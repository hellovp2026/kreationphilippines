    -webkit-text-fill-color: transparent;
    color: transparent;

  .blob {

    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;

  .blob-magenta {
    width: 600px; height: 600px;

    top: -300px; left: -200px;
    animation: floatA 16s ease-in-out infinite alternate;

  .blob-cyan {

    animation: floatB 20s ease-in-out infinite alternate;

  .blob-purple {
    width: 480px; height: 480px;

  @keyframes floatA { to { transform: translate(150px, 100px); } }
  @keyframes floatB { to { transform: translate(-120px, 80px); } }
  @keyframes floatC { to { transform: translate(-100px, -100px); } }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spinSlow { to { transform: rotate(360deg); } }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 8px 30px rgba(255,27,107,0.4), 0 0 0 0 rgba(255,27,107,0.5); }

  @keyframes scrollBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
  @keyframes pulse {

    100% { transform: scale(1.6); opacity: 0; }

  @keyframes shimmer-sweep {
    0% { transform: translateX(-120%) skewX(-20deg); }
    100% { transform: translateX(220%) skewX(-20deg); }

  @keyframes alert-pulse {

    50% { transform: translateY(0) rotate(-4deg); }
    75% { transform: translateY(-6px) rotate(2deg); }

const peso = (n) => '₱' + new Intl.NumberFormat('en-PH', { minimumFractionDigits: 0 }).format(Number(n) || 0);

const formatDate = (iso, opts = {}) => {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-PH', {
    weekday: opts.weekday || undefined,
    month: 'short',
    day: 'numeric',
    year: opts.year ? 'numeric' : undefined,
  });
};

const formatTime = (t) => {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hh = parseInt(h);
  const period = hh >= 12 ? 'PM' : 'AM';
  const h12 = hh > 12 ? hh - 12 : (hh === 0 ? 12 : hh);
  return h12 + (m && m !== '00' ? ':' + m : '') + ' ' + period;
};

function Countdown() {
  const target = React.useMemo(() => new Date('2026-08-22T13:00:00+08:00').getTime(), []);
  const [diff, setDiff] = React.useState(target - Date.now());

  React.useEffect(() => {
    const tick = () => setDiff(target - Date.now());
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [target]);

  if (diff <= 0) {
    return (
      <div className="font-mono" style={{
        fontSize: 11, letterSpacing: 2.5, color: 'var(--brand)',
        fontWeight: 700, padding: '8px 14px', textAlign: 'center',
      }}>
        ⚡ IT'S HAPPENING TODAY ⚡
      </div>
    );
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff / 3600000) % 24);
  const m = Math.floor((diff / 60000) % 60);
  const s = Math.floor((diff / 1000) % 60);

  const block = (val, label) => (
    <div style={{
      flex: '0 0 auto',
      minWidth: 64,
      padding: '10px 14px',
      borderRadius: 8,
      background: 'rgba(255,255,255,0.04)',
      border: '1px solid rgba(255,255,255,0.1)',
      textAlign: 'center',
    }}>
      <div className="font-display" style={{
        fontSize: 28, fontWeight: 900, lineHeight: 1,
        color: 'var(--text)', letterSpacing: -1,
        fontVariantNumeric: 'tabular-nums',
      }}>
        {String(val).padStart(2, '0')}
      </div>
      <div className="font-mono" style={{
        fontSize: 9, letterSpacing: 1.8, color: 'var(--text-soft)',
        fontWeight: 700, marginTop: 6,
      }}>
        {label}
      </div>
    </div>
  );

  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
    }}>
      <div className="font-mono" style={{
        fontSize: 10, letterSpacing: 3, color: 'var(--brand)', fontWeight: 700,
        display: 'flex', alignItems: 'center', gap: 8,
      }}>
        <span style={{
          width: 6, height: 6, background: 'var(--brand)', borderRadius: '50%',
          boxShadow: '0 0 10px var(--brand)',
        }} />
        COUNTDOWN TO D-DAY
      </div>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center' }}>
        {block(d, 'DAYS')}
        {block(h, 'HOURS')}
        {block(m, 'MINS')}
        {block(s, 'SECS')}
      </div>
    </div>
  );
}

// Category glyph — small decorative icon, varies per category type
function CategoryGlyph({ type, accent }) {
  const stroke = accent;
  if (type === 'mic') {
    return (
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect x="15" y="6" width="10" height="18" rx="5" stroke={stroke} strokeWidth="2.5" />
        <path d="M 9 19 C 9 25 13 30 20 30 C 27 30 31 25 31 19" stroke={stroke} strokeWidth="2.5" strokeLinecap="round" fill="none" />
        <line x1="20" y1="30" x2="20" y2="35" stroke={stroke} strokeWidth="2.5" strokeLinecap="round" />
      </svg>
    );
  }
  if (type === 'diamond') {
    return (
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M 20 4 L 34 14 L 28 36 L 12 36 L 6 14 Z"
              stroke={stroke} strokeWidth="2.5" strokeLinejoin="round" fill="none" />
        <path d="M 6 14 L 34 14 M 14 14 L 20 4 L 26 14 L 20 36"
              stroke={stroke} strokeWidth="1.5" strokeLinejoin="round" opacity="0.6" />
      </svg>
    );
  }
  if (type === 'crown') {
    return (
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M 5 14 L 11 26 L 20 8 L 29 26 L 35 14 L 32 32 L 8 32 Z" stroke={stroke} strokeWidth="2.5" strokeLinejoin="round" />
        <circle cx="5" cy="14" r="2" fill={stroke} />
        <circle cx="20" cy="8" r="2" fill={stroke} />
        <circle cx="35" cy="14" r="2" fill={stroke} />
      </svg>
    );
  }
  if (type === 'speaker') {
    return (
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M 8 14 L 14 14 L 22 8 L 22 32 L 14 26 L 8 26 Z" stroke={stroke} strokeWidth="2.5" strokeLinejoin="round" />
        <path d="M 27 14 C 30 16 30 24 27 26" stroke={stroke} strokeWidth="2.5" strokeLinecap="round" fill="none" />
        <path d="M 30 10 C 35 14 35 26 30 30" stroke={stroke} strokeWidth="2.5" strokeLinecap="round" fill="none" />
      </svg>
    );
  }
  if (type === 'star') {
    return (
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M 20 4 L 24 16 L 36 16 L 26 23 L 30 35 L 20 28 L 10 35 L 14 23 L 4 16 L 16 16 Z"
              stroke={stroke} strokeWidth="2.5" strokeLinejoin="round" />
      </svg>
    );
  }
  if (type === 'booth') {
    // A canopy/booth with a heart inside — represents a fanbooth as a love shrine
    return (
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        {/* Booth canopy */}
        <path d="M 6 14 L 20 6 L 34 14 L 32 14 L 32 34 L 8 34 L 8 14 Z"
              stroke={stroke} strokeWidth="2.5" strokeLinejoin="round" fill="none" />
        {/* Heart inside */}
        <path d="M 20 28 C 16 24 13 22 13 19 C 13 17 14.5 16 16 16 C 17.5 16 19 17 20 19 C 21 17 22.5 16 24 16 C 25.5 16 27 17 27 19 C 27 22 24 24 20 28 Z"
              fill={stroke} />
      </svg>
    );
  }
  return null;
}

function RegistrationForm({ event }) {
  const [form, setForm] = React.useState({
    category: '',
    group_name: '',
    leader_name: '',
    leader_phone: '',
    leader_email: '',
    affiliated_entertainment: '',
    member_count: '',
    member_list: '',
    song_or_idol: '',
    notes: '',
  });
  // Structured per-member rows. Synced with form.member_count.
  const [members, setMembers] = React.useState([]); // [{ name: '', age: '' }, ...]
  const [leaderIsMember, setLeaderIsMember] = React.useState(false);
  const [agreed, setAgreed] = React.useState(false);
  const [showTerms, setShowTerms] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);
  const [submittedRegistration, setSubmittedRegistration] = React.useState(null);
  const [error, setError] = React.useState(null);

  // Sync the members array when member_count changes.
  // Preserves existing entries; truncates/extends as needed.
  React.useEffect(() => {
    const n = parseInt(form.member_count, 10);
    if (!n || n < 1) {
      if (members.length !== 0) setMembers([]);
      return;
    }
    // Cap at 60 to prevent accidental huge counts blowing up the UI
    const capped = Math.min(n, 60);
    if (capped === members.length) return;
    setMembers((prev) => {
      if (capped > prev.length) {
        const additions = Array.from({ length: capped - prev.length }, () => ({ name: '', age: '' }));
        return [...prev, ...additions];
      }
      return prev.slice(0, capped);
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [form.member_count]);

  // When "leader is also a member" toggles ON, copy leader_name into member #1
  // (only if member #1 is currently empty, to avoid overwriting user typing).
  // When leader_name updates and leaderIsMember is on, keep member #1 in sync
  // as long as the user hasn't manually overridden it to something different.
  React.useEffect(() => {
    if (!leaderIsMember) return;
    if (members.length === 0) return;
    const first = members[0];
    // Only auto-fill if first member name is empty OR already matches a previous leader value
    if (first.name === '' || first._autofilledFromLeader) {
      setMembers((prev) => {
        const next = prev.slice();
        next[0] = { ...next[0], name: form.leader_name, _autofilledFromLeader: true };
        return next;
      });
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [leaderIsMember, form.leader_name]);

  const updateMember = (idx, field, value) => {
    setMembers((prev) => {
      const next = prev.slice();
      next[idx] = { ...next[idx], [field]: value };
      // If user manually edits the name, drop the autofill flag so we don't overwrite later
      if (field === 'name') next[idx]._autofilledFromLeader = false;
      return next;
    });
  };

  const isAffiliatedCategory = ['battle', 'fanchant', 'fanbooth'].includes(form.category);
  const isDanceCategory = ['open-stage', 'battle'].includes(form.category);
  const isFanCategory = ['fanchant', 'fanbooth'].includes(form.category);

  const update = (field) => (e) => setForm({ ...form, [field]: e.target.value });

  const submit = async (e) => {
    e.preventDefault();
    setError(null);

    // Validation
    if (!form.category) return setError('Please select a category.');
    if (!form.group_name.trim()) return setError('Group/Team name is required.');
    if (isAffiliatedCategory && !form.affiliated_entertainment.trim()) {
      return setError('Affiliated Dance Cover Entertainment is required for this category.');
    }
    if (!form.leader_name.trim()) return setError('Leader name is required.');
    if (!form.leader_phone.trim() && !form.leader_email.trim()) {
      return setError('Please provide either phone or email.');
    }
    const memberCountNum = parseInt(form.member_count, 10);
    if (!memberCountNum || memberCountNum < 1) {
      return setError('Number of members is required.');
    }
    if (members.length !== memberCountNum) {
      return setError('Member rows do not match the number you entered. Adjust the count.');
    }
    // Per-row validation: name required, age required and 1-99.
    for (let i = 0; i < members.length; i++) {
      const m = members[i];
      const name = (m.name || '').trim();
      const ageStr = String(m.age || '').trim();
      if (!name) return setError('Member #' + (i + 1) + ': name is required.');
      if (!ageStr) return setError('Member #' + (i + 1) + ': age is required.');
      const ageNum = parseInt(ageStr, 10);
      if (!Number.isFinite(ageNum) || ageNum < 1 || ageNum > 99) {
        return setError('Member #' + (i + 1) + ': age must be a number from 1 to 99.');
      }
    }
    if (!form.song_or_idol.trim()) {
      return setError(isDanceCategory
        ? 'Song & artist is required.'
        : 'Idol group / fandom is required.');
    }
    if (!agreed) {
      return setError('You must agree to the Event Mechanics and Terms & Conditions before submitting.');
    }

    setSubmitting(true);
    try {
      // Generate registration code AND registration id client-side.
      // This way the insert needs no SELECT round-trip (keeping anon RLS narrow),
      // and we already know the id we need for the registration_members rows.
      const generateRegCode = () => {
        // Safe alphabet: no 0/O/1/I/L (matches the SQL function)
        const alphabet = '23456789ABCDEFGHJKMNPQRSTUVWXYZ';
        let tail = '';
        for (let i = 0; i < 4; i++) {
          tail += alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        }
        return 'DKC-' + tail;
      };
      const generateUuid = () => {
        // RFC 4122 v4. crypto.randomUUID() exists in modern browsers; fallback for older.
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          return window.crypto.randomUUID();
        }
        // Fallback v4
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
          const r = (Math.random() * 16) | 0;
          const v = c === 'x' ? r : (r & 0x3) | 0x8;
          return v.toString(16);
        });
      };

      const registrationId = generateUuid();
      let registrationCode = generateRegCode();

      // Build a textual member_list for legacy display (admin CSV export reads
      // it). The AFTER INSERT trigger that used to auto-parse this into rows
      // has been removed (see kreation_fix_member_duplication.sql), so writing
      // this text no longer causes duplicate registration_members rows.
      const legacyMemberList = members
        .map((m) => (m.name || '').trim() + ', ' + String(m.age || '').trim())
        .join('\n');

      const regPayload = {
        id: registrationId,
        category: form.category,
        group_name: form.group_name.trim(),
        leader_name: form.leader_name.trim(),
        leader_phone: form.leader_phone.trim() || null,
        leader_email: form.leader_email.trim() || null,
        affiliated_entertainment: form.affiliated_entertainment.trim() || null,
        member_count: memberCountNum,
        member_list: legacyMemberList,
        song_or_idol: form.song_or_idol.trim(),
        notes: form.notes.trim() || null,
        agreed_to_terms: true,
        agreed_at: new Date().toISOString(),
        registration_code: registrationCode,
      };

      // Retry on the unique-violation for registration_code (extremely rare).
      let attempts = 0;
      let regInsertError = null;
      while (attempts < 5) {
        const { error } = await supabase
          .from('registrations')
          .insert(regPayload);
        if (!error) { regInsertError = null; break; }
        if (error.code === '23505' && (error.message || '').includes('registration_code')) {
          regPayload.registration_code = generateRegCode();
          registrationCode = regPayload.registration_code;
          attempts++;
          continue;
        }
        regInsertError = error;
        break;
      }
      if (regInsertError) throw regInsertError;

      // Insert structured members rows.
      const memberRows = members.map((m, idx) => ({
        registration_id: registrationId,
        member_name: (m.name || '').trim(),
        member_age: parseInt(String(m.age || '').trim(), 10),
        member_order: idx + 1,
        payment_status: 'unpaid',
        added_by: 'buyer_form',
      }));
      const { error: memErr } = await supabase
        .from('registration_members')
        .insert(memberRows);
      if (memErr) {
        // Members insert failed but registration succeeded. Surface a specific
        // message so we know to manually fix in admin rather than blocking the user.
        console.error('Member rows failed to insert:', memErr);
        throw new Error('Registration saved (ID: ' + registrationCode + ') but member details failed to save. Please screenshot this and message us on Instagram so we can add your members manually.');
      }

      setSubmittedRegistration({ ...regPayload });
      setSubmitted(true);
    } catch (err) {
      setError(err.message || 'Could not submit. Please try again or DM us on Instagram.');
    } finally {
      setSubmitting(false);
    }
  };

  if (submitted) {
    const regCode = (submittedRegistration && submittedRegistration.registration_code) || '';
    return (
      <section id="register" style={{
        padding: '80px 32px 40px',
        maxWidth: 1320, margin: '0 auto',
      }}>
        <div style={{
          maxWidth: 720, margin: '0 auto',
          padding: '56px 40px',
          borderRadius: 14,
          background: 'linear-gradient(135deg, rgba(255,27,107,0.1), rgba(199,36,255,0.08))',
          border: '1px solid rgba(255,27,107,0.4)',
          textAlign: 'center',
        }}>
          <div style={{
            width: 72, height: 72, margin: '0 auto 24px',
            borderRadius: '50%',
            background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
              <path d="M5 12l5 5L20 7" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <h3 className="font-display" style={{
            fontSize: 32, fontWeight: 800, letterSpacing: -1,
            margin: '0 0 14px', color: 'var(--text)',
          }}>
            Registration received.
          </h3>
          <p style={{
            fontSize: 15, lineHeight: 1.7, color: 'var(--text-muted)',
            margin: '0 0 32px',
          }}>
            We{'\u2019'}ll review your entry and reach out within 48 hours with next steps
            and the event group chat link. Check both your Instagram and email.
          </p>

          {/* REGISTRATION ID — the important part */}
          {regCode && (
            <div style={{
              marginBottom: 28,
              padding: '24px 20px',
              borderRadius: 14,
              background: 'rgba(0, 229, 255, 0.06)',
              border: '1px dashed rgba(0, 229, 255, 0.5)',
            }}>
              <div className="font-mono" style={{
                fontSize: 10, letterSpacing: 2.5, color: 'var(--accent)',
                fontWeight: 700, marginBottom: 10,
              }}>
                YOUR REGISTRATION ID
              </div>
              <div className="font-mono" style={{
                fontSize: 36, fontWeight: 800, letterSpacing: 6,
                color: 'var(--text)',
                marginBottom: 14,
                wordBreak: 'break-all',
              }}>
                {regCode}
              </div>
              <button
                onClick={() => {
                  try {
                    navigator.clipboard.writeText(regCode);
                    const btn = document.getElementById('reg-copy-btn');
                    if (btn) {
                      const orig = btn.textContent;
                      btn.textContent = 'Copied \u2713';
                      setTimeout(() => { btn.textContent = orig; }, 1800);
                    }
                  } catch (e) { /* clipboard unavailable */ }
                }}
                id="reg-copy-btn"
                style={{
                  padding: '8px 18px',
                  borderRadius: 8,
                  background: 'rgba(0, 229, 255, 0.12)',
                  border: '1px solid rgba(0, 229, 255, 0.4)',
                  color: 'var(--accent)',
                  fontFamily: 'JetBrains Mono, monospace',
                  fontSize: 11, fontWeight: 700, letterSpacing: 1.5,
                  cursor: 'pointer',
                }}
              >
                Copy ID
              </button>
              <div className="anim-alert-pulse" style={{
                marginTop: 22,
                padding: '22px 20px',
                borderRadius: 14,
                background: 'linear-gradient(135deg, rgba(255, 23, 68, 0.15), rgba(199, 36, 255, 0.08))',
                border: '2px solid rgba(255, 23, 68, 0.8)',
                textAlign: 'center',
              }}>
                <div className="anim-camera-bounce" style={{
                  fontSize: 44,
                  marginBottom: 8,
                  lineHeight: 1,
                  display: 'inline-block',
                }}>
                  📸
                </div>
                <div className="anim-flash-text font-display" style={{
                  fontSize: 22,
                  fontWeight: 900,
                  color: '#FFFFFF',
                  letterSpacing: 1.5,
                  textTransform: 'uppercase',
                  marginBottom: 12,
                  textShadow: '0 2px 8px rgba(255, 23, 68, 0.6)',
                }}>
                  Screenshot this now!
                </div>
                <div style={{
                  fontSize: 14,
                  color: '#FFE5EB',
                  lineHeight: 1.6,
                  marginBottom: 14,
                }}>
                  Save this ID. Your group will need it to pay the registration fee.
                  We won{'\u2019'}t show it again on this page.
                </div>
                <div style={{
                  padding: '14px 18px',
                  borderRadius: 8,
                  background: 'rgba(0, 0, 0, 0.35)',
                  border: '1px solid rgba(255, 255, 255, 0.15)',
                  fontFamily: 'JetBrains Mono, monospace',
                  fontSize: 14,
                  color: '#FFFFFF',
                  letterSpacing: 0.5,
                  display: 'inline-block',
                  maxWidth: '100%',
                  wordBreak: 'break-all',
                  fontWeight: 700,
                }}>
                  <div style={{
                    fontSize: 9, letterSpacing: 2.5, color: '#FFB3C7',
                    marginBottom: 6, fontFamily: 'JetBrains Mono, monospace', fontWeight: 700,
                  }}>
                    GO TO →
                  </div>
                  /participant-payment
                </div>
              </div>
            </div>
          )}

          <button
            onClick={() => {
              setForm({
                category: '', group_name: '', leader_name: '', leader_phone: '',
                leader_email: '', affiliated_entertainment: '', member_count: '',
                member_list: '', song_or_idol: '', notes: '',
              });
              setMembers([]);
              setLeaderIsMember(false);
              setAgreed(false);
              setSubmitted(false);
              setSubmittedRegistration(null);
            }}
            style={{
              padding: '12px 24px',
              borderRadius: 4,
              background: 'rgba(255,255,255,0.05)',
              border: '1px solid rgba(255,255,255,0.15)',
              color: 'var(--text)',
              fontFamily: 'Sora, sans-serif', fontWeight: 600, fontSize: 13,
              letterSpacing: 1, cursor: 'pointer',
            }}
          >
            Submit another entry
          </button>
        </div>
      </section>
    );
  }

  return (
    <section id="register" style={{
      padding: '80px 32px 40px',
      maxWidth: 1320, margin: '0 auto',
    }}>
      <div style={{ marginBottom: 40, maxWidth: 760, margin: '0 auto 40px', textAlign: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20, justifyContent: 'center' }}>
          <span style={{
            width: 36, height: 1, background: 'linear-gradient(90deg, transparent, #FF1B6B, transparent)',
          }} />
          <span className="font-mono" style={{
            fontSize: 11, letterSpacing: 3, color: 'var(--brand)', fontWeight: 700,
          }}>
            09 — REGISTER YOUR ENTRY
          </span>
          <span style={{
            width: 36, height: 1, background: 'linear-gradient(90deg, #FF1B6B, transparent)',
          }} />
        </div>
        <h2 className="font-display" style={{
          fontSize: 'clamp(36px, 5.5vw, 60px)', lineHeight: 1,
          margin: '0 0 20px', letterSpacing: -1.8, fontWeight: 800,
        }}>
          Submit your entry.
        </h2>
        <p style={{
          fontSize: 18, lineHeight: 1.7, color: 'var(--text-muted)',
          margin: '0 auto', maxWidth: 640,
        }}>
          Fill out this form to register. We'll DM you on Instagram or email you within
          48 hours with payment details and confirmation.
        </p>
      </div>

      <form onSubmit={submit} style={{
        maxWidth: 760,
        margin: '0 auto',
        padding: '40px 40px',
        borderRadius: 14,
        background: 'rgba(255,255,255,0.025)',
        border: '1px solid rgba(255,255,255,0.08)',
        display: 'flex', flexDirection: 'column', gap: 24,
      }}>
        {/* Category */}
        <FormField label="CATEGORY *">
          <select
            value={form.category}
            onChange={update('category')}
            required
            style={selectStyle}
          >
            <option value="">Select a category</option>
            <option value="open-stage">Open Stage</option>
            <option value="battle">Battle of the Entertainments</option>
            <option value="fanchant">Fanchant Battle</option>
            <option value="fanbooth">Fanbooth Battle</option>
          </select>
        </FormField>

        {/* Group / Entertainment name */}
        <FormField label={isAffiliatedCategory ? 'GROUP / TEAM NAME *' : 'GROUP NAME *'}>
          <input
            type="text"
            value={form.group_name}
            onChange={update('group_name')}
            required
            placeholder="e.g. NYX PH, XSCAPE, The Glitz"
            style={inputStyle}
          />
        </FormField>

        {/* Affiliated entertainment (conditional) */}
        {isAffiliatedCategory && (
          <FormField label="AFFILIATED DANCE COVER ENTERTAINMENT *">
            <input
              type="text"
              value={form.affiliated_entertainment}
              onChange={update('affiliated_entertainment')}
              required
              placeholder="The Entertainment you're representing"
              style={inputStyle}
            />
          </FormField>
        )}

        {/* Leader name */}
        <FormField label="LEADER / REPRESENTATIVE NAME *">
          <input
            type="text"
            value={form.leader_name}
            onChange={update('leader_name')}
            required
            placeholder="Full name"
            style={inputStyle}
          />
        </FormField>

        {/* Leader contact - phone + email side by side */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16 }}>
          <FormField label="PHONE / MESSENGER">
            <input
              type="tel"
              value={form.leader_phone}
              onChange={update('leader_phone')}
              placeholder="09XX XXX XXXX"
              style={inputStyle}
            />
          </FormField>
          <FormField label="EMAIL">
            <input
              type="email"
              value={form.leader_email}
              onChange={update('leader_email')}
              placeholder="leader@example.com"
              style={inputStyle}
            />
          </FormField>
        </div>

        {/* Member count */}
        <FormField
          label="NUMBER OF MEMBERS *"
          hint={
            form.category === 'open-stage' ? 'Minimum 4 members' :
            form.category === 'battle' ? 'Minimum 4 members' :
            form.category === 'fanchant' ? 'Minimum 10 members' :
            form.category === 'fanbooth' ? 'Exactly 3 members will staff the booth' :
            'How many members are in your group'
          }
        >
          <input
            type="number"
            min="1"
            value={form.member_count}
            onChange={update('member_count')}
            required
            placeholder="e.g. 6"
            style={inputStyle}
          />
        </FormField>

        {/* Member rows (one per member, synced with NUMBER OF MEMBERS) */}
        <FormField
          label="MEMBERS *"
          hint={
            members.length === 0
              ? 'Enter the number of members above and rows will appear here.'
              : 'Fill in each member\u2019s full name and age. Age must be 1\u201399.'
          }
        >
          {members.length > 0 && (
            <div style={{
              marginBottom: 12,
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 14px', borderRadius: 8,
              background: 'rgba(255,255,255,0.025)',
              border: '1px solid rgba(255,255,255,0.08)',
            }}>
              <input
                type="checkbox"
                id="leader-is-member"
                checked={leaderIsMember}
                onChange={(e) => setLeaderIsMember(e.target.checked)}
                style={{
                  width: 16, height: 16, cursor: 'pointer',
                  accentColor: '#FF1B6B',
                }}
              />
              <label
                htmlFor="leader-is-member"
                style={{
                  fontSize: 13, color: 'var(--text)',
                  cursor: 'pointer', userSelect: 'none',
                  lineHeight: 1.4,
                }}
              >
                Leader is also a member{' '}
                <span style={{ color: 'var(--text-soft)', fontSize: 12 }}>
                  (auto-fills member #1 with the leader name)
                </span>
              </label>
            </div>
          )}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {members.map((m, idx) => (
              <div
                key={idx}
                style={{
                  display: 'grid',
                  gridTemplateColumns: '38px 1fr 92px',
                  gap: 10,
                  alignItems: 'center',
                }}
              >
                <div
                  className="font-mono"
                  style={{
                    fontSize: 11, fontWeight: 700,
                    color: 'var(--text-soft)',
                    letterSpacing: 1,
                    textAlign: 'center',
                  }}
                >
                  #{idx + 1}
                </div>
                <input
                  type="text"
                  value={m.name || ''}
                  onChange={(e) => updateMember(idx, 'name', e.target.value)}
                  placeholder={'Member #' + (idx + 1) + ' full name'}
                  style={inputStyle}
                  required
                />
                <input
                  type="number"
                  value={m.age || ''}
                  onChange={(e) => updateMember(idx, 'age', e.target.value)}
                  placeholder="Age"
                  min="1"
                  max="99"
                  style={{ ...inputStyle, textAlign: 'center' }}
                  required
                />
              </div>
            ))}
          </div>
        </FormField>

        {/* Conditional: Song (dance) or Idol (fan) */}
        {isDanceCategory && (
          <FormField label="SONG & ARTIST *" hint="The song you'll cover, including the original artist">
            <input
              type="text"
              value={form.song_or_idol}
              onChange={update('song_or_idol')}
              required
              placeholder='e.g. "Maestro" — SEVENTEEN'
              style={inputStyle}
            />
          </FormField>
        )}
        {isFanCategory && (
          <FormField label="IDOL GROUP / FANDOM *" hint="The group your fandom is representing">
            <input
              type="text"
              value={form.song_or_idol}
              onChange={update('song_or_idol')}
              required
              placeholder="e.g. SEVENTEEN, TWICE, ATEEZ"
              style={inputStyle}
            />
          </FormField>
        )}

        {/* Notes */}
        <FormField label="NOTES" hint="Anything else we should know? (Optional)">
          <textarea
            value={form.notes}
            onChange={update('notes')}
            rows={3}
            placeholder="Special requests, accessibility needs, questions, etc."
            style={{ ...inputStyle, resize: 'vertical', fontFamily: 'Sora, sans-serif' }}
          />
        </FormField>

        {/* Agreement checkbox */}
        <label style={{
          display: 'flex', gap: 12, alignItems: 'flex-start',
          padding: '16px 18px',
          borderRadius: 8,
          background: agreed ? 'rgba(255,27,107,0.08)' : 'rgba(255,255,255,0.025)',
          border: agreed ? '1px solid rgba(255,27,107,0.4)' : '1px solid rgba(255,255,255,0.08)',
          cursor: 'pointer',
          transition: 'background 0.2s, border-color 0.2s',
        }}>
          <input
            type="checkbox"
            checked={agreed}
            onChange={(e) => setAgreed(e.target.checked)}
            style={{
              marginTop: 3,
              width: 18, height: 18,
              accentColor: '#FF1B6B',
              cursor: 'pointer',
              flexShrink: 0,
            }}
          />
          <span style={{
            fontSize: 13.5, lineHeight: 1.65, color: 'var(--text)',
          }}>
            By submitting this entry, I confirm I have read and agreed to all the{' '}
            <a
              href="#open-stage"
              style={{ color: 'var(--brand)', textDecoration: 'underline' }}
              onClick={(e) => { e.stopPropagation(); }}
            >
              Event Mechanics
            </a>
            {' '}and{' '}
            <a
              href="#"
              onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowTerms(true); }}
              style={{ color: 'var(--brand)', textDecoration: 'underline', cursor: 'pointer' }}
            >
              Terms and Conditions
            </a>
            . I understand that registration fees are non-refundable once the participant list is published.
          </span>
        </label>

        {error && (
          <div style={{
            padding: '12px 16px',
            borderRadius: 6,
            background: 'rgba(255,80,80,0.1)',
            border: '1px solid rgba(255,80,80,0.4)',
            color: '#FFA0A0', fontSize: 13.5, lineHeight: 1.5,
          }}>
            {error}
          </div>
        )}

        <div style={{
          paddingTop: 12,
          borderTop: '1px solid rgba(255,255,255,0.08)',
          display: 'flex', flexDirection: 'column', gap: 10,
        }}>
          <button
            type="submit"
            disabled={submitting}
            style={{
              padding: '16px 28px',
              borderRadius: 6,
              border: 'none',
              cursor: submitting ? 'wait' : 'pointer',
              background: submitting
                ? 'rgba(255,27,107,0.4)'
                : 'linear-gradient(135deg, #FF1B6B 0%, #C724FF 100%)',
              color: 'white',
              fontFamily: 'Sora, sans-serif',
              fontWeight: 800, fontSize: 13, letterSpacing: 1.5,
              boxShadow: submitting ? 'none' : '0 10px 30px rgba(255,27,107,0.4)',
              transition: 'transform 0.2s',
            }}
          >
            {submitting ? 'SUBMITTING...' : 'SUBMIT REGISTRATION →'}
          </button>
          <div style={{ fontSize: 12, color: 'var(--text-soft)', lineHeight: 1.5 }}>
            KPH will reach out within 48 hours with payment details and the event group chat link.
          </div>
        </div>
      </form>

      {/* Terms and Conditions Modal */}
      {showTerms && <TermsModal onClose={() => setShowTerms(false)} />}
    </section>
  );
}

function FormField({ label, children, hint }) {
  return (
    <div>
      <label className="font-mono" style={{
        display: 'block',
        fontSize: 12, letterSpacing: 2.5, color: 'var(--brand)',
        fontWeight: 700, marginBottom: 12,
      }}>
        {label}
      </label>
      {children}
      {hint && (
        <div style={{
          fontSize: 14, color: 'var(--text-soft)',
          marginTop: 10, fontStyle: 'italic', lineHeight: 1.5,
        }}>
          {hint}
        </div>
      )}
    </div>
  );
}

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 100,
        background: 'rgba(8, 2, 15, 0.85)',

        WebkitBackdropFilter: 'blur(8px)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '20px',
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}

          maxWidth: 820, width: '100%', maxHeight: '90vh',
          borderRadius: 14,
          background: '#0E0420',
          border: '1px solid rgba(255,255,255,0.1)',

          padding: '20px 28px',

          flexShrink: 0,
        }}>
          <div>
            <div className="font-mono" style={{
              fontSize: 10, letterSpacing: 2.5, color: 'var(--brand)',
              fontWeight: 700, marginBottom: 4,
            }}>
              KREATION PHILIPPINES
            </div>
            <div className="font-display" style={{
              fontSize: 22, fontWeight: 800, color: 'var(--text)',
              letterSpacing: -0.5, lineHeight: 1.1,
            }}>
              Terms and Conditions
            </div>
          </div>
          <button
            onClick={onClose}
            style={{
              width: 36, height: 36, borderRadius: '50%',
              background: 'rgba(255,255,255,0.05)',
              border: '1px solid rgba(255,255,255,0.1)',
              color: 'var(--text)', cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 20, lineHeight: 1, padding: 0,
            }}
          >
            ×

        </div>

        <div style={{
          padding: '28px',
          overflowY: 'auto',
          flex: 1,
          fontSize: 14, lineHeight: 1.75, color: 'var(--text-muted)',
        }}>
          <TermsContent />
        </div>

        <div style={{
          padding: '16px 28px',
          borderTop: '1px solid rgba(255,255,255,0.08)',
          display: 'flex', justifyContent: 'flex-end',
          flexShrink: 0,
        }}>
          <button
            onClick={onClose}
            style={{
              padding: '12px 24px',
              borderRadius: 6,
              border: 'none', cursor: 'pointer',
              background: 'linear-gradient(135deg, #FF1B6B 0%, #C724FF 100%)',
              color: 'white',
              fontFamily: 'Sora, sans-serif',
              fontWeight: 700, fontSize: 12, letterSpacing: 1.5,
              boxShadow: '0 6px 20px rgba(255,27,107,0.35)',
            }}
          >
            CLOSE
          </button>
        </div>
      </div>
    </div>
  );
}

function getUpcomingFridays(count) {
  const list = [];
  const today = new Date();
  const cursor = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1);
  while (list.length < count) {
    if (cursor.getDay() === 5) {
      list.push(new Date(cursor));
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return list;
}

function BanRevokeScreen({ onBackHome }) {
  const [step, setStep] = React.useState(1); // 1=read, 2=form, 3=success
  const [agreedConduct, setAgreedConduct] = React.useState({});
  const [form, setForm] = React.useState({
    full_name: '',
    contact_phone: '',
    contact_email: '',
    date_of_birth: '',
    previous_ban_reason: '',
    statement: '',
    location: 'davao',
    meeting_date: '',
    meeting_time: '',
  });
  const [submitting, setSubmitting] = React.useState(false);
  const [submittedApp, setSubmittedApp] = React.useState(null);
  const [error, setError] = React.useState(null);

  const allAgreed = CONDUCT_RULES.every((r) => agreedConduct[r.id]);
  const update = (field) => (e) => setForm({ ...form, [field]: e.target.value });
  const fridays = React.useMemo(() => getUpcomingFridays(12), []);

  const toggleRule = (id) => setAgreedConduct({ ...agreedConduct, [id]: !agreedConduct[id] });

  const proceedToForm = () => {
    if (!allAgreed) {
      setError('You must agree to all 8 rules of the code of conduct.');
      return;
    }
    setError(null);
    setStep(2);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const submit = async (e) => {
    e.preventDefault();
    setError(null);
    if (!form.full_name.trim()) return setError('Full name is required.');
    if (!form.contact_email.trim()) return setError('Email is required.');
    if (!form.statement.trim()) return setError('A statement about your accountability and growth is required.');
    if (!form.meeting_date) return setError('Please pick a meeting date.');
    if (!form.meeting_time) return setError('Please pick a meeting time.');

    setSubmitting(true);
    try {
      const payload = {
        full_name: form.full_name.trim(),
        contact_phone: form.contact_phone.trim() || null,
        contact_email: form.contact_email.trim(),
        date_of_birth: form.date_of_birth || null,
        previous_ban_reason: form.previous_ban_reason.trim() || null,
        statement: form.statement.trim(),
        location: form.location,
        meeting_date: form.meeting_date,
        meeting_time: form.meeting_time,
        agreed_to_conduct: true,
        agreed_at: new Date().toISOString(),
      };
      const { data, error: insertError } = await supabase
        .from('ban_revoke_applications')
        .insert(payload)
        .select()
        .single();
      if (insertError) throw insertError;
      setSubmittedApp(data || payload);
      setStep(3);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (err) {
      setError(err.message || 'Could not submit. Please try again.');
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div style={{
      minHeight: '100vh', position: 'relative', overflow: 'hidden',
      background: 'radial-gradient(ellipse at top, #1A0533 0%, #08020F 60%)',
    }}>
      <CompeteNav onBackHome={onBackHome} onBuyTickets={() => {}} />

      <BanRevokeHero />

      {step === 1 && (
        <BanRevokeStepRead
          agreedConduct={agreedConduct}
          toggleRule={toggleRule}
          allAgreed={allAgreed}
          onProceed={proceedToForm}
          error={error}
        />
      )}

      {step === 2 && (
        <BanRevokeStepForm
          form={form}
          update={update}
          setForm={setForm}
          fridays={fridays}
          onSubmit={submit}
          submitting={submitting}
          error={error}
          onBack={() => { setStep(1); window.scrollTo({ top: 0 }); }}
        />
      )}

      {step === 3 && submittedApp && (
        <BanRevokeStepSuccess application={submittedApp} />
      )}

      <HomeFooter />
    </div>
  );
}

    </section>
  );

function App() {
  const [view, setView] = useState('home'); // 'home' | 'checkout' | 'event-detail' | 'compete' | 'ban-revoke' | 'ban-revoke'
  const [activeEventId, setActiveEventId] = useState(null);
  const [step, setStep] = useState('tickets');
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);

  // Catalog data
  const [event, setEvent] = useState(null);
  const [ticketTypes, setTicketTypes] = useState([]);
  const [addOns, setAddOns] = useState([]);
  const [pickupSlots, setPickupSlots] = useState([]);
  const [seats, setSeats] = useState([]);
  const [takenSeatIds, setTakenSeatIds] = useState(new Set());

  // Cart state
  const [cart, setCart] = useState({});       // { ticketTypeId: quantity }
  const [attendees, setAttendees] = useState([]); // [{ name, ticketTypeId, hasRaveParty, seatId? }]
  const [pickupSlotId, setPickupSlotId] = useState(null);
  const [buyer, setBuyer] = useState({ name: '', email: '', phone: '' });
  const [paymentRef, setPaymentRef] = useState('');
  const [receiptFile, setReceiptFile] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState(null);
  const [submittedOrder, setSubmittedOrder] = useState(null);

  // Load data
  useEffect(() => {
    (async () => {
      try {
        const [evR, ttR, aR, psR, sR, osR, oR] = await Promise.all([
          supabase.from('events').select('*').eq('is_active', true).limit(1).maybeSingle(),
          supabase.from('ticket_types').select('*').order('display_order'),
          supabase.from('add_ons').select('*').eq('is_active', true).order('display_order'),
          supabase.from('pickup_slots').select('*').eq('is_active', true).order('slot_date'),
          supabase.from('seats').select('*').order('row_label').order('seat_number'),
          supabase.from('order_seats').select('seat_id, orders!inner(status)'),
          supabase.from('orders').select('id, status').in('status', ['awaiting_verification', 'confirmed', 'pending_payment'])
        ]);
        if (evR.error) throw evR.error;
        if (!evR.data) throw new Error('No active event configured yet.');
        setEvent(evR.data);
        // Hide Participant tier — performers pay via the separate /participant-payment.html page
        const filteredTypes = (ttR.data || []).filter(function(t) {
          const n = (t.name || '').toLowerCase();
          return !n.includes('participant') && !n.includes('performer');
        });
        setTicketTypes(filteredTypes);
        setAddOns(aR.data || []);
        setPickupSlots(psR.data || []);
        setSeats(sR.data || []);

        // Build set of taken seat IDs (seats in active orders)
        const activeOrderIds = new Set((oR.data || []).map(o => o.id));
        const taken = new Set();
        (osR.data || []).forEach(os => {
          if (activeOrderIds.has(os.order_id)) taken.add(os.seat_id);
          // Note: orders!inner join returns the join row; we check via active list above
        });
        // Fallback: use the inner-joined status field if provided
        (osR.data || []).forEach(os => {
          if (os.orders && ['awaiting_verification', 'confirmed', 'pending_payment'].includes(os.orders.status)) {
            taken.add(os.seat_id);
          }
        });
        setTakenSeatIds(taken);

        setLoading(false);
      } catch (err) {
        console.error('[Load error]', err);
        setLoadError(err.message || String(err));
        setLoading(false);
      }
    })();
  }, []);

  // Compute attendees when cart changes
  const syncAttendees = useCallback(() => {
    const built = [];
    ticketTypes.forEach(tt => {
      const qty = cart[tt.id] || 0;
      for (let i = 0; i < qty; i++) {
        // Preserve existing data if attendee at same position+type already exists
        const existing = attendees.filter(a => a.ticketTypeId === tt.id)[i];
        built.push({
          name: existing ? existing.name : '',
          ticketTypeId: tt.id,
          hasRaveParty: existing ? existing.hasRaveParty : false,
          seatId: existing ? existing.seatId : null,
        });
      }
    });
    setAttendees(built);
  }, [cart, ticketTypes, attendees]);

  // Pricing
  const totals = useMemo(() => {
    // Ticket count + subtotal come from cart so the running total updates live on Step 1
    // (attendees only syncs when the user clicks Continue out of Step 1).
    const ticketCount = Object.values(cart).reduce((s, n) => s + Number(n || 0), 0);
    const subtotal = Object.entries(cart).reduce((sum, [tid, qty]) => {
      const tt = ticketTypes.find(t => t.id === tid);
      return sum + Number(tt ? tt.price : 0) * Number(qty || 0);
    }, 0);
    const raveCount = attendees.filter(a => a.hasRaveParty).length;
    const raveAddOn = addOns.find(a => a.name.toLowerCase().includes('rave'));
    const ravePrice = raveAddOn ? Number(raveAddOn.price) : 400;
    const addOnTotal = raveCount * ravePrice;
    const total = subtotal + addOnTotal;
    return { ticketCount, subtotal, raveCount, ravePrice, addOnTotal, total };
  }, [cart, attendees, ticketTypes, addOns]);

  const vipTicketType = ticketTypes.find(t => t.has_assigned_seats);
  const vipAttendees = attendees.filter(a => vipTicketType && a.ticketTypeId === vipTicketType.id);
  const needSeats = vipAttendees.length > 0;

  // Listen for prev/next event navigation from EventDetailView
  useEffect(() => {
    const handler = (e) => {
      setActiveEventId(e.detail);
      window.scrollTo({ top: 0, behavior: 'auto' });
    };
    window.addEventListener('kph-open-event', handler);
    return () => window.removeEventListener('kph-open-event', handler);
  }, []);

  if (loading) return <LoadingScreen />;
  if (loadError) return <ErrorScreen message={loadError} />;

  if (view === 'event-detail') {
    return (
      <EventDetailView
        eventId={activeEventId}
        onBackHome={() => { setView('home'); window.scrollTo({ top: 0 }); }}
        onBackToHallOfFame={() => {
          setView('home');
          // Scroll to archive section after mount
          setTimeout(() => {
            const el = document.getElementById('archive');
            if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' });
          }, 50);
        }}
      />
    );
  }

  if (view === 'compete') {
    return (
      <CompeteScreen
        event={event}
        onBackHome={() => { setView('home'); window.scrollTo({ top: 0 }); }}
        onBuyTickets={() => {
          setView('checkout');
          setStep('tickets');
          window.scrollTo({ top: 0, behavior: 'auto' });
        }}
      />
    );
  }

  if (view === 'ban-revoke') {
    return (
      <BanRevokeScreen
        onBackHome={() => { setView('home'); window.scrollTo({ top: 0 }); }}
      />
    );
  }

  if (view === 'ban-revoke') {
    return (
      <BanRevokeScreen
        onBackHome={() => { setView('home'); window.scrollTo({ top: 0 }); }}
      />
    );
  }

  if (view === 'home') {
    return (
      <HomeScreen
        event={event}
        ticketTypes={ticketTypes}
        addOns={addOns}
        onBuyTickets={() => {
          setView('checkout');
          setStep('tickets');
          window.scrollTo({ top: 0, behavior: 'auto' });
        }}
        onOpenEvent={(eventId) => {
          setActiveEventId(eventId);
          setView('event-detail');
          window.scrollTo({ top: 0, behavior: 'auto' });
        }}
        onOpenCompete={() => {
          setView('compete');
          window.scrollTo({ top: 0, behavior: 'auto' });
        }}
        onOpenRegister={() => {
          setView('compete');
          setTimeout(() => {
            const el = document.getElementById('register');
            if (el) {
              el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
              window.scrollTo({ top: 0, behavior: 'auto' });
            }
          }, 120);
        }}
        onOpenBanRevoke={() => {
          setView('ban-revoke');
          window.scrollTo({ top: 0, behavior: 'auto' });
        }}
      />
    );
  }

  if (step === 'done') return <DoneScreen order={submittedOrder} event={event} onReturnHome={() => { setView('home'); setStep('tickets'); window.scrollTo({ top: 0 }); }} />;

  const goNext = () => {
    if (step === 'tickets') {
      syncAttendees();
      setStep('attendees');
    } else if (step === 'attendees') {
      setStep(needSeats ? 'seats' : 'details');
    } else if (step === 'seats') {
      setStep('details');
    } else if (step === 'details') {
      setStep('payment');
    }
  };

  const goBack = () => {
    if (step === 'attendees') setStep('tickets');
    else if (step === 'seats') setStep('attendees');
    else if (step === 'details') setStep(needSeats ? 'seats' : 'attendees');
    else if (step === 'payment') setStep('details');
  };

  return (
    <div style={{
      minHeight: '100vh', position: 'relative', overflow: 'hidden',
      background: 'radial-gradient(ellipse at top, #1A0533 0%, #08020F 60%)'
    }}>
      <div className="blob blob-magenta" />
      <div className="blob blob-cyan" />
      <div className="blob blob-purple" />

      <TopBar onHome={() => { setView('home'); window.scrollTo({ top: 0 }); }} />

      <main style={{ position: 'relative', zIndex: 1, maxWidth: 900, margin: '0 auto', padding: '20px 20px 60px' }}>
        {step === 'tickets' && (
          <>
            <EventHero event={event} />
            <StepProgress current={1} needSeats={needSeats} />
            <TicketsStep
              ticketTypes={ticketTypes}
              cart={cart} setCart={setCart}
              seats={seats} takenSeatIds={takenSeatIds}
              onNext={goNext}
              totals={totals}
            />
          </>
        )}
        {step === 'attendees' && (
          <>
            <StepProgress current={2} needSeats={needSeats} />
            <AttendeesStep
              attendees={attendees} setAttendees={setAttendees}
              ticketTypes={ticketTypes}
              ravePrice={totals.ravePrice}
              totals={totals}
              onNext={goNext} onBack={goBack}
            />
          </>
        )}
        {step === 'seats' && (
          <>
            <StepProgress current={3} needSeats={needSeats} />
            <SeatsStep
              seats={seats} takenSeatIds={takenSeatIds}
              vipAttendees={vipAttendees}
              attendees={attendees} setAttendees={setAttendees}
              vipTicketType={vipTicketType}
              onNext={goNext} onBack={goBack}
            />
          </>
        )}
        {step === 'details' && (
          <>
            <StepProgress current={needSeats ? 4 : 3} needSeats={needSeats} />
            <DetailsStep
              pickupSlots={pickupSlots}
              pickupSlotId={pickupSlotId} setPickupSlotId={setPickupSlotId}
              buyer={buyer} setBuyer={setBuyer}
              totals={totals}
              onNext={goNext} onBack={goBack}
            />
          </>
        )}
        {step === 'payment' && (
          <>
            <StepProgress current={needSeats ? 5 : 4} needSeats={needSeats} />
            <PaymentStep
              event={event} totals={totals}
              paymentRef={paymentRef} setPaymentRef={setPaymentRef}
              receiptFile={receiptFile} setReceiptFile={setReceiptFile}
              submitting={submitting} submitError={submitError}
              attendees={attendees} buyer={buyer}
              pickupSlotId={pickupSlotId}
              ticketTypes={ticketTypes} addOns={addOns}
              onBack={goBack}
              onSubmit={async () => {
                setSubmitting(true); setSubmitError(null);
                try {
                  const order = await submitOrder({
                    event, ticketTypes, addOns, attendees, buyer,
                    pickupSlotId, paymentRef, receiptFile, totals
                  });
                  setSubmittedOrder(order);
                  setStep('done');
                } catch (err) {
                  console.error('[Submit error]', err);
                  setSubmitError(err.message || String(err));
                } finally {
                  setSubmitting(false);
                }
              }}
            />
          </>
        )}
      </main>
    </div>
  );
}

// ============================================================
// SUBMIT ORDER (creates order + attendees + order_seats + order_add_ons)
// ============================================================
async function submitOrder({
  event, ticketTypes, addOns, attendees, buyer,
  pickupSlotId, paymentRef, receiptFile, totals
}) {
  // 1. Upload receipt to storage first
  const ext = receiptFile.name.split('.').pop().toLowerCase();
  const path = 'receipts/' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.' + ext;
  const upR = await supabase.storage.from('receipts').upload(path, receiptFile, { upsert: false });
  if (upR.error) throw new Error('Receipt upload failed: ' + upR.error.message);

  // 2. Create order
  const primaryTicketTypeId = attendees[0] ? attendees[0].ticketTypeId : null;
  const insOrder = await supabase.from('orders').insert({
    event_id: event.id,
    ticket_type_id: primaryTicketTypeId,
    pickup_slot_id: pickupSlotId,
    buyer_name: buyer.name.trim(),
    buyer_email: buyer.email.trim().toLowerCase(),
    buyer_phone: buyer.phone.trim(),
    subtotal: totals.subtotal,
    add_on_total: totals.addOnTotal,
    total: totals.total,
    payment_method: 'GCash',
    reference_number: paymentRef.trim(),
    receipt_path: path,
    receipt_uploaded_at: new Date().toISOString(),
    status: 'awaiting_verification',
  }).select().single();
  if (insOrder.error) throw new Error('Order creation failed: ' + insOrder.error.message);
  const order = insOrder.data;

  // 3. Insert attendees
  const attendeeRows = attendees.map((a, i) => ({
    order_id: order.id,
    name: a.name.trim(),
    ticket_type_id: a.ticketTypeId,
    seat_id: a.seatId || null,
    has_rave_party: !!a.hasRaveParty,
    display_order: i,
  }));
  if (attendeeRows.length > 0) {
    const insAtt = await supabase.from('attendees').insert(attendeeRows);
    if (insAtt.error) throw new Error('Attendee save failed: ' + insAtt.error.message);
  }

  // 4. Insert order_seats for VIP attendees with seats
  const seatRows = attendees
    .filter(a => a.seatId)
    .map(a => ({ order_id: order.id, seat_id: a.seatId }));
  if (seatRows.length > 0) {
    const insSeats = await supabase.from('order_seats').insert(seatRows);
    if (insSeats.error) throw new Error('Seat reservation failed: ' + insSeats.error.message);
  }

  // 5. Insert order_add_ons (one row aggregating rave party count)
  if (totals.raveCount > 0) {
    const raveAddOn = addOns.find(a => a.name.toLowerCase().includes('rave'));
    if (raveAddOn) {
      const insAo = await supabase.from('order_add_ons').insert({
        order_id: order.id,
        add_on_id: raveAddOn.id,
        quantity: totals.raveCount,
        price_each: raveAddOn.price,
      });
      if (insAo.error) throw new Error('Add-on save failed: ' + insAo.error.message);
    }
  }

  return order;
}

function StepProgress({ current, needSeats }) {

    ? ['Tickets', 'Attendees', 'Seats', 'Details', 'Payment']
    : ['Tickets', 'Attendees', 'Details', 'Payment'];

        return (
          <div key={label} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            padding: '5px 11px', borderRadius: 999,
            background: active
              ? 'linear-gradient(135deg, rgba(255, 27, 107, 0.18), rgba(199, 36, 255, 0.18))'
              : done ? 'rgba(0, 230, 118, 0.1)' : 'rgba(255, 255, 255, 0.04)',

              : done ? '1px solid rgba(0, 230, 118, 0.3)'
              : '1px solid var(--border)',

            letterSpacing: 0.3, fontFamily: 'Sora'
          }}>
            <span className="font-mono" style={{ fontSize: 10, opacity: 0.7 }}>
              {done ? '✓' : num}
            </span>
            {label}
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// TICKETS STEP
// ============================================================
function TicketsStep({ ticketTypes, cart, setCart, seats, takenSeatIds, onNext, totals }) {
  const update = (id, delta, max) => {
    setCart(prev => {
      const current = prev[id] || 0;
      let next = current + delta;
      if (next < 0) next = 0;
      if (max != null && next > max) next = max;
      return { ...prev, [id]: next };
    });
  };

  const remaining = (tt) => {
    if (tt.has_assigned_seats) {
      const total = seats.filter(s => s.ticket_type_id === tt.id).length;
      const taken = seats.filter(s => s.ticket_type_id === tt.id && takenSeatIds.has(s.id)).length;
      return total - taken;
    }
    return tt.capacity; // free-seating or unlimited; capacity is best estimate
  };

  return (
    <Card>
      <SectionTitle eyebrow="Step 1" title="Choose your tickets" />

      <div style={{ display: 'grid', gap: 14 }}>
        {ticketTypes.map(tt => {
          const qty = cart[tt.id] || 0;
          const rem = remaining(tt);
          const max = rem == null ? 99 : rem;
          const soldOut = rem != null && rem <= 0;
          return (
            <div key={tt.id} style={{
              padding: '18px 18px',
              background: qty > 0 ? 'rgba(255, 27, 107, 0.06)' : 'rgba(255, 255, 255, 0.02)',
              border: '1px solid ' + (qty > 0 ? 'rgba(255, 27, 107, 0.35)' : 'var(--border)'),
              borderRadius: 14,
              transition: 'all 0.18s',
              opacity: soldOut ? 0.55 : 1
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap' }}>
                <div style={{ flex: '1 1 280px', minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
                    <span className="font-display" style={{ fontSize: 18, fontWeight: 800, color: 'var(--text)' }}>{tt.name}</span>
                    {tt.category === 'dancer' && (
                      <span style={{
                        fontSize: 9, padding: '2px 8px', borderRadius: 999,
                        background: 'rgba(0, 229, 255, 0.12)', color: 'var(--accent)',
                        letterSpacing: 1, fontWeight: 700, border: '1px solid rgba(0, 229, 255, 0.3)',
                        fontFamily: 'Sora'
                      }}>DANCER</span>
                    )}
                    {tt.has_assigned_seats && (
                      <span style={{
                        fontSize: 9, padding: '2px 8px', borderRadius: 999,
                        background: 'rgba(255, 179, 0, 0.12)', color: 'var(--warn)',
                        letterSpacing: 1, fontWeight: 700, border: '1px solid rgba(255, 179, 0, 0.3)',
                        fontFamily: 'Sora'
                      }}>ASSIGNED SEAT</span>
                    )}
                  </div>
                  <div style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.55, marginBottom: 10 }}>
                    {tt.description}
                  </div>
                  <div className="font-display" style={{ fontSize: 22, fontWeight: 800, color: 'var(--text)' }}>
                    {peso(tt.price)}{tt.category === 'dancer' ? <span style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-soft)' }}> / member</span> : ''}
                  </div>
                  {rem != null && rem > 0 && rem <= 30 && (
                    <div style={{ fontSize: 11, color: 'var(--warn)', marginTop: 6, fontWeight: 600 }}>
                      Only {rem} left
                    </div>
                  )}
                </div>

                <div style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  background: 'rgba(255, 255, 255, 0.04)',
                  padding: '6px 8px', borderRadius: 999,
                  border: '1px solid var(--border)'
                }}>
                  <QtyBtn onClick={() => update(tt.id, -1)} disabled={qty === 0}>
                    <Icon name="minus" size={14} />
                  </QtyBtn>
                  <span className="font-mono" style={{
                    minWidth: 28, textAlign: 'center', fontSize: 16, fontWeight: 700
                  }}>{soldOut ? '–' : qty}</span>
                  <QtyBtn onClick={() => update(tt.id, 1, max)} disabled={soldOut || qty >= max}>
                    <Icon name="plus" size={14} />
                  </QtyBtn>
                </div>
              </div>
            </div>
          );
        })}

        {/* Pay As Participant tile — for performers who have already

            New performers should register first via the Mechanics page. */}
        <a href="./participant-payment.html"
           style={{
             display: 'block', textDecoration: 'none',
             padding: '18px 18px',
             background: 'rgba(199, 36, 255, 0.06)',
             border: '1px solid rgba(199, 36, 255, 0.35)',
             borderRadius: 14,
             transition: 'all 0.18s',
           }}
           onMouseEnter={(e) => {
             e.currentTarget.style.background = 'rgba(199, 36, 255, 0.1)';
             e.currentTarget.style.borderColor = 'rgba(199, 36, 255, 0.6)';
             e.currentTarget.style.boxShadow = '0 0 24px rgba(199, 36, 255, 0.2)';
           }}
           onMouseLeave={(e) => {
             e.currentTarget.style.background = 'rgba(199, 36, 255, 0.06)';
             e.currentTarget.style.borderColor = 'rgba(199, 36, 255, 0.35)';
             e.currentTarget.style.boxShadow = 'none';
           }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap' }}>
            <div style={{ flex: '1 1 280px', minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
                <span className="font-display" style={{ fontSize: 18, fontWeight: 800, color: 'var(--text)' }}>Pay As Participant</span>
                <span style={{
                  fontSize: 9, padding: '2px 8px', borderRadius: 999,
                  background: 'rgba(199, 36, 255, 0.18)', color: '#D88BFF',
                  letterSpacing: 1, fontWeight: 700, border: '1px solid rgba(199, 36, 255, 0.4)',
                  fontFamily: 'Sora'

              </div>

              </div>
              <div className="font-display" style={{ fontSize: 22, fontWeight: 800, color: 'var(--text)' }}>
                ₱300<span style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-soft)' }}> / member</span>

// ============================================================
// ATTENDEES STEP
// ============================================================
function AttendeesStep({ attendees, setAttendees, ticketTypes, ravePrice, totals, onNext, onBack }) {

    counters[a.ticketTypeId] = (counters[a.ticketTypeId] || 0) + 1;
    return { ...a, _num: counters[a.ticketTypeId] };
  });

  const setField = (idx, field, value) => {
    setAttendees(prev => prev.map((a, i) => i === idx ? { ...a, [field]: value } : a));
  };

  return (
    <Card>
      <SectionTitle
        eyebrow="Step 2"
        title="Who's coming?"
        subtitle="Each ticket needs a name (this is what'll print on the ticket). Tick the Rave Party box per attendee who wants to add it."

      <div style={{ display: 'grid', gap: 10 }}>
        {numbered.map((a, i) => (
          <div key={i} style={{
            padding: 14,
            background: 'rgba(255, 255, 255, 0.02)',
            border: '1px solid var(--border)',

            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10,

              letterSpacing: 1.2, textTransform: 'uppercase', fontFamily: 'Sora'
            }}>
              <Icon name="user" size={12} />
              {ttName(a.ticketTypeId)} #{a._num}
            </div>
            <input
              type="text" value={a.name}
              onChange={(e) => setField(i, 'name', e.target.value)}
              placeholder="Full name"
              style={{
                width: '100%', padding: '11px 14px', borderRadius: 10,
                fontSize: 14, marginBottom: 10, boxSizing: 'border-box'
              }}
            />
            <label style={{
              display: 'flex', alignItems: 'center', gap: 10,
              cursor: 'pointer', userSelect: 'none', padding: '6px 0'
            }}>
              <div className={'checkbox' + (a.hasRaveParty ? ' checked' : '')}
                   onClick={() => setField(i, 'hasRaveParty', !a.hasRaveParty)}>
                {a.hasRaveParty && <Icon name="check" size={13} strokeWidth={3} />}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 13, fontWeight: 600 }}>
                  Add Rave Party Pass
                </span>
                <span style={{
                  fontSize: 11, padding: '2px 8px', borderRadius: 999,
                  background: 'rgba(199, 36, 255, 0.12)',
                  color: 'var(--brand-2)', fontWeight: 700,
                  border: '1px solid rgba(199, 36, 255, 0.3)'

                  +{peso(ravePrice)}
                </span>
              </div>

      <FooterBar
        summary={
          <>
            <div style={{ fontSize: 11, color: 'var(--text-soft)', letterSpacing: 1, fontWeight: 600, fontFamily: 'Sora' }}>
              TOTAL · {totals.raveCount > 0 ? totals.raveCount + ' rave pass' + (totals.raveCount === 1 ? '' : 'es') : 'no add-ons'}
            </div>
            <div className="font-display grad-text-tight" style={{ fontSize: 22, fontWeight: 800 }}>
              {peso(totals.total)}
            </div>
          </>
        }
        right={
          <div style={{ display: 'flex', gap: 8 }}>
            <GhostBtn onClick={onBack}><Icon name="back" size={14} /> Back</GhostBtn>

              Continue <Icon name="arrow" size={14} />
            </PrimaryBtn>
          </div>

  );
}

// ============================================================
// SEATS STEP
// ============================================================
function SeatsStep({ seats, takenSeatIds, vipAttendees, attendees, setAttendees, vipTicketType, onNext, onBack }) {
  // Index of which VIP attendees have a seat
  const vipAttendeeIndices = attendees
    .map((a, i) => a.ticketTypeId === vipTicketType.id ? i : -1)
    .filter(i => i >= 0);

  const needed = vipAttendees.length;
  const assigned = vipAttendees.filter(a => a.seatId).length;
  const selectedSeatIds = new Set(vipAttendees.map(a => a.seatId).filter(Boolean));

  const toggleSeat = (seat) => {
    if (takenSeatIds.has(seat.id)) return;
    // Find next unassigned VIP attendee or the one currently holding this seat
    const idxWithThisSeat = attendees.findIndex(a => a.seatId === seat.id);
    if (idxWithThisSeat >= 0) {
      // Unassign
      setAttendees(prev => prev.map((a, i) => i === idxWithThisSeat ? { ...a, seatId: null } : a));
      return;
    }
    // Find next unassigned VIP attendee
    const nextIdx = vipAttendeeIndices.find(i => !attendees[i].seatId);
    if (nextIdx == null) return; // all assigned
    setAttendees(prev => prev.map((a, i) => i === nextIdx ? { ...a, seatId: seat.id } : a));
  };

  // Build grid by row
  const vipSeats = seats.filter(s => s.ticket_type_id === vipTicketType.id);
  const rows = {};
  vipSeats.forEach(s => {
    if (!rows[s.row_label]) rows[s.row_label] = [];
    rows[s.row_label].push(s);
  });
  Object.keys(rows).forEach(r => rows[r].sort((a, b) => a.seat_number - b.seat_number));
  const rowLabels = Object.keys(rows).sort();

  return (
    <Card>
      <SectionTitle
        eyebrow="Step 3"
        title="Pick your seats"
        subtitle={'Select ' + needed + ' seat' + (needed === 1 ? '' : 's') + ' for your VIP attendees. Click a selected seat to remove it.'}
      />

      <div style={{
        background: 'rgba(255, 27, 107, 0.06)',
        border: '1px solid rgba(255, 27, 107, 0.2)',
        borderRadius: 10, padding: '12px 16px',
        fontSize: 13, fontWeight: 600,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8,
        marginBottom: 18
      }}>
        <span>Seats selected:</span>
        <span className="font-mono" style={{ color: 'var(--brand)', fontSize: 16 }}>
          {assigned} / {needed}
        </span>
      </div>

      {/* Stage indicator */}
      <div style={{
        textAlign: 'center', padding: '10px 0',
        background: 'linear-gradient(180deg, rgba(255, 27, 107, 0.15), transparent)',
        borderRadius: 8, marginBottom: 24,
        fontSize: 11, letterSpacing: 4, color: 'var(--text-muted)', fontWeight: 700, fontFamily: 'Sora'
      }}>
        ▼ STAGE ▼
      </div>

      {/* Seat grid — split into two blocks with an aisle gap.
          Left block: seats 1-14. Right block: seats 15-28.
          Airplane-style numbering — row letter continues across both blocks. */}
      <div style={{
        overflowX: 'auto', padding: '4px 0 12px', WebkitOverflowScrolling: 'touch'
      }}>
        <div style={{ display: 'inline-block', minWidth: '100%' }}>
          {rowLabels.map(row => {
            const rowSeats = rows[row] || [];
            const leftBlock = rowSeats.filter(s => s.seat_number <= 14);
            const rightBlock = rowSeats.filter(s => s.seat_number > 14);

            const renderSeat = (seat) => {
              const taken = takenSeatIds.has(seat.id);
              const selected = selectedSeatIds.has(seat.id);
              const cls = 'seat' + (taken ? ' seat-taken' : '') + (selected ? ' seat-selected' : '');
              const attIdx = attendees.findIndex(a => a.seatId === seat.id);
              const vipNum = attIdx >= 0
                ? vipAttendeeIndices.indexOf(attIdx) + 1
                : null;
              return (
                <div key={seat.id} className={cls}
                     onClick={() => toggleSeat(seat)}
                     title={row + seat.seat_number}>
                  {selected ? vipNum : seat.seat_number}
                </div>
              );
            };

            return (
              <div key={row} style={{
                display: 'flex', alignItems: 'center', gap: 4,
                marginBottom: 4, justifyContent: 'center'
              }}>
                <span className="font-mono" style={{
                  fontSize: 10, color: 'var(--text-soft)', width: 18, textAlign: 'right', fontWeight: 700
                }}>{row}</span>
                <div style={{ display: 'flex', gap: 4 }}>
                  {leftBlock.map(renderSeat)}
                </div>
                {/* Aisle gap */}
                <span style={{
                  width: 16, textAlign: 'center',
                  fontSize: 9, color: 'var(--text-soft)',
                  fontFamily: 'JetBrains Mono, monospace',
                }}>{'\u00b7'}</span>
                <div style={{ display: 'flex', gap: 4 }}>
                  {rightBlock.map(renderSeat)}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <Legend />

      {/* Per-attendee summary */}
      <div style={{ marginTop: 20, padding: 14, background: 'rgba(255, 255, 255, 0.02)', borderRadius: 10, border: '1px solid var(--border)' }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-soft)', letterSpacing: 1.2, textTransform: 'uppercase', marginBottom: 10, fontFamily: 'Sora' }}>
          Your VIP attendees
        </div>
        <div style={{ display: 'grid', gap: 6 }}>
          {vipAttendees.map((a, i) => {
            const seat = a.seatId ? seats.find(s => s.id === a.seatId) : null;
            return (
              <div key={i} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                fontSize: 13, padding: '4px 0'
              }}>
                <span><strong>VIP #{i + 1}</strong> · {a.name}</span>
                <span className="font-mono" style={{
                  color: seat ? 'var(--brand)' : 'var(--text-soft)',
                  fontWeight: seat ? 700 : 400
                }}>
                  {seat ? seat.row_label + seat.seat_number : 'unassigned'}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      <FooterBar
        right={
          <div style={{ display: 'flex', gap: 8 }}>
            <GhostBtn onClick={onBack}><Icon name="back" size={14} /> Back</GhostBtn>
            <PrimaryBtn onClick={onNext} disabled={assigned !== needed}>
              Continue <Icon name="arrow" size={14} />
            </PrimaryBtn>
          </div>
        }
      />
    </Card>
  );
}

function Legend() {
  return (
    <div style={{
      display: 'flex', gap: 14, fontSize: 11, color: 'var(--text-muted)',
      justifyContent: 'center', flexWrap: 'wrap', marginTop: 12

      <LegendDot color="rgba(255, 255, 255, 0.08)" label="Available" />
