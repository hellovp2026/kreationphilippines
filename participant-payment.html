<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Performer Payment · Davao K-Pop Convention 2026 · Kreation Philippines</title>
<link rel="icon" type="image/png" href="./kph-favicon.png" />
<meta name="description" content="Pay your performer registration fee for Davao K-Pop Convention 2026." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --brand: #FF1B6B;
  --brand-2: #C724FF;
  --accent: #00E5FF;
  --bg: #08020F;
  --surface: rgba(255, 255, 255, 0.04);
  --border: rgba(255, 255, 255, 0.10);
  --text: #FFFFFF;
  --text-muted: #B4B0C8;
  --text-soft: #7A7891;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 80% 0%, rgba(199, 36, 255, 0.20), transparent 60%),
    radial-gradient(ellipse 50% 50% at 0% 100%, rgba(255, 27, 107, 0.18), transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0, 229, 255, 0.05), transparent 60%);
  background-attachment: fixed;
}
.font-display { font-family: 'Bungee', sans-serif; }
.font-mono { font-family: 'JetBrains Mono', monospace; }
.font-body { font-family: 'Sora', sans-serif; }

input, textarea, button, select {
  font-family: inherit;
}
input[type="text"], input[type="email"], input[type="tel"], textarea {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  transition: border 0.15s, background 0.15s;
}
input[type="text"]:focus, input[type="email"]:focus, input[type="tel"]:focus, textarea:focus {
  outline: none;
  border-color: var(--brand);
  background: rgba(255, 255, 255, 0.06);
}
input::placeholder, textarea::placeholder {
  color: var(--text-soft);
}
.anim-fadein { animation: fadein 0.3s ease-out; }
@keyframes fadein {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Tick box styling */
.member-card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.member-card:hover:not(.member-card-disabled) {
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(255, 27, 107, 0.4);
}
.member-card.member-card-selected {
  background: linear-gradient(135deg, rgba(255, 27, 107, 0.15), rgba(199, 36, 255, 0.10));
  border-color: rgba(255, 27, 107, 0.6);
}
.member-card.member-card-disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.checkbox-square {
  width: 22px;
  height: 22px;
  border: 2px solid rgba(255, 255, 255, 0.25);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.checkbox-square.checked {
  background: linear-gradient(135deg, #FF1B6B, #C724FF);
  border-color: transparent;
}
.checkbox-square.disabled {
  background: rgba(0, 230, 118, 0.2);
  border-color: rgba(0, 230, 118, 0.5);
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const SUPABASE_URL = 'https://zxichjnifawondqqbrxn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_298EyDyzguh8YMyzPPJeaA_glbUxJfH';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PERFORMER_FEE = 300; // ₱ per member

// =====================================================
// HELPERS
// =====================================================
const peso = (n) => '\u20B1' + (Number(n) || 0).toLocaleString('en-PH');

const STATUS_LABEL = {
  pending: 'Pending Verification',
  confirmed: 'Confirmed',
  paid: 'Fully Paid',
  rejected: 'Rejected',
  withdrawn: 'Withdrawn',
};

const CATEGORY_LABEL = {
  'open-stage': 'Open Stage',
  'battle': 'Battle of the Entertainments',
  'fanchant': 'Fanchant Battle',
  'fanbooth': 'Fanbooth Battle',
};

// =====================================================
// MAIN APP
// =====================================================
function App() {
  const [step, setStep] = useState('lookup'); // lookup | select | pay | success
  const [groupNameInput, setGroupNameInput] = useState('');
  const [lookupError, setLookupError] = useState('');
  const [lookingUp, setLookingUp] = useState(false);

  const [registration, setRegistration] = useState(null);
  const [members, setMembers] = useState([]);
  const [selectedMemberIds, setSelectedMemberIds] = useState({});

  const [paymentRef, setPaymentRef] = useState('');
  const [receiptFile, setReceiptFile] = useState(null);
  const [receiptPreview, setReceiptPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState('');

  const [appSettings, setAppSettings] = useState({});

  // Fetch app settings on mount (for GCash details)
  useEffect(() => {
    supabase.from('app_settings').select('key, value').then(({ data }) => {
      if (data) {
        const map = {};
        data.forEach((s) => { map[s.key] = s.value; });
        setAppSettings(map);
      }
    });
  }, []);

  const gcashName = appSettings.gcash_name || 'Kyla Don';
  const gcashNumber = appSettings.gcash_number || '09534900227';

  const lookupGroup = useCallback(async () => {
    setLookupError('');
    const q = groupNameInput.trim();
    if (!q) {
      setLookupError('Enter your group name to continue.');
      return;
    }

    setLookingUp(true);
    try {
      // Case-insensitive exact match. Exclude withdrawn/rejected registrations.
      const { data: regs, error: regErr } = await supabase
        .from('registrations')
        .select('*')
        .ilike('group_name', q)
        .not('status', 'in', '("withdrawn","rejected")');

      if (regErr) throw regErr;
      if (!regs || regs.length === 0) {
        setLookupError('Group not found. Check the spelling matches what you used on your registration form. If you\u2019re sure, message us on Instagram @kreationphilippines.');
        return;
      }

      // Take the first (no duplicates expected)
      const reg = regs[0];

      // Fetch members for this registration
      const { data: memData, error: memErr } = await supabase
        .from('registration_members')
        .select('*')
        .eq('registration_id', reg.id)
        .neq('payment_status', 'dropped')
        .order('member_order');

      if (memErr) throw memErr;

      if (!memData || memData.length === 0) {
        setLookupError('Your group is registered but no members are listed yet. Contact us so we can add them before you pay.');
        return;
      }

      const allPaid = memData.every((m) => m.payment_status === 'paid');
      if (allPaid) {
        setLookupError('All members of \u201C' + reg.group_name + '\u201D are already paid. Nothing to do here!');
        return;
      }

      setRegistration(reg);
      setMembers(memData);
      // Pre-select all unpaid members
      const preSelected = {};
      memData.forEach((m) => {
        if (m.payment_status === 'unpaid') preSelected[m.id] = true;
      });
      setSelectedMemberIds(preSelected);
      setStep('select');
    } catch (e) {
      console.error('Lookup error:', e);
      setLookupError('Something went wrong. Please try again or message us on Instagram.');
    } finally {
      setLookingUp(false);
    }
  }, [groupNameInput]);

  const toggleMember = useCallback((id) => {
    setSelectedMemberIds((prev) => {
      const next = Object.assign({}, prev);
      if (next[id]) delete next[id];
      else next[id] = true;
      return next;
    });
  }, []);

  const selectedCount = useMemo(() => Object.keys(selectedMemberIds).length, [selectedMemberIds]);
  const totalAmount = selectedCount * PERFORMER_FEE;

  const handleReceiptChange = useCallback((e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setReceiptFile(file);
    const reader = new FileReader();
    reader.onload = (ev) => setReceiptPreview(ev.target.result);
    reader.readAsDataURL(file);
  }, []);

  const submitPayment = useCallback(async () => {
    setSubmitError('');
    if (selectedCount === 0) {
      setSubmitError('Select at least one member to pay for.');
      return;
    }
    if (!paymentRef.trim()) {
      setSubmitError('Enter the GCash reference number from your payment.');
      return;
    }
    if (!receiptFile) {
      setSubmitError('Upload a screenshot of your GCash receipt.');
      return;
    }

    setSubmitting(true);
    try {
      // 1. Upload receipt to storage
      const ext = (receiptFile.name.split('.').pop() || 'jpg').toLowerCase();
      const path = 'performer-payments/' + registration.id + '/' + Date.now() + '.' + ext;
      const up = await supabase.storage.from('receipts').upload(path, receiptFile, { upsert: false });
      if (up.error) throw new Error('Receipt upload failed: ' + up.error.message);

      // 2. Insert registration_payments row
      const memberIds = Object.keys(selectedMemberIds);
      const ins = await supabase.from('registration_payments').insert({
        registration_id: registration.id,
        amount: totalAmount,
        payment_method: 'gcash',
        gcash_reference: paymentRef.trim(),
        receipt_url: path,
        members_covered: memberIds,
        notes: 'Submitted via participant-payment page',
      });
      if (ins.error) throw ins.error;

      setStep('success');
    } catch (e) {
      console.error('Submit error:', e);
      setSubmitError(e.message || 'Submission failed. Please try again.');
    } finally {
      setSubmitting(false);
    }
  }, [selectedCount, paymentRef, receiptFile, registration, selectedMemberIds, totalAmount]);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header />
      <main style={{ flex: 1, padding: '24px 16px 60px', maxWidth: 680, width: '100%', margin: '0 auto' }}>
        {step === 'lookup' && (
          <LookupStep
            groupNameInput={groupNameInput}
            setGroupNameInput={setGroupNameInput}
            lookupError={lookupError}
            lookingUp={lookingUp}
            onSubmit={lookupGroup}
          />
        )}
        {step === 'select' && (
          <SelectStep
            registration={registration}
            members={members}
            selectedMemberIds={selectedMemberIds}
            onToggleMember={toggleMember}
            selectedCount={selectedCount}
            totalAmount={totalAmount}
            onBack={() => { setStep('lookup'); setRegistration(null); setMembers([]); setSelectedMemberIds({}); }}
            onContinue={() => setStep('pay')}
          />
        )}
        {step === 'pay' && (
          <PayStep
            registration={registration}
            selectedCount={selectedCount}
            totalAmount={totalAmount}
            gcashName={gcashName}
            gcashNumber={gcashNumber}
            paymentRef={paymentRef} setPaymentRef={setPaymentRef}
            receiptFile={receiptFile} receiptPreview={receiptPreview}
            onReceiptChange={handleReceiptChange}
            submitting={submitting}
            submitError={submitError}
            onSubmit={submitPayment}
            onBack={() => setStep('select')}
          />
        )}
        {step === 'success' && (
          <SuccessStep
            registration={registration}
            selectedCount={selectedCount}
            totalAmount={totalAmount}
          />
        )}
      </main>
      <Footer />
    </div>
  );
}

// =====================================================
// HEADER + FOOTER
// =====================================================
function Header() {
  return (
    <header style={{
      padding: '20px 24px',
      borderBottom: '1px solid var(--border)',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'space-between',
      background: 'rgba(8, 2, 15, 0.6)',
      backdropFilter: 'blur(10px)',
      position: 'sticky',
      top: 0,
      zIndex: 10,
    }}>
      <div className="font-display" style={{
        fontSize: 18,
        letterSpacing: 1,
        background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
        WebkitBackgroundClip: 'text',
        WebkitTextFillColor: 'transparent',
      }}>
        KPH.
      </div>
      <div className="font-mono" style={{ fontSize: 10, color: 'var(--text-soft)', letterSpacing: 2 }}>
        DKC 2026 · PERFORMER PAYMENT
      </div>
    </header>
  );
}

function Footer() {
  return (
    <footer style={{
      padding: '20px 24px',
      borderTop: '1px solid var(--border)',
      textAlign: 'center',
      fontSize: 11,
      color: 'var(--text-soft)',
    }}>
      <div>Kreation Events Management · BIR Registered · @kreationphilippines</div>
      <div style={{ marginTop: 4 }}>
        Issues? DM us on Instagram or email kreationph@gmail.com
      </div>
    </footer>
  );
}

// =====================================================
// STEP: LOOKUP
// =====================================================
function LookupStep({ groupNameInput, setGroupNameInput, lookupError, lookingUp, onSubmit }) {
  const handleSubmit = (e) => { e.preventDefault(); onSubmit(); };
  return (
    <div className="anim-fadein">
      <div className="font-mono" style={{
        fontSize: 11, letterSpacing: 2.5, color: 'var(--accent)',
        fontWeight: 700, marginBottom: 10,
      }}>
        STEP 1 OF 3
      </div>
      <h1 className="font-display" style={{
        fontSize: 28, lineHeight: 1.15, margin: 0, marginBottom: 14,
        background: 'linear-gradient(135deg, #FFFFFF 0%, #FF6FA8 50%, #C724FF 100%)',
        WebkitBackgroundClip: 'text',
        WebkitTextFillColor: 'transparent',
      }}>
        Pay your performer registration fee.
      </h1>
      <p style={{ color: 'var(--text-muted)', lineHeight: 1.6, marginBottom: 28, fontSize: 14 }}>
        Look up your group by the exact name you used on the registration form. You\u2019ll then tick which members you\u2019re paying for.
      </p>

      <form onSubmit={handleSubmit} style={{
        background: 'var(--surface)',
        border: '1px solid var(--border)',
        borderRadius: 16,
        padding: 24,
      }}>
        <label className="font-mono" style={{
          display: 'block', fontSize: 10, letterSpacing: 1.5,
          color: 'var(--text-soft)', fontWeight: 700, marginBottom: 8,
        }}>
          GROUP NAME *
        </label>
        <input
          type="text"
          value={groupNameInput}
          onChange={(e) => setGroupNameInput(e.target.value)}
          placeholder="Type your group name exactly as registered"
          style={{ width: '100%', boxSizing: 'border-box' }}
          autoFocus
        />
        <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 8, lineHeight: 1.5 }}>
          Tip: It\u2019s case-insensitive but the spelling has to match.
        </div>

        {lookupError && (
          <div style={{
            marginTop: 14,
            padding: '10px 12px',
            background: 'rgba(255, 23, 68, 0.08)',
            border: '1px solid rgba(255, 23, 68, 0.3)',
            borderRadius: 8,
            fontSize: 12,
            color: '#FFA0A0',
            lineHeight: 1.5,
          }}>
            {lookupError}
          </div>
        )}

        <button
          type="submit"
          disabled={lookingUp}
          style={{
            marginTop: 18,
            width: '100%',
            padding: '13px 18px',
            borderRadius: 10,
            background: lookingUp
              ? 'rgba(255, 27, 107, 0.4)'
              : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            border: 'none',
            color: 'white',
            fontWeight: 700,
            fontSize: 14,
            letterSpacing: 0.5,
            cursor: lookingUp ? 'wait' : 'pointer',
          }}>
          {lookingUp ? 'Looking up\u2026' : 'Find My Group \u2192'}
        </button>
      </form>
    </div>
  );
}

// =====================================================
// STEP: SELECT MEMBERS
// =====================================================
function SelectStep({ registration, members, selectedMemberIds, onToggleMember, selectedCount, totalAmount, onBack, onContinue }) {
  return (
    <div className="anim-fadein">
      <div className="font-mono" style={{
        fontSize: 11, letterSpacing: 2.5, color: 'var(--accent)',
        fontWeight: 700, marginBottom: 10,
      }}>
        STEP 2 OF 3
      </div>
      <h1 className="font-display" style={{
        fontSize: 24, lineHeight: 1.2, margin: 0, marginBottom: 8,
      }}>
        {registration.group_name}
      </h1>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 22, fontSize: 12, color: 'var(--text-muted)' }}>
        <span>{CATEGORY_LABEL[registration.category] || registration.category}</span>
        <span>\u00b7</span>
        <span>Led by {registration.leader_name}</span>
      </div>

      <div style={{
        background: 'rgba(0, 229, 255, 0.06)',
        border: '1px solid rgba(0, 229, 255, 0.25)',
        borderRadius: 12,
        padding: '12px 14px',
        marginBottom: 18,
        fontSize: 12,
        color: 'var(--text-muted)',
        lineHeight: 1.5,
      }}>
        Tick the members you\u2019re paying for. Members already paid are shown with a checkmark and can\u2019t be selected again.
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
        {members.map((m) => {
          const isPaid = m.payment_status === 'paid';
          const isSelected = !!selectedMemberIds[m.id];
          return (
            <div
              key={m.id}
              className={'member-card ' +
                (isPaid ? 'member-card-disabled' : '') + ' ' +
                (isSelected && !isPaid ? 'member-card-selected' : '')}
              onClick={() => { if (!isPaid) onToggleMember(m.id); }}
            >
              <div className={'checkbox-square ' + (isPaid ? 'disabled' : (isSelected ? 'checked' : ''))}>
                {(isSelected || isPaid) && (
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                  </svg>
                )}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)' }}>{m.member_name}</div>
                <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 2 }}>
                  {m.member_age ? 'Age ' + m.member_age : 'No age on file'}
                </div>
              </div>
              {isPaid ? (
                <span style={{
                  padding: '3px 9px',
                  borderRadius: 6,
                  background: 'rgba(0, 230, 118, 0.15)',
                  border: '1px solid rgba(0, 230, 118, 0.4)',
                  fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                  color: '#00E676',
                  whiteSpace: 'nowrap',
                }}>
                  PAID
                </span>
              ) : (
                <span className="font-mono" style={{
                  fontSize: 13, fontWeight: 700, color: 'var(--text)',
                }}>
                  {peso(PERFORMER_FEE)}
                </span>
              )}
            </div>
          );
        })}
      </div>

      <div style={{
        background: 'var(--surface)',
        border: '1px solid var(--border)',
        borderRadius: 14,
        padding: 16,
        marginBottom: 18,
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
      }}>
        <div>
          <div className="font-mono" style={{
            fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)', fontWeight: 700,
          }}>
            {selectedCount} MEMBER{selectedCount === 1 ? '' : 'S'} SELECTED
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>
            \u20B1{PERFORMER_FEE} per member
          </div>
        </div>
        <div className="font-display" style={{
          fontSize: 22,
          background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
          WebkitBackgroundClip: 'text',
          WebkitTextFillColor: 'transparent',
        }}>
          {peso(totalAmount)}
        </div>
      </div>

      <div style={{ display: 'flex', gap: 10 }}>
        <button
          onClick={onBack}
          style={{
            padding: '13px 18px',
            borderRadius: 10,
            background: 'transparent',
            border: '1px solid var(--border)',
            color: 'var(--text-muted)',
            fontWeight: 600,
            fontSize: 13,
            cursor: 'pointer',
          }}>
          \u2190 Back
        </button>
        <button
          onClick={onContinue}
          disabled={selectedCount === 0}
          style={{
            flex: 1,
            padding: '13px 18px',
            borderRadius: 10,
            background: selectedCount === 0
              ? 'rgba(255, 27, 107, 0.3)'
              : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            border: 'none',
            color: 'white',
            fontWeight: 700,
            fontSize: 14,
            letterSpacing: 0.5,
            cursor: selectedCount === 0 ? 'not-allowed' : 'pointer',
          }}>
          Continue to Payment \u2192
        </button>
      </div>
    </div>
  );
}

// =====================================================
// STEP: PAY (GCash + Receipt)
// =====================================================
function PayStep({ registration, selectedCount, totalAmount, gcashName, gcashNumber, paymentRef, setPaymentRef, receiptFile, receiptPreview, onReceiptChange, submitting, submitError, onSubmit, onBack }) {
  return (
    <div className="anim-fadein">
      <div className="font-mono" style={{
        fontSize: 11, letterSpacing: 2.5, color: 'var(--accent)',
        fontWeight: 700, marginBottom: 10,
      }}>
        STEP 3 OF 3
      </div>
      <h1 className="font-display" style={{
        fontSize: 24, lineHeight: 1.2, margin: 0, marginBottom: 20,
      }}>
        Send {peso(totalAmount)} via GCash.
      </h1>

      {/* GCash details card */}
      <div style={{
        background: 'linear-gradient(135deg, rgba(0, 122, 255, 0.08), rgba(0, 229, 255, 0.04))',
        border: '1px solid rgba(0, 229, 255, 0.25)',
        borderRadius: 14,
        padding: 18,
        marginBottom: 18,
      }}>
        <div className="font-mono" style={{
          fontSize: 10, letterSpacing: 1.5, color: '#00E5FF', fontWeight: 700, marginBottom: 10,
        }}>
          PAY TO
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
          <span style={{ fontSize: 11, color: 'var(--text-soft)' }}>Name</span>
          <span style={{ fontSize: 14, fontWeight: 700 }}>{gcashName}</span>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
          <span style={{ fontSize: 11, color: 'var(--text-soft)' }}>GCash number</span>
          <span className="font-mono" style={{ fontSize: 15, fontWeight: 700, letterSpacing: 0.5 }}>{gcashNumber}</span>
        </div>
        <div style={{ height: 1, background: 'rgba(0, 229, 255, 0.2)', margin: '12px 0' }}></div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>Amount</span>
          <span className="font-display" style={{ fontSize: 22, color: '#00E5FF' }}>{peso(totalAmount)}</span>
        </div>
      </div>

      <div style={{
        background: 'rgba(255, 159, 26, 0.06)',
        border: '1px solid rgba(255, 159, 26, 0.25)',
        borderRadius: 10,
        padding: '10px 12px',
        marginBottom: 22,
        fontSize: 11,
        color: '#FFD08A',
        lineHeight: 1.5,
      }}>
        Note: Tickets won\u2019t be issued until <strong>all members of your group</strong> are paid. Other members can come back to this page anytime to pay their share.
      </div>

      {/* Reference number */}
      <div style={{ marginBottom: 16 }}>
        <label className="font-mono" style={{
          display: 'block', fontSize: 10, letterSpacing: 1.5,
          color: 'var(--text-soft)', fontWeight: 700, marginBottom: 8,
        }}>
          GCASH REFERENCE NUMBER *
        </label>
        <input
          type="text"
          value={paymentRef}
          onChange={(e) => setPaymentRef(e.target.value)}
          placeholder="e.g. 1234567890123"
          style={{ width: '100%', boxSizing: 'border-box' }}
        />
      </div>

      {/* Receipt upload */}
      <div style={{ marginBottom: 22 }}>
        <label className="font-mono" style={{
          display: 'block', fontSize: 10, letterSpacing: 1.5,
          color: 'var(--text-soft)', fontWeight: 700, marginBottom: 8,
        }}>
          GCASH RECEIPT SCREENSHOT *
        </label>
        <label style={{
          display: 'block',
          padding: receiptPreview ? 8 : 24,
          background: 'rgba(255, 255, 255, 0.03)',
          border: '2px dashed var(--border)',
          borderRadius: 12,
          textAlign: 'center',
          cursor: 'pointer',
          transition: 'border 0.15s',
        }}>
          <input
            type="file"
            accept="image/*"
            onChange={onReceiptChange}
            style={{ display: 'none' }}
          />
          {receiptPreview ? (
            <img src={receiptPreview} alt="receipt"
              style={{ maxWidth: '100%', maxHeight: 280, borderRadius: 8, display: 'block', margin: '0 auto' }} />
          ) : (
            <div>
              <div style={{ fontSize: 28, marginBottom: 6 }}>\uD83D\uDCCE</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', marginBottom: 4 }}>
                Tap to upload screenshot
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-soft)' }}>
                PNG, JPG, or HEIC. Max 10MB.
              </div>
            </div>
          )}
        </label>
        {receiptPreview && (
          <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 6, textAlign: 'center' }}>
            Tap image to choose a different file.
          </div>
        )}
      </div>

      {submitError && (
        <div style={{
          padding: '10px 12px',
          background: 'rgba(255, 23, 68, 0.08)',
          border: '1px solid rgba(255, 23, 68, 0.3)',
          borderRadius: 8,
          fontSize: 12,
          color: '#FFA0A0',
          lineHeight: 1.5,
          marginBottom: 14,
        }}>
          {submitError}
        </div>
      )}

      <div style={{ display: 'flex', gap: 10 }}>
        <button
          onClick={onBack}
          disabled={submitting}
          style={{
            padding: '13px 18px',
            borderRadius: 10,
            background: 'transparent',
            border: '1px solid var(--border)',
            color: 'var(--text-muted)',
            fontWeight: 600,
            fontSize: 13,
            cursor: submitting ? 'not-allowed' : 'pointer',
          }}>
          \u2190 Back
        </button>
        <button
          onClick={onSubmit}
          disabled={submitting}
          style={{
            flex: 1,
            padding: '13px 18px',
            borderRadius: 10,
            background: submitting
              ? 'rgba(255, 27, 107, 0.4)'
              : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            border: 'none',
            color: 'white',
            fontWeight: 700,
            fontSize: 14,
            letterSpacing: 0.5,
            cursor: submitting ? 'wait' : 'pointer',
          }}>
          {submitting ? 'Submitting\u2026' : 'Submit Payment \u2192'}
        </button>
      </div>
    </div>
  );
}

// =====================================================
// STEP: SUCCESS
// =====================================================
function SuccessStep({ registration, selectedCount, totalAmount }) {
  return (
    <div className="anim-fadein" style={{ textAlign: 'center' }}>
      <div style={{
        width: 72, height: 72,
        background: 'linear-gradient(135deg, #00E676, #00B248)',
        borderRadius: '50%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        margin: '40px auto 20px',
        boxShadow: '0 12px 40px rgba(0, 230, 118, 0.4)',
      }}>
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <h1 className="font-display" style={{
        fontSize: 26, lineHeight: 1.2, margin: 0, marginBottom: 12,
      }}>
        Payment submitted!
      </h1>
      <p style={{ color: 'var(--text-muted)', lineHeight: 1.6, marginBottom: 24, fontSize: 14 }}>
        You paid {peso(totalAmount)} for {selectedCount} member{selectedCount === 1 ? '' : 's'} of <strong style={{ color: 'var(--text)' }}>{registration.group_name}</strong>.
      </p>

      <div style={{
        background: 'var(--surface)',
        border: '1px solid var(--border)',
        borderRadius: 14,
        padding: 20,
        margin: '0 auto 24px',
        maxWidth: 440,
        textAlign: 'left',
      }}>
        <div className="font-mono" style={{
          fontSize: 10, letterSpacing: 1.5, color: 'var(--accent)', fontWeight: 700, marginBottom: 10,
        }}>
          WHAT HAPPENS NEXT
        </div>
        <ul style={{ paddingLeft: 18, margin: 0, fontSize: 13, lineHeight: 1.7, color: 'var(--text-muted)' }}>
          <li>Admin verifies your payment within 24 hours.</li>
          <li>The members you paid for will be marked as paid in our system.</li>
          <li>Once <strong style={{ color: 'var(--text)' }}>all members</strong> of your group are paid, your tickets are issued.</li>
          <li>Tickets are emailed to your group leader as a PDF closer to the event.</li>
        </ul>
      </div>

      <a href="./participant-payment.html" style={{
        display: 'inline-block',
        padding: '11px 22px',
        background: 'transparent',
        border: '1px solid var(--border)',
        borderRadius: 10,
        color: 'var(--text-muted)',
        fontSize: 13,
        fontWeight: 600,
        textDecoration: 'none',
      }}>
        Pay for another group \u2192
      </a>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
