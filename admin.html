          flexShrink: 0,
        }}>
          <div style={{ fontSize: 11, color: 'var(--text-soft)' }}>
            {template && template.updated_at && (
              <span>
                Last updated {formatDT(template.updated_at)}
                {template.updated_by && ' by ' + template.updated_by}
              </span>
            )}
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button type="button" onClick={onClose} style={{
              padding: '10px 18px', borderRadius: 8,
              background: 'transparent',
              border: '1px solid rgba(255,255,255,0.15)',
              color: 'var(--text-muted)', cursor: 'pointer',
              fontSize: 12, fontWeight: 600, letterSpacing: 0.5,
              fontFamily: 'inherit',
            }}>
              CLOSE
            </button>
            <button onClick={handleSave} disabled={saving} style={{
              padding: '10px 20px', borderRadius: 8,
              background: saving ? 'rgba(255,27,107,0.4)' : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
              border: 'none', cursor: saving ? 'wait' : 'pointer',
              color: 'white',
              fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
              fontFamily: 'inherit',
              boxShadow: saving ? 'none' : '0 8px 24px rgba(255,27,107,0.35)',
            }}>
              {saving ? 'SAVING...' : (activeTab === 'template' ? 'SAVE TEMPLATE' : 'SAVE SETTINGS')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// TICKETS VIEW — library + filters + detail panel
// ============================================================
const TIER_LABELS_FULL = { V: 'VIP', R: 'Regular', P: 'Participant' };
const TIER_COLORS = { V: '#FF1B6B', R: '#00E5FF', P: '#C724FF' };

function TicketsView({
  tickets, ticketsLoading, filteredTickets, ticketCounts,
  ticketTab, setTicketTab, ticketTierFilter, setTicketTierFilter,
  ticketSourceFilter, setTicketSourceFilter,
  ticketSearch, setTicketSearch,
  ticketSelectedId, setTicketSelectedId, selectedTicket,
  onDownloadPDF, onTransfer, onCancel,
}) {
  if (ticketsLoading) {
    return <div style={{ padding: 80, textAlign: 'center' }}><Spinner size={28} /></div>;
  }

  const statusTabs = [
    { key: 'issued', label: 'Issued', count: ticketCounts.issued },
    { key: 'used', label: 'Used', count: ticketCounts.used },
    { key: 'cancelled', label: 'Invalidated', count: ticketCounts.cancelled },
    { key: 'all', label: 'All', count: ticketCounts.all },
  ];

  return (
    <div style={{ padding: '20px 32px 40px', display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) ' + (selectedTicket ? '380px' : '0'), gap: 22 }} className="admin-grid">
      <div style={{
        background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
        borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
      }}>
        {/* Stat row */}
        <div style={{
          padding: '14px 18px',
          borderBottom: '1px solid var(--border)',
          display: 'flex', flexWrap: 'wrap', gap: 12, alignItems: 'center',
        }}>
          <TicketStat label="Total" value={ticketCounts.all} />
          <TicketStat label="VIP" value={ticketCounts.vip} color={TIER_COLORS.V} />
          <TicketStat label="Regular" value={ticketCounts.regular} color={TIER_COLORS.R} />
          <TicketStat label="Participant" value={ticketCounts.participant} color={TIER_COLORS.P} />
          <TicketStat label="Walk-ins" value={ticketCounts.walkin} color="#FFB300" />
          <TicketStat label="Scanned" value={ticketCounts.used} color="#00E676" />
        </div>

        {/* Filter row */}
        <div style={{
          padding: '12px 18px',
          borderBottom: '1px solid var(--border)',
          display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 10,
        }}>
          {statusTabs.map((t) => (
            <button key={t.key} onClick={() => setTicketTab(t.key)}
              style={{
                padding: '6px 12px', borderRadius: 999,
                background: ticketTab === t.key
                  ? 'linear-gradient(135deg, rgba(255,27,107,0.25), rgba(199,36,255,0.15))'
                  : 'rgba(255,255,255,0.04)',
                border: '1px solid ' + (ticketTab === t.key ? 'rgba(255,27,107,0.5)' : 'rgba(255,255,255,0.08)'),
                color: ticketTab === t.key ? 'var(--text)' : 'var(--text-muted)',
                fontSize: 12, fontWeight: 600, cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 6,
                fontFamily: 'inherit',
              }}>
              {t.label}
              <span className="font-mono" style={{
                background: ticketTab === t.key ? 'rgba(255,27,107,0.3)' : 'rgba(255,255,255,0.06)',
                padding: '1px 7px', borderRadius: 999, fontSize: 10, fontWeight: 600,
              }}>{t.count}</span>
            </button>
          ))}
          <div style={{ flex: 1 }} />
          <div style={{ position: 'relative', flex: '0 1 240px' }}>
            <span style={{
              position: 'absolute', left: 12, top: '50%',
              transform: 'translateY(-50%)', color: 'var(--text-soft)',
            }}>
              <Icon name="search" size={14} />
            </span>
            <input value={ticketSearch} onChange={(e) => setTicketSearch(e.target.value)}
              placeholder="Search name, code, group, seat..."
              style={{
                width: '100%', padding: '8px 12px 8px 34px', borderRadius: 10,
                fontSize: 13, boxSizing: 'border-box', fontFamily: 'inherit'
              }} />
          </div>
        </div>

        {/* Tier filter chips */}
        <div style={{
          padding: '10px 18px', borderBottom: '1px solid var(--border)',
          display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
          background: 'rgba(255, 255, 255, 0.015)',
        }}>
          <span className="font-mono" style={{
            fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
            fontWeight: 700, marginRight: 4,
          }}>
            TIER →
          </span>
          {[
            { key: 'all', label: 'All', color: null },
            { key: 'V', label: 'VIP', color: TIER_COLORS.V },
            { key: 'R', label: 'Regular', color: TIER_COLORS.R },
            { key: 'P', label: 'Participant', color: TIER_COLORS.P },
          ].map((t) => {
            const active = ticketTierFilter === t.key;
            const c = t.color || '#FFFFFF';
            return (
              <button key={t.key} onClick={() => setTicketTierFilter(t.key)}
                style={{
                  padding: '4px 11px', borderRadius: 999,
                  background: active ? c + '22' : 'rgba(255,255,255,0.03)',
                  border: '1px solid ' + (active ? c + '60' : 'rgba(255,255,255,0.08)'),
                  color: active ? c : 'var(--text-muted)',
                  fontSize: 11, fontWeight: 600, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>
                {t.label}
              </button>
            );
          })}

          <span className="font-mono" style={{
            fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
            fontWeight: 700, marginLeft: 12, marginRight: 4,
          }}>
            SOURCE →
          </span>
          {[
            { key: 'all', label: 'All' },
            { key: 'order', label: 'Online Orders' },
            { key: 'walkin', label: 'Walk-ins', color: '#FFB300' },
            { key: 'registration', label: 'Performers', color: TIER_COLORS.P },
          ].map((s) => {
            const active = ticketSourceFilter === s.key;
            const c = s.color || '#FFFFFF';
            return (
              <button key={s.key} onClick={() => setTicketSourceFilter(s.key)}
                style={{
                  padding: '4px 11px', borderRadius: 999,
                  background: active ? c + '22' : 'rgba(255,255,255,0.03)',
                  border: '1px solid ' + (active ? c + '60' : 'rgba(255,255,255,0.08)'),
                  color: active ? c : 'var(--text-muted)',
                  fontSize: 11, fontWeight: 600, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>
                {s.label}
              </button>
            );
          })}
        </div>

        {/* Table */}
        {filteredTickets.length === 0 ? (
          <div style={{ padding: 60, textAlign: 'center', color: 'var(--text-muted)' }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6, color: 'var(--text)' }}>
              {tickets.length === 0 ? 'No tickets generated yet' : 'No tickets match your filters'}
            </div>
            <div style={{ fontSize: 12 }}>
              {tickets.length === 0
                ? 'Confirm an order in the Orders tab to auto-generate tickets.'
                : 'Adjust filters or clear search.'}
            </div>
          </div>
        ) : (
          <div style={{ maxHeight: 'calc(100vh - 420px)', overflow: 'auto' }}>
            {filteredTickets.map((t) => (
              <TicketRow key={t.id}
                ticket={t}
                selected={t.id === ticketSelectedId}
                onClick={() => setTicketSelectedId(t.id)} />
            ))}
          </div>
        )}
      </div>

      {selectedTicket && (
        <TicketDetailPanel
          ticket={selectedTicket}
          onClose={() => setTicketSelectedId(null)}
          onDownloadPDF={onDownloadPDF}
          onTransfer={onTransfer}
          onCancel={onCancel}
        />
      )}
    </div>
  );
}

function TicketStat({ label, value, color }) {
  return (
    <div style={{
      padding: '6px 12px', borderRadius: 8,
      background: color ? color + '12' : 'rgba(255,255,255,0.04)',
      border: '1px solid ' + (color ? color + '30' : 'rgba(255,255,255,0.08)'),
    }}>
      <div className="font-mono" style={{
        fontSize: 9, letterSpacing: 1.5,
        color: color || 'var(--text-soft)',
        fontWeight: 700, marginBottom: 2,
      }}>
        {label.toUpperCase()}
      </div>
      <div className="font-display" style={{
        fontSize: 18, fontWeight: 800, color: 'var(--text)',
        letterSpacing: -0.3, lineHeight: 1,
      }}>
        {value}
      </div>
    </div>
  );
}

function TicketRow({ ticket: t, selected, onClick }) {
  const accent = TIER_COLORS[t.tier_code] || '#FFFFFF';
  return (
    <div onClick={onClick}
      style={{
        padding: '12px 18px',
        borderBottom: '1px solid rgba(255,255,255,0.04)',
        cursor: 'pointer',
        background: selected ? 'linear-gradient(90deg, rgba(255,27,107,0.10), rgba(199,36,255,0.05))' : 'transparent',
        borderLeft: '3px solid ' + (selected ? accent : 'transparent'),
        display: 'grid',
        gridTemplateColumns: '110px 1fr auto',
        gap: 14, alignItems: 'center',
        transition: 'background 0.15s',
      }}
      onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = 'rgba(255,255,255,0.025)'; }}
      onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}>
      <div className="font-mono" style={{
        fontSize: 12, color: 'var(--text)', fontWeight: 700,
        letterSpacing: 0.5,
      }}>
        {t.ticket_code}
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{
          fontSize: 13, fontWeight: 700, color: 'var(--text)',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          marginBottom: 3,
        }}>
          {t.attendee_name}
        </div>
        <div style={{
          fontSize: 11, color: 'var(--text-muted)',
          display: 'flex', gap: 8, flexWrap: 'wrap',
        }}>
          <span style={{ color: accent, fontWeight: 700 }}>
            {TIER_LABELS_FULL[t.tier_code] || '—'}
          </span>
          {t.seat_label && <span>· {t.seat_label}</span>}
          {t.section && !t.seat_label && <span>· {t.section}</span>}
          {t.group_name && <span>· {t.group_name}</span>}
          {t.is_walk_in && (
            <span style={{
              padding: '0 5px', borderRadius: 3,
              background: 'rgba(255, 179, 0, 0.12)',
              color: '#FFB300', fontSize: 9, fontWeight: 700,
              letterSpacing: 0.5,
            }}>WALK-IN</span>
          )}
        </div>
      </div>
      <div style={{ textAlign: 'right' }}>
        <StatusBadge status={t.status} />
      </div>
    </div>
  );
}

function TicketDetailPanel({ ticket: t, onClose, onDownloadPDF, onTransfer, onCancel }) {
  const [transferCount, setTransferCount] = useState(null);

  useEffect(() => {
    supabase.from('ticket_transfers')
      .select('id', { count: 'exact', head: true })
      .eq('ticket_id', t.id)
      .then(({ count }) => setTransferCount(count || 0));
  }, [t.id]);

  const accent = TIER_COLORS[t.tier_code] || '#FFFFFF';

  return (
    <div style={{
      background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
      borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
      maxHeight: 'calc(100vh - 100px)', display: 'flex', flexDirection: 'column',
    }} className="admin-detail-mobile-overlay">
      <div style={{
        padding: '14px 18px', borderBottom: '1px solid var(--border)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 10, flexShrink: 0,
        background: 'linear-gradient(135deg, ' + accent + '15, rgba(255,255,255,0))',
      }}>
        <div>
          <div className="font-mono" style={{
            fontSize: 10, letterSpacing: 2, color: accent,
            fontWeight: 700, marginBottom: 3,
          }}>
            {t.ticket_code}
          </div>
          <div className="font-display" style={{
            fontSize: 18, fontWeight: 800, color: 'var(--text)',
            letterSpacing: -0.3, lineHeight: 1.1,
          }}>
            {t.attendee_name}
          </div>
        </div>
        <button onClick={onClose} style={{
          width: 28, height: 28, borderRadius: '50%',
          background: 'rgba(255,255,255,0.05)',
          border: '1px solid rgba(255,255,255,0.1)',
          color: 'var(--text)', cursor: 'pointer',
          fontSize: 16, lineHeight: 1, padding: 0,
          fontFamily: 'inherit', flexShrink: 0,
        }}>×</button>
      </div>

      <div style={{ padding: '18px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 16 }}>
        <Section title="Status">
          <StatusBadge status={t.status} />
          {t.is_walk_in && (
            <span style={{
              marginLeft: 8,
              padding: '2px 8px', borderRadius: 4,
              background: 'rgba(255, 179, 0, 0.12)',
              border: '1px solid rgba(255, 179, 0, 0.4)',
              color: '#FFB300', fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
            }}>
              WALK-IN
            </span>
          )}
          {transferCount > 0 && (
            <span style={{
              marginLeft: 8,
              padding: '2px 8px', borderRadius: 4,
              background: 'rgba(0, 229, 255, 0.12)',
              border: '1px solid rgba(0, 229, 255, 0.4)',
              color: '#00E5FF', fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
            }}>
              ↻ TRANSFERRED ({transferCount})
            </span>
          )}
        </Section>

        <Section title="Tier & Seat">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, fontSize: 13 }}>
            <div>
              <div style={{ fontSize: 10, color: 'var(--text-soft)', letterSpacing: 1, marginBottom: 3, fontWeight: 700 }}>TIER</div>
              <div style={{ color: accent, fontWeight: 700 }}>{TIER_LABELS_FULL[t.tier_code] || '—'}</div>
            </div>
            {t.seat_label && (
              <div>
                <div style={{ fontSize: 10, color: 'var(--text-soft)', letterSpacing: 1, marginBottom: 3, fontWeight: 700 }}>SEAT</div>
                <div style={{ color: 'var(--text)', fontWeight: 700 }}>{t.seat_label}</div>
              </div>
            )}
            {t.section && (
              <div>
                <div style={{ fontSize: 10, color: 'var(--text-soft)', letterSpacing: 1, marginBottom: 3, fontWeight: 700 }}>SECTION</div>
                <div style={{ color: 'var(--text)' }}>{t.section}</div>
              </div>
            )}
            {t.group_name && (
              <div>
                <div style={{ fontSize: 10, color: 'var(--text-soft)', letterSpacing: 1, marginBottom: 3, fontWeight: 700 }}>GROUP</div>
                <div style={{ color: 'var(--text)' }}>{t.group_name}</div>
              </div>
            )}
            {t.group_category && (
              <div>
                <div style={{ fontSize: 10, color: 'var(--text-soft)', letterSpacing: 1, marginBottom: 3, fontWeight: 700 }}>CATEGORY</div>
                <div style={{ color: 'var(--text)' }}>{t.group_category}</div>
              </div>
            )}
          </div>
        </Section>

        <Section title="Contact">
          <div style={{ fontSize: 12, lineHeight: 1.7 }}>
            <div style={{ color: 'var(--text)' }}>{t.attendee_email || '—'}</div>
            {t.attendee_phone && <div style={{ color: 'var(--text-muted)' }}>{t.attendee_phone}</div>}
          </div>
        </Section>

        {t.scanned_at && (
          <Section title="Scanned">
            <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
              {formatDT(t.scanned_at)}
              {t.scanned_by && <div>by {t.scanned_by}</div>}
            </div>
          </Section>
        )}

        {t.status === 'cancelled' && (
          <Section title="Invalidated">
            <div style={{ fontSize: 12, color: '#FFA0A0' }}>
              {formatDT(t.cancelled_at)}
              {t.cancelled_by && <div>by {t.cancelled_by}</div>}
              {t.cancellation_reason && (
                <div style={{ marginTop: 6, padding: '8px 10px', background: 'rgba(255,23,68,0.08)',
                              borderRadius: 6, border: '1px solid rgba(255,23,68,0.2)' }}>
                  {t.cancellation_reason}
                </div>
              )}
            </div>
          </Section>
        )}

        <Section title="Actions">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <button onClick={() => onDownloadPDF(t)}
              style={{
                padding: '9px 14px', borderRadius: 8,
                background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
                border: 'none', color: 'white', cursor: 'pointer',
                fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                fontFamily: 'inherit',
              }}>
              <Icon name="download" size={12} /> DOWNLOAD TICKET PDF
            </button>
            {t.status === 'issued' && (
              <React.Fragment>
                <button onClick={() => onTransfer(t)}
                  style={{
                    padding: '8px 14px', borderRadius: 8,
                    background: 'rgba(0, 229, 255, 0.08)',
                    border: '1px solid rgba(0, 229, 255, 0.4)',
                    color: '#00E5FF', cursor: 'pointer',
                    fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                    fontFamily: 'inherit',
                  }}>
                  ↻ TRANSFER TICKET
                </button>
                <button onClick={() => onCancel(t)}
                  style={{
                    padding: '8px 14px', borderRadius: 8,
                    background: 'transparent',
                    border: '1px solid rgba(255, 23, 68, 0.4)',
                    color: '#FF6B7F', cursor: 'pointer',
                    fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                    fontFamily: 'inherit',
                  }}>
                  INVALIDATE TICKET
                </button>
              </React.Fragment>
            )}
          </div>
        </Section>
      </div>
    </div>
  );
}

// ============================================================
// TICKET TRANSFER MODAL — Path A (name edit) or Path B (reissue)
// ============================================================
function TicketTransferModal({ ticket, onClose, onSubmit }) {
  const [transferType, setTransferType] = useState('name_edit');
  const [newName, setNewName] = useState(ticket.attendee_name);
  const [newEmail, setNewEmail] = useState(ticket.attendee_email || '');
  const [reason, setReason] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);

  const submit = async (e) => {
    e.preventDefault();
    if (!newName.trim()) { alert('New attendee name required.'); return; }
    if (newName.trim() === ticket.attendee_name && newEmail === ticket.attendee_email) {
      alert('Nothing changed.'); return;
    }
    setSaving(true);
    await onSubmit(transferType, newName.trim(), newEmail.trim(), reason.trim());
    setSaving(false);
  };

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, zIndex: 100,
      background: 'rgba(8, 2, 15, 0.85)',
      backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 20,
    }}>
      <form onSubmit={submit} onClick={(e) => e.stopPropagation()} style={{
        maxWidth: 560, width: '100%',
        borderRadius: 14,
        background: '#0E0420',
        border: '1px solid rgba(255,255,255,0.1)',
        boxShadow: '0 30px 80px rgba(0,0,0,0.6)',
        display: 'flex', flexDirection: 'column',
        maxHeight: '92vh', overflow: 'hidden',
      }}>
        <div style={{
          padding: '18px 24px', borderBottom: '1px solid rgba(255,255,255,0.08)',
          flexShrink: 0,
        }}>
          <div className="font-mono" style={{
            fontSize: 10, letterSpacing: 2.5, color: '#00E5FF',
            fontWeight: 700, marginBottom: 4,
          }}>
            ↻ TICKET TRANSFER · {ticket.ticket_code}
          </div>
          <div className="font-display" style={{
            fontSize: 20, fontWeight: 800, color: 'var(--text)', letterSpacing: -0.3,
          }}>
            Transfer to a new attendee
          </div>
          <div style={{ marginTop: 6, fontSize: 12, color: 'var(--text-muted)' }}>
            Current holder: <strong style={{ color: 'var(--text)' }}>{ticket.attendee_name}</strong>
          </div>
        </div>

        <div style={{ padding: 24, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div>
            <label style={modalLabelStyle}>TRANSFER TYPE *</label>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <button type="button" onClick={() => setTransferType('name_edit')}
                style={{
                  padding: '14px 12px', borderRadius: 10,
                  background: transferType === 'name_edit'
                    ? 'linear-gradient(135deg, rgba(0,229,255,0.15), rgba(199,36,255,0.10))'
                    : 'rgba(255,255,255,0.04)',
                  border: '1px solid ' + (transferType === 'name_edit' ? 'rgba(0,229,255,0.5)' : 'rgba(255,255,255,0.1)'),
                  color: transferType === 'name_edit' ? '#00E5FF' : 'var(--text-muted)',
                  cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
                }}>
                <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: 0.5, marginBottom: 4 }}>
                  PATH A · NAME EDIT
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-soft)', lineHeight: 1.5 }}>
                  Updates the name only. <strong>Same QR code.</strong> Use this if the old PDF hasn't been shared.
                </div>
              </button>
              <button type="button" onClick={() => setTransferType('reissue')}
                style={{
                  padding: '14px 12px', borderRadius: 10,
                  background: transferType === 'reissue'
                    ? 'linear-gradient(135deg, rgba(255,27,107,0.15), rgba(199,36,255,0.10))'
                    : 'rgba(255,255,255,0.04)',
                  border: '1px solid ' + (transferType === 'reissue' ? 'rgba(255,27,107,0.5)' : 'rgba(255,255,255,0.1)'),
                  color: transferType === 'reissue' ? '#FF6FA8' : 'var(--text-muted)',
                  cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
                }}>
                <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: 0.5, marginBottom: 4 }}>
                  PATH B · REISSUE
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-soft)', lineHeight: 1.5 }}>
                  Old QR cancelled, <strong>new QR issued.</strong> Use for last-minute transfers or if the old PDF was shared.
                </div>
              </button>
            </div>
          </div>

          <div>
            <label style={modalLabelStyle}>NEW ATTENDEE NAME *</label>
            <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} required
              style={modalInputStyle} />
          </div>

          <div>
            <label style={modalLabelStyle}>NEW EMAIL (optional)</label>
            <input type="email" value={newEmail} onChange={(e) => setNewEmail(e.target.value)}
              placeholder={ticket.attendee_email || 'email@example.com'}
              style={modalInputStyle} />
          </div>

          <div>
            <label style={modalLabelStyle}>REASON (for audit log)</label>
            <textarea value={reason} onChange={(e) => setReason(e.target.value)}
              rows={2}
              placeholder="e.g. Friend couldn't come, gifted ticket to..."
              style={{...modalInputStyle, resize: 'vertical', fontFamily: 'Sora, sans-serif'}} />
          </div>
        </div>

        <div style={{
          padding: '14px 24px', borderTop: '1px solid rgba(255,255,255,0.08)',
          display: 'flex', justifyContent: 'flex-end', gap: 10, flexShrink: 0,
        }}>
          <button type="button" onClick={onClose} style={{
            padding: '10px 18px', borderRadius: 8,
            background: 'transparent',
            border: '1px solid rgba(255,255,255,0.15)',
            color: 'var(--text-muted)', cursor: 'pointer',
            fontSize: 12, fontWeight: 600, letterSpacing: 0.5,
            fontFamily: 'inherit',
          }}>CANCEL</button>
          <button type="submit" disabled={saving} style={{
            padding: '10px 20px', borderRadius: 8,
            background: saving ? 'rgba(255,27,107,0.4)' : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            border: 'none', cursor: saving ? 'wait' : 'pointer',
            color: 'white',
            fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
            fontFamily: 'inherit',
          }}>
            {saving ? 'TRANSFERRING...' : (transferType === 'name_edit' ? 'UPDATE NAME' : 'REISSUE TICKET')}
          </button>
        </div>
      </form>
    </div>
  );
}

// ============================================================
// DISPUTE HISTORY VIEW — cancelled tickets + rejected orders
// ============================================================
const DISPUTE_TYPE_META = {
  ticket_cancelled: {
    label: 'Ticket Invalidated',
    color: '#FF6B7F',
    bg: 'rgba(255, 23, 68, 0.10)',
    icon: 'x',
  },
  order_rejected: {
    label: 'Order Rejected',
    color: '#FF9F1A',
    bg: 'rgba(255, 159, 26, 0.10)',
    icon: 'alert',
  },
};

function DisputeHistoryView({ items, onOpenOrder, onOpenTicket }) {
  const [typeFilter, setTypeFilter] = useState('all');
  const [search, setSearch] = useState('');

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return items.filter((it) => {
      if (typeFilter !== 'all' && it.type !== typeFilter) return false;
      if (q) {
        const hay = ((it.attendee_name || '') + ' ' + (it.buyer_name || '') + ' ' +
                     (it.ticket_code || '') + ' ' + (it.order_ref || '') + ' ' +
                     (it.reason || '')).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [items, typeFilter, search]);

  const stats = useMemo(() => {
    return {
      all: items.length,
      ticketCancelled: items.filter((i) => i.type === 'ticket_cancelled').length,
      orderRejected: items.filter((i) => i.type === 'order_rejected').length,
      totalImpact: items.reduce((s, i) => s + (i.amount || 0), 0),
    };
  }, [items]);

  return (
    <div style={{ padding: '20px 32px 40px' }}>
      <div style={{
        background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
        borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
      }}>
        {/* Stat row */}
        <div style={{
          padding: '14px 18px', borderBottom: '1px solid var(--border)',
          display: 'flex', flexWrap: 'wrap', gap: 12, alignItems: 'center',
        }}>
          <TicketStat label="Total Disputes" value={stats.all} />
          <TicketStat label="Tickets Invalidated" value={stats.ticketCancelled} color="#FF6B7F" />
          <TicketStat label="Orders Rejected" value={stats.orderRejected} color="#FF9F1A" />
          <TicketStat label="Total Impact" value={'₱' + Math.round(stats.totalImpact)} color="#FF1B6B" />
        </div>

        {/* Filter row */}
        <div style={{
          padding: '12px 18px', borderBottom: '1px solid var(--border)',
          display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 10,
        }}>
          {[
            { key: 'all', label: 'All' },
            { key: 'ticket_cancelled', label: 'Tickets', color: '#FF6B7F' },
            { key: 'order_rejected', label: 'Rejected', color: '#FF9F1A' },
          ].map((f) => {
            const active = typeFilter === f.key;
            const c = f.color || '#FFFFFF';
            return (
              <button key={f.key} onClick={() => setTypeFilter(f.key)}
                style={{
                  padding: '6px 12px', borderRadius: 999,
                  background: active ? c + '22' : 'rgba(255,255,255,0.04)',
                  border: '1px solid ' + (active ? c + '60' : 'rgba(255,255,255,0.08)'),
                  color: active ? c : 'var(--text-muted)',
                  fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>
                {f.label}
              </button>
            );
          })}
          <div style={{ flex: 1 }} />
          <div style={{ position: 'relative', flex: '0 1 240px' }}>
            <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-soft)' }}>
              <Icon name="search" size={14} />
            </span>
            <input value={search} onChange={(e) => setSearch(e.target.value)}
              placeholder="Search name, code, reason..."
              style={{
                width: '100%', padding: '8px 12px 8px 34px', borderRadius: 10,
                fontSize: 13, boxSizing: 'border-box', fontFamily: 'inherit',
              }} />
          </div>
        </div>

        {/* List */}
        {filtered.length === 0 ? (
          <div style={{ padding: 60, textAlign: 'center', color: 'var(--text-muted)' }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6, color: 'var(--text)' }}>
              {items.length === 0 ? 'Nothing in dispute history yet' : 'No items match your filters'}
            </div>
            <div style={{ fontSize: 12 }}>
              {items.length === 0
                ? 'Cancelled tickets and rejected orders will appear here for audit.'
                : 'Adjust filters or clear search.'}
            </div>
          </div>
        ) : (
          <div style={{ maxHeight: 'calc(100vh - 360px)', overflow: 'auto' }}>
            {filtered.map((it) => (
              <DisputeRow key={it.id} item={it}
                onOpen={() => {
                  if (it.order_id) onOpenOrder(it.order_id);
                  else if (it.ticket_id) onOpenTicket(it.ticket_id);
                }} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

  const meta = DISPUTE_TYPE_META[it.type] || { label: it.type, color: '#FFFFFF', bg: 'rgba(255,255,255,0.05)', icon: 'alert' };
  return (
    <div onClick={onOpen}
      style={{
        padding: '14px 18px',
        borderBottom: '1px solid rgba(255,255,255,0.04)',
        cursor: 'pointer',
        display: 'grid',
        gridTemplateColumns: '120px 1fr auto',
        gap: 14, alignItems: 'center',
        transition: 'background 0.15s',
      }}
      onMouseEnter={(e) => { e.currentTarget.style.background = 'rgba(255,255,255,0.025)'; }}
      onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; }}>
      <div>
        <span style={{
          padding: '3px 8px', borderRadius: 4,
          background: meta.bg,
          border: '1px solid ' + meta.color + '40',
          color: meta.color, fontSize: 10, fontWeight: 700,
          letterSpacing: 0.5, whiteSpace: 'nowrap',
          display: 'inline-flex', alignItems: 'center', gap: 4,
        }}>
          <Icon name={meta.icon} size={10} /> {meta.label}
        </span>
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{
          fontSize: 13, fontWeight: 700, color: 'var(--text)',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          marginBottom: 3,
        }}>
          {it.ticket_code || it.order_ref}
          <span style={{ marginLeft: 8, color: 'var(--text-muted)', fontWeight: 500 }}>
            · {it.attendee_name || it.buyer_name || '—'}
          </span>
        </div>
        <div style={{
          fontSize: 11, color: 'var(--text-soft)',
          display: 'flex', gap: 8, flexWrap: 'wrap',
        }}>
          <span>{formatDT(it.date)}</span>
          {it.reason && (
            <span style={{ color: 'var(--text-muted)', fontStyle: 'italic' }}>
              · {it.reason.length > 60 ? it.reason.slice(0, 60) + '…' : it.reason}
            </span>
          )}
          {it.actor && <span>· by {it.actor.split('@')[0]}</span>}
        </div>
      </div>
      <div style={{ textAlign: 'right' }}>
        <div className="font-mono" style={{
          fontSize: 14, fontWeight: 700, color: meta.color,
        }}>
          ₱{Math.round(it.amount || 0)}
        </div>
        <div style={{ fontSize: 10, color: 'var(--text-soft)', marginTop: 2 }}>
          {it.type === 'ticket_cancelled' ? 'ticket value' : 'order value'}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PERFORMER MANAGEMENT SECTION
// Renders inside RegistrationDetailPanel. Fetches members and payments
// for the registration, shows status, lets admin verify payments,
// drop/add substitute members, mark members paid manually, and
// trigger performer ticket generation when all paid.
// ============================================================
function PerformerManagementSection({ registration, onVerifyPayment, onDropMember,
                                      onAddSubstitute, onMarkMemberPaid,
                                      onGeneratePerformerTickets }) {
  const [members, setMembers] = useState([]);
  const [payments, setPayments] = useState([]);
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [showAddSub, setShowAddSub] = useState(null); // null or droppedMember
  const [showAddForm, setShowAddForm] = useState(false); // toggle for blank add
  const [subName, setSubName] = useState('');
  const [subAge, setSubAge] = useState('');

  const refresh = useCallback(async () => {
    setLoading(true);
    const [memRes, payRes] = await Promise.all([
      supabase.from('registration_members')
        .select('*')
        .eq('registration_id', registration.id)
        .order('member_order'),
      supabase.from('registration_payments')
        .select('*')
        .eq('registration_id', registration.id)
        .order('created_at', { ascending: false }),
    ]);
    if (memRes.data) setMembers(memRes.data);
    if (payRes.data) setPayments(payRes.data);
    setLoading(false);
  }, [registration.id]);

  useEffect(() => { refresh(); }, [refresh]);

  // Realtime subscription so admin sees buyer-side payments appear live
  useEffect(() => {
    const ch = supabase.channel('perf-mgmt-' + registration.id)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'registration_members',
        filter: 'registration_id=eq.' + registration.id,
      }, () => refresh())
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'registration_payments',
        filter: 'registration_id=eq.' + registration.id,
      }, () => refresh())
      .subscribe();
    return function() { supabase.removeChannel(ch); };
  }, [registration.id, refresh]);

  const nonDropped = members.filter((m) => m.payment_status !== 'dropped');
  const paidCount = nonDropped.filter((m) => m.payment_status === 'paid').length;
  const unpaidCount = nonDropped.filter((m) => m.payment_status === 'unpaid').length;
  const allPaid = unpaidCount === 0 && nonDropped.length > 0;
  const totalCollected = payments
    .filter((p) => p.verified_at)
    .reduce((s, p) => s + Number(p.amount || 0), 0);
  const totalSubmitted = payments
    .reduce((s, p) => s + Number(p.amount || 0), 0);

  const hasTickets = registration.status === 'paid' ||
    members.some((m) => m.ticket_id);

  const handleVerify = async (payment) => {
    setBusy(true);
    await onVerifyPayment(payment);
    setBusy(false);
  };

  const handleDrop = async (member) => {
    const reason = window.prompt('Reason for dropping ' + member.member_name + '?');
    if (reason === null) return;
    setBusy(true);
    const ok = await onDropMember(member, reason);
    if (ok && member.payment_status === 'paid') {
      // Offer substitute UX
      const wantSub = window.confirm(
        member.member_name + ' was paid. Add a substitute who inherits their payment?'
      );
      if (wantSub) setShowAddSub(member);
    }
    setBusy(false);
  };

  const handleAddSubmit = async () => {
    if (!subName.trim()) { alert('Substitute name required'); return; }
    setBusy(true);
    const ok = await onAddSubstitute(
      registration.id,
      subName.trim(),
      subAge ? parseInt(subAge, 10) : null,
      showAddSub  // The dropped member to inherit from
    );
    if (ok) {
      setShowAddSub(null);
      setShowAddForm(false);
      setSubName('');
      setSubAge('');
    }
    setBusy(false);
  };

  const handleAddNew = async () => {
    if (!subName.trim()) { alert('Member name required'); return; }
    setBusy(true);
    const ok = await onAddSubstitute(
      registration.id,
      subName.trim(),
      subAge ? parseInt(subAge, 10) : null,
      null  // No inherit — fresh member, unpaid
    );
    if (ok) {
      setShowAddSub(null);
      setShowAddForm(false);
      setSubName('');
      setSubAge('');
    }
    setBusy(false);
  };

  const handleMarkPaid = async (member) => {
    if (!window.confirm('Mark ' + member.member_name + ' as PAID (₱300 cash)? This creates a cash payment record.')) return;
    setBusy(true);
    await onMarkMemberPaid(member, null);
    setBusy(false);
  };

  const handleGenerate = async () => {
    if (!window.confirm('Generate ' + nonDropped.length + ' performer tickets for "' + registration.group_name + '"? This is irreversible.')) return;
    setBusy(true);
    await onGeneratePerformerTickets(registration);
    setBusy(false);
  };

  if (loading) {
    return (
      <Section title="Performer Management">
        <div style={{ padding: 20, textAlign: 'center' }}><Spinner size={20} /></div>
      </Section>
    );
  }

  return (
    <React.Fragment>
      {/* PAYMENT PROGRESS */}
      <Section title="Payment Progress">
        <div style={{
          padding: 14, borderRadius: 10,
          background: allPaid ? 'rgba(0, 230, 118, 0.06)' : 'rgba(255, 159, 26, 0.06)',
          border: '1px solid ' + (allPaid ? 'rgba(0, 230, 118, 0.25)' : 'rgba(255, 159, 26, 0.25)'),
          marginBottom: 10,
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: allPaid ? '#00E676' : '#FFD08A' }}>
              {allPaid ? 'ALL MEMBERS PAID' : (paidCount + ' of ' + nonDropped.length + ' members paid')}
            </span>
            <span className="font-mono" style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>
              {peso(totalCollected)} <span style={{ color: 'var(--text-soft)', fontSize: 11 }}>/ {peso(nonDropped.length * 300)}</span>
            </span>
          </div>
          <div style={{
            height: 6, background: 'rgba(255,255,255,0.08)',
            borderRadius: 3, overflow: 'hidden',
          }}>
            <div style={{
              height: '100%',
              width: (nonDropped.length > 0 ? (paidCount / nonDropped.length * 100) : 0) + '%',
              background: allPaid ? 'linear-gradient(90deg, #00B248, #00E676)' : 'linear-gradient(90deg, #FF9F1A, #FFD08A)',
              transition: 'width 0.3s',
            }}></div>
          </div>
          {totalSubmitted > totalCollected && (
            <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 8 }}>
              {peso(totalSubmitted - totalCollected)} pending verification below
            </div>
          )}
        </div>

        {hasTickets ? (
          <div style={{
            padding: '10px 12px', borderRadius: 8,
            background: 'rgba(0, 230, 118, 0.08)',
            border: '1px solid rgba(0, 230, 118, 0.3)',
            fontSize: 12, color: '#00E676', fontWeight: 600,
            textAlign: 'center',
          }}>
            ✓ Performer tickets generated. View in Tickets tab.
          </div>
        ) : (
          <button
            onClick={handleGenerate}
            disabled={!allPaid || busy || nonDropped.length === 0}
            style={{
              width: '100%', padding: '11px 16px', borderRadius: 10,
              background: (!allPaid || nonDropped.length === 0)
                ? 'rgba(255,255,255,0.05)'
                : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
              border: '1px solid ' + (!allPaid ? 'rgba(255,255,255,0.1)' : 'transparent'),
              color: (!allPaid || nonDropped.length === 0) ? 'var(--text-soft)' : 'white',
              fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
              cursor: (!allPaid || busy) ? 'not-allowed' : 'pointer',
              fontFamily: 'inherit',
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
            }}>
            <Icon name="ticket" size={12} />
            {allPaid ? 'GENERATE ' + nonDropped.length + ' PERFORMER TICKETS' : 'WAITING FOR ' + unpaidCount + ' MEMBER(S)'}
          </button>
        )}
      </Section>

      {/* MEMBER LIST */}
      <Section title={'Members (' + nonDropped.length + (members.length > nonDropped.length ? ' active, ' + (members.length - nonDropped.length) + ' dropped' : '') + ')'}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {members.map((m) => {
            const isPaid = m.payment_status === 'paid';
            const isDropped = m.payment_status === 'dropped';
            return (
              <div key={m.id} style={{
                padding: '10px 12px', borderRadius: 10,
                background: isDropped ? 'rgba(255,255,255,0.02)' :
                            isPaid ? 'rgba(0,230,118,0.06)' : 'rgba(255,255,255,0.04)',
                border: '1px solid ' + (isDropped ? 'rgba(255,255,255,0.06)' :
                                         isPaid ? 'rgba(0,230,118,0.25)' : 'var(--border)'),
                opacity: isDropped ? 0.55 : 1,
                display: 'grid',
                gridTemplateColumns: '1fr auto',
                gap: 10, alignItems: 'center',
              }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{
                    fontSize: 13, fontWeight: 700, color: 'var(--text)',
                    textDecoration: isDropped ? 'line-through' : 'none',
                  }}>
                    {m.member_name}
                  </div>
                  <div style={{ fontSize: 10, color: 'var(--text-soft)', marginTop: 2, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    {m.member_age && <span>Age {m.member_age}</span>}
                    {isPaid && m.paid_at && <span>· Paid {formatDT(m.paid_at)}</span>}
                    {isDropped && m.dropped_reason && (
                      <span style={{ fontStyle: 'italic' }}>· Dropped: {m.dropped_reason}</span>
                    )}
                    {m.notes && <span style={{ fontStyle: 'italic' }}>· {m.notes}</span>}
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  {isPaid ? (
                    <span style={{
                      padding: '3px 8px', borderRadius: 4,
                      background: 'rgba(0,230,118,0.15)',
                      border: '1px solid rgba(0,230,118,0.4)',
                      fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
                      color: '#00E676',
                    }}>PAID</span>
                  ) : isDropped ? (
                    <span style={{
                      padding: '3px 8px', borderRadius: 4,
                      background: 'rgba(255,255,255,0.04)',
                      border: '1px solid rgba(255,255,255,0.1)',
                      fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
                      color: 'var(--text-soft)',
                    }}>DROPPED</span>
                  ) : (
                    <button onClick={() => handleMarkPaid(m)} disabled={busy || hasTickets}
                      style={{
                        padding: '4px 10px', borderRadius: 6,
                        background: 'rgba(0,229,255,0.08)',
                        border: '1px solid rgba(0,229,255,0.3)',
                        color: '#00E5FF', cursor: busy ? 'wait' : 'pointer',
                        fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                        fontFamily: 'inherit',
                      }}>
                      MARK PAID (CASH)
                    </button>
                  )}
                  {!isDropped && !hasTickets && (
                    <button onClick={() => handleDrop(m)} disabled={busy}
                      style={{
                        padding: '4px 8px', borderRadius: 6,
                        background: 'transparent',
                        border: '1px solid rgba(255,23,68,0.3)',
                        color: '#FF6B7F', cursor: busy ? 'wait' : 'pointer',
                        fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                        fontFamily: 'inherit',
                      }}>
                      DROP
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* ADD MEMBER / SUBSTITUTE */}
        {!hasTickets && (
          <div style={{ marginTop: 12 }}>
            {showAddSub !== null || showAddForm ? (
              <div style={{
                padding: 12, borderRadius: 10,
                background: 'rgba(255,255,255,0.03)',
                border: '1px solid var(--border)',
              }}>
                <div className="font-mono" style={{
                  fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
                  fontWeight: 700, marginBottom: 8,
                }}>
                  {showAddSub ? 'SUBSTITUTE FOR ' + showAddSub.member_name : 'NEW MEMBER'}
                </div>
                {showAddSub && (
                  <div style={{
                    fontSize: 11, color: 'var(--text-muted)', marginBottom: 10,
                    padding: '6px 8px',
                    background: 'rgba(0,229,255,0.06)',
                    borderRadius: 6,
                  }}>
                    This substitute inherits the ₱300 payment from {showAddSub.member_name} (no new payment needed).
                  </div>
                )}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 80px', gap: 8, marginBottom: 8 }}>
                  <input type="text" value={subName} onChange={(e) => setSubName(e.target.value)}
                    placeholder="Full name" style={{ fontSize: 13, padding: 8 }} />
                  <input type="text" value={subAge} onChange={(e) => setSubAge(e.target.value)}
                    placeholder="Age" style={{ fontSize: 13, padding: 8 }} />
                </div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={() => { setShowAddSub(null); setShowAddForm(false); setSubName(''); setSubAge(''); }}
                    style={{
                      padding: '7px 14px', borderRadius: 6, fontSize: 11,
                      background: 'transparent', border: '1px solid var(--border)',
                      color: 'var(--text-muted)', cursor: 'pointer', fontFamily: 'inherit',
                    }}>Cancel</button>
                  <button onClick={showAddSub ? handleAddSubmit : handleAddNew} disabled={busy || !subName.trim()}
                    style={{
                      flex: 1, padding: '7px 14px', borderRadius: 6, fontSize: 11, fontWeight: 700,
                      background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
                      border: 'none', color: 'white', cursor: busy ? 'wait' : 'pointer',
                      fontFamily: 'inherit',
                    }}>
                    {busy ? 'SAVING...' : (showAddSub ? 'ADD SUBSTITUTE' : 'ADD MEMBER')}
                  </button>
                </div>
              </div>
            ) : (
              <button onClick={() => setShowAddForm(true)}
                style={{
                  padding: '8px 14px', borderRadius: 8,
                  background: 'rgba(255,255,255,0.04)',
                  border: '1px dashed var(--border)',
                  color: 'var(--text-muted)', cursor: 'pointer',
                  fontSize: 11, fontWeight: 600, letterSpacing: 0.5,
                  width: '100%', fontFamily: 'inherit',
                }}>
                + Add member
              </button>
            )}
          </div>
        )}
      </Section>

      {/* PAYMENTS */}
      <Section title={'Payments (' + payments.length + ')'}>
        {payments.length === 0 ? (
          <div style={{
            fontSize: 12, color: 'var(--text-muted)',
            padding: '8px 0', textAlign: 'center',
          }}>
            No payments recorded yet. Submissions from the participant payment page appear here.
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {payments.map((p) => (
              <PaymentRow key={p.id} payment={p} members={members}
                onVerify={() => handleVerify(p)}
                busy={busy} />
            ))}
          </div>
        )}
      </Section>
    </React.Fragment>
  );
}

function PaymentRow({ payment: p, members, onVerify, busy }) {
  const verified = !!p.verified_at;
  const memberMap = useMemo(() => {
    const m = {};
    members.forEach((mem) => { m[mem.id] = mem; });
    return m;
  }, [members]);
  const coveredMembers = (p.members_covered || [])
    .map((id) => memberMap[id])
    .filter(Boolean);

  return (
    <div style={{
      padding: '10px 12px', borderRadius: 10,
      background: verified ? 'rgba(0,230,118,0.05)' : 'rgba(255,159,26,0.06)',
      border: '1px solid ' + (verified ? 'rgba(0,230,118,0.25)' : 'rgba(255,159,26,0.3)'),
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
        <span className="font-mono" style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>
          {peso(p.amount)}
        </span>
        {verified ? (
          <span style={{
            padding: '2px 7px', borderRadius: 4,
            background: 'rgba(0,230,118,0.15)',
            border: '1px solid rgba(0,230,118,0.4)',
            fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
            color: '#00E676',
          }}>VERIFIED</span>
        ) : (
          <span style={{
            padding: '2px 7px', borderRadius: 4,
            background: 'rgba(255,159,26,0.15)',
            border: '1px solid rgba(255,159,26,0.4)',
            fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
            color: '#FFD08A',
          }}>NEEDS VERIFY</span>
        )}
      </div>
      <div style={{ fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.5 }}>
        {p.payment_method === 'gcash' ? 'GCash' : (p.payment_method || '—')}
        {p.gcash_reference && <span> · Ref {p.gcash_reference}</span>}
        <span> · {formatDT(p.created_at)}</span>
      </div>
      {coveredMembers.length > 0 && (
        <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 4 }}>
          Covers: {coveredMembers.map((m) => m.member_name).join(', ')}
        </div>
      )}
      {p.receipt_url && (
        <div style={{ fontSize: 10, color: 'var(--text-soft)', marginTop: 4, fontFamily: 'JetBrains Mono, monospace' }}>
          📎 Receipt: {p.receipt_url}
        </div>
      )}
      {!verified && (
        <button onClick={onVerify} disabled={busy}
          style={{
            marginTop: 8, width: '100%', padding: '6px 10px', borderRadius: 6,
            background: 'rgba(0,230,118,0.10)',
            border: '1px solid rgba(0,230,118,0.4)',
            color: '#00E676', cursor: busy ? 'wait' : 'pointer',
            fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
            fontFamily: 'inherit',
          }}>
          ✓ VERIFY PAYMENT
        </button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
