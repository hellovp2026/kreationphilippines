function OrderList({ orders, tickets, attendeesByOrder, selectedId, onSelect }) {
  // Compute a per-order tier breakdown from the tickets array so mixed-cart
  // orders (e.g. 1 VIP + 1 Regular) show both tiers in the row, not just
  // the single ticket_type_name field on the order.
  // Priority: tickets (post-confirmation) > attendees (pre-confirmation) > order.ticket_type_name.
  const ticketsByOrder = React.useMemo(() => {
    const map = {};
    (tickets || []).forEach((t) => {
      if (!t.order_id || t.status === 'cancelled' || t.reissued_to_ticket_id) return;
      if (!map[t.order_id]) map[t.order_id] = {};
      const key = t.tier_code || '?';
      map[t.order_id][key] = (map[t.order_id][key] || 0) + 1;
    });
    return map;
  }, [tickets]);

  // Helper: convert attendee-based breakdown (keyed by ticket type NAME like
  // "VIP"/"Regular"/"Participant") to the same tier_code keys ("V"/"R"/"P")
  // used by ticketsByOrder, so OrderRow's renderer treats them the same.
  const tierCodeFromTypeName = (name) => {
    if (!name) return '?';
    const n = name.toLowerCase();
    if (n.indexOf('vip') !== -1) return 'V';
    if (n.indexOf('regular') !== -1) return 'R';
    if (n.indexOf('participant') !== -1 || n.indexOf('performer') !== -1) return 'P';
    return name.charAt(0).toUpperCase();
  };

  const attendeeBreakdownByOrder = React.useMemo(() => {
    const map = {};
    Object.keys(attendeesByOrder || {}).forEach((orderId) => {
      const byName = attendeesByOrder[orderId] || {};
      const byCode = {};
      Object.keys(byName).forEach((typeName) => {
        const code = tierCodeFromTypeName(typeName);
        byCode[code] = (byCode[code] || 0) + byName[typeName];
      });
      map[orderId] = byCode;
    });
    return map;
  }, [attendeesByOrder]);
  return (
    <div>
      <div className="admin-order-table-header" style={{
        display: 'grid', gridTemplateColumns: '60px 1fr 1.1fr 0.9fr 0.9fr 0.7fr 30px',
        gap: 12, padding: '10px 18px', fontSize: 10, fontWeight: 700,
        color: 'var(--text-soft)', letterSpacing: 1.2, textTransform: 'uppercase',
        borderBottom: '1px solid var(--border)', fontFamily: 'Sora'
      }}>
        <div>#</div>
        <div>Buyer / Order</div>
        <div>Type / Seats</div>
        <div>Payment</div>
        <div>Uploaded</div>
        <div style={{ textAlign: 'right' }}>Total</div>
        <div></div>
      </div>
      {orders.map((o, i) => {
        // Pick the best available breakdown: tickets first (more authoritative,
        // includes seat assignments), then attendees (pre-confirmation),
        // then null (forces OrderRow to fall back to order.ticket_type_name).
        const ticketBd = ticketsByOrder[o.id];
        const hasTickets = ticketBd && Object.keys(ticketBd).length > 0;
        const attendeeBd = attendeeBreakdownByOrder[o.id];
        const hasAttendees = attendeeBd && Object.keys(attendeeBd).length > 0;
        const breakdown = hasTickets ? ticketBd : (hasAttendees ? attendeeBd : null);
        return (
          <OrderRow key={o.id} order={o} position={i + 1}
                    tierBreakdown={breakdown}
                    selected={selectedId === o.id}
                    onClick={() => onSelect(o.id)} />
        );
      })}
    </div>
  );
}

function OrderRow({ order, position, selected, onClick, tierBreakdown }) {
  const expHrs = hoursUntilExpiry(order.receipt_uploaded_at);
  const urgent = order.status === 'awaiting_verification' && expHrs !== null && expHrs < 6;
  const apQty = (order.add_ons || []).reduce((s, a) => s + (a.quantity || 0), 0);

  // Build a compact tier summary string for mixed-cart visibility.
  // tierBreakdown is { V: count, R: count, P: count } from generated tickets.
  // If no tickets generated yet, fall back to the order's single primary type.
  const TIER_SHORT = { V: 'VIP', R: 'Regular', P: 'Perf' };
  const TIER_ORDER = { V: 0, R: 1, P: 2 };
  let typeDisplay;
  if (tierBreakdown && Object.keys(tierBreakdown).length > 0) {
    typeDisplay = Object.keys(tierBreakdown)
      .sort((a, b) => (TIER_ORDER[a] ?? 99) - (TIER_ORDER[b] ?? 99))
      .map((k) => (TIER_SHORT[k] || k) + (tierBreakdown[k] > 1 ? ' \u00d7 ' + tierBreakdown[k] : ''))
      .join(' \u00b7 ');
  } else {
    typeDisplay = order.ticket_type_name || '\u2014';
  }
  return (
    <div onClick={onClick}
         className="admin-order-row"
         style={{
           display: 'grid',
           gridTemplateColumns: '60px 1fr 1.1fr 0.9fr 0.9fr 0.7fr 30px',
           gap: 12, padding: '14px 18px', alignItems: 'center',
           borderBottom: '1px solid var(--border)',
           background: selected ? 'rgba(255, 27, 107, 0.08)' : 'transparent',
           cursor: 'pointer', transition: 'background 0.1s',
           borderLeft: selected ? '3px solid var(--brand)' : '3px solid transparent',
           paddingLeft: selected ? 15 : 18
         }}
         onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = 'rgba(255, 255, 255, 0.02)'; }}
         onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}>
      <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-soft)', fontWeight: 600 }}>{position}</div>
      <div>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 2, color: 'var(--text)' }}>{order.buyer_name}</div>
        <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-soft)' }}>{order.order_number}</div>
      </div>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 2 }}>
          {typeDisplay}
        </div>
        <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-muted)' }}>
          {order.seat_labels || (order.ticket_type_category === 'dancer' ? 'Crew' : '\u2014')}
          {apQty > 0 && <span style={{ color: 'var(--brand)', marginLeft: 6 }}>+ {apQty} AP</span>}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500 }}>{order.payment_method || '—'}</div>
        <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-muted)' }}>
          {order.reference_number || '—'}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500 }}>{relTime(order.receipt_uploaded_at)}</div>
        {order.status === 'awaiting_verification' && expHrs !== null && (
          <div className="font-mono" style={{
            fontSize: 11, color: urgent ? '#FF6B85' : 'var(--text-muted)',
            fontWeight: urgent ? 600 : 400
          }}>{expHrs}h left</div>
        )}
        {order.status !== 'awaiting_verification' && (
          <div style={{ marginTop: 3 }}><StatusBadge status={order.status} /></div>
        )}
      </div>
      <div className="font-mono" style={{ textAlign: 'right', fontWeight: 700, fontSize: 14, color: 'var(--text)' }}>
        {peso(order.total)}
      </div>
      <div style={{ color: 'var(--text-soft)' }}><Icon name="chevronRight" size={14} /></div>
    </div>
  );
}

              {order.status === 'confirmed' ? formatDT(order.confirmed_at) : formatDT(order.rejected_at)}
            </span>
          </div>
        )}
        {order.status === 'pending_payment' && (
          <div style={{ fontSize: 13, color: 'var(--text-muted)', textAlign: 'center', padding: 8 }}>
            Waiting for buyer to upload receipt.
          </div>
        )}
      </div>

      {order.status === 'confirmed' && (
        <Section title="Tickets">
          {orderTickets && orderTickets.length > 0 ? (
            <React.Fragment>
              <div style={{
                padding: '10px 12px', borderRadius: 8,
                background: 'rgba(0, 230, 118, 0.06)',
                border: '1px solid rgba(0, 230, 118, 0.25)',
                marginBottom: 12,
              }}>
                <div style={{
                  fontSize: 13, color: '#00E676', fontWeight: 700,
                  display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6,
                }}>
                  <Icon name="check" size={14} /> {orderTickets.length} ticket{orderTickets.length === 1 ? '' : 's'} generated
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {orderTickets.map((t) => (
                    <div key={t.id} className="font-mono" style={{
                      fontSize: 11, color: 'var(--text)',
                      display: 'flex', justifyContent: 'space-between',
                    }}>
                      <span style={{ fontWeight: 700 }}>{t.ticket_code}</span>
                      <span style={{ color: 'var(--text-muted)' }}>{t.attendee_name}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <button onClick={() => onDownloadTicketsPDF(orderTickets)}
                  style={{
                    padding: '9px 14px', borderRadius: 8,
                    background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
                    border: 'none', color: 'white', cursor: 'pointer',
                    fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                    fontFamily: 'inherit',
                  }}>
                  <Icon name="download" size={12} /> DOWNLOAD ALL TICKETS (PDF)
                </button>

                {order.tickets_pdf_sent_at ? (
                  <React.Fragment>
                    <div style={{
                      padding: '8px 12px', borderRadius: 8,
                      background: 'rgba(0, 230, 118, 0.06)',
                      border: '1px solid rgba(0, 230, 118, 0.25)',
                      fontSize: 11, color: '#00E676', fontWeight: 600,
                      textAlign: 'center',
                    }}>
                      ✓ TICKETS EMAILED {formatDT(order.tickets_pdf_sent_at)}
                    </div>
                    <a href={buildTicketsEmailMailto(order, orderTickets, settings, audienceTemplate)} target="_blank" rel="noopener"
                      style={{
                        padding: '8px 14px', borderRadius: 8,
                        background: 'rgba(0, 229, 255, 0.06)',
                        border: '1px solid rgba(0, 229, 255, 0.3)',
                        color: '#00E5FF',
                        fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                        textDecoration: 'none',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                        fontFamily: 'inherit',
                      }}>
                      <Icon name="refresh" size={12} /> RESEND EMAIL
                    </a>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <a href={buildTicketsEmailMailto(order, orderTickets, settings, audienceTemplate)} target="_blank" rel="noopener"
                      style={{
                        padding: '8px 14px', borderRadius: 8,
                        background: 'rgba(0, 229, 255, 0.08)',
                        border: '1px solid rgba(0, 229, 255, 0.4)',
                        color: '#00E5FF',
                        fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                        textDecoration: 'none',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                        fontFamily: 'inherit',
                      }}>
                      <Icon name="mail" size={12} /> COMPOSE EMAIL
                    </a>
                    <button onClick={onMarkTicketsSent}
                      style={{
                        padding: '8px 14px', borderRadius: 8,
                        background: 'rgba(0, 230, 118, 0.08)',
                        border: '1px solid rgba(0, 230, 118, 0.4)',
                        color: '#00E676', cursor: 'pointer',
                        fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                        fontFamily: 'inherit',
                      }}>
                      <Icon name="check" size={12} /> MARK TICKETS SENT
                    </button>
                  </React.Fragment>
                )}
              </div>
            </React.Fragment>
          ) : (
            <div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.5 }}>
                Tickets not generated yet. They auto-generate when you confirm an order, but you can also trigger manually.
              </div>
              <button onClick={onGenerateTickets}
                style={{
                  padding: '9px 14px', borderRadius: 8,
                  background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
                  border: 'none', color: 'white', cursor: 'pointer',
                  fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                  fontFamily: 'inherit', width: '100%',
                }}>
                <Icon name="ticket" size={12} /> GENERATE TICKETS
              </button>
            </div>
          )}
        </Section>
      )}

      {order.status === 'confirmed' && (
        <Section title="Danger Zone">
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.5 }}>
            Void this order if it was a test, fraud, or admin error. Any active tickets will be invalidated automatically. The order disappears from active counts but stays in the database for audit.
          </div>
          <button
            onClick={() => {
              const reason = window.prompt('Reason for voiding this order? (e.g., "test data cleanup")');
              if (reason === null) return;
              if (!window.confirm('Void this order? This will invalidate any remaining active tickets and remove the order from active counts.')) return;
              onVoid(reason || 'Admin void');
            }}
            style={{
              width: '100%', padding: '9px 14px', borderRadius: 8,
              background: 'transparent',
              border: '1px solid rgba(255, 23, 68, 0.4)',
              color: '#FF6B7F', cursor: 'pointer',
              fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
              fontFamily: 'inherit',
            }}>
            VOID ORDER
          </button>
        </Section>
      )}

    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ padding: '18px 22px', borderBottom: '1px solid var(--border)' }}>
      {title && (
        <div style={{
          fontSize: 11, fontWeight: 700, color: 'var(--text-soft)',
          letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 12,
          fontFamily: 'Sora'
        }}>{title}</div>
      )}
      {children}
    </div>
  );
}

function KV({ iconName, label, value, mono, compact }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: 'auto 80px 1fr', gap: 10,
      alignItems: 'center', padding: compact ? '4px 0' : '7px 0', fontSize: 14
    }}>
      <span style={{ color: 'var(--text-soft)' }}><Icon name={iconName} size={13} /></span>
      <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>{label}</span>
      <span className={mono ? 'font-mono' : ''}
            style={{ fontWeight: 500, fontSize: mono ? 13 : 14, wordBreak: 'break-word', color: 'var(--text)' }}>
        {value || '—'}
      </span>
    </div>
  );
}

function Line({ label, value, large }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between',
      alignItems: large ? 'baseline' : 'center',
      paddingTop: large ? 10 : 0, marginTop: large ? 10 : 0,
      borderTop: large ? '1px solid var(--border)' : 'none'
    }}>
      <span>{label}</span>
      <span className="font-mono">{value}</span>
    </div>
  );
}

// ============================================================
// REGISTRATIONS VIEW
// ============================================================
const sectionBtnStyle = (active) => ({
  padding: '10px 18px',
  borderRadius: 12,
  background: active
    ? 'linear-gradient(135deg, rgba(255, 27, 107, 0.22), rgba(199, 36, 255, 0.22))'
    : 'transparent',
  color: active ? 'var(--text)' : 'var(--text-muted)',
  border: active ? '1px solid rgba(255, 27, 107, 0.45)' : '1px solid var(--border)',
  fontSize: 13, fontWeight: 700, letterSpacing: 0.3, cursor: 'pointer',
  display: 'flex', alignItems: 'center', gap: 10,
  fontFamily: 'inherit', transition: 'all 0.15s',
});

function RegistrationsView({
  registrations, regLoading, filteredRegs,
  regTab, setRegTab, regSearch, setRegSearch,
  regCategoryFilter, setRegCategoryFilter,
  regSelectedId, setRegSelectedId,
  regCounts, readyToIssueCount, regCategoryCounts,
  selectedReg, onUpdateStatus, onSaveNotes,
  onMarkConfirmationSent, onUnmarkConfirmationSent,
  onExportCSV, emailTemplate, performerTicketsTemplate, settings, onEditTemplate,
  bulkSelected, setBulkSelected,
  onVerifyPayment, onDropMember, onAddSubstitute,
  onMarkMemberPaid, onRenameMember, onGeneratePerformerTickets,
  tickets,
}) {
  // Bulk selection helpers
  const filteredIds = filteredRegs.map((r) => r.id);
  const selectedCount = filteredIds.filter((id) => bulkSelected[id]).length;
  const allSelected = filteredIds.length > 0 && selectedCount === filteredIds.length;
  const toggleSelectAll = () => {
    const next = { ...bulkSelected };
    if (allSelected) {
      filteredIds.forEach((id) => { delete next[id]; });
    } else {
      filteredIds.forEach((id) => { next[id] = true; });
    }
    setBulkSelected(next);
  };
  const toggleOne = (id) => {
    const next = { ...bulkSelected };
    if (next[id]) delete next[id];
    else next[id] = true;
    setBulkSelected(next);
  };
  const clearSelection = () => setBulkSelected({});
  const bulkConfirm = async () => {
    if (!window.confirm('Confirm ' + selectedCount + ' registrations?')) return;
    for (const id of Object.keys(bulkSelected)) {
      if (bulkSelected[id]) await onUpdateStatus(id, 'confirmed');
    }
    clearSelection();
  };
  return (
    <React.Fragment>
      {/* Stats row */}
      <div style={{ padding: '20px 32px 0', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
        <StatCard label="Pending Review" value={regCounts.pending}
                  sub="awaiting your action" accent="#FFB300" iconName="clock" />
        <StatCard label="Confirmed" value={regCounts.confirmed}
                  sub="approved entries" accent="#00E5FF" iconName="check" />
        <StatCard label="Paid" value={regCounts.paid}
                  sub="fee received" accent="#00E676" iconName="check" />
        {readyToIssueCount > 0 && (
          <StatCard label="Ready to Issue Tickets" value={readyToIssueCount}
                    sub="all members paid" accent="#C724FF" iconName="ticket" />
        )}
        <StatCard label="Rejected / Withdrawn" value={regCounts.rejected + regCounts.withdrawn}
                  sub={regCounts.rejected + ' rejected · ' + regCounts.withdrawn + ' withdrew'}
                  accent="#FF1744" iconName="x" />
      </div>

      {/* Main grid: list + detail panel */}
      <div style={{
        padding: '24px 32px 64px',
        display: 'grid',
        gridTemplateColumns: selectedReg ? '1fr 500px' : '1fr',
        gap: 22, transition: 'grid-template-columns 0.25s'
      }}>
        <div style={{
          background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
          borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden'
        }}>
          {/* Filter row */}
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 16, flexWrap: 'wrap',
          }}>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {[
                { key: 'pending', label: 'Pending', count: regCounts.pending },
                { key: 'confirmed', label: 'Confirmed', count: regCounts.confirmed },
                { key: 'paid', label: 'Paid', count: regCounts.paid },
                { key: 'rejected', label: 'Rejected', count: regCounts.rejected },
                { key: 'withdrawn', label: 'Withdrawn', count: regCounts.withdrawn },
              ].map((t) => (
                <button key={t.key} onClick={() => { setRegTab(t.key); setRegSelectedId(null); }}
                  style={{
                    padding: '8px 14px', borderRadius: 10,
                    background: regTab === t.key
                      ? 'linear-gradient(135deg, rgba(255, 27, 107, 0.2), rgba(199, 36, 255, 0.2))'
                      : 'transparent',
                    color: regTab === t.key ? 'var(--text)' : 'var(--text-muted)',
                    border: regTab === t.key ? '1px solid rgba(255, 27, 107, 0.4)' : '1px solid transparent',
                    fontSize: 13, fontWeight: 600, cursor: 'pointer',
                    display: 'flex', alignItems: 'center', gap: 8, transition: 'all 0.15s',
                    fontFamily: 'inherit'
                  }}>
                  {t.label}
                  <span className="font-mono" style={{
                    background: regTab === t.key ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
                    padding: '1px 7px', borderRadius: 999, fontSize: 11, fontWeight: 600
                  }}>{t.count}</span>
                </button>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center', flex: '0 1 auto', flexWrap: 'wrap' }}>
              <button onClick={onEditTemplate}
                title="Edit the email confirmation template"
                style={{
                  padding: '7px 12px', borderRadius: 8,
                  background: 'rgba(199, 36, 255, 0.08)',
                  border: '1px solid rgba(199, 36, 255, 0.3)',
                  color: '#C724FF', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600, letterSpacing: 0.3,
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                }}>
                <Icon name="mail" size={12} /> EDIT EMAIL
              </button>
              <button onClick={onExportCSV}
                title="Export current filter to CSV"
                style={{
                  padding: '7px 12px', borderRadius: 8,
                  background: 'rgba(0, 229, 255, 0.08)',
                  border: '1px solid rgba(0, 229, 255, 0.3)',
                  color: '#00E5FF', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600, letterSpacing: 0.3,
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                }}>
                <Icon name="download" size={12} /> CSV
              </button>
              <div style={{ position: 'relative', flex: '0 1 240px' }}>
                <span style={{
                  position: 'absolute', left: 12, top: '50%',
                  transform: 'translateY(-50%)', color: 'var(--text-soft)',
                }}>
                  <Icon name="search" size={14} />
                </span>
                <input value={regSearch} onChange={(e) => setRegSearch(e.target.value)}
                  placeholder="Search ID (DKC-XXXX), group, leader, email..."
                  style={{
                    width: '100%', padding: '8px 12px 8px 34px', borderRadius: 10,
                    fontSize: 13, boxSizing: 'border-box', fontFamily: 'inherit'
                  }} />
              </div>
            </div>
          </div>

          {/* Category filter chips */}
          <div style={{
            padding: '10px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
            background: 'rgba(255, 255, 255, 0.015)',
          }}>
            <span className="font-mono" style={{
              fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
              fontWeight: 700, marginRight: 4,
            }}>
              CATEGORY →
            </span>
            {[
              { key: 'all', label: 'All', accent: '#FFFFFF' },
              { key: 'open-stage', label: 'Open Stage', accent: '#FF1B6B' },
              { key: 'battle', label: 'Battle', accent: '#C724FF' },
              { key: 'fanchant', label: 'Fanchant', accent: '#00E5FF' },
              { key: 'fanbooth', label: 'Fanbooth', accent: '#FF6FA8' },
            ].map((c) => {
              const isActive = regCategoryFilter === c.key;
              const catCount = c.key === 'all' ? registrations.length : (regCategoryCounts[c.key] || 0);
              return (
                <button key={c.key} onClick={() => setRegCategoryFilter(c.key)}
                  style={{
                    padding: '5px 12px', borderRadius: 999,
                    background: isActive ? c.accent + '22' : 'rgba(255,255,255,0.03)',
                    border: '1px solid ' + (isActive ? c.accent + '60' : 'rgba(255,255,255,0.08)'),
                    color: isActive ? c.accent : 'var(--text-muted)',
                    fontSize: 11, fontWeight: 600, letterSpacing: 0.3, cursor: 'pointer',
                    display: 'inline-flex', alignItems: 'center', gap: 6,
                    fontFamily: 'inherit', transition: 'all 0.15s',
                  }}>
                  {c.label}
                  <span style={{
                    fontSize: 10, opacity: 0.7,
                  }}>
                    {catCount}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Bulk action bar — visible when items selected */}
          {selectedCount > 0 && (
            <div style={{
              padding: '10px 18px',
              background: 'linear-gradient(90deg, rgba(255,27,107,0.15), rgba(199,36,255,0.10))',
              borderBottom: '1px solid rgba(255,27,107,0.3)',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              gap: 14, flexWrap: 'wrap',
            }}>
              <div style={{
                fontSize: 13, fontWeight: 700, color: 'var(--text)',
              }}>
                <span style={{ color: 'var(--brand)' }}>{selectedCount}</span> selected
              </div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <button onClick={bulkConfirm}
                  style={{
                    padding: '6px 12px', borderRadius: 6,
                    background: 'rgba(0, 229, 255, 0.15)',
                    border: '1px solid rgba(0, 229, 255, 0.5)',
                    color: '#00E5FF', cursor: 'pointer',
                    fontSize: 11, fontWeight: 700, letterSpacing: 0.3,
                    fontFamily: 'inherit',
                  }}>BULK CONFIRM</button>
                <button onClick={clearSelection}
                  style={{
                    padding: '6px 12px', borderRadius: 6,
                    background: 'transparent',
                    border: '1px solid rgba(255,255,255,0.15)',
                    color: 'var(--text-muted)', cursor: 'pointer',
                    fontSize: 11, fontWeight: 600, letterSpacing: 0.3,
                    fontFamily: 'inherit',
                  }}>CLEAR</button>
              </div>
            </div>
          )}

          {/* Select-all row, only when there are results */}
          {!regLoading && filteredRegs.length > 0 && (
            <div style={{
              padding: '8px 18px',
              borderBottom: '1px solid var(--border)',
              background: 'rgba(255,255,255,0.015)',
              display: 'flex', alignItems: 'center', gap: 10,
              fontSize: 11, color: 'var(--text-soft)', fontWeight: 600, letterSpacing: 0.5,
            }}>
              <input type="checkbox" checked={allSelected}
                onChange={toggleSelectAll}
                style={{
                  width: 16, height: 16, cursor: 'pointer',
                  accentColor: '#FF1B6B',
                }} />
              <span>SELECT ALL IN VIEW ({filteredRegs.length})</span>
            </div>
          )}

          {/* List */}
          {regLoading ? (
            <div style={{ padding: 80, textAlign: 'center' }}><Spinner size={28} /></div>
          ) : filteredRegs.length === 0 ? (
            <RegEmptyState tab={regTab} search={regSearch} />
          ) : (
            <RegistrationList
              registrations={filteredRegs}
              selectedId={regSelectedId}
              onSelect={setRegSelectedId}
              bulkSelected={bulkSelected}
              onToggleOne={toggleOne}
            />
          )}
        </div>

        {selectedReg && (
          <RegistrationDetailPanel
            registration={selectedReg}
            onClose={() => setRegSelectedId(null)}
            onUpdateStatus={onUpdateStatus}
            onSaveNotes={onSaveNotes}
            onMarkConfirmationSent={onMarkConfirmationSent}
            onUnmarkConfirmationSent={onUnmarkConfirmationSent}
            emailTemplate={emailTemplate}
            performerTicketsTemplate={performerTicketsTemplate}
            settings={settings}
            onVerifyPayment={onVerifyPayment}
            onDropMember={onDropMember}
            onAddSubstitute={onAddSubstitute}
            onMarkMemberPaid={onMarkMemberPaid}
            onRenameMember={onRenameMember}
            onGeneratePerformerTickets={onGeneratePerformerTickets}
            registrationTickets={(tickets || []).filter((t) =>
              t.registration_id === selectedReg.id &&
              t.status !== 'cancelled' &&
              !t.reissued_to_ticket_id
            )}
          />
        )}
      </div>
    </React.Fragment>
  );
}

function RegEmptyState({ tab, search }) {
  const msgs = {
    pending: { title: 'No pending registrations', body: "When crews submit entries via the website, they'll appear here." },
    confirmed: { title: 'No confirmed registrations', body: 'Approved entries land here. None yet.' },
    paid: { title: 'No paid registrations', body: 'Once payment is verified, mark entries as paid.' },
    rejected: { title: 'No rejected entries', body: 'Entries you decline appear here.' },
    withdrawn: { title: 'No withdrawn entries', body: 'Groups that drop out land here.' },
  };
  const m = msgs[tab] || { title: 'Nothing here', body: '' };
  return (
    <div style={{ padding: 80, textAlign: 'center', color: 'var(--text-muted)' }}>
      <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6, color: 'var(--text)' }}>
        {search ? 'No results' : m.title}
      </div>
      <div style={{ fontSize: 13 }}>
        {search ? 'Try a different name, email, or Entertainment.' : m.body}
      </div>
    </div>
  );
}

function RegistrationList({ registrations, selectedId, onSelect, bulkSelected, onToggleOne }) {
  return (
    <div style={{ maxHeight: 'calc(100vh - 380px)', overflow: 'auto' }}>
      {registrations.map((r) => (
        <RegistrationRow
          key={r.id}
          registration={r}
          selected={r.id === selectedId}
          onClick={() => onSelect(r.id)}
          bulkChecked={!!(bulkSelected && bulkSelected[r.id])}
          onToggleBulk={onToggleOne}
        />
      ))}
    </div>
  );
}

function RegistrationRow({ registration: r, selected, onClick, bulkChecked, onToggleBulk }) {
  const accent = CATEGORY_COLORS[r.category] || '#FFFFFF';
  return (
    <div
      onClick={onClick}
      style={{
        padding: '14px 18px',
        borderBottom: '1px solid rgba(255,255,255,0.04)',
        cursor: 'pointer',
        background: selected ? 'linear-gradient(90deg, rgba(255,27,107,0.10), rgba(199,36,255,0.05))' : 'transparent',
        borderLeft: '3px solid ' + (selected ? accent : 'transparent'),
        display: 'grid',
        gridTemplateColumns: 'auto 1fr auto',
        gap: 14, alignItems: 'center',
        transition: 'background 0.15s',
      }}
      onMouseEnter={(e) => {
        if (!selected) e.currentTarget.style.background = 'rgba(255,255,255,0.025)';
      }}
      onMouseLeave={(e) => {
        if (!selected) e.currentTarget.style.background = 'transparent';
      }}
    >
      <input type="checkbox" checked={bulkChecked || false}
        onClick={(e) => e.stopPropagation()}
        onChange={() => onToggleBulk && onToggleBulk(r.id)}
        style={{
          width: 16, height: 16, cursor: 'pointer',
          accentColor: '#FF1B6B',
        }} />
      <div style={{ minWidth: 0 }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6,
        }}>
          <span style={{
            padding: '2px 8px', borderRadius: 4,
            background: accent + '15',
            border: '1px solid ' + accent + '40',
            color: accent,
            fontSize: 9, fontWeight: 700, letterSpacing: 1,
            fontFamily: 'JetBrains Mono, monospace',
          }}>
            {(CATEGORY_LABELS[r.category] || r.category).toUpperCase()}
          </span>
          {r.registration_code && (
            <span style={{
              padding: '2px 8px', borderRadius: 4,
              background: 'rgba(255,255,255,0.04)',
              border: '1px solid rgba(255,255,255,0.12)',
              color: 'var(--text-muted)',
              fontSize: 10, fontWeight: 700, letterSpacing: 1,
              fontFamily: 'JetBrains Mono, monospace',
            }} title="Registration ID — what the group uses to pay">
              {r.registration_code}
            </span>
          )}
          <StatusBadge status={r.status} />
        </div>
        <div className="font-display" style={{
          fontSize: 17, fontWeight: 700, color: 'var(--text)',
          letterSpacing: -0.3, lineHeight: 1.2, marginBottom: 5,
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
        }}>
          {r.group_name}
        </div>
        <div style={{
          fontSize: 13, color: 'var(--text-muted)',
          display: 'flex', gap: 14, flexWrap: 'wrap',
        }}>
          <span><Icon name="users" size={12} /> {r.leader_name}</span>
          {r.member_count && <span>· {r.member_count} members</span>}
          {r.affiliated_entertainment && (
            <span style={{ color: accent }}>· {r.affiliated_entertainment}</span>
          )}
        </div>
      </div>
      <div style={{ textAlign: 'right', whiteSpace: 'nowrap' }}>
        {r.confirmation_sent_at && (
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 4,
            padding: '2px 7px', borderRadius: 4,
            background: 'rgba(0, 230, 118, 0.12)',
            border: '1px solid rgba(0, 230, 118, 0.35)',
            color: '#00E676',
            fontSize: 9, fontWeight: 700, letterSpacing: 1,
            marginBottom: 4,
            fontFamily: 'JetBrains Mono, monospace',
          }} title="Confirmation email sent">
            ✓ EMAILED
          </div>
        )}
        <div className="font-mono" style={{
          fontSize: 11, color: 'var(--text-soft)', fontWeight: 600,
        }}>
          {relTime(r.created_at)}
        </div>
      </div>
    </div>
  );
}

function RegistrationDetailPanel({ registration: r, onClose, onUpdateStatus, onSaveNotes,
                                    onMarkConfirmationSent, onUnmarkConfirmationSent,
                                    emailTemplate, performerTicketsTemplate, settings,
                                    onVerifyPayment, onDropMember, onAddSubstitute,
                                    onMarkMemberPaid, onRenameMember, onGeneratePerformerTickets,
                                    registrationTickets }) {
  const [adminNotes, setAdminNotes] = useState(r.admin_notes || '');
  const [savingNotes, setSavingNotes] = useState(false);
  const accent = CATEGORY_COLORS[r.category] || '#FFFFFF';

  useEffect(() => {
    setAdminNotes(r.admin_notes || '');
  }, [r.id, r.admin_notes]);

  const handleSaveNotes = async () => {
    setSavingNotes(true);
    await onSaveNotes(r.id, adminNotes);
    setSavingNotes(false);
  };

  return (
    <div className="anim-fade-in" style={{
      background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
      borderRadius: 18, border: '1px solid var(--border)',
      overflow: 'hidden', position: 'sticky', top: 88, alignSelf: 'start',
      maxHeight: 'calc(100vh - 112px)', display: 'flex', flexDirection: 'column'
    }}>
      <div style={{
        padding: '16px 20px', borderBottom: '1px solid var(--border)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between'
      }}>
        <div>
          <div style={{
            display: 'inline-block',
            padding: '2px 8px', borderRadius: 4,
            background: accent + '15',
            border: '1px solid ' + accent + '40',
            color: accent,
            fontSize: 9, fontWeight: 700, letterSpacing: 1,
            fontFamily: 'JetBrains Mono, monospace',
            marginBottom: 6,
          }}>
            {(CATEGORY_LABELS[r.category] || r.category).toUpperCase()}
          </div>
          <div className="font-display" style={{
            fontSize: 22, fontWeight: 700, color: 'var(--text)',
            letterSpacing: -0.3, lineHeight: 1.2,
          }}>
            {r.group_name}
          </div>
        </div>
        <button onClick={onClose} style={{ ...iconBtnStyle, padding: 6 }}>
          <Icon name="x" size={16} />
        </button>
      </div>

      <div style={{ overflow: 'auto', flex: 1 }}>
        <Section>
          <KV iconName="hash" label="Status" value={<StatusBadge status={r.status} />} />
          {r.registration_code && (
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 0', borderBottom: '1px solid var(--border)',
            }}>
              <Icon name="hash" size={13} />
              <div style={{
                fontSize: 11, color: 'var(--text-soft)', fontWeight: 600,
                letterSpacing: 0.5, minWidth: 84,
              }}>
                Reg ID
              </div>
              <div style={{
                fontFamily: 'JetBrains Mono, monospace',
                fontSize: 13, fontWeight: 700, color: 'var(--text)',
                letterSpacing: 1.5,
              }}>
                {r.registration_code}
              </div>
              <button
                onClick={() => {
                  try {
                    navigator.clipboard.writeText(r.registration_code);
                    const el = document.getElementById('reg-id-copy-' + r.id);
                    if (el) {
                      el.textContent = '\u2713';
                      setTimeout(() => { el.textContent = 'COPY'; }, 1400);
                    }
                  } catch (e) { /* clipboard unavailable */ }
                }}
                id={'reg-id-copy-' + r.id}
                style={{
                  marginLeft: 'auto',
                  padding: '3px 8px', borderRadius: 4,
                  background: 'rgba(255,255,255,0.04)',
                  border: '1px solid rgba(255,255,255,0.12)',
                  color: 'var(--text-muted)',
                  fontFamily: 'JetBrains Mono, monospace',
                  fontSize: 9, fontWeight: 700, letterSpacing: 1,
                  cursor: 'pointer',
                }}
                title="Copy registration ID"
              >
                COPY
              </button>
            </div>
          )}
          <KV iconName="clock" label="Submitted" value={formatDT(r.created_at)} />
          {r.confirmed_at && (
            <KV iconName="check" label="Confirmed" value={formatDT(r.confirmed_at)} />
          )}
          {r.confirmed_by && (
            <KV iconName="user" label="By" value={r.confirmed_by} mono />
          )}
        </Section>

        <Section title="Leader & Contact">
          <KV iconName="user" label="Name" value={r.leader_name} />
          <KV iconName="phone" label="Phone" value={r.leader_phone} mono />
          <KV iconName="mail" label="Email" value={r.leader_email} mono />
        </Section>

        {r.affiliated_entertainment && (
          <Section title="Affiliated Entertainment">
            <div style={{
              padding: '10px 12px', borderRadius: 8,
              background: accent + '12', border: '1px solid ' + accent + '40',
              color: accent, fontSize: 14, fontWeight: 700,
            }}>
              {r.affiliated_entertainment}
            </div>
          </Section>
        )}

        <Section title={r.category === 'fanchant' || r.category === 'fanbooth' ? 'Idol Group / Fandom' : 'Song & Artist'}>
          <div style={{
            padding: '10px 12px', borderRadius: 8,
            background: 'rgba(255,255,255,0.025)',
            border: '1px solid var(--border)',
            color: 'var(--text)', fontSize: 14, fontWeight: 600,
          }}>
            {r.song_or_idol || '—'}
          </div>
        </Section>

        <PerformerManagementSection
          registration={r}
          onVerifyPayment={onVerifyPayment}
          onDropMember={onDropMember}
          onAddSubstitute={onAddSubstitute}
          onMarkMemberPaid={onMarkMemberPaid}
          onRenameMember={onRenameMember}
          onGeneratePerformerTickets={onGeneratePerformerTickets}
        />

        {r.notes && (
          <Section title="Notes from Group">
            <div style={{
              padding: '10px 12px', borderRadius: 8,
              background: 'rgba(255, 179, 0, 0.08)',
              border: '1px solid rgba(255, 179, 0, 0.2)',
              color: '#FFD380', fontSize: 13, lineHeight: 1.6,
            }}>
              {r.notes}
            </div>
          </Section>
        )}

        <Section title="Terms Agreement">
          {r.agreed_to_terms ? (
            <div style={{
              fontSize: 12, color: 'var(--text-muted)',
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <span style={{ color: '#00E676' }}><Icon name="check" size={14} /></span>
              <span>Agreed on {formatDT(r.agreed_at)}</span>
            </div>
          ) : (
            <div style={{ fontSize: 12, color: '#FF1744' }}>
              ⚠ No agreement record
            </div>
          )}
        </Section>

        <Section title="Confirmation Email">
          {r.confirmation_sent_at ? (
            <div style={{
              padding: '10px 12px', borderRadius: 8,
              background: 'rgba(0, 230, 118, 0.08)',
              border: '1px solid rgba(0, 230, 118, 0.3)',
            }}>
              <div style={{
                fontSize: 13, color: '#00E676', fontWeight: 700,
                display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4,
              }}>
                <Icon name="check" size={14} /> Sent
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                {formatDT(r.confirmation_sent_at)}
                {r.confirmation_sent_by && ' · by ' + r.confirmation_sent_by}
              </div>
              <div style={{ display: 'flex', gap: 8, marginTop: 10, flexWrap: 'wrap' }}>
                {r.leader_email && (
                  <a href={buildConfirmationMailto(r, emailTemplate, settings)}
                    target="_blank" rel="noopener"
                    style={{
                      padding: '6px 12px', borderRadius: 6,
                      background: 'rgba(0, 229, 255, 0.06)',
                      border: '1px solid rgba(0, 229, 255, 0.3)',
                      color: '#00E5FF',
                      fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                      textDecoration: 'none',
                      display: 'inline-flex', alignItems: 'center', gap: 4,
                      fontFamily: 'inherit',
                    }}>
                    <Icon name="refresh" size={11} /> RESEND
                  </a>
                )}
                <button onClick={() => {
                  if (window.confirm('Unmark this confirmation as sent? Use only if you marked by mistake.')) {
                    onUnmarkConfirmationSent && onUnmarkConfirmationSent(r.id);
                  }
                }}
                style={{
                  padding: '5px 10px', borderRadius: 6,
                  background: 'transparent',
                  border: '1px solid rgba(255,255,255,0.15)',
                  color: 'var(--text-soft)', cursor: 'pointer',
                  fontSize: 10, fontWeight: 600, letterSpacing: 0.5,
                  fontFamily: 'inherit',
                }}>
                  UNMARK SENT
                </button>
              </div>
            </div>
          ) : (
            <div>
              <div style={{
                fontSize: 12, color: 'var(--text-muted)',
                lineHeight: 1.55, marginBottom: 10,
              }}>
                Send the registration confirmation with next steps + GC link.
                Opens your email client with a pre-filled draft. Click "Mark as sent" after you've sent it.
              </div>
              {r.leader_email ? (
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  <a href={buildConfirmationMailto(r, emailTemplate, settings)}
                    target="_blank" rel="noopener"
                    style={{
                      padding: '8px 14px', borderRadius: 8,
                      background: 'rgba(0, 229, 255, 0.1)',
                      border: '1px solid rgba(0, 229, 255, 0.5)',
                      color: '#00E5FF',
                      fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                      textDecoration: 'none',
                      display: 'inline-flex', alignItems: 'center', gap: 6,
                      fontFamily: 'inherit',
                    }}>
                    <Icon name="mail" size={12} /> COMPOSE EMAIL
                  </a>
                  <button onClick={() => onMarkConfirmationSent && onMarkConfirmationSent(r.id)}
                    style={{
                      padding: '8px 14px', borderRadius: 8,
                      background: 'rgba(0, 230, 118, 0.1)',
                      border: '1px solid rgba(0, 230, 118, 0.5)',
                      color: '#00E676', cursor: 'pointer',
                      fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                      display: 'inline-flex', alignItems: 'center', gap: 6,
                      fontFamily: 'inherit',
                    }}>
                    <Icon name="check" size={12} /> MARK AS SENT
                  </button>
                </div>
              ) : (
                <div style={{
                  padding: '10px 12px', borderRadius: 8,
                  background: 'rgba(255, 23, 68, 0.08)',
                  border: '1px solid rgba(255, 23, 68, 0.3)',
                  fontSize: 12, color: '#FFA0A0',
                }}>
                  No email on file. Contact via phone: <strong style={{ color: '#FFB300' }}>{r.leader_phone || '—'}</strong>
                </div>
              )}
            </div>
          )}
        </Section>

        {registrationTickets && registrationTickets.length > 0 && (
          <Section title="Performer Tickets Email">
            <div style={{
              fontSize: 12, color: 'var(--text-muted)',
              lineHeight: 1.55, marginBottom: 10,
            }}>
              All members are paid up and {registrationTickets.length} performer ticket{registrationTickets.length === 1 ? '' : 's'} have been generated.
              Send the tickets-sent email with the PDF attached.
              Opens your email client with a pre-filled draft.
            </div>
            {r.leader_email ? (
              <a href={buildPerformerTicketsMailto(r, registrationTickets, settings, performerTicketsTemplate)}
                target="_blank" rel="noopener"
                style={{
                  padding: '8px 14px', borderRadius: 8,
                  background: 'rgba(0, 229, 255, 0.1)',
                  border: '1px solid rgba(0, 229, 255, 0.5)',
                  color: '#00E5FF',
                  fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                  textDecoration: 'none',
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                }}>
                <Icon name="mail" size={12} /> COMPOSE TICKETS EMAIL
              </a>
            ) : (
              <div style={{
                padding: '10px 12px', borderRadius: 8,
                background: 'rgba(255, 23, 68, 0.08)',
                border: '1px solid rgba(255, 23, 68, 0.3)',
                fontSize: 12, color: '#FFA0A0',
              }}>
                No email on file. Contact via phone: <strong style={{ color: '#FFB300' }}>{r.leader_phone || '\u2014'}</strong>
              </div>
            )}
          </Section>
        )}

        <Section title="Admin Notes (internal)">
          <textarea
            value={adminNotes}
            onChange={(e) => setAdminNotes(e.target.value)}
            placeholder="Internal notes about this entry — payment status, communication history, special considerations..."
            rows={4}
            style={{
              width: '100%', padding: '10px 12px',
              background: 'rgba(255,255,255,0.025)',
              border: '1px solid var(--border)', borderRadius: 8,
              color: 'var(--text)', fontSize: 13, lineHeight: 1.5,
              fontFamily: 'Sora, sans-serif', resize: 'vertical',
              boxSizing: 'border-box', outline: 'none',
            }}
          />
          <button onClick={handleSaveNotes}
            disabled={savingNotes || adminNotes === (r.admin_notes || '')}
            style={{
              marginTop: 8,
              padding: '8px 14px', borderRadius: 8,
              background: 'rgba(0, 229, 255, 0.1)',
              border: '1px solid rgba(0, 229, 255, 0.4)',
              color: '#00E5FF', cursor: 'pointer',
              fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
              opacity: (savingNotes || adminNotes === (r.admin_notes || '')) ? 0.5 : 1,
              fontFamily: 'inherit',
            }}>
            {savingNotes ? 'SAVING…' : 'SAVE NOTES'}
          </button>
        </Section>
      </div>

      {/* Status action bar */}
      <div style={{
        padding: '14px 18px',
        borderTop: '1px solid var(--border)',
        background: 'rgba(8, 2, 15, 0.6)',
      }}>
        <div className="font-mono" style={{
          fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
          fontWeight: 700, marginBottom: 10,
        }}>
          UPDATE STATUS →
        </div>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {r.status !== 'pending' && (
            <RegActionBtn label="Pending" icon="clock" color="#FFB300"
              onClick={() => onUpdateStatus(r.id, 'pending')} />
          )}
          {r.status !== 'confirmed' && (
            <RegActionBtn label="Confirm" icon="check" color="#00E5FF"
              onClick={() => onUpdateStatus(r.id, 'confirmed')} />
          )}
          {/* Note: 'Paid' status flips automatically when all members are paid.
              No manual 'Mark Paid' button — prevents flipping status without
              actual payment data, which used to break ticket generation logic. */}
          {r.status !== 'rejected' && (
            <RegActionBtn label="Reject" icon="x" color="#FF1744"
              onClick={() => {
                if (window.confirm('Reject this registration? The group will be notified.')) {
                  onUpdateStatus(r.id, 'rejected');
                }
              }} />
          )}
          {r.status !== 'withdrawn' && (
            <RegActionBtn label="Withdrew" icon="x" color="#A0A0A0"
              onClick={() => {
                if (window.confirm('Mark this group as withdrawn? They will still be on the hook for fees per policy.')) {
                  onUpdateStatus(r.id, 'withdrawn');
                }
              }} />
          )}
        </div>
      </div>
    </div>
  );
}

function RegActionBtn({ label, icon, color, onClick }) {
  return (
    <button onClick={onClick}
      style={{
        padding: '8px 12px', borderRadius: 8,
        background: color + '15',
        border: '1px solid ' + color + '50',
        color: color, cursor: 'pointer',
        fontSize: 11, fontWeight: 700, letterSpacing: 0.4,
        display: 'flex', alignItems: 'center', gap: 6,
        fontFamily: 'inherit', transition: 'all 0.15s',
      }}
      onMouseEnter={(e) => {
        e.currentTarget.style.background = color + '25';
      }}
      onMouseLeave={(e) => {
        e.currentTarget.style.background = color + '15';
      }}>
      <Icon name={icon} size={12} /> {label}
    </button>
  );
}

// ============================================================
// BAN REVOKE VIEW
// ============================================================
const MEETING_TIME_LABELS = {
  '17:00': '5:00 PM',
  '18:00': '6:00 PM',
  '19:00': '7:00 PM',
  '20:00': '8:00 PM',
};

function BanRevokeView({
  applications, appLoading, filteredApps,
  appTab, setAppTab, appSearch, setAppSearch,
  appLocationFilter, setAppLocationFilter,
  appSelectedId, setAppSelectedId,
  appCounts, appLocationCounts,
  selectedApp, onUpdateStatus, onSaveNotes, onExportCSV,
}) {
  return (
    <React.Fragment>
      {/* Stats row */}
      <div style={{ padding: '20px 32px 0', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
        <StatCard label="Pending Review" value={appCounts.pending}
                  sub="awaiting first action" accent="#FFB300" iconName="clock" />
        <StatCard label="Meeting Scheduled" value={appCounts.meeting_scheduled}
                  sub="awaiting outcome" accent="#00E5FF" iconName="clock" />
        <StatCard label="Approved" value={appCounts.approved}
                  sub="cleared to return" accent="#00E676" iconName="check" />
        <StatCard label="Denied" value={appCounts.denied}
                  sub="ban upheld" accent="#FF1744" iconName="x" />
      </div>

      {/* Main grid */}
      <div style={{
        padding: '24px 32px 64px',
        display: 'grid',
        gridTemplateColumns: selectedApp ? '1fr 500px' : '1fr',
        gap: 22, transition: 'grid-template-columns 0.25s'
      }}>
        <div style={{
          background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
          borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden'
        }}>
          {/* Filter row */}
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 16, flexWrap: 'wrap',
          }}>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {[
                { key: 'pending', label: 'Pending', count: appCounts.pending },
                { key: 'meeting_scheduled', label: 'Meeting Scheduled', count: appCounts.meeting_scheduled },
                { key: 'approved', label: 'Approved', count: appCounts.approved },
                { key: 'denied', label: 'Denied', count: appCounts.denied },
              ].map((t) => (
                <button key={t.key} onClick={() => { setAppTab(t.key); setAppSelectedId(null); }}
                  style={{
                    padding: '8px 14px', borderRadius: 10,
                    background: appTab === t.key
                      ? 'linear-gradient(135deg, rgba(255, 27, 107, 0.2), rgba(199, 36, 255, 0.2))'
                      : 'transparent',
                    color: appTab === t.key ? 'var(--text)' : 'var(--text-muted)',
                    border: appTab === t.key ? '1px solid rgba(255, 27, 107, 0.4)' : '1px solid transparent',
                    fontSize: 13, fontWeight: 600, cursor: 'pointer',
                    display: 'flex', alignItems: 'center', gap: 8, transition: 'all 0.15s',
                    fontFamily: 'inherit'
                  }}>
                  {t.label}
                  <span className="font-mono" style={{
                    background: appTab === t.key ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
                    padding: '1px 7px', borderRadius: 999, fontSize: 11, fontWeight: 600
                  }}>{t.count}</span>
                </button>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center', flex: '0 1 auto' }}>
              <button onClick={onExportCSV}
                title="Export current filter to CSV"
                style={{
                  padding: '7px 12px', borderRadius: 8,
                  background: 'rgba(0, 229, 255, 0.08)',
                  border: '1px solid rgba(0, 229, 255, 0.3)',
                  color: '#00E5FF', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600, letterSpacing: 0.3,
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                }}>
                <Icon name="download" size={12} /> CSV
              </button>
              <div style={{ position: 'relative', flex: '0 1 240px' }}>
                <span style={{
                  position: 'absolute', left: 12, top: '50%',
                  transform: 'translateY(-50%)', color: 'var(--text-soft)',
                }}>
                  <Icon name="search" size={14} />
                </span>
                <input value={appSearch} onChange={(e) => setAppSearch(e.target.value)}
                  placeholder="Search name, email, statement..."
                  style={{
                    width: '100%', padding: '8px 12px 8px 34px', borderRadius: 10,
                    fontSize: 13, boxSizing: 'border-box', fontFamily: 'inherit'
                  }} />
              </div>
            </div>
          </div>

          {/* Location filter chips */}
          <div style={{
            padding: '10px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
            background: 'rgba(255, 255, 255, 0.015)',
          }}>
            <span className="font-mono" style={{
              fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
              fontWeight: 700, marginRight: 4,
            }}>
              LOCATION →
            </span>
            {[
              { key: 'all', label: 'All', accent: '#FFFFFF', count: applications.length },
              { key: 'davao', label: 'Davao (in-person)', accent: '#00E676', count: appLocationCounts.davao || 0 },
              { key: 'remote', label: 'Remote', accent: '#00E5FF', count: appLocationCounts.remote || 0 },
            ].map((c) => {
              const isActive = appLocationFilter === c.key;
              return (
                <button key={c.key} onClick={() => setAppLocationFilter(c.key)}
                  style={{
                    padding: '5px 12px', borderRadius: 999,
                    background: isActive ? c.accent + '22' : 'rgba(255,255,255,0.03)',
                    border: '1px solid ' + (isActive ? c.accent + '60' : 'rgba(255,255,255,0.08)'),
                    color: isActive ? c.accent : 'var(--text-muted)',
                    fontSize: 11, fontWeight: 600, letterSpacing: 0.3, cursor: 'pointer',
                    display: 'inline-flex', alignItems: 'center', gap: 6,
                    fontFamily: 'inherit', transition: 'all 0.15s',
                  }}>
                  {c.label}
                  <span style={{ fontSize: 10, opacity: 0.7 }}>
                    {c.count}
                  </span>
                </button>
              );
            })}
          </div>

          {/* List */}
          {appLoading ? (
            <div style={{ padding: 80, textAlign: 'center' }}><Spinner size={28} /></div>
          ) : filteredApps.length === 0 ? (
            <AppEmptyState tab={appTab} search={appSearch} />
          ) : (
            <ApplicationList
              applications={filteredApps}
              selectedId={appSelectedId}
              onSelect={setAppSelectedId}
            />
          )}
        </div>

        {selectedApp && (
          <ApplicationDetailPanel
            application={selectedApp}
            onClose={() => setAppSelectedId(null)}
            onUpdateStatus={onUpdateStatus}
            onSaveNotes={onSaveNotes}
          />
        )}
      </div>
    </React.Fragment>
  );
}

function formatMeetingDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

        display: 'grid',
        gridTemplateColumns: '1fr auto',

// FINANCE VIEW — gross income, expenses, net profit, budget vs actual, insights
// ============================================================
const EXPENSE_CATEGORIES = [
  { key: 'venue', label: 'Venue', accent: '#FF1B6B' },
  { key: 'prizes', label: 'Prizes', accent: '#FFB300' },
  { key: 'production', label: 'Production', accent: '#C724FF' },
  { key: 'marketing', label: 'Marketing', accent: '#00E5FF' },
  { key: 'food', label: 'Food & Drinks', accent: '#FF6FA8' },
  { key: 'staff', label: 'Staff & Volunteers', accent: '#00E676' },
  { key: 'permits', label: 'Permits & Fees', accent: '#82B1FF' },
  { key: 'utilities', label: 'Utilities & Tech', accent: '#9C7BFF' },
  { key: 'miscellaneous', label: 'Miscellaneous', accent: '#A0A0A0' },
];
const EXPENSE_CATEGORIES_LABELS = EXPENSE_CATEGORIES.reduce((m, c) => { m[c.key] = c.label; return m; }, {});
const EXPENSE_CATEGORIES_COLORS = EXPENSE_CATEGORIES.reduce((m, c) => { m[c.key] = c.accent; return m; }, {});

function FinanceView({
  financeLoading, budget, expenses, filteredExpenses,
  expenseCategoryFilter, setExpenseCategoryFilter,
  grossIncome, ticketIncome, performerCashIncome,
  tierInventory,
  totalExpenses, totalBudget, netProfit,
  expensesByCategory, orders, registrations, applications, tickets,
  onAddExpense, onEditExpense, onDeleteExpense, onExportCSV,
  onAddBudget, onEditBudget, onDeleteBudget,
}) {
  if (financeLoading) {
    return (
      <div style={{ padding: 80, textAlign: 'center' }}>
        <Spinner size={28} />
      </div>
    );
  }

  // Budget by category, looked up by category key
  const budgetByCategory = budget.reduce((m, b) => {
    m[b.category] = (m[b.category] || 0) + Number(b.allocated || 0);
    return m;
  }, {});

  const burnRate = totalBudget > 0 ? (totalExpenses / totalBudget) : 0;

  return (
    <React.Fragment>
      {/* Tier inventory — sold / remaining / revenue per tier.
          Same as the Orders tab summary but with an extra Participant card
          since Finance is the place where per-tier revenue matters most. */}
      {tierInventory && (
        <div style={{ padding: '20px 32px 0', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
          <TierInventoryCard tier="V" label="VIP · ₱300" accent="#FF1B6B" data={tierInventory.V} />
          <TierInventoryCard tier="R" label="REGULAR · ₱250" accent="#00E5FF" data={tierInventory.R} />
          <TierInventoryCard tier="P" label="PARTICIPANT · ₱300" accent="#C724FF" data={tierInventory.P} />
        </div>
      )}

      {/* Top summary cards */}
      <div style={{ padding: '14px 32px 0', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
        <StatCard label="Gross Income" value={peso(grossIncome)}
                  sub={performerCashIncome > 0
                    ? peso(ticketIncome) + ' tickets + ' + peso(performerCashIncome) + ' performer cash'
                    : 'from confirmed orders'}
                  accent="#00E676" iconName="card" />
        <StatCard label="Total Expenses" value={peso(totalExpenses)}
                  sub={Math.round(burnRate * 100) + '% of budget'} accent="#FF1744" iconName="x" />
        <StatCard label="Net Profit" value={peso(netProfit)}
                  sub={netProfit >= 0 ? 'on track' : 'in the red'}
                  accent={netProfit >= 0 ? '#00E5FF' : '#FF1744'} iconName="check" />
        <StatCard label="Budget Allocated" value={peso(totalBudget)}
                  sub={peso(totalBudget - totalExpenses) + ' remaining'} accent="#FFB300" iconName="hash" />
      </div>

      {/* Two-column layout: budget vs actual + insights */}
      <div style={{
        padding: '24px 32px 24px',
        display: 'grid',
        gridTemplateColumns: 'minmax(0, 1.6fr) minmax(0, 1fr)',
        gap: 22,
      }}>
        {/* LEFT — Budget vs Actual */}
        <div style={{
          background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
          borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
          padding: '22px 24px',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: 18,
          }}>
            <div>
              <div className="font-mono" style={{
                fontSize: 10, letterSpacing: 2.5, color: 'var(--text-soft)',
                fontWeight: 700, marginBottom: 6,
              }}>
                BUDGET vs ACTUAL
              </div>
              <div className="font-display" style={{
                fontSize: 22, fontWeight: 800, color: 'var(--text)',
                letterSpacing: -0.5,
              }}>
                Where the money goes
              </div>
            </div>
            <button onClick={onAddBudget} style={{
              padding: '8px 14px', borderRadius: 8,
              background: 'linear-gradient(135deg, rgba(255, 27, 107, 0.15), rgba(199, 36, 255, 0.15))',
              border: '1px solid rgba(255, 27, 107, 0.4)',
              color: '#FF6FA8',
              fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
              cursor: 'pointer', fontFamily: 'inherit',
              whiteSpace: 'nowrap',
            }}>
              + ADD BUDGET LINE
            </button>
          </div>

          {budget.length === 0 ? (
            <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-muted)', fontSize: 13, lineHeight: 1.6 }}>
              No budget allocated yet.<br />
              <span style={{ fontSize: 12, color: 'var(--text-soft)' }}>
                Click "+ ADD BUDGET LINE" above to allocate your first category.
              </span>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {budget.map((b) => {
                const actual = expensesByCategory[b.category] || 0;
                const allocated = Number(b.allocated || 0);
                const pct = allocated > 0 ? Math.min(100, (actual / allocated) * 100) : 0;
                const over = actual > allocated;
                const accent = EXPENSE_CATEGORIES_COLORS[b.category] || '#A0A0A0';
                return (
                  <div key={b.id}>
                    <div style={{
                      display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
                      marginBottom: 6, gap: 12,
                    }}>
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div style={{
                          fontSize: 13, fontWeight: 700, color: 'var(--text)',
                          marginBottom: 2,
                        }}>
                          {EXPENSE_CATEGORIES_LABELS[b.category] || b.category}
                          {b.label && (
                            <span style={{ color: 'var(--text-soft)', fontWeight: 400, marginLeft: 8, fontSize: 11 }}>
                              {b.label}
                            </span>
                          )}
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 12, whiteSpace: 'nowrap' }}>
                        <div className="font-mono" style={{ fontSize: 12 }}>
                          <span style={{ color: over ? '#FF1744' : 'var(--text)', fontWeight: 700 }}>
                            {peso(actual)}
                          </span>
                          <span style={{ color: 'var(--text-soft)' }}> / {peso(allocated)}</span>
                        </div>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button onClick={() => onEditBudget(b)}
                            title="Edit this budget line"
                            style={{
                              width: 28, height: 28, borderRadius: 6,
                              background: 'rgba(255,255,255,0.04)',
                              border: '1px solid rgba(255,255,255,0.1)',
                              color: 'var(--text-muted)', cursor: 'pointer',
                              fontSize: 13, lineHeight: 1, padding: 0,
                              display: 'flex', alignItems: 'center', justifyContent: 'center',
                              fontFamily: 'inherit',
                            }}>
                            <Icon name="edit" size={13} />
                          </button>
                          <button onClick={() => onDeleteBudget(b)}
                            title="Delete this budget line (with undo)"
                            style={{
                              width: 28, height: 28, borderRadius: 6,
                              background: 'rgba(255,23,68,0.06)',
                              border: '1px solid rgba(255,23,68,0.2)',
                              color: '#FF6B7F', cursor: 'pointer',
                              fontSize: 15, lineHeight: 1, padding: 0,
                              display: 'flex', alignItems: 'center', justifyContent: 'center',
                              fontFamily: 'inherit',
                            }}>
                            ×
                          </button>
                        </div>
                      </div>
                    </div>
                    <div style={{
                      height: 8, borderRadius: 999,
                      background: 'rgba(255,255,255,0.06)',
                      overflow: 'hidden',
                      border: over ? '1px solid rgba(255,23,68,0.4)' : '1px solid transparent',
                    }}>
                      <div style={{
                        height: '100%',
                        width: pct + '%',
                        background: over
                          ? 'linear-gradient(90deg, ' + accent + ', #FF1744)'
                          : 'linear-gradient(90deg, ' + accent + '80, ' + accent + ')',
                        transition: 'width 0.4s ease',
                      }} />
                    </div>
                    {over && (
                      <div style={{
                        marginTop: 4, fontSize: 10, color: '#FF1744', fontWeight: 600,
                        letterSpacing: 0.3,
                      }}>
                        ⚠ OVER BUDGET BY {peso(actual - allocated)}
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Also show categories with expenses but no budget */}
              {Object.keys(expensesByCategory)
                .filter((cat) => !budget.some((b) => b.category === cat))
                .map((cat) => {
                  const actual = expensesByCategory[cat] || 0;
                  const accent = EXPENSE_CATEGORIES_COLORS[cat] || '#A0A0A0';
                  return (
                    <div key={cat}>
                      <div style={{
                        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
                        marginBottom: 6, gap: 12,
                      }}>
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{
                            fontSize: 13, fontWeight: 700, color: 'var(--text)',
                            marginBottom: 2,
                          }}>
                            {EXPENSE_CATEGORIES_LABELS[cat] || cat}
                            <span style={{ color: '#FFB300', fontWeight: 600, marginLeft: 8, fontSize: 11 }}>
                              UNALLOCATED
                            </span>
                          </div>
                        </div>
                        <div className="font-mono" style={{ fontSize: 12, color: 'var(--text)', fontWeight: 700 }}>
                          {peso(actual)}
                        </div>
                      </div>
                      <div style={{
                        height: 8, borderRadius: 999,
                        background: 'rgba(255,179,0,0.15)',
                        border: '1px dashed rgba(255,179,0,0.4)',
                      }} />
                    </div>
                  );
                })}
            </div>
          )}
        </div>

        {/* RIGHT — Smart Insights */}
        <InsightsPanel
          orders={orders}
          registrations={registrations}
          applications={applications}
          tickets={tickets}
          grossIncome={grossIncome}
          totalExpenses={totalExpenses}
          totalBudget={totalBudget}
          netProfit={netProfit}
        />
      </div>

      {/* Expense list section */}
      <div style={{
        padding: '0 32px 64px',
