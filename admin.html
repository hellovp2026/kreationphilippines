const formatDT = (iso) => {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-PH', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true
  });
};

const relTime = (iso) => {
  if (!iso) return '—';
  const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
};

const hoursUntilExpiry = (uploadedAt) => {
  if (!uploadedAt) return null;
  const expiresAt = new Date(uploadedAt).getTime() + 24 * 60 * 60 * 1000;
  return Math.max(0, Math.floor((expiresAt - Date.now()) / (60 * 60 * 1000)));
};

// Maps category slug → human-readable label
const CATEGORY_LABELS = {
  'open-stage': 'Open Stage',
  'battle': 'Battle of the Entertainments',
  'fanchant': 'Fanchant Battle',
  'fanbooth': 'Fanbooth Battle',
};
const CATEGORY_COLORS = {
  'open-stage': '#FF1B6B',
  'battle': '#C724FF',
  'fanchant': '#00E5FF',
  'fanbooth': '#FF6FA8',
};

// Simple {{var}} substitution
function applyTemplate(text, data) {
  if (!text) return '';
  return text.replace(/\{\{(\w+)\}\}/g, function(_, key) {
    return data[key] !== undefined && data[key] !== null ? String(data[key]) : '';
  });
}

// Build context object for registration variables
function buildRegistrationContext(reg, settings) {
  const isDanceCategory = reg.category === 'open-stage' || reg.category === 'battle';
  const fee = isDanceCategory ? (reg.member_count || 0) * 300 : 0;
  const categoryLabel = CATEGORY_LABELS[reg.category] || reg.category;
  const gc = (settings && settings.event_gc_link && settings.event_gc_link.trim())
    ? settings.event_gc_link
    : '[paste your event group chat link here]';
  const gcashName = (settings && settings.gcash_name) || 'Kyla Don';
  const gcashNumber = (settings && settings.gcash_number) || '09534900227';

  const affiliatedLine = reg.affiliated_entertainment
    ? 'Affiliated Entertainment: ' + reg.affiliated_entertainment + '\n'
    : '';
  const songIdolLine = reg.song_or_idol
    ? (isDanceCategory ? 'Song/Artist: ' : 'Idol Group: ') + reg.song_or_idol + '\n'
    : '';

  let feeBlock;
  let stepOne;
  if (isDanceCategory) {
    feeBlock = 'REGISTRATION FEE\nTotal Fee: \u20B1' + fee +
               ' (\u20B1300 \u00D7 ' + (reg.member_count || 0) + ' members)\n\n' +
               'PAY VIA GCASH\nAccount: ' + gcashName + '\nNumber: ' + gcashNumber + '\n\n' +
               'Deadline: August 15, 2026';
    stepOne = 'Send proof of payment by replying to this email.';
  } else {
    feeBlock = 'PARTICIPANT TICKETS\nMembers of Fanchant/Fanbooth do not pay the \u20B1300 participant fee.\nEach member needs a Regular audience ticket (\u20B1250) to enter the venue.\nTickets: https://kreationphilippines.vercel.app';
    stepOne = 'Each member buys a \u20B1250 audience ticket via the site.';
  }

  return {
    leader_name: reg.leader_name || '',
    leader_email: reg.leader_email || '',
    leader_phone: reg.leader_phone || '',
    group_name: reg.group_name || '',
    category: reg.category || '',
    category_label: categoryLabel,
    member_count: reg.member_count || 0,
    affiliated_entertainment: reg.affiliated_entertainment || '',
    affiliated_line: affiliatedLine,
    song_or_idol: reg.song_or_idol || '',
    song_idol_line: songIdolLine,
    registration_fee: fee,
    gc_link: gc,
    gcash_name: gcashName,
    gcash_number: gcashNumber,
    fee_block: feeBlock,
    step_one: stepOne,
  };
}

// Build mailto: link from registration confirmation template
function buildConfirmationMailto(reg, template, settings) {
  const ctx = buildRegistrationContext(reg, settings);

  // Fall back to hardcoded if no template loaded
  const subjectTpl = (template && template.subject)
    || 'Your KPH Registration is Confirmed \u2014 {{group_name}}';
  const bodyTpl = (template && template.body)
    || ('Hi {{leader_name}},\n\nThank you for registering "{{group_name}}". Reply to this email for next steps.\n\nKreation Philippines');

  const subject = applyTemplate(subjectTpl, ctx);
  const body = applyTemplate(bodyTpl, ctx);

  const to = encodeURIComponent(reg.leader_email || '');
  const subj = encodeURIComponent(subject);
  const bd = encodeURIComponent(body);
  return 'mailto:' + to + '?subject=' + subj + '&body=' + bd;
}

// Build mailto: link for sending tickets PDF to buyer
function buildTicketsEmailMailto(order, orderTickets, settings) {
  const buyerName = (order.buyer_name || '').split(' ')[0] || 'there';
  const ticketCount = orderTickets ? orderTickets.length : 0;
  const orderRef = order.id ? order.id.slice(0, 8).toUpperCase() : '';
  const tierLabel = order.ticket_type_name || 'ticket';

  const lines = [
    'Hi ' + buyerName + ',',
    '',
    'Thank you for your order! Your ' + ticketCount + ' \u00d7 ' + tierLabel + ' ticket' + (ticketCount === 1 ? '' : 's') + ' for Davao K-Pop Convention 2026 are attached as a PDF.',
    '',
    'EVENT DETAILS',
    '\u2022 Date: Saturday, August 22, 2026',
    '\u2022 Doors: 11:00 AM \u00b7 Show: 1:00 PM',
    '\u2022 Venue: CAP Grand Auditorium, 37 I\u00f1igo St, Poblacion, Davao City',
    '',
    'YOUR TICKETS',
  ];

  if (orderTickets && orderTickets.length > 0) {
    orderTickets.forEach(function(t) {
      let line = '\u2022 ' + (t.ticket_code || '') + ' \u2014 ' + (t.attendee_name || '');
      if (t.seat_label) line += ' \u2014 Seat ' + t.seat_label;
      lines.push(line);
    });
  }

  lines.push(
    '',
    'IMPORTANT',
    '\u2022 Each ticket has a unique QR code \u2014 do not share or screenshot publicly.',
    '\u2022 Bring a valid ID matching the attendee name.',
    '\u2022 Tickets are non-transferable without prior approval. Reply to this email if you need to transfer.',
    '\u2022 Doors open at 11:00 AM. Please arrive early to avoid queues.',
    '',
    'Order reference: #' + orderRef,
    '',
    'See you at DKC 2026!',
    '',
    'Kreation Events Management',
    '@kreationphilippines'
  );

  const subject = 'Your DKC 2026 Tickets \u00b7 Order #' + orderRef;
  const to = encodeURIComponent(order.buyer_email || '');
  const subj = encodeURIComponent(subject);
  const bd = encodeURIComponent(lines.join('\n'));
  return 'mailto:' + to + '?subject=' + subj + '&body=' + bd;
}

// Build "Add to Google Calendar" link for ban revoke meeting
function buildGCalLink(application) {
  if (!application.meeting_date || !application.meeting_time) return null;

  // Treat the date+time as Manila local time (UTC+8)
  // Build the start Date in UTC by parsing as Manila
  const [y, m, d] = application.meeting_date.split('-').map(Number);
  const [hh, mm] = application.meeting_time.split(':').map(Number);
  // Manila is UTC+8 — to get UTC, subtract 8 hours
  const startUtc = new Date(Date.UTC(y, m - 1, d, hh - 8, mm));
  const endUtc = new Date(startUtc.getTime() + 60 * 60 * 1000); // 1 hour meeting

  const fmt = (date) => {
    return date.getUTCFullYear() +
      String(date.getUTCMonth() + 1).padStart(2, '0') +
      String(date.getUTCDate()).padStart(2, '0') + 'T' +
      String(date.getUTCHours()).padStart(2, '0') +
      String(date.getUTCMinutes()).padStart(2, '0') +
      '00Z';
  };

  const detailsLines = [
    'KPH Ban Revoke Application Review',
    '',
    'Applicant: ' + application.full_name,
    'Email: ' + application.contact_email,
  ];
  if (application.contact_phone) detailsLines.push('Phone: ' + application.contact_phone);
  detailsLines.push('');
  detailsLines.push('Format: ' + (application.location === 'davao'
    ? 'In-person at Work Co Claveria Branch'
    : 'Remote — video call'));
  detailsLines.push('');
  if (application.statement) {
    detailsLines.push('Statement of Accountability:');
    detailsLines.push(application.statement);
  }

  const location = application.location === 'davao'
    ? 'Work Co Claveria Branch, Davao City, Philippines'
    : 'Remote / Video Call';

  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: 'KPH Ban Revoke Review — ' + application.full_name,
    dates: fmt(startUtc) + '/' + fmt(endUtc),
    details: detailsLines.join('\n'),
    location: location,
  });

  return 'https://calendar.google.com/calendar/render?' + params.toString();
}

// Cryptographically random 64-char hex token (encoded in QR)
function generateQrToken() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return Array.from(arr, function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

// Sequential ticket code per tier. Walk-ins get W prefix.
// Examples: KP-V-A012 (VIP A12), KP-R-00087 (Regular #87),
//           KP-V-W0042 (Walk-in VIP #42), KP-P-00214 (Performer #214)
async function generateTicketCode(tierCode, isWalkIn, seatLabel) {
  // For VIP with assigned seat, use seat label
  if (tierCode === 'V' && seatLabel && !isWalkIn) {
    return 'KP-V-' + seatLabel.toUpperCase();
  }

  // Otherwise: sequential. Look up max existing for this tier+walk-in combo.
  const prefix = 'KP-' + tierCode + '-' + (isWalkIn ? 'W' : '');
  const { data, error } = await supabase
    .from('tickets')
    .select('ticket_code')
    .like('ticket_code', prefix + '%')
    .order('ticket_code', { ascending: false })
    .limit(1);

  let nextNum = 1;
  if (data && data.length > 0) {
    const lastCode = data[0].ticket_code;
    const numPart = lastCode.replace(prefix, '').replace(/[^0-9]/g, '');
    const lastNum = parseInt(numPart, 10);
    if (!isNaN(lastNum)) nextNum = lastNum + 1;
  }

  return prefix + String(nextNum).padStart(isWalkIn ? 4 : 5, '0');
}

// Map ticket_type_name (free-text from db) to tier_code (single letter)
function tierCodeFromName(name) {
  if (!name) return 'R';
  const n = name.toLowerCase();
  if (n.includes('vip')) return 'V';
  if (n.includes('participant') || n.includes('performer')) return 'P';
  return 'R';
}

// Default section name per tier
function sectionFromTier(tierCode) {
  return tierCode === 'V' ? 'Ground Floor' :
         tierCode === 'R' ? 'Upper' :
         tierCode === 'P' ? 'Performer Area' : '';
}

// Cached logo blob — fetched once per session
let _logoCache = null;
async function fetchLogoForPDF() {
  if (_logoCache) return _logoCache;
  try {
    const resp = await fetch('./dkc-event-logo.jpg');
    if (!resp.ok) throw new Error('Logo fetch failed: ' + resp.status);
    const blob = await resp.blob();
    const dataUrl = await new Promise(function(res, rej) {
      const r = new FileReader();
      r.onloadend = function() { res(r.result); };
      r.onerror = rej;
      r.readAsDataURL(blob);
    });
    _logoCache = dataUrl;
    return dataUrl;
  } catch (e) {
    console.warn('Could not load DKC logo for PDF — proceeding without it.', e);
    return null;
  }
}

// Tier-specific top band gradient (matches preview file exactly)
function tierGradient(tierCode) {
  if (tierCode === 'V')
    return 'linear-gradient(135deg, #3D0F6E 0%, #5A1A8E 50%, #7A2BB0 100%)';
  if (tierCode === 'R')
    return 'linear-gradient(135deg, #1B2F6E 0%, #2C3D8E 50%, #3D2C8E 100%)';
  if (tierCode === 'P')
    return 'linear-gradient(135deg, #4F0A4F 0%, #6E1A6E 50%, #7A1A7E 100%)';
  return 'linear-gradient(135deg, #2A0A4F 0%, #4F1A7A 100%)';
}

function tierPillGradient(tierCode) {
  if (tierCode === 'V') return 'linear-gradient(90deg, #FF1B6B, #FF6FA8)';
  if (tierCode === 'R') return 'linear-gradient(90deg, #00B8D4, #00E5FF)';
  if (tierCode === 'P') return 'linear-gradient(90deg, #C724FF, #E366FF)';
  return 'linear-gradient(90deg, #FF1B6B, #C724FF)';
}

function tierAccentColor(tierCode) {
  if (tierCode === 'V') return '#FF6FA8';
  if (tierCode === 'R') return '#00E5FF';
  if (tierCode === 'P') return '#E366FF';
  return '#FFFFFF';
}

// Generate a multi-page PDF, one ticket per page — uses html2canvas for design fidelity
async function generateTicketsPDF(tickets, orderRef) {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    throw new Error('jsPDF library not loaded');
  }
  if (typeof html2canvas !== 'function') {
    throw new Error('html2canvas library not loaded');
  }

  const { jsPDF } = window.jspdf;
  // Custom page size sized to fit one ticket nicely (4" x 8.7")
  const doc = new jsPDF({ unit: 'mm', format: [102, 220] });

  const logoSrc = await fetchLogoForPDF();

  // Wait for Google Fonts to load (Bungee, Sora, JetBrains Mono)
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) { /* continue */ }
  }

  // Build offscreen container
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;background:#FFFFFF;padding:0;margin:0;';
  document.body.appendChild(container);

  try {
    for (let i = 0; i < tickets.length; i++) {
      const t = tickets[i];
      const decorated = Object.assign({}, t, {
        _orderRefLabel: orderRef ? '#' + orderRef : '#' + (t.ticket_code || ''),
        _ticketCountLabel: tickets.length > 1
          ? (i + 1) + ' of ' + tickets.length + ' tickets'
          : '',
      });

      container.innerHTML = renderTicketHTML(decorated, logoSrc);

      // Wait for images inside the ticket to load
      const imgs = container.querySelectorAll('img');
      await Promise.all(Array.from(imgs).map(function(img) {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return new Promise(function(resolve) {
          img.onload = resolve;
          img.onerror = resolve;
          setTimeout(resolve, 2000);
        });
      }));

      // Render to canvas (2x for retina sharpness)
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#FFFFFF',
        logging: false,
      });

      const imgData = canvas.toDataURL('image/jpeg', 0.92);

      if (i > 0) doc.addPage();
      // Embed image filling the page
      doc.addImage(imgData, 'JPEG', 0, 0, 102, 220);
    }
  } finally {
    document.body.removeChild(container);
  }

  return doc;
}

// Create one ticket per attendee for this order. Uses the attendees table
// for per-ticket data: name, ticket_type, seat. Reads order.total for price.
async function generateTicketsForOrder(order, currentUserEmail) {
  // Skip if tickets already generated for this order
  const { data: existing } = await supabase
    .from('tickets')
    .select('id')
    .eq('order_id', order.id)
    .limit(1);
  if (existing && existing.length > 0) {
    return { tickets: [], alreadyGenerated: true };
  }

  // Fetch attendees with their ticket type names + seats
  const { data: attendees, error: attErr } = await supabase
    .from('attendees')
    .select(
      'id, name, ticket_type_id, seat_id, display_order, ' +
      'ticket_types(name), seats(seat_label)'
    )
    .eq('order_id', order.id)
    .order('display_order');

  if (attErr) {
    console.error('Attendee fetch failed:', attErr);
    throw attErr;
  }

  if (!attendees || attendees.length === 0) {
    // Order with no attendees — nothing to generate
    return { tickets: [], alreadyGenerated: false };
  }

  // Per-ticket price: divide order total by attendee count
  const total = Number(order.total) || 0;
  const perTicketPrice = total > 0 ? total / attendees.length : 0;

  const newTickets = [];
  for (let i = 0; i < attendees.length; i++) {
    const att = attendees[i];
    const typeName = (att.ticket_types && att.ticket_types.name) || order.ticket_type_name || 'Regular';
    const tierCode = tierCodeFromName(typeName);
    const seatLabel = (att.seats && att.seats.seat_label) || null;

    const code = await generateTicketCode(tierCode, !!order.is_walk_in, seatLabel);
    const qrToken = generateQrToken();

    newTickets.push({
      ticket_code: code,
      qr_token: qrToken,
      order_id: order.id,
      attendee_name: att.name || order.buyer_name || 'Guest',
      attendee_email: order.buyer_email || null,
      attendee_phone: order.buyer_phone || null,
      ticket_type_name: typeName,
      tier_code: tierCode,
      section: sectionFromTier(tierCode),
      seat_label: seatLabel,
      price: perTicketPrice,
      status: 'issued',
      is_walk_in: !!order.is_walk_in,
      issued_by: currentUserEmail || null,
    });
  }

  const { data: inserted, error } = await supabase
    .from('tickets')
    .insert(newTickets)
    .select();

  if (error) {
    console.error('Ticket insert failed:', error);
    throw error;
  }

  return { tickets: inserted || [], alreadyGenerated: false };
}

// Generate performer tickets for a registration. One ticket per non-dropped, paid member.
// Only callable when ALL non-dropped members are paid.
async function generateTicketsForRegistration(registration, currentUserEmail) {
  // Skip if tickets already generated for this registration
  const { data: existing } = await supabase
    .from('tickets')
    .select('id')
    .eq('registration_id', registration.id)
    .limit(1);
  if (existing && existing.length > 0) {
    return { tickets: [], alreadyGenerated: true };
  }

  // Fetch non-dropped members
  const { data: members, error: memErr } = await supabase
    .from('registration_members')
    .select('*')
    .eq('registration_id', registration.id)
    .neq('payment_status', 'dropped')
    .order('member_order');

  if (memErr) throw memErr;
  if (!members || members.length === 0) {
    throw new Error('No members on this registration');
  }

  // Block generation if anyone hasn't paid
  const unpaid = members.filter(function(m) { return m.payment_status !== 'paid'; });
  if (unpaid.length > 0) {
    throw new Error(unpaid.length + ' member(s) still unpaid. Cannot generate tickets yet.');
  }

  const newTickets = [];
  for (let i = 0; i < members.length; i++) {
    const m = members[i];
    const code = await generateTicketCode('P', false, null);
    const qrToken = generateQrToken();

    newTickets.push({
      ticket_code: code,
      qr_token: qrToken,
      registration_id: registration.id,
      registration_member_id: m.id,
      attendee_name: m.member_name,
      attendee_email: registration.leader_email || null,
      attendee_phone: registration.leader_phone || null,
      ticket_type_name: 'Participant',
      tier_code: 'P',
      section: 'Performer Area',
      group_name: registration.group_name,
      group_category: registration.category,
      price: 300,
      status: 'issued',
      is_walk_in: false,
      issued_by: currentUserEmail || null,
    });
  }

  const { data: inserted, error } = await supabase
    .from('tickets')
    .insert(newTickets)
    .select();

  if (error) {
    console.error('Performer ticket insert failed:', error);
    throw error;
  }

  // Link each member to its new ticket
  if (inserted && inserted.length > 0) {
    for (let j = 0; j < inserted.length; j++) {
      const t = inserted[j];
      if (t.registration_member_id) {
        await supabase.from('registration_members')
          .update({ ticket_id: t.id })
          .eq('id', t.registration_member_id);
      }
    }
  }

  // Mark registration as fully paid
  await supabase.from('registrations')
    .update({ status: 'paid' })
    .eq('id', registration.id);

  return { tickets: inserted || [], alreadyGenerated: false };
}


function App() {
  const [session, setSession] = useState(null);
  const [isAdmin, setIsAdmin] = useState(null);
  const [adminRecord, setAdminRecord] = useState(null);
  const [bootLoading, setBootLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(function(res) {
      setSession(res.data.session);
      setBootLoading(false);
    });
    const sub = supabase.auth.onAuthStateChange(function(_e, sess) {
      setSession(sess);
      if (!sess) { setIsAdmin(null); setAdminRecord(null); }
    });
    return function() { sub.data.subscription.unsubscribe(); };
  }, []);

  useEffect(() => {
    if (!session) return;
    setIsAdmin(null);
    const rawEmail = session.user && session.user.email;
    const email = (rawEmail || '').trim().toLowerCase();
    console.log('[Admin Check] Session email:', rawEmail, '→ normalized:', email);
    if (!email) {
      console.warn('[Admin Check] No email on session.user');
      setIsAdmin(false);
      return;
    }
    supabase.from('admins').select('*')
      .ilike('email', email).eq('is_active', true)
      .maybeSingle()
      .then(function(res) {
        console.log('[Admin Check] Query response:', res);
        if (res.error) {
          console.error('[Admin Check] Error:', res.error);
        }
        setIsAdmin(!!res.data);
        setAdminRecord(res.data);
      });
  }, [session]);

  if (bootLoading) return <BootScreen />;
  if (!session) return <LoginScreen />;
  if (isAdmin === null) return <BootScreen message="Verifying access..." />;
  if (isAdmin === false) return <AccessDeniedScreen session={session} />;
  return <Dashboard session={session} adminRecord={adminRecord} />;
}

  const handleTransferTicket = useCallback(async (ticketId, transferType, newName, newEmail, reason) => {
    const oldTicket = tickets.find((t) => t.id === ticketId);
    if (!oldTicket) return;

    if (transferType === 'name_edit') {
      // Path A: just update the name + email
      const { error } = await supabase
        .from('tickets')
        .update({ attendee_name: newName, attendee_email: newEmail || oldTicket.attendee_email })
        .eq('id', ticketId);
      if (error) {
        showToast('Transfer failed: ' + error.message, 'warning');
        return;
      }
      await supabase.from('ticket_transfers').insert({
        ticket_id: ticketId,
        old_attendee_name: oldTicket.attendee_name,
        new_attendee_name: newName,
        old_attendee_email: oldTicket.attendee_email,
        new_attendee_email: newEmail || oldTicket.attendee_email,
        transfer_type: 'name_edit',
        reason: reason,
        transferred_by: session.user.email,
      });
      showToast('Name updated. QR code stays the same.');
    } else {
      // Path B: cancel old, create new with new QR
      const newQrToken = generateQrToken();
      const oldCodeParts = oldTicket.ticket_code.split('-');
      // For reissue, keep the same code structure but mark cancelled
      // and issue new with R-suffix or fresh sequence
      const newCode = await generateTicketCode(oldTicket.tier_code, oldTicket.is_walk_in, oldTicket.seat_label);
      // If same code came back (VIP seat-based), append -R
      const finalNewCode = newCode === oldTicket.ticket_code ? newCode + '-R' : newCode;

      const { data: newTicket, error: insertErr } = await supabase
        .from('tickets')
        .insert({
          ticket_code: finalNewCode,
          qr_token: newQrToken,
          order_id: oldTicket.order_id,
          registration_id: oldTicket.registration_id,
          attendee_name: newName,
          attendee_email: newEmail || oldTicket.attendee_email,
          ticket_type_name: oldTicket.ticket_type_name,
          tier_code: oldTicket.tier_code,
          section: oldTicket.section,
          seat_label: oldTicket.seat_label,
          group_name: oldTicket.group_name,
          group_category: oldTicket.group_category,
          price: oldTicket.price || 0,
          status: 'issued',
          is_walk_in: oldTicket.is_walk_in,
          issued_by: session.user.email,
        })
        .select()
        .single();

      if (insertErr) {
        showToast('Reissue failed: ' + insertErr.message, 'warning');
        return;
      }

      await supabase.from('tickets').update({
        status: 'cancelled',
        cancelled_at: new Date().toISOString(),
        cancelled_by: session.user.email,
        cancellation_reason: 'Transferred to ' + newName,
        reissued_to_ticket_id: newTicket.id,
      }).eq('id', ticketId);

      await supabase.from('ticket_transfers').insert({
        ticket_id: ticketId,
        old_attendee_name: oldTicket.attendee_name,
        new_attendee_name: newName,
        old_attendee_email: oldTicket.attendee_email,
        new_attendee_email: newEmail || oldTicket.attendee_email,
        transfer_type: 'reissue',
        old_ticket_code: oldTicket.ticket_code,
        new_ticket_code: finalNewCode,
        reason: reason,
        transferred_by: session.user.email,
      });

      showToast('Reissued. Old QR is now dead — download new PDF.');
    }
    fetchTickets();
  }, [tickets, session, showToast, fetchTickets]);

  // Invalidate a ticket (admin-side cleanup — test data, fraud, errors).
  // Does NOT cascade to order status — orders stay clean. Finance auto-corrects
  // since gross income is computed from active tickets only.
  const handleCancelTicket = useCallback(async (ticketId, reason) => {
    const res = await supabase.from('tickets').update({
      status: 'cancelled',
      cancelled_at: new Date().toISOString(),
      cancelled_by: session.user.email,
      cancellation_reason: reason || 'Admin invalidation',
    }).eq('id', ticketId);
    if (res.error) {
      showToast('Invalidate failed: ' + res.error.message, 'warning');
      return;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'ticket_invalidated',
      resource_type: 'ticket',
      resource_id: ticketId,
      details: { reason: reason || null },
    });

    showToast('Ticket invalidated');
    fetchTickets();
  }, [session, showToast, fetchTickets]);

  // ===== PERFORMER MEMBER + PAYMENT HANDLERS =====
  const handleVerifyPayment = useCallback(async (payment) => {
    // Mark payment as verified AND mark its covered members as paid
    const now = new Date().toISOString();
    const upd = await supabase.from('registration_payments').update({
      verified_at: now,
      verified_by: session.user.email,
    }).eq('id', payment.id);
    if (upd.error) {
      showToast('Verify failed: ' + upd.error.message, 'warning');
      return false;
    }

    const memberIds = payment.members_covered || [];
    if (memberIds.length > 0) {
      await supabase.from('registration_members').update({
        payment_status: 'paid',
        paid_at: now,
        payment_id: payment.id,
      }).in('id', memberIds);
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'payment_verified',
      resource_type: 'registration_payment',
      resource_id: payment.id,
      details: { amount: payment.amount, members_count: memberIds.length },
    });

    showToast('Payment verified, ' + memberIds.length + ' member(s) marked paid');
    return true;
  }, [session, showToast]);

  const handleDropMember = useCallback(async (member, reason) => {
    const upd = await supabase.from('registration_members').update({
      payment_status: 'dropped',
      dropped_at: new Date().toISOString(),
      dropped_reason: reason || 'Dropped by admin',
    }).eq('id', member.id);
    if (upd.error) {
      showToast('Drop failed: ' + upd.error.message, 'warning');
      return false;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'member_dropped',
      resource_type: 'registration_member',
      resource_id: member.id,
      details: { name: member.member_name, reason: reason || null },
    });

    showToast(member.member_name + ' dropped');
    return true;
  }, [session, showToast]);

  const handleAddSubstitute = useCallback(async (registrationId, memberName, memberAge, inheritFromMember) => {
    // Create new member, optionally inheriting payment status from dropped member
    const newMember = {
      registration_id: registrationId,
      member_name: memberName,
      member_age: memberAge || null,
      payment_status: inheritFromMember ? 'paid' : 'unpaid',
      paid_at: inheritFromMember ? new Date().toISOString() : null,
      payment_id: inheritFromMember ? inheritFromMember.payment_id : null,
      notes: inheritFromMember ? 'Substitute for ' + inheritFromMember.member_name : null,
      added_by: session.user.email,
    };

    // Determine member_order — append after existing members
    const { data: existing } = await supabase
      .from('registration_members')
      .select('member_order')
      .eq('registration_id', registrationId)
      .order('member_order', { ascending: false })
      .limit(1);
    const nextOrder = (existing && existing[0]) ? (existing[0].member_order || 0) + 1 : 1;
    newMember.member_order = nextOrder;

    const ins = await supabase.from('registration_members').insert(newMember).select().single();
    if (ins.error) {
      showToast('Add failed: ' + ins.error.message, 'warning');
      return false;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'member_added',
      resource_type: 'registration_member',
      resource_id: ins.data.id,
      details: { name: memberName, inherited_from: inheritFromMember ? inheritFromMember.id : null },
    });

    showToast(memberName + ' added' + (inheritFromMember ? ' as substitute' : ''));
    return true;
  }, [session, showToast]);

  const handleMarkMemberPaid = useCallback(async (member, note) => {
    // Manual mark-as-paid (for cash payments). Creates a synthetic payment record.
    const now = new Date().toISOString();
    const payIns = await supabase.from('registration_payments').insert({
      registration_id: member.registration_id,
      amount: 300,
      payment_method: 'cash',
      members_covered: [member.id],
      notes: note || 'Manual cash payment marked by admin',
      recorded_by: session.user.email,
      verified_at: now,
      verified_by: session.user.email,
    }).select().single();

    if (payIns.error) {
      showToast('Mark paid failed: ' + payIns.error.message, 'warning');
      return false;
    }

    await supabase.from('registration_members').update({
      payment_status: 'paid',
      paid_at: now,
      payment_id: payIns.data.id,
    }).eq('id', member.id);

    showToast(member.member_name + ' marked as paid');
    return true;
  }, [session, showToast]);

  const handleGeneratePerformerTickets = useCallback(async (registration) => {
    try {
      const result = await generateTicketsForRegistration(registration, session.user.email);
      if (result.alreadyGenerated) {
        showToast('Performer tickets already generated for this group');
      } else {
        showToast('Generated ' + result.tickets.length + ' performer tickets');
        await supabase.from('audit_log').insert({
          actor_email: session.user.email,
          action: 'performer_tickets_generated',
          resource_type: 'registration',
          resource_id: registration.id,
          details: { count: result.tickets.length },
        });
      }
      fetchTickets();
      fetchRegistrations();
    } catch (e) {
      showToast('Generation failed: ' + e.message, 'warning');
    }
  }, [session, showToast, fetchTickets, fetchRegistrations]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

      // Section switching shortcuts (works anywhere)
      if ((e.key === '1' || e.key === '2' || e.key === '3' || e.key === '4' || e.key === '5' || e.key === '6') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        const sections = ['orders', 'registrations', 'ban-revoke', 'tickets', 'disputes', 'finance'];
        setSection(sections[parseInt(e.key, 10) - 1]);
        return;
      }

      // ? for shortcuts help
      if (e.key === '?' || (e.shiftKey && e.key === '/')) {
        e.preventDefault();
        showToast('Shortcuts: 1-4 switch tabs · ↑↓ navigate · Enter confirm · Esc close', 'success');
        return;
      }

      // Orders section
      if (section === 'orders' && filtered.length) {
        const idx = filtered.findIndex((o) => o.id === selectedId);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = filtered[Math.min(idx + 1, filtered.length - 1)] || filtered[0];
          setSelectedId(next.id);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const prev = filtered[Math.max(idx - 1, 0)];
          if (prev) setSelectedId(prev.id);
        } else if (e.key === 'Enter' && selectedId && tab === 'awaiting_verification') {
          e.preventDefault();
          handleConfirm(selectedId);
        } else if (e.key === 'Escape') {
          setSelectedId(null); setZoomReceipt(null);
        }
      }
      // Registrations section
      else if (section === 'registrations' && filteredRegs.length) {
        const idx = filteredRegs.findIndex((r) => r.id === regSelectedId);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = filteredRegs[Math.min(idx + 1, filteredRegs.length - 1)] || filteredRegs[0];
          setRegSelectedId(next.id);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const prev = filteredRegs[Math.max(idx - 1, 0)];
          if (prev) setRegSelectedId(prev.id);
        } else if (e.key === 'Enter' && regSelectedId && regTab === 'pending') {
          e.preventDefault();
          updateRegStatus(regSelectedId, 'confirmed');
        } else if (e.key === 'Escape') {
          setRegSelectedId(null);
        } else if (e.key === ' ' && regSelectedId) {
          // Space: toggle bulk selection
          e.preventDefault();
          const next = { ...bulkSelected };
          if (next[regSelectedId]) delete next[regSelectedId];
          else next[regSelectedId] = true;
          setBulkSelected(next);
        }
      }
      // Ban Revoke section
      else if (section === 'ban-revoke' && filteredApps.length) {
        const idx = filteredApps.findIndex((a) => a.id === appSelectedId);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = filteredApps[Math.min(idx + 1, filteredApps.length - 1)] || filteredApps[0];
          setAppSelectedId(next.id);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const prev = filteredApps[Math.max(idx - 1, 0)];
          if (prev) setAppSelectedId(prev.id);
        } else if (e.key === 'Escape') {
          setAppSelectedId(null);
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [section, filtered, selectedId, tab, handleConfirm,
      filteredRegs, regSelectedId, regTab, updateRegStatus, bulkSelected,
      filteredApps, appSelectedId, showToast]);

  const logout = async () => { await supabase.auth.signOut(); };

  return (
    <div style={{
      minHeight: '100vh', position: 'relative',
      background: 'radial-gradient(ellipse at top, #160428 0%, #08020F 50%)'
    }}>
      <TopBar session={session} adminRecord={adminRecord} onLogout={logout}
              onRefresh={section === 'orders' ? fetchOrders : section === 'registrations' ? fetchRegistrations : fetchApplications} />

      {/* SECTION TOGGLE */}
      <div style={{
        padding: '20px 32px 0', display: 'flex', alignItems: 'center', gap: 6,
      }}>
        <button onClick={() => setSection('orders')} style={sectionBtnStyle(section === 'orders')}>
          <Icon name="ticket" size={14} />
          <span>Orders</span>
          <span className="font-mono" style={{
            background: section === 'orders' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            {activeCounts.activeOrders}
          </span>
        </button>
        <button onClick={() => setSection('registrations')} style={sectionBtnStyle(section === 'registrations')}>
          <Icon name="users" size={14} />
          <span>Registrations</span>
          <span className="font-mono" style={{
            background: section === 'registrations' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            {registrations.length}
          </span>
        </button>
        <button onClick={() => setSection('ban-revoke')} style={sectionBtnStyle(section === 'ban-revoke')}>
          <Icon name="alert" size={14} />
          <span>Ban Revoke</span>
          <span className="font-mono" style={{
            background: section === 'ban-revoke' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            {applications.length}
          </span>
        </button>
        <button onClick={() => setSection('tickets')} style={sectionBtnStyle(section === 'tickets')}>
          <Icon name="ticket" size={14} />
          <span>Tickets</span>
          <span className="font-mono" style={{
            background: section === 'tickets' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            {activeCounts.activeTickets}
          </span>
        </button>
        <button onClick={() => setSection('disputes')} style={sectionBtnStyle(section === 'disputes')}>
          <Icon name="alert" size={14} />
          <span>Disputes</span>
          <span className="font-mono" style={{
            background: section === 'disputes' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            {disputeItems.length}
          </span>
        </button>
        <button onClick={() => setSection('finance')} style={sectionBtnStyle(section === 'finance')}>
          <Icon name="card" size={14} />
          <span>Finance</span>
          <span className="font-mono" style={{
            background: section === 'finance' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            ₱{Math.round(netProfit / 1000)}k
          </span>
        </button>
      </div>

      {section === 'orders' ? (
      <React.Fragment>

      <div style={{ padding: '28px 32px 0', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
        <StatCard label="Awaiting Review" value={counts.awaiting_verification}
                  sub={peso(pendingRevenue) + ' on hold'} accent="#FFB300" iconName="clock" />
        <StatCard label="Confirmed" value={counts.confirmed}
                  sub={peso(confirmedRevenue) + ' collected'} accent="#00E676" iconName="check" />
        <StatCard label="Pending Payment" value={counts.pending_payment}
                  sub="no receipt yet" accent="#00E5FF" iconName="inbox" />
        <StatCard label="Rejected" value={counts.rejected}
                  sub="this event" accent="#FF1744" iconName="x" />
      </div>

      <div style={{
        padding: '24px 32px 64px',
        display: 'grid',
        gridTemplateColumns: selected ? '1fr 460px' : '1fr',
        gap: 22, transition: 'grid-template-columns 0.25s'
      }}>
        <div style={{
          background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
          borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden'
        }}>
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap'
          }}>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {[
                { key: 'awaiting_verification', label: 'Awaiting Review', count: counts.awaiting_verification },
                { key: 'confirmed', label: 'Confirmed', count: counts.confirmed },
                { key: 'rejected', label: 'Rejected', count: counts.rejected },
                { key: 'pending_payment', label: 'No Receipt', count: counts.pending_payment },
              ].map((t) => (
                <button key={t.key} onClick={() => { setTab(t.key); setSelectedId(null); }}
                        style={{
                          padding: '8px 14px', borderRadius: 10,
                          background: tab === t.key
                            ? 'linear-gradient(135deg, rgba(255, 27, 107, 0.2), rgba(199, 36, 255, 0.2))'
                            : 'transparent',
                          color: tab === t.key ? 'var(--text)' : 'var(--text-muted)',
                          border: tab === t.key ? '1px solid rgba(255, 27, 107, 0.4)' : '1px solid transparent',
                          fontSize: 13, fontWeight: 600, cursor: 'pointer',
                          display: 'flex', alignItems: 'center', gap: 8, transition: 'all 0.15s',
                          fontFamily: 'inherit'
                        }}>
                  {t.label}
                  <span className="font-mono" style={{
                    background: tab === t.key ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
                    padding: '1px 7px', borderRadius: 999, fontSize: 11, fontWeight: 600
                  }}>{t.count}</span>
                </button>
              ))}
            </div>
            <div style={{ position: 'relative', flex: '0 1 280px' }}>
              <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-soft)' }}>
                <Icon name="search" size={14} />
              </span>
              <input value={search} onChange={(e) => setSearch(e.target.value)}
                     placeholder="Search name, order #, ref no..."
                     style={{
                       width: '100%', padding: '8px 12px 8px 34px', borderRadius: 10,
                       fontSize: 13, boxSizing: 'border-box', fontFamily: 'inherit'
                     }} />
            </div>
          </div>

          {loading ? (
            <div style={{ padding: 80, textAlign: 'center' }}><Spinner size={28} /></div>
          ) : filtered.length === 0 ? (
            <EmptyState tab={tab} search={search} />
          ) : (
            <OrderList orders={filtered} selectedId={selectedId} onSelect={setSelectedId} />
          )}

          {tab === 'awaiting_verification' && filtered.length > 0 && (
            <div style={{
              padding: '10px 18px', background: 'rgba(255, 255, 255, 0.02)',
              borderTop: '1px solid var(--border)',
              fontSize: 11, color: 'var(--text-muted)', display: 'flex', gap: 16, flexWrap: 'wrap'
            }}>
              <span><kbd>↑</kbd> <kbd>↓</kbd> navigate</span>
              <span><kbd>Enter</kbd> confirm</span>
              <span><kbd>Esc</kbd> close panel</span>
            </div>
          )}
        </div>

        {selected && (
          <DetailPanel
            order={selected}
            onClose={() => setSelectedId(null)}
            onConfirm={() => handleConfirm(selected.id)}
            onReject={(reason) => handleReject(selected.id, reason)}
            onZoomReceipt={(url) => setZoomReceipt(url)}
            orderTickets={tickets.filter((t) => t.order_id === selected.id)}
            onGenerateTickets={() => handleGenerateTicketsForOrder(selected)}
            onDownloadTicketsPDF={(orderTickets) => handleDownloadTicketsPDF(selected, orderTickets)}
            onMarkTicketsSent={() => handleMarkTicketsSent(selected.id)}
            settings={appSettings}
          />
        )}
      </div>
      </React.Fragment>
      ) : section === 'registrations' ? (
      <RegistrationsView
        registrations={registrations}
        regLoading={regLoading}
        filteredRegs={filteredRegs}
        regTab={regTab} setRegTab={setRegTab}
        regSearch={regSearch} setRegSearch={setRegSearch}
        regCategoryFilter={regCategoryFilter} setRegCategoryFilter={setRegCategoryFilter}
        regSelectedId={regSelectedId} setRegSelectedId={setRegSelectedId}
        regCounts={regCounts}
        regCategoryCounts={regCategoryCounts}
        selectedReg={selectedReg}
        onUpdateStatus={updateRegStatus}
        onSaveNotes={saveRegNotes}
        onMarkConfirmationSent={markConfirmationSent}
        onUnmarkConfirmationSent={unmarkConfirmationSent}
        onExportCSV={exportRegCSV}
        emailTemplate={emailTemplates.registration_confirmation}
        settings={appSettings}
        onEditTemplate={() => setShowTemplateEditor(true)}
        bulkSelected={bulkSelected}
        setBulkSelected={setBulkSelected}
        onVerifyPayment={handleVerifyPayment}
        onDropMember={handleDropMember}
        onAddSubstitute={handleAddSubstitute}
        onMarkMemberPaid={handleMarkMemberPaid}
        onGeneratePerformerTickets={handleGeneratePerformerTickets}
      />
      ) : section === 'ban-revoke' ? (
      <BanRevokeView
        applications={applications}
        appLoading={appLoading}
        filteredApps={filteredApps}
        appTab={appTab} setAppTab={setAppTab}
        appSearch={appSearch} setAppSearch={setAppSearch}
        appLocationFilter={appLocationFilter} setAppLocationFilter={setAppLocationFilter}
        appSelectedId={appSelectedId} setAppSelectedId={setAppSelectedId}
        appCounts={appCounts}
        appLocationCounts={appLocationCounts}
        selectedApp={selectedApp}
        onUpdateStatus={updateAppStatus}
        onSaveNotes={saveAppNotes}
        onExportCSV={exportAppCSV}
      />
      ) : section === 'tickets' ? (
      <TicketsView
        tickets={tickets}
        ticketsLoading={ticketsLoading}
        filteredTickets={filteredTickets}
        ticketCounts={ticketCounts}
        ticketTab={ticketTab} setTicketTab={setTicketTab}
        ticketTierFilter={ticketTierFilter} setTicketTierFilter={setTicketTierFilter}
        ticketSourceFilter={ticketSourceFilter} setTicketSourceFilter={setTicketSourceFilter}
        ticketSearch={ticketSearch} setTicketSearch={setTicketSearch}
        ticketSelectedId={ticketSelectedId} setTicketSelectedId={setTicketSelectedId}
        selectedTicket={selectedTicket}
        onDownloadPDF={async (ticket) => {
          await handleDownloadTicketsPDF(null, [ticket]);
        }}
        onTransfer={(ticket) => setShowTransferModal(ticket)}
        onCancel={(ticket) => {
          const reason = window.prompt('Reason for invalidating this ticket?');
          if (reason) handleCancelTicket(ticket.id, reason);
        }}
      />
      ) : section === 'disputes' ? (
      <DisputeHistoryView
        items={disputeItems}
        onOpenOrder={(orderId) => {
          setSection('orders');
          setSelectedId(orderId);
        }}
        onOpenTicket={(ticketId) => {
          setSection('tickets');
          setTicketSelectedId(ticketId);
        }}
      />
      ) : (
      <FinanceView
        financeLoading={financeLoading}
        budget={budget}
        expenses={expenses}
        filteredExpenses={filteredExpenses}
        expenseCategoryFilter={expenseCategoryFilter}
        setExpenseCategoryFilter={setExpenseCategoryFilter}
        grossIncome={grossIncome}
        totalExpenses={totalExpenses}
        totalBudget={totalBudget}
        netProfit={netProfit}
        expensesByCategory={expensesByCategory}
        orders={orders}
        registrations={registrations}
        applications={applications}
        tickets={tickets}
        onAddExpense={() => { setEditingExpense(null); setShowExpenseModal(true); }}
        onEditExpense={(e) => { setEditingExpense(e); setShowExpenseModal(true); }}
        onDeleteExpense={(id) => {
          if (window.confirm('Delete this expense? This cannot be undone.')) {
            deleteExpense(id);
          }
        }}
        onExportCSV={exportExpensesCSV}
      />
      )}
      {showExpenseModal && (
        <ExpenseModal
          initial={editingExpense}
          onClose={() => { setShowExpenseModal(false); setEditingExpense(null); }}
          onSave={async (data) => {
            const ok = await saveExpense(data);
            if (ok) { setShowExpenseModal(false); setEditingExpense(null); }
          }}
        />
      )}
      {showTemplateEditor && (
        <EmailTemplateEditor
          template={emailTemplates.registration_confirmation}
          settings={appSettings}
          onClose={() => setShowTemplateEditor(false)}
          onSaveTemplate={saveEmailTemplate}
          onSaveSetting={saveAppSetting}
        />
      )}
      {showTransferModal && (
        <TicketTransferModal
          ticket={showTransferModal}
          onClose={() => setShowTransferModal(null)}
          onSubmit={async (transferType, newName, newEmail, reason) => {
            await handleTransferTicket(showTransferModal.id, transferType, newName, newEmail, reason);
            setShowTransferModal(null);
          }}
        />
      )}

      {zoomReceipt && (
        <div onClick={() => setZoomReceipt(null)} style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          zIndex: 100, padding: 24, cursor: 'zoom-out'
        }}>
          <img src={zoomReceipt} alt="Receipt" style={{ maxWidth: '90vw', maxHeight: '90vh', borderRadius: 12 }} />
        </div>
      )}

      {toast && (
        <div className="anim-slide-up" style={{
          position: 'fixed', bottom: 32, right: 32, zIndex: 50,
          background: toast.kind === 'warning'
            ? 'linear-gradient(135deg, #FF1744, #C50E30)'
            : 'linear-gradient(135deg, #00E676, #00A845)',
          color: 'white', padding: '14px 20px', borderRadius: 12,
          display: 'flex', alignItems: 'center', gap: 10,
          boxShadow: '0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset',
          fontSize: 14, fontWeight: 600
        }}>
          <Icon name={toast.kind === 'warning' ? 'alert' : 'send'} size={16} />
          {toast.msg}
        </div>
      )}
    </div>
  );
}

      borderRadius: 14, padding: '16px 18px',
      border: '1px solid var(--border)',
      position: 'relative', overflow: 'hidden'
    }}>
      <div style={{
        position: 'absolute', top: 0, left: 0, width: 3, height: '100%',
        background: accent, boxShadow: '0 0 20px ' + accent
      }} />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: 1.2, textTransform: 'uppercase', fontFamily: 'Sora' }}>
          {label}

        <span style={{ color: accent, opacity: 0.9 }}><Icon name={iconName} size={16} /></span>

function EmptyState({ tab, search }) {
  const msgs = {
    awaiting_verification: { title: 'No receipts to review', body: "Once buyers upload receipts, they'll appear here, oldest first." },
    confirmed: { title: 'No confirmed orders yet', body: 'Orders you approve will show up here.' },
    rejected: { title: 'No rejected orders', body: 'Orders you reject will be listed here.' },
    pending_payment: { title: 'No pending payments', body: "Buyers in checkout who haven't uploaded a receipt yet appear here." },
  };
  const m = msgs[tab] || { title: 'No orders', body: '' };
  return (
    <div style={{ padding: '64px 20px', textAlign: 'center' }}>
      <div style={{
        width: 64, height: 64, borderRadius: 18,
        background: 'rgba(255, 27, 107, 0.08)', color: 'var(--brand)',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        marginBottom: 18, border: '1px solid rgba(255, 27, 107, 0.2)'
      }}>
        <Icon name="inbox" size={26} />
      </div>
      <div className="font-display" style={{ fontSize: 17, fontWeight: 700, marginBottom: 6, color: 'var(--text)' }}>
        {search ? 'No matches' : m.title}
      </div>
      <div style={{ fontSize: 13, color: 'var(--text-muted)', maxWidth: 360, margin: '0 auto' }}>
        {search ? 'Try a different search term.' : m.body}

function OrderList({ orders, selectedId, onSelect }) {
  return (
    <div>
      <div style={{
        display: 'grid', gridTemplateColumns: '60px 1fr 1.1fr 0.9fr 0.9fr 0.7fr 30px',
        gap: 12, padding: '10px 18px', fontSize: 10, fontWeight: 700,
        color: 'var(--text-soft)', letterSpacing: 1.2, textTransform: 'uppercase',
        borderBottom: '1px solid var(--border)', fontFamily: 'Sora'
      }}>
        <div>#</div>
        <div>Buyer / Order</div>
        <div>Type / Seats</div>
        <div>Payment</div>
        <div>Uploaded</div>
        <div style={{ textAlign: 'right' }}>Total</div>
        <div></div>
      </div>
      {orders.map((o, i) => (
        <OrderRow key={o.id} order={o} position={i + 1}
                  selected={selectedId === o.id}
                  onClick={() => onSelect(o.id)} />
      ))}
    </div>
  );
}

function OrderRow({ order, position, selected, onClick }) {
  const expHrs = hoursUntilExpiry(order.receipt_uploaded_at);
  const urgent = order.status === 'awaiting_verification' && expHrs !== null && expHrs < 6;
  const apQty = (order.add_ons || []).reduce((s, a) => s + (a.quantity || 0), 0);
  return (
    <div onClick={onClick}
         style={{
           display: 'grid',
           gridTemplateColumns: '60px 1fr 1.1fr 0.9fr 0.9fr 0.7fr 30px',
           gap: 12, padding: '14px 18px', alignItems: 'center',
           borderBottom: '1px solid var(--border)',
           background: selected ? 'rgba(255, 27, 107, 0.08)' : 'transparent',
           cursor: 'pointer', transition: 'background 0.1s',
           borderLeft: selected ? '3px solid var(--brand)' : '3px solid transparent',
           paddingLeft: selected ? 15 : 18
         }}
         onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = 'rgba(255, 255, 255, 0.02)'; }}
         onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}>
      <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-soft)', fontWeight: 600 }}>{position}</div>
      <div>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 2, color: 'var(--text)' }}>{order.buyer_name}</div>
        <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-soft)' }}>{order.order_number}</div>
      </div>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 2 }}>
          {order.ticket_type_name || '—'}
        </div>
        <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-muted)' }}>
          {order.seat_labels || (order.ticket_type_category === 'dancer' ? 'Crew' : '—')}
          {apQty > 0 && <span style={{ color: 'var(--brand)', marginLeft: 6 }}>+ {apQty} AP</span>}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500 }}>{order.payment_method || '—'}</div>
        <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-muted)' }}>
          {order.reference_number || '—'}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500 }}>{relTime(order.receipt_uploaded_at)}</div>
        {order.status === 'awaiting_verification' && expHrs !== null && (
          <div className="font-mono" style={{
            fontSize: 11, color: urgent ? '#FF6B85' : 'var(--text-muted)',
            fontWeight: urgent ? 600 : 400
          }}>{expHrs}h left</div>
        )}
        {order.status !== 'awaiting_verification' && (
          <div style={{ marginTop: 3 }}><StatusBadge status={order.status} /></div>
        )}
      </div>
      <div className="font-mono" style={{ textAlign: 'right', fontWeight: 700, fontSize: 14, color: 'var(--text)' }}>
        {peso(order.total)}
      </div>
      <div style={{ color: 'var(--text-soft)' }}><Icon name="chevronRight" size={14} /></div>
    </div>
  );
}

function DetailPanel({ order, onClose, onConfirm, onReject, onZoomReceipt,
                       orderTickets, onGenerateTickets, onDownloadTicketsPDF,
                       onMarkTicketsSent, settings }) {
  const [rejectMode, setRejectMode] = useState(false);
  const [rejectReason, setRejectReason] = useState('');
  const [receiptUrl, setReceiptUrl] = useState(null);
  const [receiptLoading, setReceiptLoading] = useState(false);

  useEffect(() => {
    setRejectMode(false); setRejectReason(''); setReceiptUrl(null);
    if (order.receipt_path) {
      setReceiptLoading(true);
      supabase.storage.from('receipts').createSignedUrl(order.receipt_path, 300)
        .then(function(res) {
          if (res.data && res.data.signedUrl) setReceiptUrl(res.data.signedUrl);
          setReceiptLoading(false);
        });
    }
  }, [order.id, order.receipt_path]);

  return (
    <div className="anim-fade-in" style={{
      background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
      borderRadius: 18, border: '1px solid var(--border)',
      overflow: 'hidden', position: 'sticky', top: 88, alignSelf: 'start',
      maxHeight: 'calc(100vh - 112px)', display: 'flex', flexDirection: 'column'
    }}>
      <div style={{
        padding: '16px 20px', borderBottom: '1px solid var(--border)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between'
      }}>
        <div>
          <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-soft)', fontWeight: 600 }}>
            {order.order_number}
          </div>
          <div className="font-display" style={{ fontSize: 18, fontWeight: 700, marginTop: 2, color: 'var(--text)' }}>
            {order.buyer_name}
          </div>
        </div>
        <button onClick={onClose} style={{ ...iconBtnStyle, padding: 6 }}>
          <Icon name="x" size={16} />
        </button>
      </div>

      <div style={{ overflow: 'auto', flex: 1 }}>
        <Section>
          <KV iconName="mail" label="Email" value={order.buyer_email} mono />
          <KV iconName="phone" label="Phone" value={order.buyer_phone} mono />
        </Section>

        <Section title="Order">
          <KV iconName="ticket" label="Type"
              value={order.ticket_type_category === 'dancer' ? 'Dancer Registration' : 'Audience'} />
          {order.ticket_type_name && <KV iconName="hash" label="Section" value={order.ticket_type_name} />}
          {order.seat_labels && <KV iconName="hash" label="Seats" value={order.seat_labels} mono />}
          {order.add_ons && order.add_ons.length > 0 && (
            <KV iconName="sparkles" label="Add-ons"
                value={order.add_ons.map(function(a) {
                  return a.quantity + '× ' + a.name + ' (' + peso(a.quantity * a.price_each) + ')';
                }).join(', ')} />
          )}
          {order.pickup_date && (
            <KV iconName="clock" label="Pickup"
                value={order.pickup_date + ' • ' + (order.pickup_start || '') + '-' + (order.pickup_end || '')} />
          )}
          {order.internal_notes && (
            <div style={{
              marginTop: 10, padding: 10,
              background: 'rgba(255, 179, 0, 0.08)', borderRadius: 8,
              fontSize: 12, color: '#FFD380', lineHeight: 1.5,
              border: '1px solid rgba(255, 179, 0, 0.2)'
            }}>
              <strong>Notes:</strong> {order.internal_notes}
            </div>
          )}
        </Section>

        <Section title="Receipt">
          {receiptLoading ? (
            <div style={{ padding: 20, textAlign: 'center' }}><Spinner size={20} /></div>
          ) : receiptUrl ? (
            <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
              <img src={receiptUrl} alt="Receipt" onClick={() => onZoomReceipt(receiptUrl)}
                   style={{
                     width: 100, borderRadius: 8, cursor: 'zoom-in', objectFit: 'cover',
                     border: '1px solid var(--border)'
                   }} />
              <div style={{ flex: 1, fontSize: 12 }}>
                <KV iconName="card" label="Method" value={order.payment_method} compact />
                <KV iconName="hash" label="Ref. No." value={order.reference_number} mono compact />
                <KV iconName="clock" label="Uploaded" value={formatDT(order.receipt_uploaded_at)} compact />
              </div>
            </div>
          ) : (
            <div style={{ fontSize: 13, color: 'var(--text-muted)', padding: '8px 0' }}>
              No receipt uploaded yet.
            </div>
          )}
        </Section>

        <Section title="Amount">
          <div style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.9 }}>
            <Line label="Tickets" value={peso(order.subtotal)} />
            {Number(order.add_on_total) > 0 && <Line label="Add-ons" value={peso(order.add_on_total)} />}
            <Line
              label={<strong style={{ color: 'var(--text)' }}>Buyer Sent</strong>}
              value={<span className="font-display grad-text-tight" style={{
                fontSize: 24, fontWeight: 800
              }}>{peso(order.total)}</span>}
              large
            />
          </div>
        </Section>
      </div>

      <div style={{
        padding: '14px 20px', borderTop: '1px solid var(--border)',
        background: 'rgba(255, 255, 255, 0.02)'
      }}>
        {order.status === 'awaiting_verification' && !rejectMode && (
          <div style={{ display: 'flex', gap: 10 }}>
            <button onClick={() => setRejectMode(true)} style={{
              padding: '12px 16px',
              background: 'rgba(255, 23, 68, 0.08)', color: '#FF6B85',
              border: '1px solid rgba(255, 23, 68, 0.25)', borderRadius: 10,
              fontSize: 13, fontWeight: 600,
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6,
              fontFamily: 'inherit'
            }}>
              <Icon name="x" size={14} /> Reject
            </button>
            <button onClick={onConfirm} style={{
              flex: 1, padding: '12px 16px',
              background: 'linear-gradient(135deg, #FF1B6B 0%, #C724FF 100%)',
              color: 'white', border: 'none', borderRadius: 10,
              fontSize: 13, fontWeight: 700, letterSpacing: 0.3,
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              boxShadow: '0 6px 20px rgba(255, 27, 107, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.1)',
              fontFamily: 'inherit'
            }}>
              <Icon name="check" size={15} /> Confirm & Send Ticket
            </button>
          </div>
        )}
        {order.status === 'awaiting_verification' && rejectMode && (
          <div>
            <textarea value={rejectReason} onChange={(e) => setRejectReason(e.target.value)}
                      placeholder="Reason for rejection (sent to buyer)..." autoFocus
                      style={{
                        width: '100%', padding: 10, borderRadius: 8,
                        fontSize: 13, resize: 'none', minHeight: 60,
                        marginBottom: 10, fontFamily: 'inherit', boxSizing: 'border-box'
                      }} />
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => setRejectMode(false)} style={{
                padding: '10px 14px',
                background: 'rgba(255, 255, 255, 0.04)', color: 'var(--text-muted)',
                border: '1px solid var(--border)', borderRadius: 8, fontSize: 12,
                cursor: 'pointer', fontWeight: 500, fontFamily: 'inherit'
              }}>Cancel</button>
              <button onClick={() => onReject(rejectReason)} style={{
                flex: 1, padding: '10px 14px',
                background: 'linear-gradient(135deg, #FF1744, #C50E30)',
                color: 'white', border: 'none', borderRadius: 8, fontSize: 12, fontWeight: 700,
                cursor: 'pointer', fontFamily: 'inherit'
              }}>Confirm Rejection</button>
            </div>
          </div>
        )}
        {order.status !== 'awaiting_verification' && order.status !== 'pending_payment' && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <StatusBadge status={order.status} />
            <span className="font-mono" style={{ fontSize: 12, color: 'var(--text-muted)' }}>
              {order.status === 'confirmed' ? formatDT(order.confirmed_at) : formatDT(order.rejected_at)}
            </span>
          </div>
        )}
        {order.status === 'pending_payment' && (
          <div style={{ fontSize: 13, color: 'var(--text-muted)', textAlign: 'center', padding: 8 }}>
            Waiting for buyer to upload receipt.
          </div>
        )}
      </div>

      {order.status === 'confirmed' && (
        <Section title="Tickets">
          {orderTickets && orderTickets.length > 0 ? (
            <React.Fragment>
              <div style={{
                padding: '10px 12px', borderRadius: 8,
                background: 'rgba(0, 230, 118, 0.06)',
                border: '1px solid rgba(0, 230, 118, 0.25)',
                marginBottom: 12,
              }}>
                <div style={{
                  fontSize: 13, color: '#00E676', fontWeight: 700,
                  display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6,
                }}>
                  <Icon name="check" size={14} /> {orderTickets.length} ticket{orderTickets.length === 1 ? '' : 's'} generated
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {orderTickets.map((t) => (
                    <div key={t.id} className="font-mono" style={{
                      fontSize: 11, color: 'var(--text)',
                      display: 'flex', justifyContent: 'space-between',
                    }}>
                      <span style={{ fontWeight: 700 }}>{t.ticket_code}</span>
                      <span style={{ color: 'var(--text-muted)' }}>{t.attendee_name}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <button onClick={() => onDownloadTicketsPDF(orderTickets)}
                  style={{
                    padding: '9px 14px', borderRadius: 8,
                    background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
                    border: 'none', color: 'white', cursor: 'pointer',
                    fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                    fontFamily: 'inherit',
                  }}>
                  <Icon name="download" size={12} /> DOWNLOAD ALL TICKETS (PDF)
                </button>

                {order.tickets_pdf_sent_at ? (
                  <div style={{
                    padding: '8px 12px', borderRadius: 8,
                    background: 'rgba(0, 230, 118, 0.06)',
                    border: '1px solid rgba(0, 230, 118, 0.25)',
                    fontSize: 11, color: '#00E676', fontWeight: 600,
                    textAlign: 'center',
                  }}>
                    ✓ TICKETS EMAILED {formatDT(order.tickets_pdf_sent_at)}
                  </div>
                ) : (
                  <React.Fragment>
                    <a href={buildTicketsEmailMailto(order, orderTickets, settings)} target="_blank" rel="noopener"
                      style={{
                        padding: '8px 14px', borderRadius: 8,
                        background: 'rgba(0, 229, 255, 0.08)',
                        border: '1px solid rgba(0, 229, 255, 0.4)',
                        color: '#00E5FF',
                        fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                        textDecoration: 'none',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                        fontFamily: 'inherit',
                      }}>
                      <Icon name="mail" size={12} /> COMPOSE EMAIL
                    </a>
                    <button onClick={onMarkTicketsSent}
                      style={{
                        padding: '8px 14px', borderRadius: 8,
                        background: 'rgba(0, 230, 118, 0.08)',
                        border: '1px solid rgba(0, 230, 118, 0.4)',
                        color: '#00E676', cursor: 'pointer',
                        fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                        fontFamily: 'inherit',
                      }}>
                      <Icon name="check" size={12} /> MARK TICKETS SENT
                    </button>
                  </React.Fragment>
                )}
              </div>
            </React.Fragment>
          ) : (
            <div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.5 }}>
                Tickets not generated yet. They auto-generate when you confirm an order, but you can also trigger manually.
              </div>
              <button onClick={onGenerateTickets}
                style={{
                  padding: '9px 14px', borderRadius: 8,
                  background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
                  border: 'none', color: 'white', cursor: 'pointer',
                  fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                  fontFamily: 'inherit', width: '100%',
                }}>
                <Icon name="ticket" size={12} /> GENERATE TICKETS
              </button>
            </div>
          )}
        </Section>
      )}

    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}>
      {title && (
        <div style={{
          fontSize: 10, fontWeight: 700, color: 'var(--text-soft)',
          letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 10,
          fontFamily: 'Sora'
        }}>{title}</div>
      )}
      {children}
    </div>
  );
}

function KV({ iconName, label, value, mono, compact }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: 'auto 70px 1fr', gap: 8,
      alignItems: 'center', padding: compact ? '3px 0' : '5px 0', fontSize: 13
    }}>
      <span style={{ color: 'var(--text-soft)' }}><Icon name={iconName} size={12} /></span>
      <span style={{ color: 'var(--text-muted)', fontSize: 12 }}>{label}</span>
      <span className={mono ? 'font-mono' : ''}
            style={{ fontWeight: 500, fontSize: mono ? 12 : 13, wordBreak: 'break-word', color: 'var(--text)' }}>
        {value || '—'}
      </span>
    </div>
  );
}

function Line({ label, value, large }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between',
      alignItems: large ? 'baseline' : 'center',
      paddingTop: large ? 10 : 0, marginTop: large ? 10 : 0,
      borderTop: large ? '1px solid var(--border)' : 'none'
    }}>
      <span>{label}</span>
      <span className="font-mono">{value}</span>
    </div>
  );
}
