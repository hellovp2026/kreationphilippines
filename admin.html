  bulkSelected, setBulkSelected,
  onVerifyPayment, onDropMember, onAddSubstitute,
  onMarkMemberPaid, onGeneratePerformerTickets,
}) {
  // Bulk selection helpers
  const filteredIds = filteredRegs.map((r) => r.id);
  const selectedCount = filteredIds.filter((id) => bulkSelected[id]).length;
  const allSelected = filteredIds.length > 0 && selectedCount === filteredIds.length;
  const toggleSelectAll = () => {
    const next = { ...bulkSelected };
    if (allSelected) {
      filteredIds.forEach((id) => { delete next[id]; });
    } else {
      filteredIds.forEach((id) => { next[id] = true; });
    }
    setBulkSelected(next);
  };
  const toggleOne = (id) => {
    const next = { ...bulkSelected };
    if (next[id]) delete next[id];
    else next[id] = true;
    setBulkSelected(next);
  };
  const clearSelection = () => setBulkSelected({});
  const bulkConfirm = async () => {
    if (!window.confirm('Confirm ' + selectedCount + ' registrations?')) return;
    for (const id of Object.keys(bulkSelected)) {
      if (bulkSelected[id]) await onUpdateStatus(id, 'confirmed');
    }
    clearSelection();
  };
  const bulkMarkPaid = async () => {
    if (!window.confirm('Mark ' + selectedCount + ' registrations as paid?')) return;
    for (const id of Object.keys(bulkSelected)) {
      if (bulkSelected[id]) await onUpdateStatus(id, 'paid');
    }
    clearSelection();
  };
  return (
    <React.Fragment>
      {/* Stats row */}
      <div style={{ padding: '20px 32px 0', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
        <StatCard label="Pending Review" value={regCounts.pending}
                  sub="awaiting your action" accent="#FFB300" iconName="clock" />
        <StatCard label="Confirmed" value={regCounts.confirmed}
                  sub="approved entries" accent="#00E5FF" iconName="check" />
        <StatCard label="Paid" value={regCounts.paid}
                  sub="fee received" accent="#00E676" iconName="check" />
        <StatCard label="Rejected / Withdrawn" value={regCounts.rejected + regCounts.withdrawn}
                  sub={regCounts.rejected + ' rejected · ' + regCounts.withdrawn + ' withdrew'}
                  accent="#FF1744" iconName="x" />
      </div>

      {/* Main grid: list + detail panel */}
      <div style={{
        padding: '24px 32px 64px',
        display: 'grid',
        gridTemplateColumns: selectedReg ? '1fr 500px' : '1fr',
        gap: 22, transition: 'grid-template-columns 0.25s'
      }}>
        <div style={{
          background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
          borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden'
        }}>
          {/* Filter row */}
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 16, flexWrap: 'wrap',
          }}>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              {[
                { key: 'pending', label: 'Pending', count: regCounts.pending },
                { key: 'confirmed', label: 'Confirmed', count: regCounts.confirmed },
                { key: 'paid', label: 'Paid', count: regCounts.paid },
                { key: 'rejected', label: 'Rejected', count: regCounts.rejected },
                { key: 'withdrawn', label: 'Withdrawn', count: regCounts.withdrawn },
              ].map((t) => (
                <button key={t.key} onClick={() => { setRegTab(t.key); setRegSelectedId(null); }}
                  style={{
                    padding: '8px 14px', borderRadius: 10,
                    background: regTab === t.key
                      ? 'linear-gradient(135deg, rgba(255, 27, 107, 0.2), rgba(199, 36, 255, 0.2))'
                      : 'transparent',
                    color: regTab === t.key ? 'var(--text)' : 'var(--text-muted)',
                    border: regTab === t.key ? '1px solid rgba(255, 27, 107, 0.4)' : '1px solid transparent',
                    fontSize: 13, fontWeight: 600, cursor: 'pointer',
                    display: 'flex', alignItems: 'center', gap: 8, transition: 'all 0.15s',
                    fontFamily: 'inherit'
                  }}>
                  {t.label}
                  <span className="font-mono" style={{
                    background: regTab === t.key ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
                    padding: '1px 7px', borderRadius: 999, fontSize: 11, fontWeight: 600
                  }}>{t.count}</span>
                </button>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center', flex: '0 1 auto', flexWrap: 'wrap' }}>
              <button onClick={onEditTemplate}
                title="Edit the email confirmation template"
                style={{
                  padding: '7px 12px', borderRadius: 8,
                  background: 'rgba(199, 36, 255, 0.08)',
                  border: '1px solid rgba(199, 36, 255, 0.3)',
                  color: '#C724FF', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600, letterSpacing: 0.3,
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                }}>
                <Icon name="mail" size={12} /> EDIT EMAIL
              </button>
              <button onClick={onExportCSV}
                title="Export current filter to CSV"
                style={{
                  padding: '7px 12px', borderRadius: 8,
                  background: 'rgba(0, 229, 255, 0.08)',
                  border: '1px solid rgba(0, 229, 255, 0.3)',
                  color: '#00E5FF', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600, letterSpacing: 0.3,
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                }}>
                <Icon name="download" size={12} /> CSV
              </button>
              <div style={{ position: 'relative', flex: '0 1 240px' }}>
                <span style={{
                  position: 'absolute', left: 12, top: '50%',
                  transform: 'translateY(-50%)', color: 'var(--text-soft)',
                }}>
                  <Icon name="search" size={14} />
                </span>
                <input value={regSearch} onChange={(e) => setRegSearch(e.target.value)}
                  placeholder="Search group, leader, email..."
                  style={{
                    width: '100%', padding: '8px 12px 8px 34px', borderRadius: 10,
                    fontSize: 13, boxSizing: 'border-box', fontFamily: 'inherit'
                  }} />
              </div>
            </div>
          </div>

          {/* Category filter chips */}
          <div style={{
            padding: '10px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
            background: 'rgba(255, 255, 255, 0.015)',
          }}>
            <span className="font-mono" style={{
              fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
              fontWeight: 700, marginRight: 4,
            }}>
              CATEGORY →
            </span>
            {[
              { key: 'all', label: 'All', accent: '#FFFFFF' },
              { key: 'open-stage', label: 'Open Stage', accent: '#FF1B6B' },
              { key: 'battle', label: 'Battle', accent: '#C724FF' },
              { key: 'fanchant', label: 'Fanchant', accent: '#00E5FF' },
              { key: 'fanbooth', label: 'Fanbooth', accent: '#FF6FA8' },
            ].map((c) => {
              const isActive = regCategoryFilter === c.key;
              const catCount = c.key === 'all' ? registrations.length : (regCategoryCounts[c.key] || 0);
              return (
                <button key={c.key} onClick={() => setRegCategoryFilter(c.key)}
                  style={{
                    padding: '5px 12px', borderRadius: 999,
                    background: isActive ? c.accent + '22' : 'rgba(255,255,255,0.03)',
                    border: '1px solid ' + (isActive ? c.accent + '60' : 'rgba(255,255,255,0.08)'),
                    color: isActive ? c.accent : 'var(--text-muted)',
                    fontSize: 11, fontWeight: 600, letterSpacing: 0.3, cursor: 'pointer',
                    display: 'inline-flex', alignItems: 'center', gap: 6,
                    fontFamily: 'inherit', transition: 'all 0.15s',
                  }}>
                  {c.label}
                  <span style={{
                    fontSize: 10, opacity: 0.7,
                  }}>
                    {catCount}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Bulk action bar — visible when items selected */}
          {selectedCount > 0 && (
            <div style={{
              padding: '10px 18px',
              background: 'linear-gradient(90deg, rgba(255,27,107,0.15), rgba(199,36,255,0.10))',
              borderBottom: '1px solid rgba(255,27,107,0.3)',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              gap: 14, flexWrap: 'wrap',
            }}>
              <div style={{
                fontSize: 13, fontWeight: 700, color: 'var(--text)',
              }}>
                <span style={{ color: 'var(--brand)' }}>{selectedCount}</span> selected
              </div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <button onClick={bulkConfirm}
                  style={{
                    padding: '6px 12px', borderRadius: 6,
                    background: 'rgba(0, 229, 255, 0.15)',
                    border: '1px solid rgba(0, 229, 255, 0.5)',
                    color: '#00E5FF', cursor: 'pointer',
                    fontSize: 11, fontWeight: 700, letterSpacing: 0.3,
                    fontFamily: 'inherit',
                  }}>BULK CONFIRM</button>
                <button onClick={bulkMarkPaid}
                  style={{
                    padding: '6px 12px', borderRadius: 6,
                    background: 'rgba(0, 230, 118, 0.15)',
                    border: '1px solid rgba(0, 230, 118, 0.5)',
                    color: '#00E676', cursor: 'pointer',
                    fontSize: 11, fontWeight: 700, letterSpacing: 0.3,
                    fontFamily: 'inherit',
                  }}>BULK MARK PAID</button>
                <button onClick={clearSelection}
                  style={{
                    padding: '6px 12px', borderRadius: 6,
                    background: 'transparent',
                    border: '1px solid rgba(255,255,255,0.15)',
                    color: 'var(--text-muted)', cursor: 'pointer',
                    fontSize: 11, fontWeight: 600, letterSpacing: 0.3,
                    fontFamily: 'inherit',
                  }}>CLEAR</button>
              </div>
            </div>
          )}

          {/* Select-all row, only when there are results */}
          {!regLoading && filteredRegs.length > 0 && (
            <div style={{
              padding: '8px 18px',
              borderBottom: '1px solid var(--border)',
              background: 'rgba(255,255,255,0.015)',
              display: 'flex', alignItems: 'center', gap: 10,
              fontSize: 11, color: 'var(--text-soft)', fontWeight: 600, letterSpacing: 0.5,
            }}>
              <input type="checkbox" checked={allSelected}
                onChange={toggleSelectAll}
                style={{
                  width: 16, height: 16, cursor: 'pointer',
                  accentColor: '#FF1B6B',
                }} />
              <span>SELECT ALL IN VIEW ({filteredRegs.length})</span>
            </div>
          )}

          {/* List */}
          {regLoading ? (
            <div style={{ padding: 80, textAlign: 'center' }}><Spinner size={28} /></div>
          ) : filteredRegs.length === 0 ? (
            <RegEmptyState tab={regTab} search={regSearch} />
          ) : (
            <RegistrationList
              registrations={filteredRegs}
              selectedId={regSelectedId}
              onSelect={setRegSelectedId}
              bulkSelected={bulkSelected}
              onToggleOne={toggleOne}
            />
          )}
        </div>

        {selectedReg && (
          <RegistrationDetailPanel
            registration={selectedReg}
            onClose={() => setRegSelectedId(null)}
            onUpdateStatus={onUpdateStatus}
            onSaveNotes={onSaveNotes}
            onMarkConfirmationSent={onMarkConfirmationSent}
            onUnmarkConfirmationSent={onUnmarkConfirmationSent}
            emailTemplate={emailTemplate}
            settings={settings}
            onVerifyPayment={onVerifyPayment}
            onDropMember={onDropMember}
            onAddSubstitute={onAddSubstitute}
            onMarkMemberPaid={onMarkMemberPaid}
            onGeneratePerformerTickets={onGeneratePerformerTickets}
          />
        )}
      </div>
    </React.Fragment>
  );
}

function RegEmptyState({ tab, search }) {
  const msgs = {
    pending: { title: 'No pending registrations', body: "When crews submit entries via the website, they'll appear here." },
    confirmed: { title: 'No confirmed registrations', body: 'Approved entries land here. None yet.' },
    paid: { title: 'No paid registrations', body: 'Once payment is verified, mark entries as paid.' },
    rejected: { title: 'No rejected entries', body: 'Entries you decline appear here.' },
    withdrawn: { title: 'No withdrawn entries', body: 'Groups that drop out land here.' },
  };
  const m = msgs[tab] || { title: 'Nothing here', body: '' };
  return (
    <div style={{ padding: 80, textAlign: 'center', color: 'var(--text-muted)' }}>
      <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6, color: 'var(--text)' }}>
        {search ? 'No results' : m.title}
      </div>
      <div style={{ fontSize: 13 }}>
        {search ? 'Try a different name, email, or Entertainment.' : m.body}
      </div>
    </div>
  );
}

function RegistrationList({ registrations, selectedId, onSelect, bulkSelected, onToggleOne }) {
  return (
    <div style={{ maxHeight: 'calc(100vh - 380px)', overflow: 'auto' }}>
      {registrations.map((r) => (
        <RegistrationRow
          key={r.id}
          registration={r}
          selected={r.id === selectedId}
          onClick={() => onSelect(r.id)}
          bulkChecked={!!(bulkSelected && bulkSelected[r.id])}
          onToggleBulk={onToggleOne}
        />
      ))}
    </div>
  );
}

function RegistrationRow({ registration: r, selected, onClick, bulkChecked, onToggleBulk }) {
  const accent = CATEGORY_COLORS[r.category] || '#FFFFFF';
  return (
    <div
      onClick={onClick}
      style={{
        padding: '14px 18px',
        borderBottom: '1px solid rgba(255,255,255,0.04)',
        cursor: 'pointer',
        background: selected ? 'linear-gradient(90deg, rgba(255,27,107,0.10), rgba(199,36,255,0.05))' : 'transparent',
        borderLeft: '3px solid ' + (selected ? accent : 'transparent'),
        display: 'grid',
        gridTemplateColumns: 'auto 1fr auto',
        gap: 14, alignItems: 'center',
        transition: 'background 0.15s',
      }}
      onMouseEnter={(e) => {
        if (!selected) e.currentTarget.style.background = 'rgba(255,255,255,0.025)';
      }}
      onMouseLeave={(e) => {
        if (!selected) e.currentTarget.style.background = 'transparent';
      }}
    >
      <input type="checkbox" checked={bulkChecked || false}
        onClick={(e) => e.stopPropagation()}
        onChange={() => onToggleBulk && onToggleBulk(r.id)}
        style={{
          width: 16, height: 16, cursor: 'pointer',
          accentColor: '#FF1B6B',
        }} />
      <div style={{ minWidth: 0 }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6,
        }}>
          <span style={{
            padding: '2px 8px', borderRadius: 4,
            background: accent + '15',
            border: '1px solid ' + accent + '40',
            color: accent,
            fontSize: 9, fontWeight: 700, letterSpacing: 1,
            fontFamily: 'JetBrains Mono, monospace',
          }}>
            {(CATEGORY_LABELS[r.category] || r.category).toUpperCase()}
          </span>
          <StatusBadge status={r.status} />
        </div>
        <div className="font-display" style={{
          fontSize: 16, fontWeight: 700, color: 'var(--text)',
          letterSpacing: -0.3, lineHeight: 1.2, marginBottom: 4,
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
        }}>
          {r.group_name}
        </div>
        <div style={{
          fontSize: 12, color: 'var(--text-muted)',
          display: 'flex', gap: 14, flexWrap: 'wrap',
        }}>
          <span><Icon name="users" size={11} /> {r.leader_name}</span>
          {r.member_count && <span>· {r.member_count} members</span>}
          {r.affiliated_entertainment && (
            <span style={{ color: accent }}>· {r.affiliated_entertainment}</span>
          )}
        </div>
      </div>
      <div style={{ textAlign: 'right', whiteSpace: 'nowrap' }}>
        {r.confirmation_sent_at && (
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 4,
            padding: '2px 7px', borderRadius: 4,
            background: 'rgba(0, 230, 118, 0.12)',
            border: '1px solid rgba(0, 230, 118, 0.35)',
            color: '#00E676',
            fontSize: 9, fontWeight: 700, letterSpacing: 1,
            marginBottom: 4,
            fontFamily: 'JetBrains Mono, monospace',
          }} title="Confirmation email sent">
            ✓ EMAILED
          </div>
        )}
        <div className="font-mono" style={{
          fontSize: 11, color: 'var(--text-soft)', fontWeight: 600,
        }}>
          {relTime(r.created_at)}
        </div>
      </div>
    </div>
  );
}

function RegistrationDetailPanel({ registration: r, onClose, onUpdateStatus, onSaveNotes,
                                    onMarkConfirmationSent, onUnmarkConfirmationSent,
                                    emailTemplate, settings,
                                    onVerifyPayment, onDropMember, onAddSubstitute,
                                    onMarkMemberPaid, onGeneratePerformerTickets }) {
  const [adminNotes, setAdminNotes] = useState(r.admin_notes || '');
  const [savingNotes, setSavingNotes] = useState(false);
  const accent = CATEGORY_COLORS[r.category] || '#FFFFFF';

  useEffect(() => {
    setAdminNotes(r.admin_notes || '');
  }, [r.id, r.admin_notes]);

  const handleSaveNotes = async () => {
    setSavingNotes(true);
    await onSaveNotes(r.id, adminNotes);
    setSavingNotes(false);
  };

  return (
    <div className="anim-fade-in" style={{
      background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
      borderRadius: 18, border: '1px solid var(--border)',
      overflow: 'hidden', position: 'sticky', top: 88, alignSelf: 'start',
      maxHeight: 'calc(100vh - 112px)', display: 'flex', flexDirection: 'column'
    }}>
      <div style={{
        padding: '16px 20px', borderBottom: '1px solid var(--border)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between'
      }}>
        <div>
          <div style={{
            display: 'inline-block',
            padding: '2px 8px', borderRadius: 4,
            background: accent + '15',
            border: '1px solid ' + accent + '40',
            color: accent,
            fontSize: 9, fontWeight: 700, letterSpacing: 1,
            fontFamily: 'JetBrains Mono, monospace',
            marginBottom: 6,
          }}>
            {(CATEGORY_LABELS[r.category] || r.category).toUpperCase()}
          </div>
          <div className="font-display" style={{
            fontSize: 18, fontWeight: 700, color: 'var(--text)',
            letterSpacing: -0.3, lineHeight: 1.2,
          }}>
            {r.group_name}
          </div>
        </div>
        <button onClick={onClose} style={{ ...iconBtnStyle, padding: 6 }}>
          <Icon name="x" size={16} />
        </button>
      </div>

      <div style={{ overflow: 'auto', flex: 1 }}>
        <Section>
          <KV iconName="hash" label="Status" value={<StatusBadge status={r.status} />} />
          <KV iconName="clock" label="Submitted" value={formatDT(r.created_at)} />
          {r.confirmed_at && (
            <KV iconName="check" label="Confirmed" value={formatDT(r.confirmed_at)} />
          )}
          {r.confirmed_by && (
            <KV iconName="user" label="By" value={r.confirmed_by} mono />
          )}
        </Section>

        <Section title="Leader & Contact">
          <KV iconName="user" label="Name" value={r.leader_name} />
          <KV iconName="phone" label="Phone" value={r.leader_phone} mono />
          <KV iconName="mail" label="Email" value={r.leader_email} mono />
        </Section>

        {r.affiliated_entertainment && (
          <Section title="Affiliated Entertainment">
            <div style={{
              padding: '10px 12px', borderRadius: 8,
              background: accent + '12', border: '1px solid ' + accent + '40',
              color: accent, fontSize: 14, fontWeight: 700,
            }}>
              {r.affiliated_entertainment}
            </div>
          </Section>
        )}

        <Section title={r.category === 'fanchant' || r.category === 'fanbooth' ? 'Idol Group / Fandom' : 'Song & Artist'}>
          <div style={{
            padding: '10px 12px', borderRadius: 8,
            background: 'rgba(255,255,255,0.025)',
            border: '1px solid var(--border)',
            color: 'var(--text)', fontSize: 14, fontWeight: 600,
          }}>
            {r.song_or_idol || '—'}
          </div>
        </Section>

        <PerformerManagementSection
          registration={r}
          onVerifyPayment={onVerifyPayment}
          onDropMember={onDropMember}
          onAddSubstitute={onAddSubstitute}
          onMarkMemberPaid={onMarkMemberPaid}
          onGeneratePerformerTickets={onGeneratePerformerTickets}
        />

        {r.notes && (
          <Section title="Notes from Group">
            <div style={{
              padding: '10px 12px', borderRadius: 8,
              background: 'rgba(255, 179, 0, 0.08)',
              border: '1px solid rgba(255, 179, 0, 0.2)',
              color: '#FFD380', fontSize: 13, lineHeight: 1.6,
            }}>
              {r.notes}
            </div>
          </Section>
        )}

        <Section title="Terms Agreement">
          {r.agreed_to_terms ? (
            <div style={{
              fontSize: 12, color: 'var(--text-muted)',
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <span style={{ color: '#00E676' }}><Icon name="check" size={14} /></span>
              <span>Agreed on {formatDT(r.agreed_at)}</span>
            </div>
          ) : (
            <div style={{ fontSize: 12, color: '#FF1744' }}>
              ⚠ No agreement record
            </div>
          )}
        </Section>

        <Section title="Confirmation Email">
          {r.confirmation_sent_at ? (
            <div style={{
              padding: '10px 12px', borderRadius: 8,
              background: 'rgba(0, 230, 118, 0.08)',
              border: '1px solid rgba(0, 230, 118, 0.3)',
            }}>
              <div style={{
                fontSize: 13, color: '#00E676', fontWeight: 700,
                display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4,

                <Icon name="check" size={14} /> Sent
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                {formatDT(r.confirmation_sent_at)}
                {r.confirmation_sent_by && ' · by ' + r.confirmation_sent_by}
              </div>
              <button onClick={() => {
                if (window.confirm('Unmark this confirmation as sent? Use only if you marked by mistake.')) {
                  onUnmarkConfirmationSent && onUnmarkConfirmationSent(r.id);
                }
              }}
              style={{
                marginTop: 10,
                padding: '5px 10px', borderRadius: 6,
                background: 'transparent',
                border: '1px solid rgba(255,255,255,0.15)',
                color: 'var(--text-soft)', cursor: 'pointer',
                fontSize: 10, fontWeight: 600, letterSpacing: 0.5,
                fontFamily: 'inherit',

                UNMARK SENT
              </button>
            </div>
          ) : (
            <div>
              <div style={{
                fontSize: 12, color: 'var(--text-muted)',
                lineHeight: 1.55, marginBottom: 10,
              }}>
                Send the registration confirmation with next steps + GC link.
                Opens your email client with a pre-filled draft. Click "Mark as sent" after you've sent it.
              </div>
              {r.leader_email ? (
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  <a href={buildConfirmationMailto(r, emailTemplate, settings)}
                    target="_blank" rel="noopener"
                    style={{
                      padding: '8px 14px', borderRadius: 8,
                      background: 'rgba(0, 229, 255, 0.1)',
                      border: '1px solid rgba(0, 229, 255, 0.5)',
                      color: '#00E5FF',
                      fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                      textDecoration: 'none',
                      display: 'inline-flex', alignItems: 'center', gap: 6,
                      fontFamily: 'inherit',
                    }}>
                    <Icon name="mail" size={12} /> COMPOSE EMAIL
                  </a>
                  <button onClick={() => onMarkConfirmationSent && onMarkConfirmationSent(r.id)}
                    style={{
                      padding: '8px 14px', borderRadius: 8,
                      background: 'rgba(0, 230, 118, 0.1)',
                      border: '1px solid rgba(0, 230, 118, 0.5)',
                      color: '#00E676', cursor: 'pointer',
                      fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                      display: 'inline-flex', alignItems: 'center', gap: 6,
                      fontFamily: 'inherit',
                    }}>
                    <Icon name="check" size={12} /> MARK AS SENT
                  </button>
                </div>
              ) : (
                <div style={{
                  padding: '10px 12px', borderRadius: 8,
                  background: 'rgba(255, 23, 68, 0.08)',
                  border: '1px solid rgba(255, 23, 68, 0.3)',
                  fontSize: 12, color: '#FFA0A0',
                }}>
                  No email on file. Contact via phone: <strong style={{ color: '#FFB300' }}>{r.leader_phone || '—'}</strong>
                </div>
              )}
            </div>
          )}
        </Section>

        <Section title="Admin Notes (internal)">
          <textarea
            value={adminNotes}
            onChange={(e) => setAdminNotes(e.target.value)}
            placeholder="Internal notes about this entry — payment status, communication history, special considerations..."
            rows={4}
            style={{
              width: '100%', padding: '10px 12px',
              background: 'rgba(255,255,255,0.025)',
              border: '1px solid var(--border)', borderRadius: 8,
              color: 'var(--text)', fontSize: 13, lineHeight: 1.5,
              fontFamily: 'Sora, sans-serif', resize: 'vertical',
              boxSizing: 'border-box', outline: 'none',
            }}
          />
          <button onClick={handleSaveNotes}
            disabled={savingNotes || adminNotes === (r.admin_notes || '')}
            style={{
              marginTop: 8,
              padding: '8px 14px', borderRadius: 8,
              background: 'rgba(0, 229, 255, 0.1)',
              border: '1px solid rgba(0, 229, 255, 0.4)',
              color: '#00E5FF', cursor: 'pointer',
              fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
              opacity: (savingNotes || adminNotes === (r.admin_notes || '')) ? 0.5 : 1,
              fontFamily: 'inherit',
            }}>
            {savingNotes ? 'SAVING…' : 'SAVE NOTES'}
          </button>
        </Section>
      </div>

      {/* Status action bar */}
      <div style={{
        padding: '14px 18px',
        borderTop: '1px solid var(--border)',
        background: 'rgba(8, 2, 15, 0.6)',
      }}>
        <div className="font-mono" style={{
          fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
          fontWeight: 700, marginBottom: 10,
        }}>
          UPDATE STATUS →
        </div>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {r.status !== 'pending' && (
            <RegActionBtn label="Pending" icon="clock" color="#FFB300"
              onClick={() => onUpdateStatus(r.id, 'pending')} />
          )}
          {r.status !== 'confirmed' && (
            <RegActionBtn label="Confirm" icon="check" color="#00E5FF"
              onClick={() => onUpdateStatus(r.id, 'confirmed')} />
          )}
          {r.status !== 'paid' && (
            <RegActionBtn label="Mark Paid" icon="check" color="#00E676"
              onClick={() => onUpdateStatus(r.id, 'paid')} />
          )}
          {r.status !== 'rejected' && (
            <RegActionBtn label="Reject" icon="x" color="#FF1744"
              onClick={() => {
                if (window.confirm('Reject this registration? The group will be notified.')) {
                  onUpdateStatus(r.id, 'rejected');
                }
              }} />
          )}
          {r.status !== 'withdrawn' && (
            <RegActionBtn label="Withdrew" icon="x" color="#A0A0A0"
              onClick={() => {
                if (window.confirm('Mark this group as withdrawn? They will still be on the hook for fees per policy.')) {
                  onUpdateStatus(r.id, 'withdrawn');
                }
              }} />
          )}
        </div>
      </div>
    </div>
  );
}

function RegActionBtn({ label, icon, color, onClick }) {
  return (
    <button onClick={onClick}
      style={{
        padding: '8px 12px', borderRadius: 8,
        background: color + '15',
        border: '1px solid ' + color + '50',
        color: color, cursor: 'pointer',
        fontSize: 11, fontWeight: 700, letterSpacing: 0.4,
        display: 'flex', alignItems: 'center', gap: 6,
        fontFamily: 'inherit', transition: 'all 0.15s',
      }}
      onMouseEnter={(e) => {
        e.currentTarget.style.background = color + '25';
      }}
      onMouseLeave={(e) => {
        e.currentTarget.style.background = color + '15';
      }}>
      <Icon name={icon} size={12} /> {label}
    </button>
  );
}

function AppEmptyState({ tab, search }) {
  const msgs = {
    pending: { title: 'No pending applications', body: 'When banned individuals submit applications, they appear here.' },
    meeting_scheduled: { title: 'No scheduled meetings', body: 'Applications marked as scheduled appear here.' },
    approved: { title: 'No approved applications', body: 'Approved applicants land here.' },
    denied: { title: 'No denied applications', body: 'Denied applicants land here.' },
  };
  const m = msgs[tab] || { title: 'Nothing here', body: '' };
  return (
    <div style={{ padding: 80, textAlign: 'center', color: 'var(--text-muted)' }}>
      <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6, color: 'var(--text)' }}>
        {search ? 'No results' : m.title}
      </div>
      <div style={{ fontSize: 13 }}>
        {search ? 'Try a different name or keyword.' : m.body}
      </div>
    </div>
  );
}

function ApplicationList({ applications, selectedId, onSelect }) {
  return (
    <div style={{ maxHeight: 'calc(100vh - 340px)', overflow: 'auto' }}>
      {applications.map((a) => (
        <ApplicationRow
          key={a.id}
          application={a}
          selected={a.id === selectedId}
          onClick={() => onSelect(a.id)}
        />
      ))}
    </div>
  );
}

function formatMeetingDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function ApplicationRow({ application: a, selected, onClick }) {
  const accent = a.location === 'davao' ? '#00E676' : '#00E5FF';
  return (
    <div
      onClick={onClick}
      style={{
        padding: '14px 18px',
        borderBottom: '1px solid rgba(255,255,255,0.04)',
        cursor: 'pointer',
        background: selected ? 'linear-gradient(90deg, rgba(255,27,107,0.10), rgba(199,36,255,0.05))' : 'transparent',
        borderLeft: '3px solid ' + (selected ? accent : 'transparent'),
        display: 'grid',
        gridTemplateColumns: '1fr auto',
        gap: 16, alignItems: 'center',
        transition: 'background 0.15s',
      }}
      onMouseEnter={(e) => {
        if (!selected) e.currentTarget.style.background = 'rgba(255,255,255,0.025)';
      }}
      onMouseLeave={(e) => {
        if (!selected) e.currentTarget.style.background = 'transparent';
      }}
    >
      <div style={{ minWidth: 0 }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6,

          <span style={{
            padding: '2px 8px', borderRadius: 4,

        <div style={{
          fontSize: 12, color: 'var(--text-muted)',

            <RegActionBtn label="Meeting Scheduled" icon="clock" color="#00E5FF"
              onClick={() => onUpdateStatus(a.id, 'meeting_scheduled')} />

          {a.status !== 'approved' && (
            <RegActionBtn label="Approve" icon="check" color="#00E676"
              onClick={() => {

          {a.status !== 'denied' && (
            <RegActionBtn label="Deny" icon="x" color="#FF1744"

                if (window.confirm('Deny this application? The ban remains in effect.')) {
                  onUpdateStatus(a.id, 'denied');
                }
              }} />
          )}
        </div>
      </div>
    </div>
  );
}

// FINANCE VIEW — gross income, expenses, net profit, budget vs actual, insights
// ============================================================
const EXPENSE_CATEGORIES = [
  { key: 'venue', label: 'Venue', accent: '#FF1B6B' },
  { key: 'prizes', label: 'Prizes', accent: '#FFB300' },
  { key: 'production', label: 'Production', accent: '#C724FF' },
  { key: 'marketing', label: 'Marketing', accent: '#00E5FF' },
  { key: 'food', label: 'Food & Drinks', accent: '#FF6FA8' },
  { key: 'staff', label: 'Staff & Volunteers', accent: '#00E676' },
  { key: 'permits', label: 'Permits & Fees', accent: '#82B1FF' },
  { key: 'utilities', label: 'Utilities & Tech', accent: '#9C7BFF' },
  { key: 'miscellaneous', label: 'Miscellaneous', accent: '#A0A0A0' },
];
const EXPENSE_CATEGORIES_LABELS = EXPENSE_CATEGORIES.reduce((m, c) => { m[c.key] = c.label; return m; }, {});
const EXPENSE_CATEGORIES_COLORS = EXPENSE_CATEGORIES.reduce((m, c) => { m[c.key] = c.accent; return m; }, {});

function FinanceView({
  financeLoading, budget, expenses, filteredExpenses,
  expenseCategoryFilter, setExpenseCategoryFilter,
  grossIncome, totalExpenses, totalBudget, netProfit,
  expensesByCategory, orders, registrations, applications, tickets,
  onAddExpense, onEditExpense, onDeleteExpense, onExportCSV,
}) {
  if (financeLoading) {
    return (
      <div style={{ padding: 80, textAlign: 'center' }}>
        <Spinner size={28} />
      </div>
    );
  }

  // Budget by category, looked up by category key
  const budgetByCategory = budget.reduce((m, b) => {
    m[b.category] = (m[b.category] || 0) + Number(b.allocated || 0);
    return m;
  }, {});

  const burnRate = totalBudget > 0 ? (totalExpenses / totalBudget) : 0;

  return (
    <React.Fragment>
      {/* Top summary cards */}
      <div style={{ padding: '20px 32px 0', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
        <StatCard label="Gross Income" value={peso(grossIncome)}
                  sub="from confirmed orders" accent="#00E676" iconName="card" />
        <StatCard label="Total Expenses" value={peso(totalExpenses)}
                  sub={Math.round(burnRate * 100) + '% of budget'} accent="#FF1744" iconName="x" />
        <StatCard label="Net Profit" value={peso(netProfit)}
                  sub={netProfit >= 0 ? 'on track' : 'in the red'}
                  accent={netProfit >= 0 ? '#00E5FF' : '#FF1744'} iconName="check" />
        <StatCard label="Budget Allocated" value={peso(totalBudget)}
                  sub={peso(totalBudget - totalExpenses) + ' remaining'} accent="#FFB300" iconName="hash" />
      </div>

      {/* Two-column layout: budget vs actual + insights */}
      <div style={{
        padding: '24px 32px 24px',
        display: 'grid',
        gridTemplateColumns: 'minmax(0, 1.6fr) minmax(0, 1fr)',
        gap: 22,
      }}>
        {/* LEFT — Budget vs Actual */}
        <div style={{
          background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
          borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
          padding: '22px 24px',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: 18,
          }}>
            <div>
              <div className="font-mono" style={{
                fontSize: 10, letterSpacing: 2.5, color: 'var(--text-soft)',
                fontWeight: 700, marginBottom: 6,
              }}>
                BUDGET vs ACTUAL
              </div>
              <div className="font-display" style={{
                fontSize: 22, fontWeight: 800, color: 'var(--text)',
                letterSpacing: -0.5,
              }}>
                Where the money goes
              </div>
            </div>
          </div>

          {budget.length === 0 ? (
            <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-muted)', fontSize: 13 }}>
              No budget allocated yet. Run kreation_finance_setup.sql to seed the budget.
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {budget.map((b) => {
                const actual = expensesByCategory[b.category] || 0;
                const allocated = Number(b.allocated || 0);
                const pct = allocated > 0 ? Math.min(100, (actual / allocated) * 100) : 0;
                const over = actual > allocated;
                const accent = EXPENSE_CATEGORIES_COLORS[b.category] || '#A0A0A0';
                return (
                  <div key={b.id}>
                    <div style={{
                      display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
                      marginBottom: 6, gap: 12,
                    }}>
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div style={{
                          fontSize: 13, fontWeight: 700, color: 'var(--text)',
                          marginBottom: 2,
                        }}>
                          {EXPENSE_CATEGORIES_LABELS[b.category] || b.category}
                          {b.label && (
                            <span style={{ color: 'var(--text-soft)', fontWeight: 400, marginLeft: 8, fontSize: 11 }}>
                              {b.label}
                            </span>
                          )}
                        </div>
                      </div>
                      <div className="font-mono" style={{ fontSize: 12, whiteSpace: 'nowrap' }}>
                        <span style={{ color: over ? '#FF1744' : 'var(--text)', fontWeight: 700 }}>
                          {peso(actual)}
                        </span>
                        <span style={{ color: 'var(--text-soft)' }}> / {peso(allocated)}</span>
                      </div>
                    </div>
                    <div style={{
                      height: 8, borderRadius: 999,
                      background: 'rgba(255,255,255,0.06)',
                      overflow: 'hidden',
                      border: over ? '1px solid rgba(255,23,68,0.4)' : '1px solid transparent',
                    }}>
                      <div style={{
                        height: '100%',
                        width: pct + '%',
                        background: over
                          ? 'linear-gradient(90deg, ' + accent + ', #FF1744)'
                          : 'linear-gradient(90deg, ' + accent + '80, ' + accent + ')',
                        transition: 'width 0.4s ease',
                      }} />
                    </div>
                    {over && (
                      <div style={{
                        marginTop: 4, fontSize: 10, color: '#FF1744', fontWeight: 600,
                        letterSpacing: 0.3,
                      }}>
                        ⚠ OVER BUDGET BY {peso(actual - allocated)}
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Also show categories with expenses but no budget */}
              {Object.keys(expensesByCategory)
                .filter((cat) => !budget.some((b) => b.category === cat))
                .map((cat) => {
                  const actual = expensesByCategory[cat] || 0;
                  const accent = EXPENSE_CATEGORIES_COLORS[cat] || '#A0A0A0';
                  return (
                    <div key={cat}>
                      <div style={{
                        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
                        marginBottom: 6, gap: 12,
                      }}>
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{
                            fontSize: 13, fontWeight: 700, color: 'var(--text)',
                            marginBottom: 2,
                          }}>
                            {EXPENSE_CATEGORIES_LABELS[cat] || cat}
                            <span style={{ color: '#FFB300', fontWeight: 600, marginLeft: 8, fontSize: 11 }}>
                              UNALLOCATED
                            </span>
                          </div>
                        </div>
                        <div className="font-mono" style={{ fontSize: 12, color: 'var(--text)', fontWeight: 700 }}>
                          {peso(actual)}
                        </div>
                      </div>
                      <div style={{
                        height: 8, borderRadius: 999,
                        background: 'rgba(255,179,0,0.15)',
                        border: '1px dashed rgba(255,179,0,0.4)',
                      }} />
                    </div>
                  );
                })}
            </div>
          )}
        </div>

        {/* RIGHT — Smart Insights */}
        <InsightsPanel
          orders={orders}
          registrations={registrations}
          applications={applications}
          tickets={tickets}
          grossIncome={grossIncome}
          totalExpenses={totalExpenses}
          totalBudget={totalBudget}
          netProfit={netProfit}
        />
      </div>

      {/* Expense list section */}
      <div style={{
        padding: '0 32px 64px',
      }}>
        <div style={{
          background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
          borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
        }}>
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 16, flexWrap: 'wrap',
          }}>
            <div>
              <div className="font-mono" style={{
                fontSize: 10, letterSpacing: 2.5, color: 'var(--text-soft)',
                fontWeight: 700, marginBottom: 4,
              }}>
                EXPENSE LEDGER
              </div>
              <div className="font-display" style={{
                fontSize: 18, fontWeight: 800, color: 'var(--text)', letterSpacing: -0.3,
              }}>
                {filteredExpenses.length} {filteredExpenses.length === 1 ? 'entry' : 'entries'}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
              <button onClick={onAddExpense}
                style={{
                  padding: '9px 16px', borderRadius: 10,
                  background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
                  border: 'none',
                  color: 'white', cursor: 'pointer',
                  fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                  boxShadow: '0 6px 18px rgba(255, 27, 107, 0.35)',
                }}>
                + ADD EXPENSE
              </button>
              <button onClick={onExportCSV}
                style={{
                  padding: '7px 12px', borderRadius: 8,
                  background: 'rgba(0, 229, 255, 0.08)',
                  border: '1px solid rgba(0, 229, 255, 0.3)',
                  color: '#00E5FF', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600, letterSpacing: 0.3,
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: 'inherit',
                }}>
                <Icon name="download" size={12} /> CSV
              </button>
            </div>
          </div>

          {/* Category filter chips */}
          <div style={{
            padding: '10px 18px', borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
            background: 'rgba(255, 255, 255, 0.015)',
          }}>
            <span className="font-mono" style={{
              fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
              fontWeight: 700, marginRight: 4,
            }}>
              CATEGORY →
            </span>
            <button onClick={() => setExpenseCategoryFilter('all')}
              style={{
                padding: '5px 12px', borderRadius: 999,
                background: expenseCategoryFilter === 'all' ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.03)',
                border: '1px solid ' + (expenseCategoryFilter === 'all' ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.08)'),
                color: expenseCategoryFilter === 'all' ? 'var(--text)' : 'var(--text-muted)',
                fontSize: 11, fontWeight: 600, cursor: 'pointer',
                fontFamily: 'inherit',
              }}>
              All <span style={{ fontSize: 10, opacity: 0.7 }}>{expenses.length}</span>
            </button>
            {EXPENSE_CATEGORIES.map((c) => {
              const count = expenses.filter((e) => e.category === c.key).length;
              if (count === 0) return null;
              const isActive = expenseCategoryFilter === c.key;
              return (
                <button key={c.key} onClick={() => setExpenseCategoryFilter(c.key)}
                  style={{
                    padding: '5px 12px', borderRadius: 999,
                    background: isActive ? c.accent + '22' : 'rgba(255,255,255,0.03)',
                    border: '1px solid ' + (isActive ? c.accent + '60' : 'rgba(255,255,255,0.08)'),
                    color: isActive ? c.accent : 'var(--text-muted)',
                    fontSize: 11, fontWeight: 600, cursor: 'pointer',
                    fontFamily: 'inherit',
                  }}>
                  {c.label} <span style={{ fontSize: 10, opacity: 0.7 }}>{count}</span>
                </button>
              );
            })}
          </div>

          {/* Expense table */}
          {filteredExpenses.length === 0 ? (
            <div style={{ padding: 60, textAlign: 'center', color: 'var(--text-muted)' }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6, color: 'var(--text)' }}>
                {expenses.length === 0 ? 'No expenses logged yet' : 'No expenses in this category'}
              </div>
              <div style={{ fontSize: 12 }}>
                {expenses.length === 0
                  ? 'Click "+ ADD EXPENSE" to start tracking outgoing money.'
                  : 'Try another category or reset to "All".'}
              </div>
            </div>
          ) : (
            <div style={{ overflow: 'auto' }}>
              <table style={{
                width: '100%', borderCollapse: 'collapse',
                fontSize: 13,
              }}>
                <thead>
                  <tr style={{
                    background: 'rgba(255,255,255,0.025)',
                    borderBottom: '1px solid var(--border)',
                  }}>
                    <th style={tableHeadStyle}>DATE</th>
                    <th style={tableHeadStyle}>CATEGORY</th>
                    <th style={tableHeadStyle}>DESCRIPTION</th>
                    <th style={tableHeadStyle}>VENDOR</th>
                    <th style={{...tableHeadStyle, textAlign: 'right'}}>AMOUNT</th>
                    <th style={{...tableHeadStyle, width: 80}}></th>
                  </tr>
                </thead>
                <tbody>
                  {filteredExpenses.map((e) => {
                    const accent = EXPENSE_CATEGORIES_COLORS[e.category] || '#A0A0A0';
                    return (
                      <tr key={e.id} style={{
                        borderBottom: '1px solid rgba(255,255,255,0.04)',
                        transition: 'background 0.15s',
                      }}
                      onMouseEnter={(ev) => { ev.currentTarget.style.background = 'rgba(255,255,255,0.025)'; }}
                      onMouseLeave={(ev) => { ev.currentTarget.style.background = 'transparent'; }}>
                        <td style={tableCellStyle}>
                          <span className="font-mono" style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                            {e.paid_at || '—'}
                          </span>
                        </td>
                        <td style={tableCellStyle}>
                          <span style={{
                            padding: '2px 8px', borderRadius: 4,
                            background: accent + '15',
                            border: '1px solid ' + accent + '40',
                            color: accent,
                            fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                            display: 'inline-block',
                          }}>
                            {EXPENSE_CATEGORIES_LABELS[e.category] || e.category}
                          </span>
                        </td>
                        <td style={tableCellStyle}>
                          <div style={{ color: 'var(--text)', fontWeight: 500 }}>
                            {e.description}
                          </div>
                          {e.notes && (
                            <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 2 }}>
                              {e.notes}
                            </div>
                          )}
                        </td>
                        <td style={tableCellStyle}>
                          <span style={{ color: 'var(--text-muted)' }}>
                            {e.vendor || '—'}
                          </span>
                          {e.payment_method && (
                            <div style={{ fontSize: 10, color: 'var(--text-soft)', marginTop: 2 }}>
                              {e.payment_method}
                            </div>
                          )}
                        </td>
                        <td style={{...tableCellStyle, textAlign: 'right'}}>
                          <span className="font-mono" style={{
                            fontSize: 14, fontWeight: 700, color: 'var(--text)',
                          }}>
                            {peso(e.amount)}
                          </span>
                        </td>
                        <td style={{...tableCellStyle, textAlign: 'right'}}>
                          <button onClick={() => onEditExpense(e)}
                            style={{
                              padding: '4px 8px', borderRadius: 6,
                              background: 'transparent',
                              border: '1px solid rgba(255,255,255,0.1)',
                              color: 'var(--text-muted)', cursor: 'pointer',
                              fontSize: 10, fontWeight: 600,
                              marginRight: 4,
                              fontFamily: 'inherit',
                            }}>
                            EDIT
                          </button>
                          <button onClick={() => onDeleteExpense(e.id)}
                            style={{
                              padding: '4px 8px', borderRadius: 6,
                              background: 'transparent',
                              border: '1px solid rgba(255,23,68,0.3)',
                              color: '#FF6B7F', cursor: 'pointer',
                              fontSize: 10, fontWeight: 600,
                              fontFamily: 'inherit',
                            }}>
                            DEL
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </React.Fragment>
  );
}

const tableHeadStyle = {
  textAlign: 'left',
  padding: '10px 14px',
  fontSize: 10,
  fontWeight: 700,
  letterSpacing: 1.5,
  color: 'var(--text-soft)',
  fontFamily: 'Sora, sans-serif',
};

const tableCellStyle = {
  padding: '12px 14px',
  verticalAlign: 'top',
};

// ============================================================
// INSIGHTS PANEL — calculated smart insights
// ============================================================
function InsightsPanel({ orders, registrations, applications, tickets, grossIncome, totalExpenses, totalBudget, netProfit }) {
  const insights = useMemo(() => {
    const out = [];
    const EVENT_DATE = new Date('2026-08-22T13:00:00+08:00');
    const now = new Date();
    const daysToEvent = Math.max(0, Math.ceil((EVENT_DATE - now) / (1000 * 60 * 60 * 24)));

    // Days countdown
    out.push({
      tone: daysToEvent <= 30 ? 'warning' : daysToEvent <= 90 ? 'info' : 'neutral',
      icon: 'clock',
      title: daysToEvent + ' days until event',
      body: daysToEvent <= 30
        ? 'Crunch time. Lock the participant list, finalize prizes, and confirm vendors.'
        : daysToEvent <= 90
        ? 'Three months out. Push ticket sales and chase any pending registrations.'
        : 'Plenty of runway. Focus on early ticket drops and partnership outreach.',
    });

    // Top revenue source (computed from active tickets, not order totals — consistent with gross income)
    const activeTickets = tickets.filter((t) => t.status !== 'cancelled' && !t.reissued_to_ticket_id);
    if (activeTickets.length > 0) {
      const byType = {};
      activeTickets.forEach((t) => {
        const k = t.ticket_type_name || 'Unknown';
        byType[k] = (byType[k] || 0) + Number(t.price || 0);
      });
      const top = Object.entries(byType).sort((a, b) => b[1] - a[1])[0];
      if (top) {
        const pct = grossIncome > 0 ? Math.round((top[1] / grossIncome) * 100) : 0;
        const topCount = activeTickets.filter((t) => (t.ticket_type_name || 'Unknown') === top[0]).length;
        out.push({
          tone: 'info',
          icon: 'ticket',
          title: 'Top revenue source: ' + top[0],
          body: peso(top[1]) + ' (' + pct + '% of gross income) from ' + topCount + ' tickets.',
        });
      }
    }

    // Pending orders held value
    const pendingOrders = orders.filter((o) => o.status === 'awaiting_verification');
    const pendingValue = pendingOrders.reduce((s, o) => s + Number(o.total || 0), 0);
    if (pendingValue > 0) {
      out.push({
        tone: 'warning',
        icon: 'inbox',
        title: peso(pendingValue) + ' awaiting verification',
        body: pendingOrders.length + ' orders pending review. Process these to unlock revenue and confirm seats.',
      });
    }

    // Registration progress
    const totalRegs = registrations.length;
    const paidRegs = registrations.filter((r) => r.status === 'paid').length;
    const confirmedRegs = registrations.filter((r) => r.status === 'confirmed').length;
    if (totalRegs > 0) {
      const paidPct = Math.round((paidRegs / totalRegs) * 100);
      out.push({
        tone: paidPct >= 80 ? 'positive' : paidPct >= 50 ? 'info' : 'warning',
        icon: 'users',
        title: paidRegs + ' of ' + totalRegs + ' registrations paid (' + paidPct + '%)',
        body: confirmedRegs > paidRegs
          ? (confirmedRegs - paidRegs) + ' confirmed but unpaid. Send payment reminders.'
          : 'Healthy payment conversion.',
      });
    }

    // Most popular registration category
    if (totalRegs > 0) {
      const byCat = {};
      registrations.forEach((r) => { byCat[r.category] = (byCat[r.category] || 0) + 1; });
      const topCat = Object.entries(byCat).sort((a, b) => b[1] - a[1])[0];
      if (topCat) {
        out.push({
          tone: 'info',
          icon: 'sparkles',
          title: 'Most popular: ' + (CATEGORY_LABELS[topCat[0]] || topCat[0]),
          body: topCat[1] + ' entries so far. ' + (topCat[0] === 'battle' ? 'Battle is the headline competition.' : ''),
        });
      }
    }

    // Ban revoke meetings pending
    const pendingApps = applications.filter((a) => a.status === 'pending').length;
    const scheduledApps = applications.filter((a) => a.status === 'meeting_scheduled').length;
    if (pendingApps > 0 || scheduledApps > 0) {
      out.push({
        tone: pendingApps > 0 ? 'warning' : 'info',
        icon: 'alert',
        title: pendingApps + ' pending, ' + scheduledApps + ' meetings scheduled',
        body: pendingApps > 0
          ? 'Review the new applications and schedule meetings via the Ban Revoke tab.'
          : 'Meetings on the calendar. Check the GCal links on each entry.',
      });
    }

    // Budget health
    if (totalBudget > 0) {
      const burnPct = Math.round((totalExpenses / totalBudget) * 100);
      const profitMargin = grossIncome > 0 ? Math.round((netProfit / grossIncome) * 100) : 0;
      out.push({
        tone: burnPct >= 90 ? 'warning' : burnPct >= 70 ? 'info' : 'positive',
        icon: 'card',
        title: burnPct + '% of budget spent',
        body: netProfit >= 0
          ? 'Net profit: ' + peso(netProfit) + (grossIncome > 0 ? ' (' + profitMargin + '% margin)' : '') + '. ' +
            (totalBudget - totalExpenses > 0 ? peso(totalBudget - totalExpenses) + ' still in the budget pot.' : 'Budget fully spent.')
          : 'In the red by ' + peso(Math.abs(netProfit)) + '. Push ticket sales or trim discretionary spend.',
      });
    }

    // Email confirmation gap
    const confirmedRegsWithoutEmail = registrations.filter((r) =>
      (r.status === 'confirmed' || r.status === 'paid') && !r.confirmation_sent_at
    );
    if (confirmedRegsWithoutEmail.length > 0) {
      out.push({
        tone: 'warning',
        icon: 'mail',
        title: confirmedRegsWithoutEmail.length + ' confirmations not sent',
        body: 'These groups are confirmed/paid but haven\'t received their confirmation email yet. Open the Registrations tab.',
      });
    }

    return out;
  }, [orders, registrations, applications, tickets, grossIncome, totalExpenses, totalBudget, netProfit]);

  return (
    <div style={{
      background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
      borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
      padding: '22px 24px',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 18,
      }}>
        <div>
          <div className="font-mono" style={{
            fontSize: 10, letterSpacing: 2.5, color: '#C724FF',
            fontWeight: 700, marginBottom: 6,
          }}>
            ✨ SMART INSIGHTS
          </div>
          <div className="font-display" style={{
            fontSize: 20, fontWeight: 800, color: 'var(--text)',
            letterSpacing: -0.5,
          }}>
            What needs your attention
          </div>
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {insights.map((ins, i) => {
          const toneColor = {
            warning: '#FFB300',
            positive: '#00E676',
            info: '#00E5FF',
            neutral: '#A0A0A0',
          }[ins.tone] || '#A0A0A0';
          return (
            <div key={i} style={{
              padding: '12px 14px', borderRadius: 10,
              background: toneColor + '0F',
              border: '1px solid ' + toneColor + '30',
              display: 'flex', gap: 12, alignItems: 'flex-start',
            }}>
              <div style={{ color: toneColor, marginTop: 2, flexShrink: 0 }}>
                <Icon name={ins.icon} size={16} />
              </div>

    orders.filter((o) => o.status === 'confirmed').forEach((o) => {

    <div style={{

      paddingTop: 18,

const DONUT_COLORS = ['#FF1B6B', '#C724FF', '#00E5FF', '#FFB300', '#00E676', '#FF6FA8', '#82B1FF'];

function DonutChart({ data, formatVal }) {
  const total = data.reduce((s, d) => s + d.val, 0);
  if (total <= 0) return null;
  const size = 160;
  const stroke = 26;
  const radius = (size - stroke) / 2;
  const cx = size / 2;
  const cy = size / 2;
  const circumference = 2 * Math.PI * radius;

  let accumulated = 0;
  const segments = data.map((d, i) => {
    const pct = d.val / total;
    const offset = circumference - (accumulated * circumference);
    const length = pct * circumference;
    accumulated += pct;
    return {
      ...d,
      pct,
      color: DONUT_COLORS[i % DONUT_COLORS.length],
      dashArray: length + ' ' + (circumference - length),
      dashOffset: offset,
    };
  });

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
      <svg width={size} height={size} style={{ flexShrink: 0 }}>
        <circle cx={cx} cy={cy} r={radius}
          fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
        {segments.map((s, i) => (
          <circle key={i} cx={cx} cy={cy} r={radius}
            fill="none"
            stroke={s.color}
            strokeWidth={stroke}
            strokeDasharray={s.dashArray}
            strokeDashoffset={s.dashOffset}
            transform={'rotate(-90 ' + cx + ' ' + cy + ')'}
            style={{ transition: 'all 0.4s ease' }} />
        ))}
        <text x={cx} y={cy - 3} textAnchor="middle"
          style={{
            fontFamily: 'Sora, sans-serif',
            fontSize: 11, fontWeight: 700,
            fill: 'rgba(255,255,255,0.6)', letterSpacing: 1.5,
          }}>
          TOTAL
        </text>
        <text x={cx} y={cy + 14} textAnchor="middle"
          style={{
            fontFamily: 'Sora, sans-serif',
            fontSize: 14, fontWeight: 800,
            fill: 'white', letterSpacing: -0.3,
          }}>
          {formatVal ? formatVal(total) : total}
        </text>
      </svg>
      <div style={{ flex: 1, minWidth: 140, display: 'flex', flexDirection: 'column', gap: 6 }}>
        {segments.map((s, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', gap: 8,
            fontSize: 12,
          }}>
            <span style={{
              width: 10, height: 10, borderRadius: 2,
              background: s.color, flexShrink: 0,
            }} />
            <span style={{ flex: 1, color: 'var(--text)', minWidth: 0 }}>
              {s.name}
            </span>
            <span className="font-mono" style={{ color: 'var(--text-muted)', fontSize: 11 }}>
              {Math.round(s.pct * 100)}%
            </span>
            <span className="font-mono" style={{ color: 'var(--text)', fontWeight: 700, fontSize: 11, minWidth: 70, textAlign: 'right' }}>
              {formatVal ? formatVal(s.val) : s.val}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CashFlowBars({ data, formatVal }) {
  const max = Math.max(...data.map((d) => Math.abs(d.value)), 1);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {data.map((d, i) => {
        const pct = (Math.abs(d.value) / max) * 100;
        return (
          <div key={i}>
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
              marginBottom: 4, fontSize: 12,
            }}>
              <span style={{ fontWeight: 700, color: 'var(--text)' }}>
                {d.label}
              </span>
              <span className="font-mono" style={{ color: d.color, fontWeight: 700 }}>
                {formatVal ? formatVal(d.value) : d.value}
              </span>
            </div>
            <div style={{
              height: 10, borderRadius: 999,
              background: 'rgba(255,255,255,0.06)',
              overflow: 'hidden',
            }}>
              <div style={{
                width: pct + '%', height: '100%',
                background: 'linear-gradient(90deg, ' + d.color + '60, ' + d.color + ')',
                transition: 'width 0.5s ease',
                boxShadow: '0 0 12px ' + d.color + '40',
              }} />
            </div>
          </div>
        );
      })}
    </div>
  );
}

function HorizontalBarChart({ data }) {
  const max = Math.max(...data.map((d) => d.val), 1);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {data.map((d, i) => {
        const pct = (d.val / max) * 100;
        return (
          <div key={i}>

              display: 'flex', justifyContent: 'space-between',

              overflow: 'hidden',
            }}>
              <div style={{
                width: pct + '%', height: '100%',
                background: 'linear-gradient(90deg, ' + d.accent + '70, ' + d.accent + ')',

            </div>

                    AVAILABLE VARIABLES
                  </div>
                  <div style={{ fontSize: 12, lineHeight: 1.7, color: 'var(--text-muted)' }}>

                  <div style={{
                    marginTop: 10, display: 'grid', gap: 6,

                  fontSize: 10, letterSpacing: 2.5, color: 'var(--text-soft)',
                  fontWeight: 700,

                  LIVE PREVIEW · SAMPLE DATA
                </div>
                <div style={{
                  padding: '12px 14px', borderRadius: 8,
                  background: 'rgba(255,255,255,0.03)',
                  border: '1px solid var(--border)',

                  <div style={{ fontSize: 10, color: 'var(--text-soft)', marginBottom: 4 }}>
                    SUBJECT
                  </div>
                  <div style={{
                    fontSize: 14, fontWeight: 700, color: 'var(--text)',
                    lineHeight: 1.4,
                  }}>
                    {previewSubject}
                  </div>
                </div>
                <div style={{
                  padding: '14px 16px', borderRadius: 8,
                  background: 'rgba(255,255,255,0.03)',
                  border: '1px solid var(--border)',
                  flex: 1, minHeight: 280,
                }}>
                  <div style={{ fontSize: 10, color: 'var(--text-soft)', marginBottom: 8 }}>
                    BODY
                  </div>
                  <pre style={{
                    margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word',
                    fontFamily: 'Sora, sans-serif',
                    fontSize: 13, lineHeight: 1.6, color: 'var(--text)',
                  }}>
                    {previewBody}
                  </pre>
                </div>
                <div style={{
                  fontSize: 11, color: 'var(--text-soft)', lineHeight: 1.6,
                  padding: '10px 12px', borderRadius: 6,
                  background: 'rgba(255, 179, 0, 0.06)',
                  border: '1px dashed rgba(255, 179, 0, 0.3)',
                }}>
                  Preview uses sample data. The real email will fill in values for each specific registration.
                </div>
              </div>
            </React.Fragment>
          ) : (
            <div style={{
              padding: 24, display: 'flex', flexDirection: 'column', gap: 18, maxWidth: 720,
            }}>
              <div style={{
                fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.6,
              }}>
                These values get substituted into the email template. Set them once here, they apply to every confirmation email.
              </div>

              <div>
                <label style={modalLabelStyle}>EVENT GROUP CHAT LINK</label>
                <input type="text" value={gcLink} onChange={(e) => setGcLink(e.target.value)}
                  placeholder="e.g. https://m.me/j/AbcDef123..."
                  style={modalInputStyle} />
                <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 6 }}>
                  Paste the Facebook Messenger group chat invite link. Used in the email and the success page on the buyer site.
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
                <div>
                  <label style={modalLabelStyle}>GCASH ACCOUNT NAME</label>
                  <input type="text" value={gcashName} onChange={(e) => setGcashName(e.target.value)}
                    style={modalInputStyle} />
                </div>
                <div>
                  <label style={modalLabelStyle}>GCASH NUMBER</label>
                  <input type="text" value={gcashNumber} onChange={(e) => setGcashNumber(e.target.value)}
                    style={modalInputStyle} />
                </div>
              </div>

        {/* Footer */}
        <div style={{
          padding: '14px 24px', borderTop: '1px solid rgba(255,255,255,0.08)',
