const formatDT = (iso) => {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-PH', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true
  });
};

const relTime = (iso) => {
  if (!iso) return '—';
  const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
};

const hoursUntilExpiry = (uploadedAt) => {
  if (!uploadedAt) return null;
  const expiresAt = new Date(uploadedAt).getTime() + 24 * 60 * 60 * 1000;
  return Math.max(0, Math.floor((expiresAt - Date.now()) / (60 * 60 * 1000)));
};

  'open-stage': 'Open Stage',
  'battle': 'Battle of the Entertainments',
  'fanchant': 'Fanchant Battle',
  'fanbooth': 'Fanbooth Battle',
};

};

// Simple {{var}} substitution
function applyTemplate(text, data) {
  if (!text) return '';
  return text.replace(/\{\{(\w+)\}\}/g, function(_, key) {
    return data[key] !== undefined && data[key] !== null ? String(data[key]) : '';
  });
}

// Build context object for registration variables
function buildRegistrationContext(reg, settings) {
  const isDanceCategory = reg.category === 'open-stage' || reg.category === 'battle';
  const fee = isDanceCategory ? (reg.member_count || 0) * 300 : 0;
  const categoryLabel = CATEGORY_LABELS[reg.category] || reg.category;
  const gc = (settings && settings.event_gc_link && settings.event_gc_link.trim())
    ? settings.event_gc_link
    : '[paste your event group chat link here]';
  const gcashName = (settings && settings.gcash_name) || 'Kyla Don';
  const gcashNumber = (settings && settings.gcash_number) || '09534900227';
  const ticketSendDate = (settings && settings.ticket_send_date) || 'August 15, 2026';

  const affiliatedLine = reg.affiliated_entertainment
    ? 'Affiliated Entertainment: ' + reg.affiliated_entertainment + '\n'
    : '';
  const songIdolLine = reg.song_or_idol
    ? (isDanceCategory ? 'Song/Artist: ' : 'Idol Group: ') + reg.song_or_idol + '\n'
    : '';

  let feeBlock;
  let stepOne;
  if (isDanceCategory) {
    feeBlock = 'REGISTRATION FEE\nTotal Fee: \u20B1' + fee +
               ' (\u20B1300 \u00D7 ' + (reg.member_count || 0) + ' members)\n\n' +
               'PAY VIA GCASH\nAccount: ' + gcashName + '\nNumber: ' + gcashNumber + '\n\n' +
               'Deadline: ' + ticketSendDate;
    stepOne = 'Send proof of payment by replying to this email.';
  } else {
    feeBlock = 'PARTICIPANT TICKETS\nMembers of Fanchant/Fanbooth do not pay the \u20B1300 participant fee.\nEach member needs a Regular audience ticket (\u20B1250) to enter the venue.\nTickets: https://kreationphilippines.vercel.app';
    stepOne = 'Each member buys a \u20B1250 audience ticket via the site.';
  }

  return {
    leader_name: reg.leader_name || '',
    leader_email: reg.leader_email || '',
    leader_phone: reg.leader_phone || '',
    group_name: reg.group_name || '',
    category: reg.category || '',
    category_label: categoryLabel,
    member_count: reg.member_count || 0,

// Build "Add to Google Calendar" link for ban revoke meeting
function buildGCalLink(application) {
  if (!application.meeting_date || !application.meeting_time) return null;

  // Treat the date+time as Manila local time (UTC+8)
  // Build the start Date in UTC by parsing as Manila
  const [y, m, d] = application.meeting_date.split('-').map(Number);
  const [hh, mm] = application.meeting_time.split(':').map(Number);
  // Manila is UTC+8 — to get UTC, subtract 8 hours
  const startUtc = new Date(Date.UTC(y, m - 1, d, hh - 8, mm));
  const endUtc = new Date(startUtc.getTime() + 60 * 60 * 1000); // 1 hour meeting

  const fmt = (date) => {
    return date.getUTCFullYear() +
      String(date.getUTCMonth() + 1).padStart(2, '0') +
      String(date.getUTCDate()).padStart(2, '0') + 'T' +
      String(date.getUTCHours()).padStart(2, '0') +
      String(date.getUTCMinutes()).padStart(2, '0') +
      '00Z';
  };

  const detailsLines = [
    'KPH Ban Revoke Application Review',
    '',
    'Applicant: ' + application.full_name,
    'Email: ' + application.contact_email,
  ];
  if (application.contact_phone) detailsLines.push('Phone: ' + application.contact_phone);
  detailsLines.push('');
  detailsLines.push('Format: ' + (application.location === 'davao'
    ? 'In-person at Work Co Claveria Branch'
    : 'Remote — video call'));
  detailsLines.push('');
  if (application.statement) {
    detailsLines.push('Statement of Accountability:');
    detailsLines.push(application.statement);
  }

  const location = application.location === 'davao'
    ? 'Work Co Claveria Branch, Davao City, Philippines'
    : 'Remote / Video Call';

  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: 'KPH Ban Revoke Review — ' + application.full_name,
    dates: fmt(startUtc) + '/' + fmt(endUtc),
    details: detailsLines.join('\n'),
    location: location,
  });

  return 'https://calendar.google.com/calendar/render?' + params.toString();
}

// Cryptographically random 64-char hex token (encoded in QR)
function generateQrToken() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return Array.from(arr, function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

// Sequential ticket code per tier. Walk-ins get W prefix.
// Examples: KP-V-A012 (VIP A12), KP-R-00087 (Regular #87),
//           KP-V-W0042 (Walk-in VIP #42), KP-P-00214 (Performer #214)
async function generateTicketCode(tierCode, isWalkIn, seatLabel) {
  // For VIP with assigned seat, use seat label
  if (tierCode === 'V' && seatLabel && !isWalkIn) {
    return 'KP-V-' + seatLabel.toUpperCase();
  }

  // Otherwise: sequential. Look up max existing for this tier+walk-in combo.
  const prefix = 'KP-' + tierCode + '-' + (isWalkIn ? 'W' : '');
  const { data, error } = await supabase
    .from('tickets')
    .select('ticket_code')
    .like('ticket_code', prefix + '%')
    .order('ticket_code', { ascending: false })
    .limit(1);

  let nextNum = 1;
  if (data && data.length > 0) {
    const lastCode = data[0].ticket_code;
    const numPart = lastCode.replace(prefix, '').replace(/[^0-9]/g, '');
    const lastNum = parseInt(numPart, 10);
    if (!isNaN(lastNum)) nextNum = lastNum + 1;
  }

  return prefix + String(nextNum).padStart(isWalkIn ? 4 : 5, '0');
}

// Batch-safe generator for callers that need N codes at once.
// The single-call version queries the DB each invocation, so calling it in a
// loop returns the SAME code every time (no inserts have committed between
// queries). This factory queries the DB once and increments locally.
//
// Returns a function: nextCode(seatLabel) → string
//   - For sequential tiers (R, P, and walk-ins), it returns prefix + Nnext.
//   - For VIP with seatLabel (and not walk-in), it returns KP-V-{SEAT} per call.
//
// Usage:
//   const next = await makeTicketCodeBatcher(tierCode, isWalkIn);
//   for (const item of items) {
//     const code = next(item.seatLabel);  // safe in a loop
//   }
async function makeTicketCodeBatcher(tierCode, isWalkIn) {
  const prefix = 'KP-' + tierCode + '-' + (isWalkIn ? 'W' : '');
  let nextNum = 1;

  // VIP non-walk-in tickets use seat labels (always unique), no counter needed.
  // We still set up the counter in case a VIP without a seat slips through.
  const { data } = await supabase
    .from('tickets')
    .select('ticket_code')
    .like('ticket_code', prefix + '%')
    .order('ticket_code', { ascending: false })
    .limit(1);
  if (data && data.length > 0) {
    const lastCode = data[0].ticket_code;
    const numPart = lastCode.replace(prefix, '').replace(/[^0-9]/g, '');
    const lastNum = parseInt(numPart, 10);
    if (!isNaN(lastNum)) nextNum = lastNum + 1;
  }

  const pad = isWalkIn ? 4 : 5;
  return function nextCode(seatLabel) {
    if (tierCode === 'V' && seatLabel && !isWalkIn) {
      return 'KP-V-' + seatLabel.toUpperCase();
    }
    const code = prefix + String(nextNum).padStart(pad, '0');
    nextNum++;
    return code;
  };
}

// Map ticket_type_name (free-text from db) to tier_code (single letter)
function tierCodeFromName(name) {
  if (!name) return 'R';
  const n = name.toLowerCase();
  if (n.includes('vip')) return 'V';
  if (n.includes('participant') || n.includes('performer')) return 'P';
  return 'R';
}

// Default section name per tier
function sectionFromTier(tierCode) {
  return tierCode === 'V' ? 'Ground Floor' :
         tierCode === 'R' ? 'Upper' :
         tierCode === 'P' ? 'Performer Area' : '';
}

// Cached logo blob — fetched once per session
let _logoCache = null;
async function fetchLogoForPDF() {
  if (_logoCache) return _logoCache;
  try {
    const resp = await fetch('./dkc-event-logo.jpg');
    if (!resp.ok) throw new Error('Logo fetch failed: ' + resp.status);
    const blob = await resp.blob();
    const dataUrl = await new Promise(function(res, rej) {
      const r = new FileReader();
      r.onloadend = function() { res(r.result); };
      r.onerror = rej;
      r.readAsDataURL(blob);
    });
    _logoCache = dataUrl;
    return dataUrl;
  } catch (e) {
    console.warn('Could not load DKC logo for PDF — proceeding without it.', e);
    return null;
  }
}

// Tier-specific top band gradient (matches preview file exactly)
function tierGradient(tierCode) {
  if (tierCode === 'V')
    return 'linear-gradient(135deg, #3D0F6E 0%, #5A1A8E 50%, #7A2BB0 100%)';
  if (tierCode === 'R')
    return 'linear-gradient(135deg, #1B2F6E 0%, #2C3D8E 50%, #3D2C8E 100%)';
  if (tierCode === 'P')
    return 'linear-gradient(135deg, #4F0A4F 0%, #6E1A6E 50%, #7A1A7E 100%)';
  return 'linear-gradient(135deg, #2A0A4F 0%, #4F1A7A 100%)';
}

function tierPillGradient(tierCode) {
  if (tierCode === 'V') return 'linear-gradient(90deg, #FF1B6B, #FF6FA8)';
  if (tierCode === 'R') return 'linear-gradient(90deg, #00B8D4, #00E5FF)';
  if (tierCode === 'P') return 'linear-gradient(90deg, #C724FF, #E366FF)';
  return 'linear-gradient(90deg, #FF1B6B, #C724FF)';
}

// Same color pair as tierPillGradient, but as a [start, end] tuple for SVG <stop> use
function tierPillGradientStops(tierCode) {
  if (tierCode === 'V') return ['#FF1B6B', '#FF6FA8'];
  if (tierCode === 'R') return ['#00B8D4', '#00E5FF'];
  if (tierCode === 'P') return ['#C724FF', '#E366FF'];
  return ['#FF1B6B', '#C724FF'];
}

function tierAccentColor(tierCode) {
  if (tierCode === 'V') return '#FF6FA8';
  if (tierCode === 'R') return '#00E5FF';
  if (tierCode === 'P') return '#E366FF';
  return '#FFFFFF';
}

// Generate a multi-page PDF, one ticket per page — uses html2canvas for design fidelity
async function generateTicketsPDF(tickets, orderRef) {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    throw new Error('jsPDF library not loaded');
  }
  if (typeof html2canvas !== 'function') {
    throw new Error('html2canvas library not loaded');
  }

  const { jsPDF } = window.jspdf;
  // Custom page size sized to fit one ticket nicely (4" x 8.7")
  const doc = new jsPDF({ unit: 'mm', format: [102, 220] });

  const logoSrc = await fetchLogoForPDF();

  // Wait for Google Fonts to load (Bungee, Sora, JetBrains Mono)
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) { /* continue */ }
  }

  // Build offscreen container
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;background:#FFFFFF;padding:0;margin:0;';
  document.body.appendChild(container);

  try {
    for (let i = 0; i < tickets.length; i++) {
      const t = tickets[i];
      const decorated = Object.assign({}, t, {
        _orderRefLabel: orderRef ? '#' + orderRef : '#' + (t.ticket_code || ''),
        _ticketCountLabel: tickets.length > 1
          ? (i + 1) + ' of ' + tickets.length + ' tickets'
          : '',
      });

      container.innerHTML = renderTicketHTML(decorated, logoSrc);

      // Wait for images inside the ticket to load
      const imgs = container.querySelectorAll('img');
      await Promise.all(Array.from(imgs).map(function(img) {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return new Promise(function(resolve) {
          img.onload = resolve;
          img.onerror = resolve;
          setTimeout(resolve, 2000);
        });
      }));

      // Render to canvas (2x for retina sharpness)
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#FFFFFF',
        logging: false,
      });

      const imgData = canvas.toDataURL('image/jpeg', 0.92);

      if (i > 0) doc.addPage();
      // Embed image filling the page
      doc.addImage(imgData, 'JPEG', 0, 0, 102, 220);
    }
  } finally {
    document.body.removeChild(container);
  }

  return doc;
}

// Create one ticket per attendee for this order. Uses the attendees table
// for per-ticket data: name, ticket_type, seat. Reads order.total for price.
async function generateTicketsForOrder(order, currentUserEmail) {
  // Skip if tickets already generated for this order
  const { data: existing } = await supabase
    .from('tickets')
    .select('id')
    .eq('order_id', order.id)
    .limit(1);
  if (existing && existing.length > 0) {
    return { tickets: [], alreadyGenerated: true };
  }

  // Fetch attendees with their ticket type names + prices + seats.
  // Note: the seats table has columns `row_label` + `seat_number`, not a single
  // `seat_label` column. We construct the label in JS below.
  // Per-ticket price comes from ticket_types.price so mixed-cart orders
  // (e.g. 1 VIP + 1 Regular) get correct per-tier pricing — NOT the order
  // total averaged across all attendees (which would be wrong).
  const { data: attendees, error: attErr } = await supabase
    .from('attendees')
    .select(
      'id, name, ticket_type_id, seat_id, display_order, ' +
      'ticket_types(name, price), seats(row_label, seat_number)'
    )
    .eq('order_id', order.id)
    .order('display_order');

  if (attErr) {
    console.error('Attendee fetch failed:', attErr);
    throw attErr;
  }

  if (!attendees || attendees.length === 0) {
    // Order with no attendees — nothing to generate
    return { tickets: [], alreadyGenerated: false };
  }

  // Fallback per-ticket price if a ticket_type happens to have a NULL price.
  // Should never happen in practice (all ticket_types have prices), but
  // defensively divide the order total evenly as a last resort.
  const total = Number(order.total) || 0;
  const fallbackPrice = total > 0 ? total / attendees.length : 0;

  // We need to determine tier per attendee to pick the right batcher. For audience
  // orders the tier is typically uniform within the order (or comes from the seat),
  // but to be safe we maintain one batcher per (tier, walkIn) combination.
  const batchers = {};
  const getBatcher = async (tierCode, isWalkIn) => {
    const key = tierCode + '|' + (isWalkIn ? 'W' : '');
    if (!batchers[key]) {
      batchers[key] = await makeTicketCodeBatcher(tierCode, isWalkIn);
    }
    return batchers[key];
  };

  const newTickets = [];
  for (let i = 0; i < attendees.length; i++) {
    const att = attendees[i];
    const typeName = (att.ticket_types && att.ticket_types.name) || order.ticket_type_name || 'Regular';
    const tierCode = tierCodeFromName(typeName);
    // Seat label is row_label + seat_number (e.g. "A" + 12 → "A12"). Only set
    // for VIP attendees whose seats were reserved at checkout.
    const seatLabel = (att.seats && att.seats.row_label != null && att.seats.seat_number != null)
      ? String(att.seats.row_label) + String(att.seats.seat_number)
      : null;

    const nextCode = await getBatcher(tierCode, !!order.is_walk_in);
    const code = nextCode(seatLabel);
    const qrToken = generateQrToken();

    // Per-ticket price: prefer the joined ticket_types.price (correct for
    // mixed-cart orders). Fall back to the averaged order total only if
    // the ticket_type somehow has no price set.
    const typePrice = (att.ticket_types && att.ticket_types.price != null)
      ? Number(att.ticket_types.price)
      : fallbackPrice;

    newTickets.push({
      ticket_code: code,
      qr_token: qrToken,
      order_id: order.id,
      attendee_name: att.name || order.buyer_name || 'Guest',
      attendee_email: order.buyer_email || null,
      attendee_phone: order.buyer_phone || null,
      ticket_type_name: typeName,
      tier_code: tierCode,
      section: sectionFromTier(tierCode),
      seat_label: seatLabel,
      price: typePrice,
      status: 'issued',
      is_walk_in: !!order.is_walk_in,
      issued_by: currentUserEmail || null,
    });
  }

  const { data: inserted, error } = await supabase
    .from('tickets')
    .insert(newTickets)
    .select();

  if (error) {
    console.error('Ticket insert failed:', error);
    throw error;
  }

  return { tickets: inserted || [], alreadyGenerated: false };
}

// Generate performer tickets for a registration. One ticket per non-dropped, paid member.
// Only callable when ALL non-dropped members are paid.
async function generateTicketsForRegistration(registration, currentUserEmail) {
  // Skip if tickets already generated for this registration
  const { data: existing } = await supabase
    .from('tickets')
    .select('id')
    .eq('registration_id', registration.id)
    .limit(1);
  if (existing && existing.length > 0) {
    return { tickets: [], alreadyGenerated: true };
  }

  // Fetch non-dropped members
  const { data: members, error: memErr } = await supabase
    .from('registration_members')
    .select('*')
    .eq('registration_id', registration.id)
    .neq('payment_status', 'dropped')
    .order('member_order');

  if (memErr) throw memErr;
  if (!members || members.length === 0) {
    throw new Error('No members on this registration');
  }

  // Block generation if anyone hasn't paid
  const unpaid = members.filter(function(m) { return m.payment_status !== 'paid'; });
  if (unpaid.length > 0) {
    throw new Error(unpaid.length + ' member(s) still unpaid. Cannot generate tickets yet.');
  }

  const newTickets = [];
  // One batcher for all performer tickets (all tier P, never walk-in)
  const nextPerformerCode = await makeTicketCodeBatcher('P', false);
  for (let i = 0; i < members.length; i++) {
    const m = members[i];
    const code = nextPerformerCode(null);
    const qrToken = generateQrToken();

    newTickets.push({
      ticket_code: code,
      qr_token: qrToken,
      registration_id: registration.id,
      registration_member_id: m.id,
      attendee_name: m.member_name,
      attendee_email: registration.leader_email || null,
      attendee_phone: registration.leader_phone || null,
      ticket_type_name: 'Participant',
      tier_code: 'P',
      section: 'Performer Area',
      group_name: registration.group_name,
      group_category: registration.category,
      price: 300,
      status: 'issued',
      is_walk_in: false,
      issued_by: currentUserEmail || null,
    });
  }

  const { data: inserted, error } = await supabase
    .from('tickets')
    .insert(newTickets)
    .select();

  if (error) {
    console.error('Performer ticket insert failed:', error);
    throw error;
  }

  // Link each member to its new ticket
  if (inserted && inserted.length > 0) {
    for (let j = 0; j < inserted.length; j++) {
      const t = inserted[j];
      if (t.registration_member_id) {
        await supabase.from('registration_members')
          .update({ ticket_id: t.id })
          .eq('id', t.registration_member_id);
      }
    }
  }

  // Mark registration as fully paid
  await supabase.from('registrations')
    .update({ status: 'paid' })
    .eq('id', registration.id);

  return { tickets: inserted || [], alreadyGenerated: false };
}


function App() {
  const [session, setSession] = useState(null);
  const [isAdmin, setIsAdmin] = useState(null);
  const [adminRecord, setAdminRecord] = useState(null);
  const [bootLoading, setBootLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(function(res) {
      setSession(res.data.session);
      setBootLoading(false);
    });
    const sub = supabase.auth.onAuthStateChange(function(_e, sess) {
      setSession(sess);
      if (!sess) { setIsAdmin(null); setAdminRecord(null); }
    });
    return function() { sub.data.subscription.unsubscribe(); };
  }, []);

  useEffect(() => {
    if (!session) return;
    setIsAdmin(null);
    const rawEmail = session.user && session.user.email;
    const email = (rawEmail || '').trim().toLowerCase();
    console.log('[Admin Check] Session email:', rawEmail, '→ normalized:', email);
    if (!email) {
      console.warn('[Admin Check] No email on session.user');
      setIsAdmin(false);
      return;
    }
    supabase.from('admins').select('*')
      .ilike('email', email).eq('is_active', true)
      .maybeSingle()
      .then(function(res) {
        console.log('[Admin Check] Query response:', res);
        if (res.error) {
          console.error('[Admin Check] Error:', res.error);
        }
        setIsAdmin(!!res.data);
        setAdminRecord(res.data);
      });
  }, [session]);

  if (bootLoading) return <BootScreen />;
  if (!session) return <LoginScreen />;
  if (isAdmin === null) return <BootScreen message="Verifying access..." />;
  if (isAdmin === false) return <AccessDeniedScreen session={session} />;
  return <Dashboard session={session} adminRecord={adminRecord} />;
}

      background: 'radial-gradient(ellipse at top, #1A0533 0%, #08020F 60%)'
    }}>
      <div className="blob blob-magenta" style={{ opacity: 0.3 }} />
      <div className="anim-slide-up" style={{
        position: 'relative', zIndex: 2,
        background: 'rgba(255, 255, 255, 0.03)', backdropFilter: 'blur(20px)',
        borderRadius: 24, padding: 40, maxWidth: 460, width: '100%',
        border: '1px solid var(--border)', textAlign: 'center'
      }}>
        <div style={{
          width: 64, height: 64, borderRadius: 18,
          background: 'var(--danger-bg)',
          color: 'var(--danger)', display: 'inline-flex',
          alignItems: 'center', justifyContent: 'center', marginBottom: 20,
          border: '1px solid rgba(255, 23, 68, 0.3)'
        }}>
          <Icon name="lock" size={28} />
        </div>
        <div className="font-display" style={{ fontSize: 24, fontWeight: 800, marginBottom: 10 }}>
          Access denied
        </div>
        <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 24, lineHeight: 1.6 }}>
          The email <strong style={{ color: 'var(--text)' }}>{session.user.email}</strong> is
          not on the admin list. Ask a super admin to add you, or check that you signed in
          with the right account.
        </div>
        <button onClick={logout} style={{
          padding: '10px 18px', background: 'rgba(255,255,255,0.05)', color: 'var(--text)',
          border: '1px solid var(--border)', borderRadius: 10, fontSize: 13, fontWeight: 600,
          cursor: 'pointer', fontFamily: 'inherit'
        }}>
          Sign out
        </button>
      </div>
    </div>
  );
}

const iconBtnStyle = {
  background: 'rgba(255, 255, 255, 0.04)',
  border: '1px solid var(--border)', borderRadius: 10,
  padding: 9, cursor: 'pointer', color: 'var(--text-muted)',
  display: 'flex', fontFamily: 'inherit', transition: 'all 0.15s'
};

function Dashboard({ session, adminRecord }) {
  const [section, setSection] = useState('orders'); // 'orders' | 'registrations'

  // ===== ORDERS STATE =====
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('awaiting_verification');
  const [search, setSearch] = useState('');
  const [selectedId, setSelectedId] = useState(null);
  const [toast, setToast] = useState(null);
  // Separate toast slot for action toasts (e.g. "Deleted. Undo?"). Stays
  // visible longer than auto-toast and includes a clickable action button.
  const [actionToast, setActionToast] = useState(null);
  const actionToastTimerRef = React.useRef(null);
  const [zoomReceipt, setZoomReceipt] = useState(null);

  // ===== REGISTRATIONS STATE =====
  const [registrations, setRegistrations] = useState([]);
  const [regLoading, setRegLoading] = useState(true);
  const [regTab, setRegTab] = useState('pending');
  const [regSearch, setRegSearch] = useState('');
  const [regCategoryFilter, setRegCategoryFilter] = useState('all');
  const [regSelectedId, setRegSelectedId] = useState(null);

  // ===== BAN REVOKE STATE =====
  const [applications, setApplications] = useState([]);
  const [appLoading, setAppLoading] = useState(true);
  const [appTab, setAppTab] = useState('pending');
  const [appSearch, setAppSearch] = useState('');
  const [appLocationFilter, setAppLocationFilter] = useState('all');
  const [appSelectedId, setAppSelectedId] = useState(null);

  // ===== FINANCE STATE =====
  const [budget, setBudget] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [financeLoading, setFinanceLoading] = useState(true);
  const [expenseCategoryFilter, setExpenseCategoryFilter] = useState('all');
  const [showExpenseModal, setShowExpenseModal] = useState(false);
  const [editingExpense, setEditingExpense] = useState(null);
  const [showBudgetModal, setShowBudgetModal] = useState(false);
  const [editingBudget, setEditingBudget] = useState(null);

  // ===== EMAIL TEMPLATES + APP SETTINGS =====
  const [emailTemplates, setEmailTemplates] = useState({});
  const [appSettings, setAppSettings] = useState({});
  const [showTemplateEditor, setShowTemplateEditor] = useState(false);

  // ===== BULK SELECTION (Registrations) =====
  const [bulkSelected, setBulkSelected] = useState({});

  // ===== TICKETS STATE =====
  const [tickets, setTickets] = useState([]);
  const [ticketsLoading, setTicketsLoading] = useState(true);
  const [ticketTab, setTicketTab] = useState('issued');           // issued/used/cancelled/all
  const [ticketTierFilter, setTicketTierFilter] = useState('all'); // all/V/R/P
  const [ticketSourceFilter, setTicketSourceFilter] = useState('all'); // all/order/registration/walkin
  const [ticketSearch, setTicketSearch] = useState('');

  // ===== SEAT MAP STATE =====
  // The seats table is the source of truth for assigned-seat tier (VIP).
  // We pair seats with order_seats (reservations) and tickets (confirmed)
  // to derive each seat's state for the Seat Map tab.
  const [seats, setSeats] = useState([]);
  const [orderSeats, setOrderSeats] = useState([]);  // [{ seat_id, order_id, orders: { status, buyer_name, ... } }]
  const [seatSelectedId, setSeatSelectedId] = useState(null);
  const [ticketSelectedId, setTicketSelectedId] = useState(null);
  const [showTransferModal, setShowTransferModal] = useState(null); // null or ticket object
  const [showHelp, setShowHelp] = useState(false); // Help modal for SOPs / quick reference

  // ===== ATTENDEES-FOR-LIST STATE =====
  // For the Orders list, we need per-order tier breakdown EVEN before
  // tickets are generated (i.e. for awaiting_verification orders that
  // contain a mixed cart like VIP + Regular). Tickets only exist after
  // confirmation, so before that we derive the breakdown from attendees.
  // This is a light fetch (id, order_id, ticket_types(name) only).
  const [attendeesByOrder, setAttendeesByOrder] = useState({});

  // ===== PERFORMER PAYMENTS STATE (global, for Finance + count badges) =====
  const [performerPayments, setPerformerPayments] = useState([]);

  const showToast = useCallback((msg, kind = 'success') => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 3500);
  }, []);

  // Action toast — visible for a longer window with a clickable button.
  // Used for "Deleted X. Undo?" type interactions.
  const showActionToast = useCallback((msg, actionLabel, onAction, durationMs = 6000) => {
    if (actionToastTimerRef.current) clearTimeout(actionToastTimerRef.current);
    setActionToast({ msg, actionLabel, onAction });
    actionToastTimerRef.current = setTimeout(() => {
      setActionToast(null);
      actionToastTimerRef.current = null;
    }, durationMs);
  }, []);

  const dismissActionToast = useCallback(() => {
    if (actionToastTimerRef.current) clearTimeout(actionToastTimerRef.current);
    actionToastTimerRef.current = null;
    setActionToast(null);
  }, []);

  const fetchOrders = useCallback(async () => {
    const res = await supabase.from('orders_admin_view').select('*')
      .order('receipt_uploaded_at', { ascending: true, nullsFirst: false });
    if (res.error) {
      console.error(res.error);
      showToast('Could not load orders', 'warning');
    } else {
      setOrders(res.data || []);
    }
    setLoading(false);
  }, [showToast]);

  // Fetch attendees for all orders so the Orders list can show mixed-cart
  // tier breakdown BEFORE tickets are generated. Light query — only ids
  // and the joined ticket_type name (no PII like email/phone).
  const fetchAttendeesByOrder = useCallback(async () => {
    const res = await supabase.from('attendees')
      .select('id, order_id, ticket_types(name)');
    if (res.error) {
      console.error('attendees-list fetch error:', res.error);
      return;
    }
    const map = {};
    (res.data || []).forEach((a) => {
      if (!a.order_id) return;
      const typeName = (a.ticket_types && a.ticket_types.name) || 'Unknown';
      if (!map[a.order_id]) map[a.order_id] = {};
      map[a.order_id][typeName] = (map[a.order_id][typeName] || 0) + 1;
    });
    setAttendeesByOrder(map);
  }, []);

  useEffect(() => {
    fetchOrders();
    fetchAttendeesByOrder();
    const channel = supabase.channel('orders-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' },
          () => {
            fetchOrders();
            fetchAttendeesByOrder();
          })
      .subscribe();
    return function() { supabase.removeChannel(channel); };
  }, [fetchOrders, fetchAttendeesByOrder]);

  const filtered = useMemo(() => {
    return orders
      .filter((o) => o.status === tab)
      .filter((o) => {
        if (!search) return true;
        const q = search.toLowerCase();
        return (
          (o.buyer_name || '').toLowerCase().includes(q) ||
          (o.order_number || '').toLowerCase().includes(q) ||
          (o.buyer_email || '').toLowerCase().includes(q) ||
          (o.reference_number || '').toLowerCase().includes(q)
        );
      });
  }, [orders, tab, search]);

  const counts = useMemo(() => {
    const c = { awaiting_verification: 0, confirmed: 0, rejected: 0, pending_payment: 0 };
    orders.forEach((o) => { if (c[o.status] !== undefined) c[o.status]++; });
    return c;
  }, [orders]);

  const pendingRevenue = useMemo(() =>
    orders.filter((o) => o.status === 'awaiting_verification')
          .reduce((s, o) => s + Number(o.total || 0), 0), [orders]);
  const confirmedRevenue = useMemo(() =>
    orders.filter((o) => o.status === 'confirmed')
          .reduce((s, o) => s + Number(o.total || 0), 0), [orders]);

  const selected = orders.find((o) => o.id === selectedId);

  const handleConfirm = useCallback(async (id) => {
    const order = orders.find((o) => o.id === id);
    const res = await supabase.from('orders').update({
      status: 'confirmed',
      confirmed_at: new Date().toISOString(),
    }).eq('id', id);
    if (res.error) { showToast('Could not confirm: ' + res.error.message, 'warning'); return; }
    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'confirmed_order', resource_type: 'order', resource_id: id,
    });

    // Auto-generate tickets for this order
    if (order) {
      try {
        // Retry up to 3 times on unique-code conflict (concurrent confirms).
        let result = null;
        let lastErr = null;
        for (let attempt = 0; attempt < 3; attempt++) {
          try {
            result = await generateTicketsForOrder(order, session.user.email);
            break;
          } catch (e) {
            lastErr = e;
            const isUnique = (e && (e.code === '23505' ||
              (e.message || '').toLowerCase().includes('duplicate') ||
              (e.message || '').toLowerCase().includes('ticket_code')));
            if (!isUnique) throw e;
            await new Promise((r) => setTimeout(r, 80 * (attempt + 1)));
          }
        }
        if (!result) throw lastErr || new Error('Ticket gen failed after retries');

        if (!result.alreadyGenerated) {
          await supabase.from('audit_log').insert({
            actor_email: session.user.email,
            action: 'tickets_generated', resource_type: 'order', resource_id: id,
            details: { count: result.tickets.length },
          });
          showToast('Confirmed + ' + result.tickets.length + ' tickets generated');
        } else {
          showToast('Order confirmed (tickets already exist)');
        }
      } catch (e) {
        console.error('Ticket gen failed:', e);
        showToast('Confirmed, but ticket generation failed: ' + e.message, 'warning');
      }
    } else {
      showToast('Order confirmed');
    }

    const idx = filtered.findIndex((x) => x.id === id);
    const next = filtered[idx + 1] || filtered[idx - 1];
    setSelectedId(next ? next.id : null);
  }, [orders, filtered, showToast, session]);

  const handleReject = useCallback(async (id, reason) => {
    const res = await supabase.from('orders').update({
      status: 'rejected',
      rejected_at: new Date().toISOString(),
      rejection_reason: reason || null,
    }).eq('id', id);
    if (res.error) { showToast('Could not reject: ' + res.error.message, 'warning'); return; }
    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'rejected_order', resource_type: 'order', resource_id: id,
      details: { reason }
    });
    showToast('Order rejected — buyer notified', 'warning');
    const idx = filtered.findIndex((x) => x.id === id);
    const next = filtered[idx + 1] || filtered[idx - 1];
    setSelectedId(next ? next.id : null);
  }, [filtered, showToast, session]);

  const handleVoidOrder = useCallback(async (id, reason) => {
    const order = orders.find((o) => o.id === id);
    if (!order) return;

    // Invalidate all still-active tickets for this order
    const { data: activeTickets } = await supabase
      .from('tickets')
      .select('id')
      .eq('order_id', id)
      .eq('status', 'issued');

    if (activeTickets && activeTickets.length > 0) {
      const now = new Date().toISOString();
      await supabase.from('tickets').update({
        status: 'cancelled',
        cancelled_at: now,
        cancelled_by: session.user.email,
        cancellation_reason: 'Order voided: ' + (reason || 'admin cleanup'),
      }).in('id', activeTickets.map((t) => t.id));
    }

    // Void the order
    const upd = await supabase.from('orders').update({
      status: 'cancelled',
      cancelled_at: new Date().toISOString(),
      cancelled_by: session.user.email,
      cancellation_reason: reason || 'Admin void',
    }).eq('id', id);

    if (upd.error) {
      showToast('Void failed: ' + upd.error.message, 'warning');
      return;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'order_voided',
      resource_type: 'order',
      resource_id: id,
      details: { reason: reason || null, invalidatedTickets: activeTickets ? activeTickets.length : 0 },
    });

    showToast('Order voided' + (activeTickets && activeTickets.length > 0 ? ' (' + activeTickets.length + ' tickets invalidated)' : ''));
    fetchOrders();
    fetchTickets();
    setSelectedId(null);
  }, [orders, session, showToast, fetchOrders, fetchTickets]);

  const fetchRegistrations = useCallback(async () => {
    const res = await supabase.from('registrations').select('*')
      .order('created_at', { ascending: false });
    if (res.error) {
      console.error(res.error);
      showToast('Could not load registrations', 'warning');
    } else {
      setRegistrations(res.data || []);
    }
    setRegLoading(false);
  }, [showToast]);

  useEffect(() => {
    fetchRegistrations();
    const channel = supabase.channel('registrations-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'registrations' },
          () => fetchRegistrations())
      .subscribe();
    return function() { supabase.removeChannel(channel); };
  }, [fetchRegistrations]);

  const filteredRegs = useMemo(() => {
    return registrations
      .filter((r) => r.status === regTab)
      .filter((r) => regCategoryFilter === 'all' || r.category === regCategoryFilter)
      .filter((r) => {
        if (!regSearch) return true;
        const q = regSearch.toLowerCase();
        return (
          (r.group_name || '').toLowerCase().includes(q) ||
          (r.registration_code || '').toLowerCase().includes(q) ||
          (r.leader_name || '').toLowerCase().includes(q) ||
          (r.leader_email || '').toLowerCase().includes(q) ||
          (r.leader_phone || '').toLowerCase().includes(q) ||
          (r.affiliated_entertainment || '').toLowerCase().includes(q) ||
          (r.song_or_idol || '').toLowerCase().includes(q)
        );
      });
  }, [registrations, regTab, regCategoryFilter, regSearch]);

  const regCounts = useMemo(() => {
    const c = { pending: 0, confirmed: 0, paid: 0, rejected: 0, withdrawn: 0 };
    registrations.forEach((r) => { if (c[r.status] !== undefined) c[r.status]++; });
    return c;
  }, [registrations]);

  // Groups that are all-paid but tickets haven't been issued yet.
  // Surfaces in a stat card so admin doesn't forget to click Generate Tickets.
  const readyToIssueCount = useMemo(() => {
    const groupsWithTickets = new Set();
    tickets.forEach((t) => { if (t.registration_id) groupsWithTickets.add(t.registration_id); });
    return registrations.filter((r) =>
      r.status === 'paid' && !groupsWithTickets.has(r.id)
    ).length;
  }, [registrations, tickets]);

  const regCategoryCounts = useMemo(() => {
    const c = { 'open-stage': 0, 'battle': 0, 'fanchant': 0, 'fanbooth': 0 };
    registrations.forEach((r) => { if (c[r.category] !== undefined) c[r.category]++; });
    return c;
  }, [registrations]);

  const selectedReg = registrations.find((r) => r.id === regSelectedId);

  const updateRegStatus = useCallback(async (id, newStatus, adminNotes) => {
    const updates = { status: newStatus };
    if (newStatus === 'confirmed') {
      updates.confirmed_at = new Date().toISOString();
      updates.confirmed_by = session.user.email;
    }
    if (adminNotes !== undefined && adminNotes !== null) {
      updates.admin_notes = adminNotes;
    }
    const res = await supabase.from('registrations').update(updates).eq('id', id);
    if (res.error) { showToast('Could not update: ' + res.error.message, 'warning'); return; }
    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'registration_' + newStatus,
      resource_type: 'registration', resource_id: id,
    });
    showToast('Registration marked ' + newStatus);
    fetchRegistrations();
  }, [fetchRegistrations, showToast, session]);

  const saveRegNotes = useCallback(async (id, adminNotes) => {
    const res = await supabase.from('registrations').update({ admin_notes: adminNotes }).eq('id', id);
    if (res.error) { showToast('Could not save notes: ' + res.error.message, 'warning'); return; }
    showToast('Notes saved');
    fetchRegistrations();
  }, [fetchRegistrations, showToast]);

  const markConfirmationSent = useCallback(async (id) => {
    const res = await supabase.from('registrations').update({
      confirmation_sent_at: new Date().toISOString(),
      confirmation_sent_by: session.user.email,
    }).eq('id', id);
    if (res.error) { showToast('Could not mark sent: ' + res.error.message, 'warning'); return; }
    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'registration_confirmation_sent',
      resource_type: 'registration', resource_id: id,
    });
    showToast('Confirmation marked sent');
    fetchRegistrations();
  }, [fetchRegistrations, showToast, session]);

  const unmarkConfirmationSent = useCallback(async (id) => {
    const res = await supabase.from('registrations').update({
      confirmation_sent_at: null,
      confirmation_sent_by: null,
    }).eq('id', id);
    if (res.error) { showToast('Could not unmark: ' + res.error.message, 'warning'); return; }
    showToast('Confirmation unmarked');
    fetchRegistrations();
  }, [fetchRegistrations, showToast]);

  const exportRegCSV = useCallback(() => {
    const headers = ['Submitted', 'Category', 'Group Name', 'Entertainment', 'Leader Name',
                     'Phone', 'Email', 'Member Count', 'Member List', 'Song/Idol',
                     'Status', 'Notes', 'Admin Notes'];
    const escape = (val) => '"' + String(val == null ? '' : val).replace(/"/g, '""').replace(/\n/g, ' / ') + '"';
    const rows = filteredRegs.map((r) => [
      r.created_at ? new Date(r.created_at).toISOString().slice(0, 19).replace('T', ' ') : '',
      CATEGORY_LABELS[r.category] || r.category,
      r.group_name,
      r.affiliated_entertainment || '',
      r.leader_name,
      r.leader_phone || '',
      r.leader_email || '',
      r.member_count || '',
      r.member_list || '',
      r.song_or_idol || '',
      r.status,
      r.notes || '',
      r.admin_notes || '',
    ].map(escape).join(','));
    const csv = [headers.map(escape).join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kph-registrations-' + regTab + '-' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }, [filteredRegs, regTab]);

  // ===== BAN REVOKE FETCH + REALTIME =====
  const fetchApplications = useCallback(async () => {
    const res = await supabase.from('ban_revoke_applications').select('*')
      .order('created_at', { ascending: false });
    if (res.error) {
      console.error(res.error);
      showToast('Could not load applications', 'warning');
    } else {
      setApplications(res.data || []);
    }
    setAppLoading(false);
  }, [showToast]);

  useEffect(() => {
    fetchApplications();
    const channel = supabase.channel('ban-revoke-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'ban_revoke_applications' },
          () => fetchApplications())
      .subscribe();
    return function() { supabase.removeChannel(channel); };
  }, [fetchApplications]);

  const filteredApps = useMemo(() => {
    return applications
      .filter((a) => a.status === appTab)
      .filter((a) => appLocationFilter === 'all' || a.location === appLocationFilter)
      .filter((a) => {
        if (!appSearch) return true;
        const q = appSearch.toLowerCase();
        return (
          (a.full_name || '').toLowerCase().includes(q) ||
          (a.contact_email || '').toLowerCase().includes(q) ||
          (a.contact_phone || '').toLowerCase().includes(q) ||
          (a.statement || '').toLowerCase().includes(q)
        );
      });
  }, [applications, appTab, appLocationFilter, appSearch]);

  const appCounts = useMemo(() => {
    const c = { pending: 0, meeting_scheduled: 0, approved: 0, denied: 0 };
    applications.forEach((a) => { if (c[a.status] !== undefined) c[a.status]++; });
    return c;
  }, [applications]);

  const appLocationCounts = useMemo(() => {
    const c = { davao: 0, remote: 0 };
    applications.forEach((a) => { if (c[a.location] !== undefined) c[a.location]++; });
    return c;
  }, [applications]);

  const selectedApp = applications.find((a) => a.id === appSelectedId);

  const updateAppStatus = useCallback(async (id, newStatus, adminNotes) => {
    const updates = { status: newStatus };
    if (newStatus === 'approved' || newStatus === 'denied') {
      updates.reviewed_at = new Date().toISOString();
      updates.reviewed_by = session.user.email;
    }
    if (adminNotes !== undefined && adminNotes !== null) {
      updates.admin_notes = adminNotes;
    }
    const res = await supabase.from('ban_revoke_applications').update(updates).eq('id', id);
    if (res.error) { showToast('Could not update: ' + res.error.message, 'warning'); return; }
    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'ban_revoke_' + newStatus,
      resource_type: 'ban_revoke_application', resource_id: id,
    });
    showToast('Application marked ' + newStatus.replace('_', ' '));
    fetchApplications();
  }, [fetchApplications, showToast, session]);

  const saveAppNotes = useCallback(async (id, adminNotes) => {
    const res = await supabase.from('ban_revoke_applications').update({ admin_notes: adminNotes }).eq('id', id);
    if (res.error) { showToast('Could not save notes: ' + res.error.message, 'warning'); return; }
    showToast('Notes saved');
    fetchApplications();
  }, [fetchApplications, showToast]);

  const exportAppCSV = useCallback(() => {
    const headers = ['Submitted', 'Full Name', 'Email', 'Phone', 'Date of Birth',
                     'Previous Ban Reason', 'Statement', 'Location',
                     'Meeting Date', 'Meeting Time', 'Status', 'Admin Notes'];
    const escape = (val) => '"' + String(val == null ? '' : val).replace(/"/g, '""').replace(/\n/g, ' / ') + '"';
    const rows = filteredApps.map((a) => [
      a.created_at ? new Date(a.created_at).toISOString().slice(0, 19).replace('T', ' ') : '',
      a.full_name,
      a.contact_email,
      a.contact_phone || '',
      a.date_of_birth || '',
      a.previous_ban_reason || '',
      a.statement || '',

  const deleteBudgetWithUndo = useCallback(async (budgetRow) => {

    return {

  // Tier inventory: capacity, sold, remaining, revenue per tier.

  // Revenue = sum of ticket.price for those same active tickets.
  // Caps are hardcoded per Kyla's decision: 200 VIP, 300 Regular.
  // Participant has no cap (group-based, capacity managed by category limits).
  const TIER_CAPS = { V: 140, R: 300 };
  const tierInventory = useMemo(() => {
    const isActive = (t) => t.status !== 'cancelled';
    const isDisplayed = (t) => !t.reissued_to_ticket_id;
    const sumActive = (tierCode) => tickets
      .filter((t) => t.tier_code === tierCode && isActive(t) && isDisplayed(t))
      .reduce((s, t) => s + Number(t.price || 0), 0);
    const countActive = (tierCode) => tickets
      .filter((t) => t.tier_code === tierCode && isActive(t) && isDisplayed(t))
      .length;
    return {
      V: {
        cap: TIER_CAPS.V,
        sold: countActive('V'),
        remaining: Math.max(0, TIER_CAPS.V - countActive('V')),
        revenue: sumActive('V'),
      },
      R: {
        cap: TIER_CAPS.R,
        sold: countActive('R'),
        remaining: Math.max(0, TIER_CAPS.R - countActive('R')),
        revenue: sumActive('R'),
      },
      P: {
        // Participant: no hard cap. Show sold + revenue only.
        cap: null,
        sold: countActive('P'),
        remaining: null,
        revenue: sumActive('P'),
      },
    };
  }, [tickets]);

  // ===== SEAT MAP — derive per-seat state =====
  // Each seat is one of:
  //   - empty: no reservation, no ticket
  //   - reserved: order_seats row exists where order.status in (pending_payment, awaiting_verification)
  //   - confirmed: a ticket exists for this seat_label (i.e. order was confirmed, ticket issued)
  // Notes:
  //   - We key tickets to seats by seat_label string (e.g. "A14"), since the
  //     ticket row stores seat_label as text and may have a stale seat_id if the
  //     seats table is re-seeded. Label is the durable identifier.
  //   - Cancelled tickets and Path B old tickets are excluded.
  const seatStateMap = useMemo(() => {
    const map = {}; // seat_id -> { state, ticket?, order?, seat_label }

    // First, build label -> active ticket lookup (so we can match cancelled separately)
    const labelToActiveTicket = {};
    (tickets || []).forEach((t) => {
      if (t.status === 'cancelled' || t.reissued_to_ticket_id) return;
      if (!t.seat_label) return;
      labelToActiveTicket[t.seat_label] = t;
    });

    // Build seat_id -> active order_seats reservation
    const seatIdToReservation = {};
    (orderSeats || []).forEach((os) => {
      if (!os.seat_id || !os.orders) return;
      const orderStatus = os.orders.status;
      // Reserved = order is still in-flight (pre-confirmation)
      if (orderStatus === 'pending_payment' || orderStatus === 'awaiting_verification') {
        seatIdToReservation[os.seat_id] = os;
      }
    });

    (seats || []).forEach((s) => {
      const label = s.row_label + s.seat_number;
      const ticket = labelToActiveTicket[label];
      const reservation = seatIdToReservation[s.id];
      let state = 'empty';
      if (ticket) state = 'confirmed';
      else if (reservation) state = 'reserved';
      map[s.id] = { state, ticket, reservation, seat_label: label, seat: s };
    });
    return map;
  }, [seats, orderSeats, tickets]);

  const seatMapCounts = useMemo(() => {
    let confirmed = 0;
    let reserved = 0;
    let empty = 0;
    Object.values(seatStateMap).forEach((v) => {
      if (v.state === 'confirmed') confirmed++;
      else if (v.state === 'reserved') reserved++;
      else empty++;
    });
    return {
      confirmed,
      reserved,
      empty,
      // Cap comes from seats table count; falls back to VIP tier cap if seats not loaded yet.
      cap: seats.length || 140,
    };
  }, [seatStateMap, seats]);

  // Active counts for navigation pills.
  // Tickets: hide invalidated + Path B old.
  // Orders: standard "live" states.
  const activeCounts = useMemo(() => {
    return {
      activeOrders: orders.filter(
        (o) => ['pending_payment', 'awaiting_verification', 'confirmed'].includes(o.status)
      ).length,
      activeTickets: tickets.filter(
        (t) => t.status !== 'cancelled' && !t.reissued_to_ticket_id
      ).length,

  // Dispute items: cancelled tickets (excluding Path B old) + rejected orders + cancelled orders
  const disputeItems = useMemo(() => {
    const items = [];

    // Real cancellations (NOT Path B reissues — those are tracked via ticket_transfers)
    tickets
      .filter((t) => t.status === 'cancelled' && !t.reissued_to_ticket_id)
      .forEach((t) => {
        items.push({
          id: 'tc-' + t.id,
          type: 'ticket_cancelled',
          date: t.cancelled_at,
          ticket_code: t.ticket_code,
          attendee_name: t.attendee_name,
          tier_code: t.tier_code,
          amount: Number(t.price) || 0,
          reason: t.cancellation_reason,
          actor: t.cancelled_by,
          ticket_id: t.id,
        });
      });

    // Rejected orders (admin rejected at verification stage — never had tickets)
    orders
      .filter((o) => o.status === 'rejected')
      .forEach((o) => {
        items.push({
          id: 'or-' + o.id,
          type: 'order_rejected',
          date: o.rejected_at,
          order_ref: '#' + o.id.slice(0, 8).toUpperCase(),
          buyer_name: o.buyer_name,
          ticket_type_name: o.ticket_type_name,
          amount: Number(o.amount) || 0,
          reason: o.rejection_reason,
          actor: null,
          order_id: o.id,
        });
      });

    return items.sort((a, b) => {
      const ad = a.date ? new Date(a.date).getTime() : 0;
      const bd = b.date ? new Date(b.date).getTime() : 0;
      return bd - ad;
    });
  }, [tickets, orders]);

  const selectedTicket = useMemo(
    () => tickets.find((t) => t.id === ticketSelectedId) || null,
    [tickets, ticketSelectedId]
  );

  // ===== TICKET ACTIONS =====
  const handleGenerateTicketsForOrder = useCallback(async (order) => {
    try {
      // Retry on unique-code conflict (concurrent generation race)
      let result = null;
      let lastErr = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          result = await generateTicketsForOrder(order, session.user.email);
          break;
        } catch (e) {
          lastErr = e;
          const isUnique = (e && (e.code === '23505' ||
            (e.message || '').toLowerCase().includes('duplicate') ||
            (e.message || '').toLowerCase().includes('ticket_code')));
          if (!isUnique) throw e;
          await new Promise((r) => setTimeout(r, 80 * (attempt + 1)));
        }
      }
      if (!result) throw lastErr || new Error('Generation failed after retries');

      if (result.alreadyGenerated) {
        showToast('Tickets already exist for this order');
      } else {
        showToast('Generated ' + result.tickets.length + ' tickets');
        await supabase.from('audit_log').insert({
          actor_email: session.user.email,
          action: 'tickets_generated',
          resource_type: 'order',
          resource_id: order.id,
          details: { count: result.tickets.length },
        });
      }
      fetchTickets();
    } catch (e) {
      showToast('Generation failed: ' + e.message, 'warning');
    }
  }, [session, showToast, fetchTickets]);

  const handleDownloadTicketsPDF = useCallback(async (order, orderTickets) => {
    try {
      // For performer tickets, look up the original registrant on the
      // member row so the PDF can show "Original registrant: disol" when
      // the ticket has been Path A renamed.
      const memberIds = orderTickets
        .map((t) => t.registration_member_id)
        .filter(Boolean);
      let memberMap = {};
      if (memberIds.length > 0) {
        const { data: mems } = await supabase
          .from('registration_members')
          .select('id, member_name')
          .in('id', memberIds);
        (mems || []).forEach((m) => { memberMap[m.id] = m.member_name; });
      }
      const enriched = orderTickets.map((t) => {
        const origName = memberMap[t.registration_member_id];
        if (origName && origName !== t.attendee_name) {
          return Object.assign({}, t, { _originalRegistrant: origName });
        }
        return t;
      });

      const doc = await generateTicketsPDF(enriched, order ? order.id.slice(0, 8).toUpperCase() : null);
      const filename = 'KPH-tickets-' + (order ? order.id.slice(0, 8) : 'batch') + '.pdf';
      doc.save(filename);
      showToast('PDF downloaded — attach to email next');
    } catch (e) {
      showToast('PDF generation failed: ' + e.message, 'warning');
    }
  }, [showToast]);

  const handleMarkTicketsSent = useCallback(async (orderId) => {
    const res = await supabase.from('orders').update({
      tickets_pdf_sent_at: new Date().toISOString(),
      tickets_pdf_sent_by: session.user.email,
    }).eq('id', orderId);
    if (res.error) {
      showToast('Could not mark sent: ' + res.error.message, 'warning');
      return;
    }
    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'tickets_pdf_sent',
      resource_type: 'order',
      resource_id: orderId,
    });
    showToast('Tickets marked as sent');
    fetchOrders();
  }, [session, showToast, fetchOrders]);

  const handleTransferTicket = useCallback(async (ticketId, transferType, newName, newEmail, reason) => {
    const oldTicket = tickets.find((t) => t.id === ticketId);
    if (!oldTicket) return;

    if (transferType === 'name_edit') {
      // Path A: just update the name + email
      const { error } = await supabase
        .from('tickets')
        .update({ attendee_name: newName, attendee_email: newEmail || oldTicket.attendee_email })
        .eq('id', ticketId);
      if (error) {
        showToast('Transfer failed: ' + error.message, 'warning');
        return;
      }
      await supabase.from('ticket_transfers').insert({
        ticket_id: ticketId,
        old_attendee_name: oldTicket.attendee_name,
        new_attendee_name: newName,
        old_attendee_email: oldTicket.attendee_email,
        new_attendee_email: newEmail || oldTicket.attendee_email,
        transfer_type: 'name_edit',
        reason: reason,
        transferred_by: session.user.email,
      });
      showToast('Name updated. QR code stays the same.');
    } else {
      // Path B: cancel old, create new with new QR
      const newQrToken = generateQrToken();
      const oldCodeParts = oldTicket.ticket_code.split('-');
      // For reissue, keep the same code structure but mark cancelled
      // and issue new with R-suffix or fresh sequence
      const newCode = await generateTicketCode(oldTicket.tier_code, oldTicket.is_walk_in, oldTicket.seat_label);
      // If same code came back (VIP seat-based), append -R
      const finalNewCode = newCode === oldTicket.ticket_code ? newCode + '-R' : newCode;

      const { data: newTicket, error: insertErr } = await supabase
        .from('tickets')
        .insert({
          ticket_code: finalNewCode,
          qr_token: newQrToken,
          order_id: oldTicket.order_id,
          registration_id: oldTicket.registration_id,
          attendee_name: newName,
          attendee_email: newEmail || oldTicket.attendee_email,
          ticket_type_name: oldTicket.ticket_type_name,
          tier_code: oldTicket.tier_code,
          section: oldTicket.section,
          seat_label: oldTicket.seat_label,
          group_name: oldTicket.group_name,
          group_category: oldTicket.group_category,
          price: oldTicket.price || 0,
          status: 'issued',
          is_walk_in: oldTicket.is_walk_in,
          issued_by: session.user.email,
        })
        .select()
        .single();

      if (insertErr) {
        showToast('Reissue failed: ' + insertErr.message, 'warning');
        return;
      }

      await supabase.from('tickets').update({
        status: 'cancelled',
        cancelled_at: new Date().toISOString(),
        cancelled_by: session.user.email,
        cancellation_reason: 'Transferred to ' + newName,
        reissued_to_ticket_id: newTicket.id,
      }).eq('id', ticketId);

      await supabase.from('ticket_transfers').insert({
        ticket_id: ticketId,
        old_attendee_name: oldTicket.attendee_name,
        new_attendee_name: newName,
        old_attendee_email: oldTicket.attendee_email,
        new_attendee_email: newEmail || oldTicket.attendee_email,
        transfer_type: 'reissue',
        old_ticket_code: oldTicket.ticket_code,
        new_ticket_code: finalNewCode,
        reason: reason,
        transferred_by: session.user.email,
      });

      showToast('Reissued. Old QR is now dead — download new PDF.');
    }
    fetchTickets();
  }, [tickets, session, showToast, fetchTickets]);

  // Invalidate a ticket (admin-side cleanup — test data, fraud, errors).
  // Does NOT cascade to order status — orders stay clean. Finance auto-corrects
  // since gross income is computed from active tickets only.
  const handleCancelTicket = useCallback(async (ticketId, reason) => {
    const res = await supabase.from('tickets').update({
      status: 'cancelled',
      cancelled_at: new Date().toISOString(),
      cancelled_by: session.user.email,
      cancellation_reason: reason || 'Admin invalidation',
    }).eq('id', ticketId);
    if (res.error) {
      showToast('Invalidate failed: ' + res.error.message, 'warning');
      return;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'ticket_invalidated',
      resource_type: 'ticket',
      resource_id: ticketId,
      details: { reason: reason || null },
    });

    showToast('Ticket invalidated');
    fetchTickets();
  }, [session, showToast, fetchTickets]);

  // ===== PERFORMER MEMBER + PAYMENT HANDLERS =====

  // Helper: after any change to a registration's member payment states or roster,
  // re-evaluate whether the registration status should auto-flip.
  //   allPaid && status in (pending, confirmed)        → 'paid'
  //   !allPaid && status === 'paid' && no tickets yet  → revert to 'confirmed'
  // Uses fresh DB reads (not stale local state) to avoid race conditions.
  const maybeAutoFlipRegistrationStatus = useCallback(async (registrationId) => {
    if (!registrationId) return;

    const { data: mems } = await supabase
      .from('registration_members')
      .select('payment_status')
      .eq('registration_id', registrationId);
    if (!mems || mems.length === 0) return;

    const nonDropped = mems.filter((m) => m.payment_status !== 'dropped');
    const allPaid = nonDropped.length > 0 &&
                    nonDropped.every((m) => m.payment_status === 'paid');

    const { data: reg } = await supabase
      .from('registrations')
      .select('status')
      .eq('id', registrationId)
      .single();
    if (!reg) return;

    if (allPaid && (reg.status === 'pending' || reg.status === 'confirmed')) {
      const { error } = await supabase.from('registrations')
        .update({ status: 'paid' })
        .eq('id', registrationId);
      if (!error) {
        await supabase.from('audit_log').insert({
          actor_email: session.user.email,
          action: 'registration_auto_marked_paid',
          resource_type: 'registration',
          resource_id: registrationId,
          details: { trigger: 'all_members_paid' },
        });
        fetchRegistrations();
      }
    } else if (!allPaid && reg.status === 'paid') {
      // Only revert if no tickets have been issued yet.
      const { count } = await supabase
        .from('tickets')
        .select('id', { count: 'exact', head: true })
        .eq('registration_id', registrationId);
      if (!count || count === 0) {
        const { error } = await supabase.from('registrations')
          .update({ status: 'confirmed' })
          .eq('id', registrationId);
        if (!error) {
          await supabase.from('audit_log').insert({
            actor_email: session.user.email,
            action: 'registration_auto_reverted_to_confirmed',
            resource_type: 'registration',
            resource_id: registrationId,
            details: { trigger: 'member_changed_unpaid' },
          });
          fetchRegistrations();
        }
      }
    }
  }, [session, fetchRegistrations]);

  const handleVerifyPayment = useCallback(async (payment) => {
    // Mark payment as verified AND mark its covered members as paid
    const now = new Date().toISOString();
    const upd = await supabase.from('registration_payments').update({
      verified_at: now,
      verified_by: session.user.email,
    }).eq('id', payment.id);
    if (upd.error) {
      showToast('Verify failed: ' + upd.error.message, 'warning');
      return false;
    }

    const memberIds = payment.members_covered || [];
    if (memberIds.length > 0) {
      await supabase.from('registration_members').update({
        payment_status: 'paid',
        paid_at: now,
        payment_id: payment.id,
      }).in('id', memberIds);
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'payment_verified',
      resource_type: 'registration_payment',
      resource_id: payment.id,
      details: { amount: payment.amount, members_count: memberIds.length },
    });

    showToast('Payment verified, ' + memberIds.length + ' member(s) marked paid');
    fetchRegistrations();
    await maybeAutoFlipRegistrationStatus(payment.registration_id);
    return true;
  }, [session, showToast, fetchRegistrations, maybeAutoFlipRegistrationStatus]);

  const handleDropMember = useCallback(async (member, reason) => {
    const upd = await supabase.from('registration_members').update({
      payment_status: 'dropped',
      dropped_at: new Date().toISOString(),
      dropped_reason: reason || 'Dropped by admin',
    }).eq('id', member.id);
    if (upd.error) {
      showToast('Drop failed: ' + upd.error.message, 'warning');
      return false;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'member_dropped',
      resource_type: 'registration_member',
      resource_id: member.id,
      details: { name: member.member_name, reason: reason || null },
    });

    showToast(member.member_name + ' dropped');
    fetchRegistrations();
    await maybeAutoFlipRegistrationStatus(member.registration_id);
    return true;
  }, [session, showToast, fetchRegistrations, maybeAutoFlipRegistrationStatus]);

  const handleAddSubstitute = useCallback(async (registrationId, memberName, memberAge, inheritFromMember) => {
    // Create new member, optionally inheriting payment status from dropped member
    const newMember = {
      registration_id: registrationId,
      member_name: memberName,
      member_age: memberAge || null,
      payment_status: inheritFromMember ? 'paid' : 'unpaid',
      paid_at: inheritFromMember ? new Date().toISOString() : null,
      payment_id: inheritFromMember ? inheritFromMember.payment_id : null,
      notes: inheritFromMember ? 'Substitute for ' + inheritFromMember.member_name : null,
      added_by: session.user.email,
    };

    // Determine member_order — append after existing members
    const { data: existing } = await supabase
      .from('registration_members')
      .select('member_order')
      .eq('registration_id', registrationId)
      .order('member_order', { ascending: false })
      .limit(1);
    const nextOrder = (existing && existing[0]) ? (existing[0].member_order || 0) + 1 : 1;
    newMember.member_order = nextOrder;

    const ins = await supabase.from('registration_members').insert(newMember).select().single();
    if (ins.error) {
      showToast('Add failed: ' + ins.error.message, 'warning');
      return false;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'member_added',
      resource_type: 'registration_member',
      resource_id: ins.data.id,
      details: { name: memberName, inherited_from: inheritFromMember ? inheritFromMember.id : null },
    });

    showToast(memberName + ' added' + (inheritFromMember ? ' as substitute' : ''));
    fetchRegistrations();
    await maybeAutoFlipRegistrationStatus(registrationId);
    return true;
  }, [session, showToast, fetchRegistrations, maybeAutoFlipRegistrationStatus]);

  // Rename a member in place (member can't participate; substitute takes their slot).
  // Only allowed before tickets are issued — after issuance, admin must use the
  // ticket-transfer flow instead (which renames the issued ticket, not the member row).
  const handleRenameMember = useCallback(async (member, newName, newAge) => {
    // Check if any tickets exist for this registration
    const { count } = await supabase
      .from('tickets')
      .select('id', { count: 'exact', head: true })
      .eq('registration_id', member.registration_id);
    if (count && count > 0) {
      showToast('Tickets already issued — use Ticket Transfer (Path A) instead', 'warning');
      return false;
    }

    const trimmedName = (newName || '').trim();
    if (!trimmedName) {
      showToast('New name is required', 'warning');
      return false;
    }
    const parsedAge = newAge !== undefined && newAge !== null && String(newAge).trim() !== ''
      ? parseInt(String(newAge).trim(), 10)
      : null;
    if (parsedAge !== null && (!Number.isFinite(parsedAge) || parsedAge < 1 || parsedAge > 99)) {
      showToast('Age must be 1\u201399', 'warning');
      return false;
    }

    const oldName = member.member_name;
    const oldAge = member.member_age;
    const updates = { member_name: trimmedName };
    if (parsedAge !== null) updates.member_age = parsedAge;

    const upd = await supabase.from('registration_members')
      .update(updates).eq('id', member.id);
    if (upd.error) {
      showToast('Rename failed: ' + upd.error.message, 'warning');
      return false;
    }

    await supabase.from('audit_log').insert({
      actor_email: session.user.email,
      action: 'member_renamed',
      resource_type: 'registration_member',
      resource_id: member.id,
      details: {
        from: { name: oldName, age: oldAge },
        to: { name: trimmedName, age: parsedAge },
      },
    });

    showToast(oldName + ' renamed to ' + trimmedName);
    fetchRegistrations();
    return true;
  }, [session, showToast, fetchRegistrations]);

  const handleMarkMemberPaid = useCallback(async (member, note) => {
    // Manual mark-as-paid (for cash payments). Creates a synthetic payment record.
    const now = new Date().toISOString();
    const payIns = await supabase.from('registration_payments').insert({
      registration_id: member.registration_id,
      amount: 300,
      payment_method: 'cash',
      members_covered: [member.id],
      notes: note || 'Manual cash payment marked by admin',
      recorded_by: session.user.email,
      verified_at: now,
      verified_by: session.user.email,
    }).select().single();

    if (payIns.error) {
      showToast('Mark paid failed: ' + payIns.error.message, 'warning');
      return false;
    }

    await supabase.from('registration_members').update({
      payment_status: 'paid',
      paid_at: now,
      payment_id: payIns.data.id,
    }).eq('id', member.id);

    showToast(member.member_name + ' marked as paid');
    fetchRegistrations();
    await maybeAutoFlipRegistrationStatus(member.registration_id);
    return true;
  }, [session, showToast, fetchRegistrations, maybeAutoFlipRegistrationStatus]);

  const handleGeneratePerformerTickets = useCallback(async (registration) => {
    try {
      // Retry on unique-code conflict (concurrent generation race).
      // Performer codes share the KP-P- sequence across all groups, so two
      // admins generating tickets for different groups simultaneously can
      // collide on the same next number.
      let result = null;
      let lastErr = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          result = await generateTicketsForRegistration(registration, session.user.email);
          break;
        } catch (e) {
          lastErr = e;
          const isUnique = (e && (e.code === '23505' ||
            (e.message || '').toLowerCase().includes('duplicate') ||
            (e.message || '').toLowerCase().includes('ticket_code')));
          if (!isUnique) throw e;
          await new Promise((r) => setTimeout(r, 80 * (attempt + 1)));
        }
      }
      if (!result) throw lastErr || new Error('Generation failed after retries');

      if (result.alreadyGenerated) {
        showToast('Performer tickets already generated for this group');
      } else {
        showToast('Generated ' + result.tickets.length + ' performer tickets');
        await supabase.from('audit_log').insert({
          actor_email: session.user.email,
          action: 'performer_tickets_generated',
          resource_type: 'registration',
          resource_id: registration.id,
          details: { count: result.tickets.length },
        });
      }
      fetchTickets();
      fetchRegistrations();
    } catch (e) {
      showToast('Generation failed: ' + e.message, 'warning');
    }
  }, [session, showToast, fetchTickets, fetchRegistrations]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

      // Section switching shortcuts (works anywhere)
      if ((e.key === '1' || e.key === '2' || e.key === '3' || e.key === '4' || e.key === '5' || e.key === '6') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        const sections = ['orders', 'registrations', 'ban-revoke', 'tickets', 'seatmap', 'disputes', 'finance', 'settings'];
        setSection(sections[parseInt(e.key, 10) - 1]);
        return;
      }

      // ? for shortcuts help
      if (e.key === '?' || (e.shiftKey && e.key === '/')) {
        e.preventDefault();
        showToast('Shortcuts: 1-4 switch tabs · ↑↓ navigate · Enter confirm · Esc close', 'success');
        return;
      }

      // Orders section
      if (section === 'orders' && filtered.length) {
        const idx = filtered.findIndex((o) => o.id === selectedId);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = filtered[Math.min(idx + 1, filtered.length - 1)] || filtered[0];
          setSelectedId(next.id);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const prev = filtered[Math.max(idx - 1, 0)];
          if (prev) setSelectedId(prev.id);
        } else if (e.key === 'Enter' && selectedId && tab === 'awaiting_verification') {
          e.preventDefault();
          handleConfirm(selectedId);
        } else if (e.key === 'Escape') {
          setSelectedId(null); setZoomReceipt(null);
        }
      }
      // Registrations section
      else if (section === 'registrations' && filteredRegs.length) {
        const idx = filteredRegs.findIndex((r) => r.id === regSelectedId);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = filteredRegs[Math.min(idx + 1, filteredRegs.length - 1)] || filteredRegs[0];
          setRegSelectedId(next.id);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const prev = filteredRegs[Math.max(idx - 1, 0)];
          if (prev) setRegSelectedId(prev.id);
        } else if (e.key === 'Enter' && regSelectedId && regTab === 'pending') {
          e.preventDefault();
          updateRegStatus(regSelectedId, 'confirmed');
        } else if (e.key === 'Escape') {
          setRegSelectedId(null);
        } else if (e.key === ' ' && regSelectedId) {
          // Space: toggle bulk selection
          e.preventDefault();
          const next = { ...bulkSelected };
          if (next[regSelectedId]) delete next[regSelectedId];
          else next[regSelectedId] = true;
          setBulkSelected(next);
        }
      }
      // Ban Revoke section
      else if (section === 'ban-revoke' && filteredApps.length) {
        const idx = filteredApps.findIndex((a) => a.id === appSelectedId);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = filteredApps[Math.min(idx + 1, filteredApps.length - 1)] || filteredApps[0];
          setAppSelectedId(next.id);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const prev = filteredApps[Math.max(idx - 1, 0)];
          if (prev) setAppSelectedId(prev.id);
        } else if (e.key === 'Escape') {
          setAppSelectedId(null);
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [section, filtered, selectedId, tab, handleConfirm,
      filteredRegs, regSelectedId, regTab, updateRegStatus, bulkSelected,
      filteredApps, appSelectedId, showToast]);

  const logout = async () => { await supabase.auth.signOut(); };

  return (
    <div style={{
      minHeight: '100vh', position: 'relative',
      background: 'radial-gradient(ellipse at top, #160428 0%, #08020F 50%)'
    }}>
      <TopBar session={session} adminRecord={adminRecord} onLogout={logout}
              onRefresh={
                section === 'orders' ? fetchOrders
                  : section === 'registrations' ? fetchRegistrations
                  : section === 'ban-revoke' ? fetchApplications
                  : section === 'settings' ? fetchTemplatesAndSettings
                  : section === 'seatmap' ? (() => { fetchSeats(); fetchOrderSeats(); })
                  : fetchOrders
              } />

      {/* SECTION TOGGLE */}
      <div className="admin-section-tabs" style={{
        padding: '20px 32px 0', display: 'flex', alignItems: 'center', gap: 6,
      }}>
        <button onClick={() => setSection('orders')} style={sectionBtnStyle(section === 'orders')}>
          <Icon name="ticket" size={14} />
          <span>Orders</span>
          <span className="font-mono" style={{
            background: section === 'orders' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            {activeCounts.activeOrders}
          </span>
        </button>
        <button onClick={() => setSection('registrations')} style={sectionBtnStyle(section === 'registrations')}>
          <Icon name="users" size={14} />
          <span>Registrations</span>
          <span className="font-mono" style={{
            background: section === 'registrations' ? 'rgba(255, 27, 107, 0.3)' : 'rgba(255, 255, 255, 0.06)',
            padding: '1px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600,
          }}>
            {registrations.length}
          </span>

            if (ok) { setShowExpenseModal(false); setEditingExpense(null); }

          initial={editingBudget}
          onClose={() => { setShowBudgetModal(false); setEditingBudget(null); }}

            await handleTransferTicket(showTransferModal.id, transferType, newName, newEmail, reason);

        position: 'fixed', bottom: 24, right: 24, zIndex: 50,
        width: 56, height: 56, borderRadius: '50%',

        color: 'white', border: 'none', cursor: 'pointer',
        boxShadow: '0 10px 28px rgba(255,27,107,0.45)',

        </div>
      )}

      {toast && (
        <div className="anim-slide-up" style={{
          position: 'fixed', bottom: 32, right: 32, zIndex: 50,
          background: toast.kind === 'warning'
            ? 'linear-gradient(135deg, #FF1744, #C50E30)'
            : 'linear-gradient(135deg, #00E676, #00A845)',
          color: 'white', padding: '14px 20px', borderRadius: 12,
          display: 'flex', alignItems: 'center', gap: 10,
          boxShadow: '0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset',
          fontSize: 14, fontWeight: 600
        }}>
          <Icon name={toast.kind === 'warning' ? 'alert' : 'send'} size={16} />
          {toast.msg}
        </div>
      )}

      {actionToast && (
        <div className="anim-slide-up" style={{
          position: 'fixed',
          bottom: toast ? 96 : 32, // stack above regular toast if both visible
          right: 32, zIndex: 51,
          background: 'rgba(20, 8, 36, 0.95)',
          backdropFilter: 'blur(12px)',
          color: 'white', padding: '12px 14px 12px 18px', borderRadius: 12,
          display: 'flex', alignItems: 'center', gap: 14,
          boxShadow: '0 12px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.12) inset',
          fontSize: 13, fontWeight: 500,
          maxWidth: 420,
        }}>
          <span style={{ flex: 1, minWidth: 0, lineHeight: 1.4 }}>{actionToast.msg}</span>
          <button onClick={async () => {
            const fn = actionToast.onAction;
            dismissActionToast();
            if (fn) await fn();
          }} style={{
            padding: '6px 14px', borderRadius: 6,
            background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            border: 'none', color: 'white',
            fontSize: 11, fontWeight: 800, letterSpacing: 1,
            cursor: 'pointer', fontFamily: 'inherit',
            whiteSpace: 'nowrap',
          }}>
            {actionToast.actionLabel}
          </button>
        </div>
      )}
    </div>
  );
}
