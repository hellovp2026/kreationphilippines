// ============================================================
// INSIGHTS PANEL — calculated smart insights
// ============================================================
function InsightsPanel({ orders, registrations, applications, tickets, grossIncome, totalExpenses, totalBudget, netProfit }) {
  const insights = useMemo(() => {
    const out = [];
    const EVENT_DATE = new Date('2026-08-22T13:00:00+08:00');
    const now = new Date();
    const daysToEvent = Math.max(0, Math.ceil((EVENT_DATE - now) / (1000 * 60 * 60 * 24)));

    // Days countdown
    out.push({
      tone: daysToEvent <= 30 ? 'warning' : daysToEvent <= 90 ? 'info' : 'neutral',
      icon: 'clock',
      title: daysToEvent + ' days until event',
      body: daysToEvent <= 30
        ? 'Crunch time. Lock the participant list, finalize prizes, and confirm vendors.'
        : daysToEvent <= 90
        ? 'Three months out. Push ticket sales and chase any pending registrations.'
        : 'Plenty of runway. Focus on early ticket drops and partnership outreach.',
    });

    // Top revenue source (computed from active tickets, not order totals — consistent with gross income)
    const activeTickets = tickets.filter((t) => t.status !== 'cancelled' && !t.reissued_to_ticket_id);
    if (activeTickets.length > 0) {
      const byType = {};
      activeTickets.forEach((t) => {
        const k = t.ticket_type_name || 'Unknown';
        byType[k] = (byType[k] || 0) + Number(t.price || 0);
      });
      const top = Object.entries(byType).sort((a, b) => b[1] - a[1])[0];
      if (top) {
        const pct = grossIncome > 0 ? Math.round((top[1] / grossIncome) * 100) : 0;
        const topCount = activeTickets.filter((t) => (t.ticket_type_name || 'Unknown') === top[0]).length;
        out.push({
          tone: 'info',
          icon: 'ticket',
          title: 'Top revenue source: ' + top[0],
          body: peso(top[1]) + ' (' + pct + '% of gross income) from ' + topCount + ' tickets.',
        });
      }
    }

    // Pending orders held value
    const pendingOrders = orders.filter((o) => o.status === 'awaiting_verification');
    const pendingValue = pendingOrders.reduce((s, o) => s + Number(o.total || 0), 0);
    if (pendingValue > 0) {
      out.push({
        tone: 'warning',
        icon: 'inbox',
        title: peso(pendingValue) + ' awaiting verification',
        body: pendingOrders.length + ' orders pending review. Process these to unlock revenue and confirm seats.',
      });
    }

    // Registration progress
    const totalRegs = registrations.length;
    const paidRegs = registrations.filter((r) => r.status === 'paid').length;
    const confirmedRegs = registrations.filter((r) => r.status === 'confirmed').length;
    if (totalRegs > 0) {
      const paidPct = Math.round((paidRegs / totalRegs) * 100);
      out.push({
        tone: paidPct >= 80 ? 'positive' : paidPct >= 50 ? 'info' : 'warning',
        icon: 'users',
        title: paidRegs + ' of ' + totalRegs + ' registrations paid (' + paidPct + '%)',
        body: confirmedRegs > paidRegs
          ? (confirmedRegs - paidRegs) + ' confirmed but unpaid. Send payment reminders.'
          : 'Healthy payment conversion.',
      });
    }

    // Most popular registration category
    if (totalRegs > 0) {
      const byCat = {};
      registrations.forEach((r) => { byCat[r.category] = (byCat[r.category] || 0) + 1; });
      const topCat = Object.entries(byCat).sort((a, b) => b[1] - a[1])[0];
      if (topCat) {
        out.push({
          tone: 'info',
          icon: 'sparkles',
          title: 'Most popular: ' + (CATEGORY_LABELS[topCat[0]] || topCat[0]),
          body: topCat[1] + ' entries so far. ' + (topCat[0] === 'battle' ? 'Battle is the headline competition.' : ''),
        });
      }
    }

    // Ban revoke meetings pending
    const pendingApps = applications.filter((a) => a.status === 'pending').length;
    const scheduledApps = applications.filter((a) => a.status === 'meeting_scheduled').length;
    if (pendingApps > 0 || scheduledApps > 0) {
      out.push({
        tone: pendingApps > 0 ? 'warning' : 'info',
        icon: 'alert',
        title: pendingApps + ' pending, ' + scheduledApps + ' meetings scheduled',
        body: pendingApps > 0
          ? 'Review the new applications and schedule meetings via the Ban Revoke tab.'
          : 'Meetings on the calendar. Check the GCal links on each entry.',
      });
    }

    // Budget health
    if (totalBudget > 0) {
      const burnPct = Math.round((totalExpenses / totalBudget) * 100);
      const profitMargin = grossIncome > 0 ? Math.round((netProfit / grossIncome) * 100) : 0;
      out.push({
        tone: burnPct >= 90 ? 'warning' : burnPct >= 70 ? 'info' : 'positive',
        icon: 'card',
        title: burnPct + '% of budget spent',
        body: netProfit >= 0
          ? 'Net profit: ' + peso(netProfit) + (grossIncome > 0 ? ' (' + profitMargin + '% margin)' : '') + '. ' +
            (totalBudget - totalExpenses > 0 ? peso(totalBudget - totalExpenses) + ' still in the budget pot.' : 'Budget fully spent.')
          : 'In the red by ' + peso(Math.abs(netProfit)) + '. Push ticket sales or trim discretionary spend.',
      });
    }

    // Email confirmation gap
    const confirmedRegsWithoutEmail = registrations.filter((r) =>
      (r.status === 'confirmed' || r.status === 'paid') && !r.confirmation_sent_at
    );
    if (confirmedRegsWithoutEmail.length > 0) {
      out.push({
        tone: 'warning',
        icon: 'mail',
        title: confirmedRegsWithoutEmail.length + ' confirmations not sent',
        body: 'These groups are confirmed/paid but haven\'t received their confirmation email yet. Open the Registrations tab.',
      });
    }

    return out;
  }, [orders, registrations, applications, tickets, grossIncome, totalExpenses, totalBudget, netProfit]);

  return (
    <div style={{
      background: 'rgba(255, 255, 255, 0.02)', backdropFilter: 'blur(10px)',
      borderRadius: 18, border: '1px solid var(--border)', overflow: 'hidden',
      padding: '22px 24px',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 18,
      }}>
        <div>
          <div className="font-mono" style={{
            fontSize: 10, letterSpacing: 2.5, color: '#C724FF',
            fontWeight: 700, marginBottom: 6,
          }}>
            ✨ SMART INSIGHTS
          </div>
          <div className="font-display" style={{
            fontSize: 20, fontWeight: 800, color: 'var(--text)',
            letterSpacing: -0.5,
          }}>
            What needs your attention
          </div>
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {insights.map((ins, i) => {
          const toneColor = {
            warning: '#FFB300',
            positive: '#00E676',
            info: '#00E5FF',
            neutral: '#A0A0A0',
          }[ins.tone] || '#A0A0A0';
          return (
            <div key={i} style={{
              padding: '12px 14px', borderRadius: 10,
              background: toneColor + '0F',
              border: '1px solid ' + toneColor + '30',
              display: 'flex', gap: 12, alignItems: 'flex-start',
            }}>
              <div style={{ color: toneColor, marginTop: 2, flexShrink: 0 }}>
                <Icon name={ins.icon} size={16} />
              </div>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{
                  fontSize: 13, fontWeight: 700, color: 'var(--text)',
                  letterSpacing: 0.1, marginBottom: 3,
                  lineHeight: 1.3,
                }}>
                  {ins.title}
                </div>
                <div style={{
                  fontSize: 12, color: 'var(--text-muted)',
                  lineHeight: 1.55,
                }}>
                  {ins.body}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <ChartsBlock
        orders={orders}
        registrations={registrations}
        grossIncome={grossIncome}
        totalExpenses={totalExpenses}
        netProfit={netProfit}
      />
    </div>
  );
}

function ChartsBlock({ orders, registrations, grossIncome, totalExpenses, netProfit }) {
  // 1) Revenue donut by ticket type
  const revenueByType = useMemo(() => {
    const m = {};
    orders.filter((o) => o.status === 'confirmed').forEach((o) => {
      const k = o.ticket_type_name || 'Other';
      m[k] = (m[k] || 0) + Number(o.total || 0);

    return Object.entries(m).map(([name, val]) => ({ name, val }))

    });

const DONUT_COLORS = ['#FF1B6B', '#C724FF', '#00E5FF', '#FFB300', '#00E676', '#FF6FA8', '#82B1FF'];

function DonutChart({ data, formatVal }) {
  const total = data.reduce((s, d) => s + d.val, 0);
  if (total <= 0) return null;
  const size = 160;
  const stroke = 26;
  const radius = (size - stroke) / 2;
  const cx = size / 2;
  const cy = size / 2;
  const circumference = 2 * Math.PI * radius;

  let accumulated = 0;
  const segments = data.map((d, i) => {
    const pct = d.val / total;
    const offset = circumference - (accumulated * circumference);
    const length = pct * circumference;
    accumulated += pct;
    return {
      ...d,
      pct,
      color: DONUT_COLORS[i % DONUT_COLORS.length],
      dashArray: length + ' ' + (circumference - length),
      dashOffset: offset,
    };
  });

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
      <svg width={size} height={size} style={{ flexShrink: 0 }}>
        <circle cx={cx} cy={cy} r={radius}
          fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
        {segments.map((s, i) => (
          <circle key={i} cx={cx} cy={cy} r={radius}
            fill="none"
            stroke={s.color}
            strokeWidth={stroke}
            strokeDasharray={s.dashArray}
            strokeDashoffset={s.dashOffset}
            transform={'rotate(-90 ' + cx + ' ' + cy + ')'}
            style={{ transition: 'all 0.4s ease' }} />
        ))}
        <text x={cx} y={cy - 3} textAnchor="middle"
          style={{
            fontFamily: 'Sora, sans-serif',
            fontSize: 11, fontWeight: 700,
            fill: 'rgba(255,255,255,0.6)', letterSpacing: 1.5,
          }}>
          TOTAL
        </text>
        <text x={cx} y={cy + 14} textAnchor="middle"
          style={{
            fontFamily: 'Sora, sans-serif',
            fontSize: 14, fontWeight: 800,
            fill: 'white', letterSpacing: -0.3,
          }}>
          {formatVal ? formatVal(total) : total}
        </text>
      </svg>
      <div style={{ flex: 1, minWidth: 140, display: 'flex', flexDirection: 'column', gap: 6 }}>
        {segments.map((s, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', gap: 8,
            fontSize: 12,
          }}>
            <span style={{
              width: 10, height: 10, borderRadius: 2,
              background: s.color, flexShrink: 0,
            }} />
            <span style={{ flex: 1, color: 'var(--text)', minWidth: 0 }}>
              {s.name}
            </span>
            <span className="font-mono" style={{ color: 'var(--text-muted)', fontSize: 11 }}>
              {Math.round(s.pct * 100)}%
            </span>
            <span className="font-mono" style={{ color: 'var(--text)', fontWeight: 700, fontSize: 11, minWidth: 70, textAlign: 'right' }}>
              {formatVal ? formatVal(s.val) : s.val}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CashFlowBars({ data, formatVal }) {
  const max = Math.max(...data.map((d) => Math.abs(d.value)), 1);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {data.map((d, i) => {
        const pct = (Math.abs(d.value) / max) * 100;
        return (
          <div key={i}>
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
              marginBottom: 4, fontSize: 12,
            }}>
              <span style={{ fontWeight: 700, color: 'var(--text)' }}>
                {d.label}
              </span>
              <span className="font-mono" style={{ color: d.color, fontWeight: 700 }}>

              </span>

            <div style={{
              height: 10, borderRadius: 999,
              background: 'rgba(255,255,255,0.06)',
              overflow: 'hidden',

                width: pct + '%', height: '100%',

function HorizontalBarChart({ data }) {
  const max = Math.max(...data.map((d) => d.val), 1);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {data.map((d, i) => {
        const pct = (d.val / max) * 100;
        return (
          <div key={i}>
            <div style={{
              display: 'flex', justifyContent: 'space-between',
              fontSize: 12, marginBottom: 3,

              <span style={{ color: 'var(--text)' }}>{d.label}</span>
              <span className="font-mono" style={{
                color: d.accent, fontWeight: 700,

            <div style={{
              height: 8, borderRadius: 999,
              background: 'rgba(255,255,255,0.06)',

              <div style={{
                width: pct + '%', height: '100%',

// ============================================================
// WALK-IN SALES VIEW
// ============================================================
// At-the-door audience ticket sales. Cashier walks the buyer through
// tier selection, seat selection (VIP), buyer info + payment, and gets
// a QR for the buyer to photograph from the cashier's screen.
//
// WALK-IN PRICING (different from advance):
//   VIP walk-in:     ₱320 (vs ₱300 advance)
//   Regular walk-in: ₱280 (vs ₱250 advance)
//
// TICKET CODES:
//   VIP walk-in:     KP-V-W0042 (W prefix, sequential)
//   Regular walk-in: KP-R-W0042
//   (NOT KP-V-A12 — walk-ins never use seat-letter codes, even though
//   they DO get seat assignments, because seat-letter codes are reserved
//   for advance VIP sales to keep counters separate.)
//
// FLOW:
//   home → sale (step 0: tier) → (step 1: VIP seat) → (step 2: buyer+pay) → (step 3: QR + admit)
// ============================================================

const WALK_IN_PRICE_VIP = 320;
const WALK_IN_PRICE_REG = 280;

function WalkinView({
  tierInventory, seats, seatStateMap, currentUserEmail,
  orders, tickets, onSaleComplete,
}) {
  const [screen, setScreen] = useState('home'); // 'home' | 'sale'
  const [stepIndex, setStepIndex] = useState(0); // 0..3
  const [tier, setTier] = useState(null); // 'V' | 'R' | null
  const [seatId, setSeatId] = useState(null);
  const [seatLabel, setSeatLabel] = useState(null);
  const [buyerName, setBuyerName] = useState('');
  const [buyerPhone, setBuyerPhone] = useState('');
  const [paymentMethod, setPaymentMethod] = useState('cash'); // 'cash' | 'gcash'
  const [gcashRef, setGcashRef] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState(null);
  const [completedSale, setCompletedSale] = useState(null); // { order, ticket }
  const [admitNow, setAdmitNow] = useState(true);

  // ===== Walk-in stats (today) =====
  const walkInStats = useMemo(() => {
    const walkInOrders = (orders || []).filter((o) => o.is_walk_in);
    const totalRevenue = walkInOrders.reduce((s, o) => s + Number(o.total || 0), 0);
    // Find newest walk-in ticket (most recently issued)
    const walkInTickets = (tickets || []).filter((t) => t.is_walk_in)
      .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
    const lastTicket = walkInTickets[0];
    return {
      count: walkInOrders.length,
      revenue: totalRevenue,
      lastCode: lastTicket ? lastTicket.ticket_code : null,
      lastTime: lastTicket ? lastTicket.created_at : null,
    };
  }, [orders, tickets]);

  // ===== Tier availability =====
  const vipRemaining = tierInventory.V.remaining;
  const regRemaining = tierInventory.R.remaining;
  const vipSoldOut = vipRemaining <= 0;
  const regSoldOut = regRemaining <= 0;

  // ===== Reset for a new sale =====
  const resetSale = () => {
    setScreen('home');
    setStepIndex(0);
    setTier(null);
    setSeatId(null);
    setSeatLabel(null);
    setBuyerName('');
    setBuyerPhone('');
    setPaymentMethod('cash');
    setGcashRef('');
    setSubmitting(false);
    setSubmitError(null);
    setCompletedSale(null);
    setAdmitNow(true);
  };

  const startNewSale = () => {
    resetSale();
    setScreen('sale');
    setStepIndex(0);
  };

  // ===== Navigation between steps =====
  const goNext = () => {
    if (stepIndex === 0) {
      // After tier, VIP goes to seat picker; Regular skips to buyer info
      if (tier === 'V') setStepIndex(1);
      else setStepIndex(2);
    } else if (stepIndex === 1) {
      setStepIndex(2);
    }
  };
  const goBack = () => {
    if (stepIndex === 1) setStepIndex(0);
    else if (stepIndex === 2) {
      // From buyer info back to seat (VIP) or tier (Regular)
      if (tier === 'V') setStepIndex(1);
      else setStepIndex(0);
    } else if (stepIndex === 0) {
      setScreen('home');
    }
  };

  // ===== Compute total =====
  const total = tier === 'V' ? WALK_IN_PRICE_VIP : tier === 'R' ? WALK_IN_PRICE_REG : 0;

  // ===== Submit the sale =====
  const submitSale = async () => {
    setSubmitting(true);
    setSubmitError(null);

    // Track what's been created so we can rollback on failure.
    // If ticket generation fails (e.g. unique-code conflict, RLS, etc.) we
    // don't want to leave an orphan order in the admin Orders tab.
    let createdOrderId = null;

    try {
      if (!tier) throw new Error('Tier not selected');
      if (tier === 'V' && !seatId) throw new Error('Seat not selected for VIP');
      if (paymentMethod === 'gcash' && !gcashRef.trim()) {
        throw new Error('GCash reference number required');
      }

      // 1. Pick the matching ticket_type_id from the DB.
      // .find() passes the FULL row to the matcher, not just the name field.
      const ttRes = await supabase.from('ticket_types').select('id, name').order('display_order');
      if (ttRes.error) throw ttRes.error;
      const matchTier = (row) => {
        const n = (row && row.name ? row.name : '').toLowerCase();
        if (tier === 'V') return n.includes('vip');
        if (tier === 'R') return n.includes('regular') || (!n.includes('vip') && !n.includes('participant') && !n.includes('performer'));
        return false;
      };
      const ticketType = (ttRes.data || []).find(matchTier);
      if (!ticketType) throw new Error('Could not match ticket type for tier ' + tier);

      // 2. Create order (status=confirmed, is_walk_in=true)
      const buyerNameValue = buyerName.trim() || 'Walk-in Buyer';
      const insOrder = await supabase.from('orders').insert({
        ticket_type_id: ticketType.id,
        buyer_name: buyerNameValue,
        buyer_email: '',
        buyer_phone: buyerPhone.trim() || null,
        subtotal: total,
        add_on_total: 0,
        total: total,
        payment_method: paymentMethod === 'gcash' ? 'GCash' : 'Cash',
        reference_number: paymentMethod === 'gcash' ? gcashRef.trim() : null,
        status: 'confirmed',
        is_walk_in: true,
        walk_in_issued_by: currentUserEmail,
        walk_in_payment_method: paymentMethod,
      }).select().single();
      if (insOrder.error) throw new Error('Order creation failed: ' + insOrder.error.message);
      const order = insOrder.data;
      createdOrderId = order.id;

      // 3. Create attendee
      const insAtt = await supabase.from('attendees').insert({
        order_id: order.id,
        name: buyerNameValue,
        ticket_type_id: ticketType.id,
        seat_id: seatId || null,
        display_order: 0,
      });
      if (insAtt.error) throw new Error('Attendee save failed: ' + insAtt.error.message);

      // 4. Lock the seat (VIP only). The DB has a trigger that prevents
      // double-booking — if another cashier just grabbed this seat between
      // when we read the seat map and when we submit, we get a clear error.
      if (tier === 'V' && seatId) {
        const insSeat = await supabase.from('order_seats').insert({
          order_id: order.id,
          seat_id: seatId,
        });
        if (insSeat.error) {
          const msg = (insSeat.error.message || '').toLowerCase();
          if (msg.includes('seat already reserved') || msg.includes('23505') || insSeat.error.code === '23505') {
            throw new Error('That seat was just taken by another cashier. Go back and pick a different seat.');
          }
          throw new Error('Seat reservation failed: ' + insSeat.error.message);
        }
      }

      // 5. Generate the ticket via the standard ticket generator.
      // generateTicketsForOrder handles walk-in code prefixing automatically
      // based on order.is_walk_in.
      //
      // RETRY LOGIC: under concurrent walk-in sales, two cashiers might compute
      // the same next ticket code (e.g. both see KP-V-W0041 as latest and both
      // try to insert KP-V-W0042). The DB rejects the second with a unique
      // violation (Postgres error 23505). Retry up to 3 times; each retry
      // reads the latest sequence and increments past it.
      let gen = null;
      let lastErr = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          gen = await generateTicketsForOrder(order, currentUserEmail);
          break;
        } catch (e) {
          lastErr = e;
          const isUniqueViolation = (e && (e.code === '23505' ||
            (e.message || '').toLowerCase().includes('duplicate') ||
            (e.message || '').toLowerCase().includes('ticket_code')));
          if (!isUniqueViolation) throw e;
          // Brief backoff so retries don't all hit at the same instant
          await new Promise((r) => setTimeout(r, 80 * (attempt + 1)));
        }
      }
      if (!gen) {
        throw lastErr || new Error('Ticket generation failed after 3 retries');
      }
      if (gen.alreadyGenerated || !gen.tickets || gen.tickets.length === 0) {
        throw new Error('Ticket generation returned no ticket');
      }
      const ticket = gen.tickets[0];

      // 6. If "Admit Now" is on, mark the ticket as scanned immediately
      if (admitNow) {
        const upd = await supabase.from('tickets').update({
          scanned_at: new Date().toISOString(),
          scanned_by: currentUserEmail || 'walk-in-cashier',
          last_scan_at: new Date().toISOString(),
          status: 'used',
        }).eq('id', ticket.id).select().single();
        if (upd.error) {
          // Non-fatal — sale completed, just couldn't auto-admit
          console.warn('Auto-admit failed:', upd.error);
        } else {
          ticket.scanned_at = upd.data.scanned_at;
          ticket.scanned_by = upd.data.scanned_by;
          ticket.status = upd.data.status;
        }
      }

      setCompletedSale({ order, ticket });
      setStepIndex(3);
      onSaleComplete && onSaleComplete();
    } catch (err) {
      console.error('[Walk-in submit]', err);

      // ROLLBACK: if order was created but a later step failed, delete the
      // orphan order so it doesn't pollute admin Orders tab. Best-effort —
      // if delete also fails (RLS, network), we surface the error but the
      // sale is still marked as failed. Admin can find the orphan via the
      // is_walk_in=true filter on Orders if needed.
      if (createdOrderId) {
        try {
          // Delete child rows first (FK cascade would be cleaner but isn't
          // guaranteed to be set up in the schema)
          await supabase.from('order_seats').delete().eq('order_id', createdOrderId);
          await supabase.from('attendees').delete().eq('order_id', createdOrderId);
          await supabase.from('orders').delete().eq('id', createdOrderId);
        } catch (rollbackErr) {
          console.error('[Walk-in rollback]', rollbackErr);
        }
      }

      setSubmitError(err.message || String(err));
    } finally {
      setSubmitting(false);
    }
  };

  // ===== Toggle admit on the completed sale screen =====
  const toggleAdmit = async () => {
    if (!completedSale) return;
    const t = completedSale.ticket;
    const newAdmit = !t.scanned_at;
    try {
      const upd = await supabase.from('tickets').update(
        newAdmit
          ? {
              scanned_at: new Date().toISOString(),
              scanned_by: currentUserEmail || 'walk-in-cashier',
              last_scan_at: new Date().toISOString(),
              status: 'used',
            }
          : {
              scanned_at: null,
              scanned_by: null,
              last_scan_at: null,
              status: 'issued',
            }
      ).eq('id', t.id).select().single();
      if (upd.error) throw upd.error;
      setCompletedSale({
        order: completedSale.order,
        ticket: upd.data,
      });
      onSaleComplete && onSaleComplete();
    } catch (err) {
      alert('Could not change admit status: ' + (err.message || err));
    }
  };

  // =====================================================
  // RENDER
  // =====================================================
  if (screen === 'home') {
    return (
      <WalkinHome
        stats={walkInStats}
        tierInventory={tierInventory}
        onStart={startNewSale}
        recentOrders={(orders || []).filter((o) => o.is_walk_in).slice(0, 8)}
        tickets={tickets} />
    );
  }

  // 'sale' screen — show steps based on stepIndex
  return (
    <div style={{ padding: '24px 32px 80px', maxWidth: 800, margin: '0 auto' }}>
      <button onClick={goBack} style={{
        background: 'transparent', border: 'none', color: 'var(--text-muted)',
        cursor: 'pointer', padding: '6px 0', marginBottom: 12,
        fontSize: 13, display: 'flex', alignItems: 'center', gap: 6,
      }}>
        {'\u2190'} Back
      </button>

      <h1 className="font-display" style={{
        fontSize: 26, fontWeight: 800, margin: '0 0 6px', letterSpacing: -0.5,
      }}>
        New Walk-in Sale
      </h1>
      {stepIndex < 3 && (
        <div className="font-mono" style={{
          fontSize: 11, letterSpacing: 1.5, color: 'var(--text-soft)',
          fontWeight: 700, marginBottom: 24,
        }}>
          {'STEP ' + (stepIndex + 1) + ' OF 3'}
          {stepIndex === 0 && ': PICK TIER'}
          {stepIndex === 1 && ': PICK SEAT'}
          {stepIndex === 2 && ': BUYER + PAYMENT'}
        </div>
      )}

      {stepIndex === 0 && (
        <WalkinStepTier
          tier={tier} setTier={setTier}
          vipRemaining={vipRemaining} regRemaining={regRemaining}
          vipSoldOut={vipSoldOut} regSoldOut={regSoldOut}
          onNext={goNext} />
      )}

      {stepIndex === 1 && (
        <WalkinStepSeat
          seats={seats}
          seatStateMap={seatStateMap}
          seatId={seatId}
          onPickSeat={(s) => {
            setSeatId(s.id);
            setSeatLabel(String(s.row_label) + String(s.seat_number));
          }}
          seatLabel={seatLabel}
          onNext={goNext} />
      )}

      {stepIndex === 2 && (
        <WalkinStepBuyer
          tier={tier} seatLabel={seatLabel} total={total}
          buyerName={buyerName} setBuyerName={setBuyerName}
          buyerPhone={buyerPhone} setBuyerPhone={setBuyerPhone}
          paymentMethod={paymentMethod} setPaymentMethod={setPaymentMethod}
          gcashRef={gcashRef} setGcashRef={setGcashRef}
          submitting={submitting} submitError={submitError}
          onSubmit={submitSale} />
      )}

      {stepIndex === 3 && completedSale && (
        <WalkinStepComplete
          sale={completedSale}
          onToggleAdmit={toggleAdmit}
          onNewSale={startNewSale}
          onDone={() => setScreen('home')} />
      )}
    </div>
  );
}

// ============================================================
// WALK-IN HOME — stats + start button + recent walk-ins
// ============================================================
function WalkinHome({ stats, tierInventory, onStart, recentOrders, tickets }) {
  // For each recent order, find its ticket so we can display the ticket code
  const orderIdToTicket = useMemo(() => {
    const map = {};
    (tickets || []).forEach((t) => {
      if (t.order_id && t.is_walk_in) map[t.order_id] = t;
    });
    return map;
  }, [tickets]);

  return (
    <div style={{ padding: '28px 32px 80px' }}>
      {/* Top stats row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 14, marginBottom: 20 }}>
        <StatTile label="WALK-INS TODAY" value={stats.count} sub={stats.lastCode ? ('Last: ' + stats.lastCode) : 'No sales yet'} accent="#FF1B6B" />
        <StatTile label="REVENUE" value={'\u20B1' + stats.revenue.toLocaleString()} sub="from walk-ins" accent="#00E676" />
        <StatTile label="VIP REMAINING" value={tierInventory.V.remaining} sub={'of ' + tierInventory.V.cap} accent="#FFB300" />
        <StatTile label="REGULAR REMAINING" value={tierInventory.R.remaining} sub={'of ' + tierInventory.R.cap} accent="#00E5FF" />
      </div>

      {/* Big start button */}
      <button onClick={onStart} style={{
        width: '100%', padding: '24px',
        background: 'linear-gradient(135deg, #FF1B6B 0%, #C724FF 100%)',
        color: 'white', border: 'none', borderRadius: 14,
        fontSize: 18, fontWeight: 800, letterSpacing: 1.5,
        cursor: 'pointer', textTransform: 'uppercase',
        boxShadow: '0 8px 30px rgba(255,27,107,0.35)',
        marginBottom: 24,
      }}>
        + New Walk-in Sale
      </button>

      {/* Recent walk-ins */}
      <div className="font-mono" style={{
        fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
        fontWeight: 700, marginBottom: 10,
      }}>
        RECENT WALK-INS
      </div>
      {recentOrders.length === 0 && (
        <div style={{
          padding: 24, textAlign: 'center',
          background: 'rgba(255,255,255,0.02)',
          border: '1px solid var(--border)', borderRadius: 12,
          color: 'var(--text-soft)', fontSize: 13,
        }}>
          No walk-in sales yet today.
        </div>
      )}
      {recentOrders.length > 0 && (
        <div style={{
          background: 'rgba(255,255,255,0.02)',
          border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden',
        }}>
          {recentOrders.map((o, i) => {
            const t = orderIdToTicket[o.id];
            return (
              <div key={o.id} style={{
                padding: '14px 18px',
                borderBottom: i < recentOrders.length - 1 ? '1px solid var(--border)' : 'none',
                display: 'flex', alignItems: 'center', gap: 14,
              }}>
                <div className="font-mono" style={{ fontSize: 12, fontWeight: 700, color: 'var(--text)', minWidth: 110 }}>
                  {t ? t.ticket_code : '\u2014'}
                </div>
                <div style={{ flex: 1, fontSize: 13, color: 'var(--text-muted)' }}>
                  {o.buyer_name || 'Walk-in Buyer'}
                  {t && t.seat_label ? (' \u00b7 Seat ' + t.seat_label) : ''}
                </div>
                <div className="font-mono" style={{ fontSize: 12, color: 'var(--text-soft)' }}>
                  {'\u20B1' + Number(o.total || 0).toLocaleString()}
                </div>
                {t && t.scanned_at && (
                  <span style={{
                    fontSize: 9, padding: '2px 8px', borderRadius: 999,
                    background: 'rgba(0,230,118,0.15)', color: '#7CF0B8',
                    fontWeight: 800, letterSpacing: 1,
                  }}>
                    ADMITTED
                  </span>
                )}
                {t && !t.scanned_at && (
                  <span style={{
                    fontSize: 9, padding: '2px 8px', borderRadius: 999,
                    background: 'rgba(255,179,0,0.15)', color: '#FFD08A',
                    fontWeight: 800, letterSpacing: 1,
                  }}>
                    HOLD
                  </span>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================================
// STEP 0 — Tier picker
// ============================================================
function WalkinStepTier({ tier, setTier, vipRemaining, regRemaining, vipSoldOut, regSoldOut, onNext }) {
  return (
    <div>
      <TierOption
        code="V" name="VIP" price={WALK_IN_PRICE_VIP}
        sub="Assigned seat, front section"
        remaining={vipRemaining} soldOut={vipSoldOut}
        selected={tier === 'V'}
        onClick={vipSoldOut ? null : () => setTier('V')} />

      <TierOption
        code="R" name="Regular" price={WALK_IN_PRICE_REG}
        sub="Free seating"
        remaining={regRemaining} soldOut={regSoldOut}
        selected={tier === 'R'}
        onClick={regSoldOut ? null : () => setTier('R')} />

      <button onClick={onNext} disabled={!tier} style={{
        width: '100%', padding: '14px',

// ============================================================
// STEP 1 — Seat picker (VIP only)
// ============================================================
function WalkinStepSeat({ seats, seatStateMap, seatId, onPickSeat, seatLabel, onNext }) {
  // Group seats by row letter
  const rowsByLetter = useMemo(() => {
    const map = {};
    (seats || []).forEach((s) => {
      if (!map[s.row_label]) map[s.row_label] = [];
      map[s.row_label].push(s);
    });
    Object.keys(map).forEach((r) => map[r].sort((a, b) => a.seat_number - b.seat_number));
    return map;
  }, [seats]);
  const rowLetters = Object.keys(rowsByLetter).sort();

  return (
    <div>
      <div style={{
        padding: '12px 14px', marginBottom: 16,
        background: 'rgba(255,179,0,0.08)', border: '1px solid rgba(255,179,0,0.25)',
        borderRadius: 10, fontSize: 13, color: '#FFD08A',
      }}>
        Pick any available seat. Green = available, gray = taken.
      </div>

      <div style={{
        padding: '12px 0', marginBottom: 14, textAlign: 'center',
        background: 'linear-gradient(180deg, rgba(255,255,255,0.03), transparent)',
        borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)',
        fontSize: 10, fontWeight: 800, letterSpacing: 3, color: 'var(--text-soft)',
      }}>
        {'\u25BC'} STAGE {'\u25BC'}
      </div>

      <div style={{ overflowX: 'auto', paddingBottom: 8 }}>
        <div style={{ display: 'inline-block', minWidth: '100%' }}>
          {rowLetters.map((rowL) => {
            const rowSeats = rowsByLetter[rowL] || [];
            const leftBlock = rowSeats.filter((s) => s.seat_number <= 14);
            const rightBlock = rowSeats.filter((s) => s.seat_number > 14);
            return (
              <div key={rowL} style={{
                display: 'flex', alignItems: 'center', gap: 4,
                marginBottom: 4, justifyContent: 'center',
              }}>
                <span className="font-mono" style={{
                  width: 22, textAlign: 'right', fontSize: 11, color: 'var(--text-soft)', fontWeight: 700,
                }}>{rowL}</span>
                <div style={{ display: 'flex', gap: 4 }}>
                  {leftBlock.map((s) => (
                    <WalkinSeatCell key={s.id} seat={s} stateInfo={seatStateMap[s.id]}
                                    isSelected={seatId === s.id}
                                    onClick={() => onPickSeat(s)} />
                  ))}
                </div>
                <span style={{
                  width: 14, textAlign: 'center', fontSize: 10, color: 'var(--text-soft)',
                }}>{'\u00b7'}</span>
                <div style={{ display: 'flex', gap: 4 }}>
                  {rightBlock.map((s) => (
                    <WalkinSeatCell key={s.id} seat={s} stateInfo={seatStateMap[s.id]}
                                    isSelected={seatId === s.id}
                                    onClick={() => onPickSeat(s)} />
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {seatLabel && (
        <div style={{
          padding: '14px 16px', marginTop: 16,
          background: 'rgba(255,27,107,0.1)', border: '1px solid rgba(255,27,107,0.3)',
          borderRadius: 10, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>Selected seat:</div>
          <div className="font-mono" style={{ fontSize: 16, fontWeight: 800, color: 'var(--text)' }}>
            {seatLabel}
          </div>
        </div>
      )}

      <button onClick={onNext} disabled={!seatLabel} style={{
        width: '100%', padding: '14px',
        background: seatLabel ? 'linear-gradient(135deg, #FF1B6B 0%, #C724FF 100%)' : 'rgba(255,255,255,0.05)',
        color: 'white', border: 'none', borderRadius: 12,
        fontSize: 14, fontWeight: 800, letterSpacing: 1.5, marginTop: 16,
        cursor: seatLabel ? 'pointer' : 'not-allowed',
        opacity: seatLabel ? 1 : 0.5,
      }}>
        NEXT {'\u2192'}
      </button>
    </div>
  );
}

function WalkinSeatCell({ seat, stateInfo, isSelected, onClick }) {
  const state = stateInfo ? stateInfo.state : 'empty';
  // Only 'empty' seats are clickable for walk-in
  const isClickable = state === 'empty';
  let bg, border, color, text;
  if (isSelected) {
    bg = '#FF1B6B'; border = '#FF1B6B'; color = 'white';
    text = String(seat.seat_number);
  } else if (state === 'confirmed') {
    bg = 'rgba(120,120,120,0.2)'; border = 'rgba(120,120,120,0.4)'; color = 'rgba(255,255,255,0.4)';
    text = String(seat.seat_number);
  } else if (state === 'reserved') {
    bg = 'rgba(255,179,0,0.15)'; border = 'rgba(255,179,0,0.4)'; color = 'rgba(255,255,255,0.6)';
    text = String(seat.seat_number);
  } else {
    bg = 'rgba(0,230,118,0.1)'; border = 'rgba(0,230,118,0.3)'; color = '#7CF0B8';
    text = String(seat.seat_number);
  }
  return (
    <button onClick={isClickable ? onClick : null} disabled={!isClickable} style={{
      width: 26, height: 26, borderRadius: 4,
      background: bg, border: '1px solid ' + border, color,
      fontSize: 9, fontWeight: 700,
      cursor: isClickable ? 'pointer' : 'not-allowed',
      fontFamily: 'JetBrains Mono, monospace',
    }}>
      {text}
    </button>
  );
}

// ============================================================
// STEP 3 — Sale complete (QR display + admit toggle)
// ============================================================
function WalkinStepComplete({ sale, onToggleAdmit, onNewSale, onDone }) {
  const { ticket } = sale;
  const canvasRef = useRef(null);
  const [qrSvg, setQrSvg] = useState('');

  useEffect(() => {
    try {
      const qr = qrcode(0, 'M');
      qr.addData(ticket.qr_token || ticket.ticket_code || 'INVALID');
      qr.make();
      setQrSvg(qr.createSvgTag({ scalable: true }));
    } catch (e) {
      console.error('QR generation failed', e);
    }
  }, [ticket]);

  const admitted = !!ticket.scanned_at;

  return (
    <div style={{ textAlign: 'center' }}>
      <div style={{
        width: 64, height: 64, borderRadius: '50%',
        background: 'rgba(0,230,118,0.2)', color: '#00E676',
        fontSize: 32, fontWeight: 900,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        margin: '0 auto 18px',
      }}>{'\u2713'}</div>

      <h2 style={{ fontSize: 24, fontWeight: 800, margin: '0 0 8px' }}>Sale complete</h2>

      <div className="font-mono" style={{ fontSize: 18, fontWeight: 700, color: 'var(--brand)', marginBottom: 6 }}>
        {ticket.ticket_code}
      </div>
      <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 24 }}>
        {ticket.attendee_name || '\u2014'}
        {' \u00b7 '}
        {ticket.tier_code === 'V' ? ('VIP Seat ' + (ticket.seat_label || '?')) : 'Regular'}
        {' \u00b7 \u20B1' + Number(ticket.price || 0)}
      </div>

      {/* QR */}
      <div style={{
        padding: 24, background: 'white', borderRadius: 16,
        maxWidth: 280, margin: '0 auto 14px',
      }}>
        <div dangerouslySetInnerHTML={{ __html: qrSvg }} style={{ width: '100%' }} />
      </div>

      <div style={{
        padding: '14px 18px', marginBottom: 18,
        background: 'rgba(255,179,0,0.08)', border: '1px solid rgba(255,179,0,0.25)',
        borderRadius: 10, fontSize: 13, color: '#FFD08A', lineHeight: 1.5,
      }}>
        <strong>{'\ud83d\udcf7'} Have the buyer photo this QR with their phone now.</strong><br />
        That photo IS their ticket. They can show it at the door when they enter.
      </div>

      {/* Admit toggle */}
      <button onClick={onToggleAdmit} style={{
        width: '100%', padding: '14px',
        background: admitted ? 'rgba(0,230,118,0.15)' : 'rgba(255,179,0,0.15)',
        border: '1px solid ' + (admitted ? 'rgba(0,230,118,0.4)' : 'rgba(255,179,0,0.4)'),
        color: admitted ? '#7CF0B8' : '#FFD08A',
        borderRadius: 12, fontSize: 13, fontWeight: 800, letterSpacing: 1.2,
        cursor: 'pointer', marginBottom: 14,
      }}>
        {admitted ? ('\u2713 ADMITTED \u2014 TAP TO MARK NOT CHECKED IN') : ('\u23F8 NOT CHECKED IN \u2014 TAP TO ADMIT NOW')}
      </button>

      {/* Action buttons */}
      <div style={{ display: 'flex', gap: 10 }}>
        <button onClick={onDone} style={{
          flex: 1, padding: '14px',
          background: 'rgba(255,255,255,0.05)',
          color: 'var(--text)', border: '1px solid var(--border)',
          borderRadius: 12, fontSize: 13, fontWeight: 700,
          cursor: 'pointer',
        }}>
          DONE
        </button>
        <button onClick={onNewSale} style={{
          flex: 2, padding: '14px',
          background: 'linear-gradient(135deg, #FF1B6B 0%, #C724FF 100%)',
          color: 'white', border: 'none',
          borderRadius: 12, fontSize: 13, fontWeight: 800, letterSpacing: 1.2,
          cursor: 'pointer',
        }}>
          + NEW SALE
        </button>
      </div>
    </div>
  );
}

// Single template editor pane: subject + body with live preview
function SettingsTemplatePane({ kindDef, template, settings, onSaveTemplate }) {

  const [saving, setSaving] = useState(false);
  const [showPreview, setShowPreview] = useState(false);

  // If the template prop changes (e.g. another template selected), refresh local state.
  // Note: parent uses key={activeKind} so this component remounts cleanly between kinds —
  // this effect handles the case where the DB row updates underneath us (rare but safe).
  useEffect(() => {
    setSubject(template ? template.subject : '');
    setBody(template ? template.body : '');
  }, [template ? template.subject : null, template ? template.body : null]);

  const isAudience = kindDef.audience === 'audience';

    step_one: 'Send proof of payment by replying to this email.',

    await onSaveTemplate(kindDef.key, subject, body);
    setSaving(false);

          background: saving ? 'rgba(255,27,107,0.4)' : 'linear-gradient(135deg, #FF1B6B, #C724FF)',

          fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
          fontFamily: 'inherit', cursor: saving ? 'wait' : 'pointer',

// Renders a 5-row × 28-col grid split into two blocks (cols 1-14 left,
// 15-28 right) with an aisle. Each seat is colored by state (empty,
// reserved, confirmed). Hover for tooltip, click for detail panel.
// ============================================================

const SEAT_COLORS = {
  empty: {
    bg: 'rgba(255, 255, 255, 0.04)',
    border: 'rgba(255, 255, 255, 0.12)',
    text: 'var(--text-soft)',
  },
  reserved: {
    bg: 'rgba(255, 179, 0, 0.18)',
    border: 'rgba(255, 179, 0, 0.6)',
    text: '#FFD08A',
  },
  confirmed: {
    bg: 'rgba(0, 230, 118, 0.2)',
    border: 'rgba(0, 230, 118, 0.6)',
    text: '#7CF0B8',
  },
  selected: {
    bg: 'rgba(255, 27, 107, 0.35)',
    border: '#FF1B6B',
    text: '#FFFFFF',
  },
};

function SeatMapView({
  seats, seatStateMap, seatMapCounts,
  seatSelectedId, setSeatSelectedId, onJumpToOrder
}) {
  // Group seats by row, then sort each row by seat_number
  const rowsByLetter = useMemo(() => {
    const map = {};
    (seats || []).forEach((s) => {
      if (!map[s.row_label]) map[s.row_label] = [];
      map[s.row_label].push(s);
    });
    Object.keys(map).forEach((r) => {
      map[r].sort((a, b) => a.seat_number - b.seat_number);
    });
    return map;
  }, [seats]);

  const rowLetters = Object.keys(rowsByLetter).sort();

  const selectedSeat = seatSelectedId ? seatStateMap[seatSelectedId] : null;

  // No seats seeded yet → show empty state with instructions
  if (!seats || seats.length === 0) {
    return (
      <div style={{ padding: 32 }}>
        <div style={{
          padding: '60px 40px',
          textAlign: 'center',
          background: 'rgba(255,255,255,0.02)',
          border: '1px dashed rgba(255,255,255,0.15)',
          borderRadius: 14,
        }}>
          <div className="font-display" style={{ fontSize: 24, fontWeight: 800, color: 'var(--text)', marginBottom: 12 }}>
            No seats configured
          </div>
          <div style={{ fontSize: 14, color: 'var(--text-muted)', lineHeight: 1.6, maxWidth: 480, margin: '0 auto' }}>
            Run the seed SQL (kreation_wipe_and_reseed_seats.sql) to populate the VIP seating chart.
            Once seats exist in the database, they'll appear here automatically.
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="seatmap-layout" style={{ padding: 32, display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) 340px', gap: 24, alignItems: 'start' }}>
      {/* Main map area */}
      <div>
        {/* Header bar */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginBottom: 22, flexWrap: 'wrap', gap: 12,
        }}>
          <div>
            <div className="font-mono" style={{
              fontSize: 10, letterSpacing: 2.5, color: 'var(--text-soft)',
              fontWeight: 700, marginBottom: 6,
            }}>
              SEAT MAP {'\u00b7'} VIP TIER {'\u00b7'} {'\u20B1'}300
            </div>
            <div className="font-display" style={{ fontSize: 24, fontWeight: 800, color: 'var(--text)', letterSpacing: -0.5 }}>
              CAP Grand Auditorium
            </div>
          </div>

          {/* Quick counts */}
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            <CountChip color="#7CF0B8" label="CONFIRMED" value={seatMapCounts.confirmed} />
            <CountChip color="#FFD08A" label="RESERVED" value={seatMapCounts.reserved} />
            <CountChip color="var(--text-soft)" label="AVAILABLE" value={seatMapCounts.empty} />
            <CountChip color="var(--text)" label="TOTAL CAP" value={seatMapCounts.cap} />
          </div>
        </div>

        {/* Stage */}
        <div style={{
          textAlign: 'center', padding: '10px 0',
          background: 'linear-gradient(180deg, rgba(255, 27, 107, 0.18), transparent)',
          borderRadius: 8, marginBottom: 24,
          fontSize: 11, letterSpacing: 5, color: 'var(--text-muted)', fontWeight: 700, fontFamily: 'Sora',
        }}>
          {'\u25BC'} STAGE {'\u25BC'}
        </div>

        {/* Seat grid */}
        <div style={{
          overflowX: 'auto', padding: '4px 0 16px', WebkitOverflowScrolling: 'touch'
        }}>
          <div style={{ display: 'inline-block', minWidth: '100%' }}>
            {/* Column header (numbers 1-28 with aisle) */}
            <div className="seatmap-colheader-mobile" style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 8, justifyContent: 'center' }}>
              <span style={{ width: 22 }}></span>
              <div style={{ display: 'flex', gap: 4 }}>
                {[...Array(14)].map((_, i) => (
                  <span key={'l' + i} className="font-mono" style={{
                    width: 26, textAlign: 'center', fontSize: 9, color: 'var(--text-soft)', fontWeight: 700,
                  }}>{i + 1}</span>
                ))}
              </div>
              <span style={{ width: 14 }}></span>
              <div style={{ display: 'flex', gap: 4 }}>
                {[...Array(14)].map((_, i) => (
                  <span key={'r' + i} className="font-mono" style={{
                    width: 26, textAlign: 'center', fontSize: 9, color: 'var(--text-soft)', fontWeight: 700,
                  }}>{i + 15}</span>
                ))}
              </div>
            </div>

            {rowLetters.map((rowL) => {
              const rowSeats = rowsByLetter[rowL] || [];
              const leftBlock = rowSeats.filter((s) => s.seat_number <= 14);
              const rightBlock = rowSeats.filter((s) => s.seat_number > 14);
              return (
                <div key={rowL} className="seatmap-row-mobile" style={{
                  display: 'flex', alignItems: 'center', gap: 4,
                  marginBottom: 6, justifyContent: 'center',
                }}>
                  <span className="font-mono seatmap-rowlabel-mobile" style={{
                    width: 22, textAlign: 'right', fontSize: 11, color: 'var(--text-soft)', fontWeight: 700,
                  }}>{rowL}</span>
                  <div style={{ display: 'flex', gap: 4 }} className="seatmap-row-mobile">
                    {leftBlock.map((s) => (
                      <SeatCell key={s.id} seat={s} stateInfo={seatStateMap[s.id]}
                                isSelected={seatSelectedId === s.id}
                                onClick={() => setSeatSelectedId(s.id)} />
                    ))}
                  </div>
                  <span className="seatmap-aisle-mobile" style={{
                    width: 14, textAlign: 'center', fontSize: 10, color: 'var(--text-soft)',
                  }}>{'\u00b7'}</span>
                  <div style={{ display: 'flex', gap: 4 }} className="seatmap-row-mobile">
                    {rightBlock.map((s) => (
                      <SeatCell key={s.id} seat={s} stateInfo={seatStateMap[s.id]}
                                isSelected={seatSelectedId === s.id}
                                onClick={() => setSeatSelectedId(s.id)} />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Legend */}
        <div style={{
          marginTop: 22,
          display: 'flex', justifyContent: 'center', gap: 24, flexWrap: 'wrap',
          padding: '14px 18px',
          background: 'rgba(255,255,255,0.02)',
          border: '1px solid var(--border)',
          borderRadius: 10,
        }}>
          <LegendItem color="empty" label="Available" />
          <LegendItem color="reserved" label="Reserved (pending order)" />
          <LegendItem color="confirmed" label="Confirmed (ticket issued)" />
        </div>
      </div>

      {/* Detail side panel */}
      <div style={{
        position: 'sticky', top: 24,
        background: 'rgba(255,255,255,0.02)',
        border: '1px solid var(--border)', borderRadius: 14,
        padding: '22px 22px',
      }}>
        {selectedSeat ? (
          <SeatDetailPane info={selectedSeat} onClose={() => setSeatSelectedId(null)} onJumpToOrder={onJumpToOrder} />
        ) : (
          <div style={{ textAlign: 'center', padding: '40px 16px' }}>
            <div style={{ fontSize: 36, marginBottom: 10 }}>{'\ud83e\udd47'}</div>
            <div style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.6 }}>
              Click any seat to see who booked it,
              the order reference, and quick actions.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function CountChip({ color, label, value }) {
  return (
    <div style={{
      padding: '8px 14px', borderRadius: 999,
      background: 'rgba(255,255,255,0.04)',
      border: '1px solid var(--border)',
      display: 'flex', alignItems: 'center', gap: 8,
    }}>
      <span style={{
        width: 8, height: 8, borderRadius: '50%',
        background: color === 'var(--text-soft)' || color === 'var(--text)' ? color : color,
        display: 'inline-block',
      }} />
      <span className="font-mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--text-soft)', fontWeight: 700 }}>
        {label}
      </span>
      <span className="font-mono" style={{ fontSize: 14, fontWeight: 800, color: 'var(--text)' }}>
        {value}
      </span>
    </div>
  );
}

function LegendItem({ color, label }) {
  const c = SEAT_COLORS[color];
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{
        width: 16, height: 16, borderRadius: 4,
        background: c.bg, border: '1px solid ' + c.border,
        display: 'inline-block',
      }} />
      <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>{label}</span>
    </div>
  );
}

function SeatCell({ seat, stateInfo, isSelected, onClick }) {
  const state = stateInfo ? stateInfo.state : 'empty';
  const colors = isSelected ? SEAT_COLORS.selected : SEAT_COLORS[state];
  const label = seat.row_label + seat.seat_number;

  // Hover tooltip text
  let tooltip = label + ' \u00b7 ' + state.toUpperCase();
  if (stateInfo) {
    if (stateInfo.state === 'confirmed' && stateInfo.ticket) {
      tooltip += '\n' + (stateInfo.ticket.attendee_name || '') +
                 (stateInfo.ticket.ticket_code ? '\n' + stateInfo.ticket.ticket_code : '');
    } else if (stateInfo.state === 'reserved' && stateInfo.reservation && stateInfo.reservation.orders) {
      tooltip += '\n' + (stateInfo.reservation.orders.buyer_name || '');
    }
  }

  return (
    <button onClick={onClick} title={tooltip} className="seatmap-cell" style={{
      width: 26, height: 26, borderRadius: 4,
      background: colors.bg,
      border: '1px solid ' + colors.border,
      color: colors.text,
      fontSize: 9, fontWeight: 700,
      cursor: 'pointer',
      fontFamily: 'JetBrains Mono, monospace',
      padding: 0,
      transition: 'transform 0.08s, box-shadow 0.08s',
    }}
    onMouseEnter={(e) => {
      e.currentTarget.style.transform = 'scale(1.15)';
      e.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,0.35)';
      e.currentTarget.style.zIndex = '5';
    }}
    onMouseLeave={(e) => {
      e.currentTarget.style.transform = 'scale(1)';
      e.currentTarget.style.boxShadow = 'none';
      e.currentTarget.style.zIndex = 'auto';
    }}>
      {seat.seat_number}
    </button>
  );
}

function SeatDetailPane({ info, onClose, onJumpToOrder }) {
  const { state, seat_label, ticket, reservation } = info;

  let stateLabel, stateColor;
  if (state === 'confirmed') { stateLabel = 'CONFIRMED'; stateColor = '#00E676'; }
  else if (state === 'reserved') { stateLabel = 'RESERVED'; stateColor = '#FFB300'; }
  else { stateLabel = 'AVAILABLE'; stateColor = 'var(--text-soft)'; }

  const order = (reservation && reservation.orders) || null;
  const orderId = (ticket && ticket.order_id) || (reservation && reservation.order_id) || null;

  return (
    <div>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 18,
      }}>
        <div className="font-mono" style={{
          fontSize: 10, letterSpacing: 2.5, color: 'var(--text-soft)',
          fontWeight: 700,
        }}>
          SEAT DETAIL
        </div>
        <button onClick={onClose} style={{
          width: 26, height: 26, borderRadius: '50%',
          background: 'rgba(255,255,255,0.05)',
          border: '1px solid rgba(255,255,255,0.1)',
          color: 'var(--text)', cursor: 'pointer',
          fontSize: 14, lineHeight: 1, padding: 0,
          fontFamily: 'inherit',
        }}>{'\u00d7'}</button>
      </div>

      <div className="font-display" style={{
        fontSize: 42, fontWeight: 800, color: 'var(--text)',
        letterSpacing: -1, marginBottom: 4,
      }}>
        {seat_label}
      </div>
      <div style={{
        display: 'inline-block',
        padding: '4px 10px', borderRadius: 999,
        background: 'rgba(255,255,255,0.04)',
        border: '1px solid ' + (state === 'confirmed' ? 'rgba(0, 230, 118, 0.35)'
                              : state === 'reserved' ? 'rgba(255, 179, 0, 0.35)'
                              : 'var(--border)'),
        marginBottom: 22,
      }}>
        <span className="font-mono" style={{
          fontSize: 10, letterSpacing: 2, color: stateColor, fontWeight: 700,
        }}>{stateLabel}</span>
      </div>

      {state === 'confirmed' && ticket && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <SeatKV label="Attendee" value={ticket.attendee_name || '\u2014'} />
          <SeatKV label="Ticket code" value={ticket.ticket_code || '\u2014'} mono />
          {ticket.attendee_email && <SeatKV label="Email" value={ticket.attendee_email} />}
          {ticket.attendee_phone && <SeatKV label="Phone" value={ticket.attendee_phone} />}
          <SeatKV label="Issued" value={ticket.created_at ? formatDT(ticket.created_at) : '\u2014'} />
          {orderId && (
            <button onClick={() => onJumpToOrder(orderId)} style={{
              marginTop: 6,
              padding: '10px 14px', borderRadius: 8,
              background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
              border: 'none', color: 'white', cursor: 'pointer',
              fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
              fontFamily: 'inherit',
            }}>
              JUMP TO ORDER {"\u2192"}
            </button>
          )}
        </div>
      )}

      {state === 'reserved' && order && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <SeatKV label="Buyer" value={order.buyer_name || '\u2014'} />
          {order.buyer_email && <SeatKV label="Email" value={order.buyer_email} />}
          <SeatKV label="Order" value={order.order_number || ('#' + (orderId || '').slice(0, 8))} mono />
          <SeatKV label="Total" value={'\u20B1' + Number(order.total || 0).toLocaleString()} />
          <SeatKV label="Status" value={(order.status || '').replace(/_/g, ' ').toUpperCase()} />
          {orderId && (
            <button onClick={() => onJumpToOrder(orderId)} style={{
              marginTop: 6,
              padding: '10px 14px', borderRadius: 8,
              background: 'linear-gradient(135deg, #FF1B6B, #C724FF)',
              border: 'none', color: 'white', cursor: 'pointer',
              fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
              fontFamily: 'inherit',
            }}>
              JUMP TO ORDER {"\u2192"}
            </button>
          )}
        </div>
      )}

      {state === 'empty' && (
        <div style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.6 }}>
          This seat is available. It will appear here once a buyer adds it
          to their cart or completes a purchase.
        </div>
      )}
    </div>
  );
}

function SeatKV({ label, value, mono }) {
  return (
    <div>
      <div className="font-mono" style={{
        fontSize: 9, letterSpacing: 1.8, color: 'var(--text-soft)',
        fontWeight: 700, marginBottom: 3,
      }}>{label.toUpperCase()}</div>
      <div style={{
        fontSize: 14, color: 'var(--text)', fontWeight: 500,
        fontFamily: mono ? 'JetBrains Mono, monospace' : 'inherit',
        wordBreak: 'break-word',
      }}>{value}</div>
    </div>
  );
}

// ============================================================
// EXPENSE MODAL — add / edit an expense
// ============================================================
function ExpenseModal({ initial, onClose, onSave }) {
  const [form, setForm] = useState({
    id: initial && initial.id ? initial.id : null,
    category: initial && initial.category ? initial.category : 'venue',
    description: initial && initial.description ? initial.description : '',
    amount: initial && initial.amount ? String(initial.amount) : '',
    vendor: initial && initial.vendor ? initial.vendor : '',
    paid_at: initial && initial.paid_at ? initial.paid_at : new Date().toISOString().slice(0, 10),
    payment_method: initial && initial.payment_method ? initial.payment_method : '',
    notes: initial && initial.notes ? initial.notes : '',
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);

  const update = (field) => (e) => setForm({ ...form, [field]: e.target.value });

  const submit = async (e) => {
    e.preventDefault();
    setError(null);
    if (!form.description.trim()) return setError('Description is required.');
    const amt = Number(form.amount);
    if (!amt || amt <= 0) return setError('Amount must be greater than 0.');
    setSaving(true);
    await onSave(form);
    setSaving(false);
  };

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, zIndex: 100,
      background: 'rgba(8, 2, 15, 0.85)',
      backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 20,
    }}>
      <form onSubmit={submit} onClick={(e) => e.stopPropagation()} style={{
        maxWidth: 560, width: '100%',
        borderRadius: 14,
        background: '#0E0420',
        border: '1px solid rgba(255,255,255,0.1)',
        boxShadow: '0 30px 80px rgba(0,0,0,0.6)',
        display: 'flex', flexDirection: 'column',
        maxHeight: '90vh',
        overflow: 'hidden',
      }}>
        <div style={{
          padding: '18px 24px', borderBottom: '1px solid rgba(255,255,255,0.08)',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          flexShrink: 0,
        }}>
          <div>
            <div className="font-mono" style={{
              fontSize: 10, letterSpacing: 2.5, color: 'var(--brand)',
              fontWeight: 700, marginBottom: 4,
            }}>
              {initial ? 'EDIT EXPENSE' : 'NEW EXPENSE'}
            </div>
            <div className="font-display" style={{
              fontSize: 20, fontWeight: 800, color: 'var(--text)',
              letterSpacing: -0.3,
            }}>
              Track outgoing money
            </div>
          </div>
          <button type="button" onClick={onClose} style={{
            width: 32, height: 32, borderRadius: '50%',
            background: 'rgba(255,255,255,0.05)',
            border: '1px solid rgba(255,255,255,0.1)',
            color: 'var(--text)', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 18, lineHeight: 1, padding: 0,
            fontFamily: 'inherit',
          }}>×</button>
        </div>

        <div style={{ padding: '24px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div>
            <label style={modalLabelStyle}>CATEGORY *</label>
            <select value={form.category} onChange={update('category')} required
              style={modalInputStyle}>
              {EXPENSE_CATEGORIES.map((c) => (
                <option key={c.key} value={c.key}>{c.label}</option>
              ))}
            </select>
          </div>

          <div>
            <label style={modalLabelStyle}>DESCRIPTION *</label>
            <input type="text" value={form.description} onChange={update('description')} required
              placeholder="e.g. Venue rental deposit, Trophies x5, Sound rental"
              style={modalInputStyle} />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div>
              <label style={modalLabelStyle}>AMOUNT (₱) *</label>
              <input type="number" step="0.01" min="0" value={form.amount} onChange={update('amount')} required
                placeholder="0.00"
                style={modalInputStyle} />
            </div>
            <div>
              <label style={modalLabelStyle}>PAID ON</label>
              <input type="date" value={form.paid_at} onChange={update('paid_at')}
                style={modalInputStyle} />
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div>
              <label style={modalLabelStyle}>VENDOR</label>
              <input type="text" value={form.vendor} onChange={update('vendor')}
                placeholder="Who you paid"
                style={modalInputStyle} />
            </div>
            <div>
              <label style={modalLabelStyle}>PAYMENT METHOD</label>
              <input type="text" value={form.payment_method} onChange={update('payment_method')}
                placeholder="GCash, Bank, Cash..."
                style={modalInputStyle} />
            </div>
          </div>

          <div>
            <label style={modalLabelStyle}>NOTES</label>
            <textarea value={form.notes} onChange={update('notes')}
              rows={3}
              placeholder="Optional context, OR receipt number, etc."
              style={{...modalInputStyle, resize: 'vertical', fontFamily: 'Sora, sans-serif'}} />
          </div>

          {error && (
            <div style={{
              padding: '10px 14px', borderRadius: 8,
              background: 'rgba(255, 23, 68, 0.1)',
              border: '1px solid rgba(255, 23, 68, 0.4)',
              color: '#FFA0A0', fontSize: 13,
            }}>
              {error}
            </div>
          )}
        </div>

        <div style={{
          padding: '16px 24px', borderTop: '1px solid rgba(255,255,255,0.08)',
          display: 'flex', justifyContent: 'flex-end', gap: 10,
          flexShrink: 0,
        }}>
          <button type="button" onClick={onClose} style={{
            padding: '10px 18px', borderRadius: 8,
            background: 'transparent',
            border: '1px solid rgba(255,255,255,0.15)',
            color: 'var(--text-muted)', cursor: 'pointer',
            fontSize: 12, fontWeight: 600, letterSpacing: 0.5,
            fontFamily: 'inherit',
          }}>
            CANCEL
          </button>
          <button type="submit" disabled={saving} style={{
            padding: '10px 20px', borderRadius: 8,
            background: saving ? 'rgba(255,27,107,0.4)' : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            border: 'none', cursor: saving ? 'wait' : 'pointer',
            color: 'white',
            fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
            fontFamily: 'inherit',
            boxShadow: saving ? 'none' : '0 8px 24px rgba(255,27,107,0.35)',
          }}>
            {saving ? 'SAVING...' : (initial ? 'UPDATE EXPENSE' : 'ADD EXPENSE')}
          </button>
        </div>
      </form>
    </div>
  );
}

// BudgetModal — add / edit a budget line. Multiple lines per category allowed

function BudgetModal({ initial, onClose, onSave }) {
  const [form, setForm] = useState({
    id: initial && initial.id ? initial.id : null,
    category: initial && initial.category ? initial.category : 'venue',
    allocated: initial && initial.allocated != null ? String(initial.allocated) : '',
    label: initial && initial.label ? initial.label : '',
    notes: initial && initial.notes ? initial.notes : '',
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);

  const update = (field) => (e) => setForm({ ...form, [field]: e.target.value });

  const submit = async (e) => {
    e.preventDefault();
    setError(null);
    const amt = Number(form.allocated);
    if (!amt || amt <= 0) return setError('Allocated amount must be greater than 0.');

    await onSave(form);
    setSaving(false);
  };

            }}>

          <button type="button" onClick={onClose} style={{

        <div style={{ padding: '24px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div>
            <label style={modalLabelStyle}>CATEGORY *</label>
            <select value={form.category} onChange={update('category')} required
              style={modalInputStyle}>
              {EXPENSE_CATEGORIES.map((c) => (
                <option key={c.key} value={c.key}>{c.label}</option>

          </div>

          <div>

            <input type="number" step="0.01" min="0" value={form.allocated} onChange={update('allocated')} required
              placeholder="0.00"
              style={modalInputStyle} />
          </div>

          <div>
            <label style={modalLabelStyle}>LABEL (OPTIONAL)</label>
            <input type="text" value={form.label} onChange={update('label')}
              placeholder="e.g. Hall rental, Deposit, Trophies"
              style={modalInputStyle} />
            <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 6, lineHeight: 1.5 }}>
              Use this when you have multiple lines for the same category (e.g. Venue: Hall, Venue: Deposit).
            </div>
          </div>

          <div>
            <label style={modalLabelStyle}>NOTES (OPTIONAL)</label>
            <textarea value={form.notes} onChange={update('notes')} rows="3"
              placeholder="Context, assumptions, who approved this allocation..."
              style={{ ...modalInputStyle, resize: 'vertical', minHeight: 70, fontFamily: 'inherit' }} />
          </div>

          {error && (
            <div style={{
              padding: '10px 12px', borderRadius: 8,
              background: 'rgba(255,23,68,0.08)',
              border: '1px solid rgba(255,23,68,0.3)',
              color: '#FF6B7F', fontSize: 12, fontWeight: 600,
            }}>
              {error}
            </div>
          )}
        </div>

        <div style={{
          padding: '14px 24px', borderTop: '1px solid rgba(255,255,255,0.08)',
          display: 'flex', justifyContent: 'flex-end', gap: 10,
          flexShrink: 0,
        }}>
          <button type="button" onClick={onClose} style={{
            padding: '10px 18px', borderRadius: 8,
            background: 'transparent',
            border: '1px solid rgba(255,255,255,0.15)',
            color: 'var(--text-muted)', cursor: 'pointer',
            fontSize: 12, fontWeight: 600, letterSpacing: 0.5,
            fontFamily: 'inherit',
          }}>
            CANCEL
          </button>
          <button type="submit" disabled={saving} style={{
            padding: '10px 20px', borderRadius: 8,
            background: saving ? 'rgba(255,27,107,0.4)' : 'linear-gradient(135deg, #FF1B6B, #C724FF)',
            border: 'none', cursor: saving ? 'wait' : 'pointer',
            color: 'white',
            fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
            fontFamily: 'inherit',
            boxShadow: saving ? 'none' : '0 8px 24px rgba(255,27,107,0.35)',
          }}>
            {saving ? 'SAVING...' : (initial ? 'UPDATE BUDGET' : 'ADD BUDGET LINE')}
          </button>
        </div>
      </form>
    </div>
  );
}

            { key: 'walkin', label: 'Walk-ins', color: '#FFB300' },
            { key: 'registration', label: 'Performers', color: TIER_COLORS.P },
          ].map((s) => {
            const active = ticketSourceFilter === s.key;
            const c = s.color || '#FFFFFF';
            return (
              <button key={s.key} onClick={() => setTicketSourceFilter(s.key)}
                style={{
                  padding: '4px 11px', borderRadius: 999,
                  background: active ? c + '22' : 'rgba(255,255,255,0.03)',
                  border: '1px solid ' + (active ? c + '60' : 'rgba(255,255,255,0.08)'),
                  color: active ? c : 'var(--text-muted)',
                  fontSize: 11, fontWeight: 600, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>
                {s.label}
              </button>
            );
          })}
        </div>

        {/* Table */}
        {filteredTickets.length === 0 ? (
          <div style={{ padding: 60, textAlign: 'center', color: 'var(--text-muted)' }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6, color: 'var(--text)' }}>
              {tickets.length === 0 ? 'No tickets generated yet' : 'No tickets match your filters'}
            </div>
            <div style={{ fontSize: 12 }}>
              {tickets.length === 0
                ? 'Confirm an order in the Orders tab to auto-generate tickets.'
                : 'Adjust filters or clear search.'}
            </div>
          </div>
        ) : (
          <div style={{ maxHeight: 'calc(100vh - 420px)', overflow: 'auto' }}>
            {filteredTickets.map((t) => (
              <TicketRow key={t.id}
                ticket={t}
                selected={t.id === ticketSelectedId}
                onClick={() => setTicketSelectedId(t.id)} />
            ))}
          </div>
        )}
      </div>

      {selectedTicket && (
        <TicketDetailPanel
          ticket={selectedTicket}
          onClose={() => setTicketSelectedId(null)}
          onDownloadPDF={onDownloadPDF}
          onTransfer={onTransfer}
          onCancel={onCancel}
        />
      )}
    </div>
  );
}

function TicketStat({ label, value, color }) {

      padding: '6px 12px', borderRadius: 8,
      background: color ? color + '12' : 'rgba(255,255,255,0.04)',

      <div className="font-mono" style={{
        fontSize: 9, letterSpacing: 1.5,

      <div className="font-display" style={{

function TicketRow({ ticket: t, selected, onClick }) {
  const accent = TIER_COLORS[t.tier_code] || '#FFFFFF';
  return (
    <div onClick={onClick}
      style={{
        padding: '12px 18px',
        borderBottom: '1px solid rgba(255,255,255,0.04)',
        cursor: 'pointer',
        background: selected ? 'linear-gradient(90deg, rgba(255,27,107,0.10), rgba(199,36,255,0.05))' : 'transparent',
        borderLeft: '3px solid ' + (selected ? accent : 'transparent'),
        display: 'grid',
        gridTemplateColumns: '110px 1fr auto',
        gap: 14, alignItems: 'center',
        transition: 'background 0.15s',
      }}
      onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = 'rgba(255,255,255,0.025)'; }}
      onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}>
      <div className="font-mono" style={{
        fontSize: 12, color: 'var(--text)', fontWeight: 700,
        letterSpacing: 0.5,
      }}>
        {t.ticket_code}
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{
          fontSize: 13, fontWeight: 700, color: 'var(--text)',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          marginBottom: 3,
        }}>
          {t.attendee_name}
        </div>
        <div style={{
          fontSize: 11, color: 'var(--text-muted)',
          display: 'flex', gap: 8, flexWrap: 'wrap',
        }}>
          <span style={{ color: accent, fontWeight: 700 }}>
            {TIER_LABELS_FULL[t.tier_code] || '—'}
          </span>
          {t.seat_label && <span>· {t.seat_label}</span>}
          {t.section && !t.seat_label && <span>· {t.section}</span>}
          {t.group_name && <span>· {t.group_name}</span>}
          {t.is_walk_in && (
            <span style={{
              padding: '0 5px', borderRadius: 3,
              background: 'rgba(255, 179, 0, 0.12)',
