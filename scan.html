<!-- QR camera library: try jsdelivr first (more reliable in PH), fall back to unpkg -->
<script>
  (function() {
    function loadScript(src, onok, onerr) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = onok;
      s.onerror = onerr;
      document.head.appendChild(s);
    }
    // Try jsdelivr (well-cached in Asia), then unpkg
    loadScript(
      'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.10/html5-qrcode.min.js',
      function(){ console.log('[QR] loaded from jsdelivr'); },
      function(){
        console.warn('[QR] jsdelivr failed, trying unpkg');
        loadScript(
          'https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js',
          function(){ console.log('[QR] loaded from unpkg'); },
          function(){
            console.warn('[QR] unpkg failed, trying cdnjs');
            loadScript(
              'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js',
              function(){ console.log('[QR] loaded from cdnjs'); },
              function(){ console.error('[QR] ALL CDNs FAILED'); }
            );
          }
        );
      }
    );
  })();
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// SUPABASE
// ============================================================
const SUPABASE_URL = 'https://zxichjnifawondqqbrxn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4aWNoam5pZmF3b25kcXFicnhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ4OTAyMzcsImV4cCI6MjA2MDQ2NjIzN30.PVtBOmJX1aKjGm4-X4HehL56JuMK_jHL_Wmtj2sLDcs';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// HELPERS
// ============================================================
const fmtTime = (iso) => {
  if (!iso) return '\u2014';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-PH', { hour: 'numeric', minute: '2-digit', hour12: true });
};
const fmtDate = (iso) => {
  if (!iso) return '\u2014';
  return new Date(iso).toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
};

// Vibrate + beep helpers (gracefully degrade if not supported)
const vibrate = (pattern) => {
  if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
};
const beep = (freq, duration) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.value = 0.18;
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000);
  } catch (e) {}
};

// Tier helpers
const TIER_LABEL = { V: 'VIP', R: 'Regular', P: 'Participant' };
const tierLabel = (code) => TIER_LABEL[code] || code || '\u2014';

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [activeTab, setActiveTab] = useState('scan'); // 'scan' | 'groups'
  const [showSettings, setShowSettings] = useState(false);
  const [showLookup, setShowLookup] = useState(false);

  // Staff identity (persisted to localStorage so they don't pick on every reload)
  const [staffName, setStaffName] = useState(() => localStorage.getItem('dkc_scan_staff') || '');

  // Settings (persisted)
  const [soundOn, setSoundOn] = useState(() => localStorage.getItem('dkc_scan_sound') !== 'off');
  const [vibrateOn, setVibrateOn] = useState(() => localStorage.getItem('dkc_scan_vibrate') !== 'off');

  // Live counters
  const [counters, setCounters] = useState({
    total: { used: 0, cap: 590 },
    V: { used: 0, cap: 140 },
    R: { used: 0, cap: 300 },
    P: { used: 0, cap: 150 },
  });

  // Most recent scans for the bottom strip (last 5 visible)
  const [recentScans, setRecentScans] = useState([]);

  // The currently displayed scan result panel (null = camera idle)
  // Shape: { kind: 'valid'|'duplicate'|'invalid'|'notfound', ticket?, message? }
  const [scanResult, setScanResult] = useState(null);

  // Staff roster — hardcoded for v1. Edit this list as needed; update with the
  // names of the people working the door. The dropdown value is what gets
  // recorded in tickets.scanned_by on every check-in.
  //
  // TODO (next session): move this to app_settings so it's manageable from admin
  // without redeploying. For now, edit + redeploy when door staff change.
  const STAFF_ROSTER = [
    'Kyla Don',
    'Door Staff 1',
    'Door Staff 2',
    'Door Staff 3',
    'Volunteer A',
    'Volunteer B',
  ];
  const staffOptions = STAFF_ROSTER.map((n) => ({ value: n, label: n }));

  // ===== Fetch + subscribe to counters =====
  const fetchCounters = useCallback(async () => {
    // Single query: count active tickets by tier, and how many have scanned_at set
    const { data, error } = await supabase
      .from('tickets')
      .select('tier_code, scanned_at, status, reissued_to_ticket_id');
    if (error) {
      console.error('Counter fetch error:', error);
      return;
    }
    const c = {
      total: { used: 0, cap: 590 },
      V: { used: 0, cap: 140 },
      R: { used: 0, cap: 300 },
      P: { used: 0, cap: 150 },
    };
    (data || []).forEach((t) => {
      if (t.status === 'cancelled' || t.reissued_to_ticket_id) return;
      const tier = t.tier_code || '?';
      if (t.scanned_at) {
        c.total.used++;
        if (c[tier]) c[tier].used++;
      }
    });
    setCounters(c);
  }, []);

  useEffect(() => {
    fetchCounters();
    const ch = supabase.channel('scanner-tickets')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tickets' },
          () => fetchCounters())
      .subscribe();
    return () => supabase.removeChannel(ch);
  }, [fetchCounters]);

  // ===== Persist settings =====
  const updateStaff = (val) => {
    setStaffName(val);
    localStorage.setItem('dkc_scan_staff', val);
  };
  const toggleSound = () => {
    setSoundOn((v) => { localStorage.setItem('dkc_scan_sound', !v ? 'on' : 'off'); return !v; });
  };
  const toggleVibrate = () => {
    setVibrateOn((v) => { localStorage.setItem('dkc_scan_vibrate', !v ? 'on' : 'off'); return !v; });
  };

  // ===== Process a scanned QR token (or manually selected ticket) =====
  // This is the heart of the scanner. Called by:
  //   - Camera scan handler (qr_token decoded from QR)
  //   - Manual lookup (ticketId)
  //   - "Override admit anyway" button (forceOverride=true)
  const processScan = useCallback(async (input) => {
    // input shape: { qrToken } OR { ticketId } OR { ticketId, forceOverride }
    const { qrToken, ticketId, forceOverride } = input;
    let ticket;
    let lookupError;

    if (qrToken) {
      const res = await supabase
        .from('tickets')
        .select('*')
        .eq('qr_token', qrToken)
        .maybeSingle();
      ticket = res.data; lookupError = res.error;
    } else if (ticketId) {
      const res = await supabase
        .from('tickets')
        .select('*')
        .eq('id', ticketId)
        .maybeSingle();
      ticket = res.data; lookupError = res.error;
    }

    if (lookupError) {
      setScanResult({ kind: 'notfound', message: 'Lookup error: ' + lookupError.message });
      if (soundOn) beep(180, 400);
      if (vibrateOn) vibrate([200, 100, 200]);
      return;
    }

    if (!ticket) {
      setScanResult({ kind: 'notfound', message: 'This QR does not match any DKC 2026 ticket.' });
      if (soundOn) beep(180, 400);
      if (vibrateOn) vibrate([200, 100, 200]);
      return;
    }

    // Cancelled/voided/reissued tickets are invalid
    if (ticket.status === 'cancelled' || ticket.reissued_to_ticket_id) {
      const reason = ticket.reissued_to_ticket_id
        ? 'This ticket was reissued. The buyer should be using a newer ticket.'
        : 'This ticket was cancelled or voided.';
      setScanResult({ kind: 'invalid', ticket, message: reason });
      if (soundOn) beep(180, 400);
      if (vibrateOn) vibrate([200, 100, 200]);
      return;
    }

    // Duplicate: already used
    if (ticket.scanned_at && !forceOverride) {
      setScanResult({ kind: 'duplicate', ticket });
      if (soundOn) { beep(180, 200); setTimeout(() => beep(180, 200), 240); setTimeout(() => beep(180, 200), 480); }
      if (vibrateOn) vibrate([200, 100, 200, 100, 200]);
      return;
    }

    // Valid scan — mark used (or record override)
    const now = new Date().toISOString();
    const updates = {
      scanned_at: ticket.scanned_at || now, // preserve original scanned_at if overriding
      scanned_by: ticket.scanned_by || (staffName || 'unknown'),
      last_scan_at: now,
    };
    if (forceOverride) {
      updates.scan_overrides = (ticket.scan_overrides || 0) + 1;
    } else {
      // status flips to 'used' only on first admit, not on overrides
      updates.status = 'used';
    }

    // RACE-CONDITION GUARD:
    // If two staff scan the same QR within milliseconds, both reads see
    // scanned_at=null and both try to admit. Without a guard, both succeed
    // and the buyer gets in twice. The fix: for the FIRST-admit path
    // (not override), also filter .is('scanned_at', null). If another
    // staff already won the race, our UPDATE matches 0 rows. We then
    // re-query to surface the duplicate to the second staff.
    let q = supabase.from('tickets').update(updates).eq('id', ticket.id);
    if (!forceOverride) {
      q = q.is('scanned_at', null);
    }
    const upd = await q.select().maybeSingle();
    if (upd.error) {
      setScanResult({ kind: 'notfound', message: 'Could not check in: ' + upd.error.message });
      if (soundOn) beep(180, 400);
      if (vibrateOn) vibrate([200, 100, 200]);
      return;
    }

    // If first-admit and update returned no row, another staff won the race.
    // Re-fetch the ticket and show it as a duplicate.
    if (!forceOverride && !upd.data) {
      const reread = await supabase.from('tickets').select('*').eq('id', ticket.id).maybeSingle();
      const winnerTicket = (reread.data || ticket);
      setScanResult({ kind: 'duplicate', ticket: winnerTicket });
      if (soundOn) { beep(180, 200); setTimeout(() => beep(180, 200), 240); setTimeout(() => beep(180, 200), 480); }
      if (vibrateOn) vibrate([200, 100, 200, 100, 200]);
      return;
    }

    setScanResult({
      kind: forceOverride ? 'override' : 'valid',
      ticket: upd.data || { ...ticket, ...updates },
    });
    if (soundOn) beep(880, 150);
    if (vibrateOn) vibrate(60);

    // Add to recent scans (keep last 5)
    setRecentScans((prev) => [{
      id: ticket.id,
      name: ticket.attendee_name,
      code: ticket.ticket_code,
      tier: ticket.tier_code,
      seat: ticket.seat_label,
      ts: now,
      kind: forceOverride ? 'override' : 'valid',
    }, ...prev].slice(0, 5));

    fetchCounters();
  }, [staffName, soundOn, vibrateOn, fetchCounters]);

  // ===== Dismiss a result panel (returns to camera idle) =====
  const dismissResult = () => setScanResult(null);

  // ===== Override admit (from duplicate panel) =====
  const overrideAdmit = (ticket) => {
    processScan({ ticketId: ticket.id, forceOverride: true });
  };

  return (
    <div style={{ minHeight: '100vh', maxWidth: 520, margin: '0 auto' }}>
      <Header
        onSettings={() => setShowSettings(true)}
        counters={counters} />

      <StaffBar
        staffName={staffName}
        staffOptions={staffOptions}
        onChange={updateStaff} />

      {activeTab === 'scan' && (
        <ScanTab
          scanResult={scanResult}
          onScanned={processScan}
          onDismiss={dismissResult}
          onOverride={overrideAdmit}
          onOpenLookup={() => setShowLookup(true)}
          recentScans={recentScans}
          staffName={staffName} />
      )}

      {activeTab === 'groups' && (
        <GroupsTab />
      )}

      <TabBar active={activeTab} onChange={setActiveTab} />

      {showSettings && (
        <SettingsModal
          onClose={() => setShowSettings(false)}
          staffName={staffName}
          staffOptions={staffOptions}
          onStaffChange={updateStaff}
          soundOn={soundOn}
          vibrateOn={vibrateOn}
          onToggleSound={toggleSound}
          onToggleVibrate={toggleVibrate} />
      )}

      {showLookup && (
        <LookupModal
          onClose={() => setShowLookup(false)}
          onPickTicket={(ticketId) => {
            setShowLookup(false);
            processScan({ ticketId });
          }} />
      )}
    </div>
  );
}

// ============================================================
// HEADER — title + counters + settings button
// ============================================================
function Header({ onSettings, counters }) {
  return (
    <div style={{
      padding: '16px 18px 14px',
      borderBottom: '1px solid var(--border)',
      background: 'rgba(8,2,15,0.95)',
      position: 'sticky', top: 0, zIndex: 30,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: -0.3 }}>
            DKC 2026 Scanner
          </div>
          <div className="font-mono" style={{ fontSize: 10, color: 'var(--text-soft)', letterSpacing: 1, marginTop: 2 }}>
            CAP GRAND AUDITORIUM
          </div>
        </div>
        <button onClick={onSettings} aria-label="Settings" style={{
          width: 38, height: 38, background: 'rgba(255,255,255,0.06)',
          border: '1px solid var(--border)', borderRadius: 10, padding: 0,
          color: 'var(--text)', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>

      {/* Counters row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
        <CounterTile label="TOTAL" used={counters.total.used} cap={counters.total.cap} tone="brand" />
        <CounterTile label="VIP" used={counters.V.used} cap={counters.V.cap} tone="vip" />
        <CounterTile label="REG" used={counters.R.used} cap={counters.R.cap} tone="reg" />
        <CounterTile label="PERF" used={counters.P.used} cap={counters.P.cap} tone="perf" />
      </div>
    </div>
  );
}

function CounterTile({ label, used, cap, tone }) {
  const colors = {
    brand: { bg: 'rgba(255,27,107,0.1)', border: 'rgba(255,27,107,0.3)', accent: '#FF1B6B' },
    vip: { bg: 'rgba(255,179,0,0.08)', border: 'rgba(255,179,0,0.3)', accent: '#FFB300' },
    reg: { bg: 'rgba(0,229,255,0.08)', border: 'rgba(0,229,255,0.3)', accent: '#00E5FF' },
    perf: { bg: 'rgba(199,36,255,0.08)', border: 'rgba(199,36,255,0.3)', accent: '#C724FF' },
  };
  const c = colors[tone] || colors.brand;
  const pct = cap > 0 ? Math.min(100, Math.round((used / cap) * 100)) : 0;
  return (
    <div style={{
      background: c.bg, border: '1px solid ' + c.border,
      borderRadius: 8, padding: '6px 8px',
    }}>
      <div className="font-mono" style={{ fontSize: 8, color: c.accent, letterSpacing: 1.2, fontWeight: 700 }}>
        {label}
      </div>
      <div className="font-mono" style={{ fontSize: 14, fontWeight: 800, color: 'var(--text)', marginTop: 1 }}>
        {used}<span style={{ color: 'var(--text-soft)', fontWeight: 500 }}>/{cap}</span>
      </div>
    </div>
  );
}

// ============================================================
// SCAN TAB — camera + scan result panel + recent scans
// ============================================================
function ScanTab({ scanResult, onScanned, onDismiss, onOverride, onOpenLookup, recentScans, staffName }) {
  const scannerRef = useRef(null);
  const html5QrRef = useRef(null);
  const lastScannedRef = useRef({ token: '', ts: 0 });
  const [cameraError, setCameraError] = useState(null);
  const [cameraStarted, setCameraStarted] = useState(false);
  // iOS Safari/Chrome require a user gesture before getUserMedia. Default to
  // false until staff taps "Enable camera". After first activation, restarts
  // happen automatically when overlays dismiss (since the user has now
  // granted permission for the session).
  const [cameraActivated, setCameraActivated] = useState(false);
  const [libReady, setLibReady] = useState(false);

  // Wait for the html5-qrcode library to load from one of the CDNs.
  useEffect(() => {
    let cancelled = false;
    const check = () => {
      if (cancelled) return;
      if (window.Html5Qrcode) {
        setLibReady(true);
        return;
      }
      setTimeout(check, 200);
    };
    check();
    return () => { cancelled = true; };
  }, []);

  // Start the camera ONCE the user has activated it, library is ready, and
  // no scan-result overlay is currently visible. Stop the camera when an
  // overlay shows (so subsequent scans are intentional) and restart when
  // it dismisses.
  useEffect(() => {
    if (!cameraActivated) return;
    if (!libReady) return;
    if (scanResult) return; // paused — overlay is visible

    let cancelled = false;
    let scanner = null;
    const startScanner = async () => {
      try {
        scanner = new window.Html5Qrcode('qr-camera', { verbose: false });
        html5QrRef.current = scanner;

        const onSuccess = (decodedText) => {
          // Debounce — same token within 1.5s is ignored (camera fires multiple times)
          const now = Date.now();
          if (lastScannedRef.current.token === decodedText && now - lastScannedRef.current.ts < 1500) {
            return;
          }
          lastScannedRef.current = { token: decodedText, ts: now };
          onScanned({ qrToken: decodedText });
        };
        const onScanError = () => { /* ignore per-frame failures */ };

        await scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1.0 },
          onSuccess, onScanError
        );
        if (!cancelled) setCameraStarted(true);
      } catch (e) {
        if (!cancelled) {
          console.error('Camera start failed:', e);
          // Distinguish permission errors from other failures so the message
          // is actionable. iOS throws NotAllowedError for denied permission.
          let msg = e.message || 'Could not start camera.';
          if (e.name === 'NotAllowedError' || /permission|denied/i.test(msg)) {
            msg = 'Camera permission was denied. On iOS: Settings \u2192 your browser \u2192 Camera \u2192 Allow. Then refresh.';
          } else if (e.name === 'NotFoundError') {
            msg = 'No camera found on this device.';
          } else if (e.name === 'NotReadableError') {
            msg = 'Camera is in use by another app. Close other camera apps and try again.';
          }
          setCameraError(msg);
          setCameraStarted(false);
        }
      }
    };
    startScanner();

    return () => {
      cancelled = true;
      if (scanner) {
        scanner.stop().catch(() => {});
        scanner.clear().catch(() => {});
      }
    };
  }, [scanResult, onScanned, cameraActivated, libReady]);

  return (
    <div style={{ padding: '14px 18px 90px' }}>
      {!staffName && (
        <div style={{
          padding: '10px 14px', marginBottom: 14,
          background: 'rgba(255,179,0,0.1)', border: '1px solid rgba(255,179,0,0.3)',
          borderRadius: 10, fontSize: 13, color: '#FFD08A',
        }}>
          Pick your name above before scanning so check-ins log to you.
        </div>
      )}

      {/* CAMERA + scan result overlay */}
      <div style={{ position: 'relative', marginBottom: 18 }}>
        <div ref={scannerRef} id="qr-camera" style={{ minHeight: cameraActivated ? 240 : 0 }} />

        {/* Initial activation button — required for iOS Safari/Chrome which
            need a user gesture before getUserMedia() is allowed. */}
        {!cameraActivated && !cameraError && (
          <div style={{
            padding: '40px 20px', textAlign: 'center',
            background: 'rgba(255,255,255,0.03)',
            border: '2px dashed rgba(255,27,107,0.3)',
            borderRadius: 12,
          }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>{'\ud83d\udcf7'}</div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>
              Camera not started
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-soft)', marginBottom: 18, lineHeight: 1.5 }}>
              Tap below to turn on the camera. Your browser will ask for permission {'\u2014'} tap Allow.
            </div>
            <button onClick={() => {
              if (!libReady) {
                setCameraError('QR library still loading. Wait a moment and try again, or refresh the page.');
                return;
              }
              setCameraError(null);
              setCameraActivated(true);
            }} style={{
              padding: '14px 28px',
              background: 'linear-gradient(135deg, #FF1B6B 0%, #C724FF 100%)',
              color: 'white', border: 'none', borderRadius: 999,
              fontSize: 14, fontWeight: 800, letterSpacing: 1.2,
              cursor: 'pointer',
              boxShadow: '0 8px 24px rgba(255,27,107,0.4)',
            }}>
              {libReady ? 'ENABLE CAMERA' : 'LOADING\u2026'}
            </button>
          </div>
        )}

        {cameraError && (
          <div style={{
            padding: '20px 16px',
            background: 'rgba(255,23,68,0.1)', border: '1px solid rgba(255,23,68,0.3)',
            borderRadius: 12, fontSize: 14, color: '#FF7A8E', marginTop: cameraActivated ? -12 : 0,
          }}>
            <strong style={{ display: 'block', marginBottom: 4 }}>Camera not available</strong>
            {cameraError}
            <button onClick={() => {
              setCameraError(null);
              setCameraActivated(false);
            }} style={{
              marginTop: 10, padding: '8px 14px',
              background: 'rgba(255,255,255,0.1)',
              border: '1px solid rgba(255,255,255,0.2)',
              color: 'var(--text)', borderRadius: 8,
              fontSize: 12, fontWeight: 700, cursor: 'pointer',
            }}>
              TRY AGAIN
            </button>
          </div>
        )}

        {!cameraError && cameraActivated && cameraStarted && !scanResult && (
          <div style={{
            position: 'absolute', bottom: 12, left: 12, right: 12,
            textAlign: 'center', color: 'rgba(255,255,255,0.8)',
            fontSize: 12, fontWeight: 600, letterSpacing: 0.5,
            textShadow: '0 1px 4px rgba(0,0,0,0.7)',
            pointerEvents: 'none',
          }}>
            Point at the QR code on the ticket
          </div>
        )}

        {scanResult && (
          <ScanResultPanel
            result={scanResult}
            onDismiss={onDismiss}
            onOverride={onOverride} />
        )}
      </div>

      {/* Manual lookup button */}
      <button onClick={onOpenLookup} style={{
        width: '100%', padding: '14px 16px',
        background: 'rgba(255,255,255,0.04)',
        border: '1px solid var(--border)',
        borderRadius: 10, color: 'var(--text)',
        fontSize: 14, fontWeight: 600,
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        cursor: 'pointer', marginBottom: 18,
      }}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
        </svg>
        Search by name or code
      </button>

      {/* Recent scans */}
      {recentScans.length > 0 && (
        <div>
          <div className="font-mono" style={{
            fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
            fontWeight: 700, marginBottom: 8, paddingLeft: 4,
          }}>
            LAST {recentScans.length} SCAN{recentScans.length === 1 ? '' : 'S'}
          </div>
          <div style={{
            background: 'rgba(255,255,255,0.02)',
            border: '1px solid var(--border)', borderRadius: 10,
            overflow: 'hidden',
          }}>
            {recentScans.map((r, i) => (
              <div key={r.id + '-' + r.ts + '-' + i} style={{
                padding: '10px 14px',
                borderBottom: i < recentScans.length - 1 ? '1px solid var(--border)' : 'none',
                display: 'flex', alignItems: 'center', gap: 10,
              }}>
                <span style={{
                  width: 18, height: 18, borderRadius: '50%',
                  background: r.kind === 'override' ? 'rgba(255,179,0,0.2)' : 'rgba(0,230,118,0.2)',
                  color: r.kind === 'override' ? '#FFD08A' : '#7CF0B8',
                  fontSize: 12, fontWeight: 800,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0,
                }}>{r.kind === 'override' ? '!' : '\u2713'}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)',
                    overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {r.name}
                  </div>
                  <div className="font-mono" style={{ fontSize: 10, color: 'var(--text-soft)' }}>
                    {tierLabel(r.tier)}{r.seat ? ' \u00b7 ' + r.seat : ''}{' \u00b7 '}{r.code}
                  </div>
                </div>
                <span className="font-mono" style={{ fontSize: 10, color: 'var(--text-soft)' }}>
                  {fmtTime(r.ts)}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// SCAN RESULT PANEL — slides over the camera
// ============================================================
function ScanResultPanel({ result, onDismiss, onOverride }) {
  const { kind, ticket, message } = result;
  const isValid = kind === 'valid' || kind === 'override';
  const isDuplicate = kind === 'duplicate';
  const isInvalid = kind === 'invalid' || kind === 'notfound';

  // Auto-dismiss valid scans after 2 seconds; duplicates and invalids stay until user dismisses
  useEffect(() => {
    if (isValid) {
      const t = setTimeout(() => onDismiss(), 2000);
      return () => clearTimeout(t);
    }
  }, [isValid, onDismiss]);

  let bg, border, iconBg;
  if (kind === 'valid') {
    bg = 'linear-gradient(135deg, rgba(0,230,118,0.95), rgba(0,200,100,0.95))';
    border = 'rgba(0,230,118,0.6)';
    iconBg = '#00E676';
  } else if (kind === 'override') {
    bg = 'linear-gradient(135deg, rgba(255,179,0,0.95), rgba(230,150,0,0.95))';
    border = 'rgba(255,179,0,0.6)';
    iconBg = '#FFB300';
  } else if (isDuplicate) {
    bg = 'linear-gradient(135deg, rgba(255,23,68,0.95), rgba(200,20,55,0.95))';
    border = 'rgba(255,23,68,0.7)';
    iconBg = '#FF1744';
  } else {
    bg = 'linear-gradient(135deg, rgba(120,120,140,0.95), rgba(80,80,100,0.95))';
    border = 'rgba(150,150,170,0.5)';
    iconBg = '#888';
  }

  return (
    <div className={isValid ? 'anim-success' : 'anim-shake'} style={{
      position: 'absolute', inset: 0,
      background: bg, border: '1px solid ' + border,
      borderRadius: 12,
      padding: '24px 20px',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      gap: 14, color: 'white',
      textAlign: 'center',
    }}>
      {/* Big icon */}
      <div style={{
        width: 64, height: 64, borderRadius: '50%',
        background: 'rgba(255,255,255,0.2)', backdropFilter: 'blur(8px)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 36, fontWeight: 900,
      }}>
        {kind === 'valid' ? '\u2713' : kind === 'override' ? '!' : kind === 'duplicate' ? '\u26A0' : '\u2717'}
      </div>

      <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5 }}>
        {kind === 'valid' && 'ADMIT'}
        {kind === 'override' && 'OVERRIDE \u2014 ADMITTED'}
        {kind === 'duplicate' && 'DUPLICATE'}
        {kind === 'invalid' && 'INVALID TICKET'}
        {kind === 'notfound' && 'NOT FOUND'}
      </div>

      {ticket && (
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>
            {ticket.attendee_name || '\u2014'}
          </div>
          <div className="font-mono" style={{ fontSize: 12, opacity: 0.9 }}>
            {tierLabel(ticket.tier_code)}{ticket.seat_label ? ' \u00b7 Seat ' + ticket.seat_label : ''}
          </div>
          <div className="font-mono" style={{ fontSize: 11, opacity: 0.75, marginTop: 4 }}>
            {ticket.ticket_code}
          </div>
        </div>
      )}

      {isDuplicate && ticket && (
        <div style={{
          fontSize: 12, opacity: 0.92,
          padding: '8px 12px',
          background: 'rgba(0,0,0,0.2)',
          borderRadius: 6, lineHeight: 1.4,
        }}>
          Already scanned at {fmtTime(ticket.scanned_at)}
          {ticket.scanned_by ? ' by ' + ticket.scanned_by : ''}
        </div>
      )}

      {message && (
        <div style={{ fontSize: 13, opacity: 0.9, padding: '0 4px', lineHeight: 1.4 }}>
          {message}
        </div>
      )}

      {/* Action buttons */}
      {isDuplicate && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, width: '100%', marginTop: 4 }}>
          <button onClick={onDismiss} style={resultBtnStyle('primary')}>
            DENY ENTRY
          </button>
          <button onClick={() => onOverride(ticket)} style={resultBtnStyle('ghost')}>
            {'OVERRIDE \u2014 ADMIT ANYWAY'}
          </button>
        </div>
      )}

      {(kind === 'invalid' || kind === 'notfound') && (
        <button onClick={onDismiss} style={resultBtnStyle('primary')}>
          DISMISS
        </button>
      )}

      {isValid && (
        <div style={{ fontSize: 10, opacity: 0.7, marginTop: 2, letterSpacing: 1 }}>
          AUTO-CLEARS IN 2s
        </div>
      )}
    </div>
  );
}

const resultBtnStyle = (variant) => ({
  width: '100%',
  padding: '14px 16px', borderRadius: 8,
  background: variant === 'primary' ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.18)',
  color: 'white', border: variant === 'primary' ? 'none' : '1px solid rgba(255,255,255,0.3)',
  fontSize: 13, fontWeight: 800, letterSpacing: 1.2,
  cursor: 'pointer',
});

// ============================================================
// GROUPS TAB — performer check-in overview
// ============================================================
function GroupsTab() {
  const [registrations, setRegistrations] = useState([]);
  const [tickets, setTickets] = useState([]);
  const [members, setMembers] = useState([]);
  const [expanded, setExpanded] = useState({});
  const [sortBy, setSortBy] = useState('missing'); // 'missing' | 'name' | 'recent'
  const [categoryFilter, setCategoryFilter] = useState('all');
  const [searchTerm, setSearchTerm] = useState('');
  const [loading, setLoading] = useState(true);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    const [regsRes, ticketsRes, membersRes] = await Promise.all([
      // Exclude only truly-dead registrations. Actual status values used in
      // the system: 'pending', 'meeting_scheduled', 'approved', 'denied',
      // 'confirmed', 'paid'. Show everything except 'denied'.
      supabase.from('registrations').select('*').not('status', 'eq', 'denied'),
      supabase.from('tickets').select('*').eq('tier_code', 'P'),
      supabase.from('registration_members').select('*'),
    ]);
    // Diagnostic logging — useful when "no groups" appears but admin shows
    // registrations. Open the browser console to see what the scanner can
    // actually read with anon access.
    if (regsRes.error) console.error('[Groups] registrations fetch error:', regsRes.error);
    if (ticketsRes.error) console.error('[Groups] tickets fetch error:', ticketsRes.error);
    if (membersRes.error) console.error('[Groups] members fetch error:', membersRes.error);
    console.log('[Groups] loaded:',
      (regsRes.data || []).length, 'registrations,',
      (ticketsRes.data || []).length, 'performer tickets,',
      (membersRes.data || []).length, 'members');
    setRegistrations(regsRes.data || []);
    setTickets(ticketsRes.data || []);
    setMembers(membersRes.data || []);
    setLoading(false);
  }, []);

  useEffect(() => {
    fetchAll();
    const ch = supabase.channel('groups-tab-tickets')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tickets' }, () => fetchAll())
      .subscribe();
    return () => supabase.removeChannel(ch);
  }, [fetchAll]);

  // Group: pair each registration with its members and ticket check-in status.
  // The proper join is registration_members.ticket_id -> tickets.id (set when admin
  // generates tickets). We fall back to a name match only if ticket_id is missing,
  // which can happen for legacy rows. Members are sorted by member_order so the
  // group sheet matches what the leader sees.
  const groupStats = useMemo(() => {
    const ticketsById = {};
    tickets.forEach((t) => { ticketsById[t.id] = t; });

    return registrations.map((reg) => {
      const groupMembers = members
        .filter((m) => m.registration_id === reg.id && m.payment_status !== 'dropped')
        .sort((a, b) => (a.member_order || 0) - (b.member_order || 0));
      const groupTickets = tickets.filter((t) =>
        t.registration_id === reg.id && t.status !== 'cancelled' && !t.reissued_to_ticket_id
      );

      const memberStatus = groupMembers.map((m) => {
        // Primary: member.ticket_id -> tickets.id
        let matchingTicket = m.ticket_id ? ticketsById[m.ticket_id] : null;
        // Fallback: name match (legacy data with no ticket_id link)
        if (!matchingTicket) {
          matchingTicket = groupTickets.find((t) =>
            (t.attendee_name || '').trim().toLowerCase() === (m.member_name || '').trim().toLowerCase()
          );
        }
        return {
          name: m.member_name,
          checked_in: !!(matchingTicket && matchingTicket.scanned_at),
          scanned_at: matchingTicket ? matchingTicket.scanned_at : null,
          ticket_code: matchingTicket ? matchingTicket.ticket_code : null,
          payment_status: m.payment_status,
        };
      });
      const presentCount = memberStatus.filter((m) => m.checked_in).length;
      const totalCount = memberStatus.length || groupTickets.length;
      const missingCount = totalCount - presentCount;
      const lastCheckIn = memberStatus
        .filter((m) => m.scanned_at)
        .map((m) => m.scanned_at)
        .sort()
        .pop();
      let badge;
      if (totalCount === 0) badge = 'pending';
      else if (presentCount === 0) badge = 'none';
      else if (missingCount === 0) badge = 'all';
      else if (missingCount <= 2) badge = 'most';
      else badge = 'many-missing';
      return {
        reg, memberStatus, presentCount, totalCount, missingCount, badge, lastCheckIn,
      };
    });
  }, [registrations, tickets, members]);

  const filteredAndSorted = useMemo(() => {
    let list = groupStats;
    if (categoryFilter !== 'all') {
      list = list.filter((g) => (g.reg.category || '').toLowerCase().indexOf(categoryFilter.toLowerCase()) !== -1);
    }
    if (searchTerm) {
      const t = searchTerm.toLowerCase();
      list = list.filter((g) =>
        (g.reg.group_name || '').toLowerCase().indexOf(t) !== -1 ||
        (g.reg.registration_code || '').toLowerCase().indexOf(t) !== -1
      );
    }
    list = [...list];
    if (sortBy === 'name') {
      list.sort((a, b) => (a.reg.group_name || '').localeCompare(b.reg.group_name || ''));
    } else if (sortBy === 'missing') {
      list.sort((a, b) => b.missingCount - a.missingCount);
    } else if (sortBy === 'recent') {
      list.sort((a, b) => (b.lastCheckIn || '').localeCompare(a.lastCheckIn || ''));
    }
    return list;
  }, [groupStats, categoryFilter, searchTerm, sortBy]);

  const allHere = groupStats.filter((g) => g.badge === 'all').length;

  return (
    <div style={{ padding: '14px 18px 90px' }}>
      {/* Controls */}
      <div style={{ display: 'grid', gap: 8, marginBottom: 14 }}>
        <input
          placeholder="Search group name or DKC code"
          value={searchTerm}
          onChange={(e) => setSearchTerm(e.target.value)} />
        <div style={{ display: 'flex', gap: 8 }}>
          <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} style={{ flex: 1 }}>
            <option value="missing">Sort: Most missing</option>
            <option value="name">Sort: Group name</option>
            <option value="recent">Sort: Recently checked in</option>
          </select>
          <select value={categoryFilter} onChange={(e) => setCategoryFilter(e.target.value)} style={{ flex: 1 }}>
            <option value="all">All categories</option>
            <option value="open">Open Stage</option>
            <option value="boe">BOE</option>
            <option value="fanchant">Fanchant</option>
            <option value="fanbooth">Fanbooth</option>
          </select>
        </div>
      </div>

      <div style={{
        padding: '10px 14px', marginBottom: 14,
        background: 'rgba(255,255,255,0.03)',
        border: '1px solid var(--border)', borderRadius: 10,
        fontSize: 13, color: 'var(--text-muted)',
      }}>
        <strong style={{ color: 'var(--text)' }}>{allHere}</strong>
        {' / ' + groupStats.length + ' groups fully present'}
      </div>

      {loading && <div style={{ textAlign: 'center', padding: 30, color: 'var(--text-soft)' }}>{'Loading\u2026'}</div>}

      {!loading && filteredAndSorted.length === 0 && groupStats.length === 0 && (
        <div style={{ textAlign: 'center', padding: 30, color: 'var(--text-soft)', fontSize: 13, lineHeight: 1.5 }}>
          <div style={{ marginBottom: 6 }}>No performer groups yet.</div>
          <div style={{ fontSize: 11 }}>
            Groups appear here once admin generates performer tickets for a registration. Each member gets their own QR; this tab tracks how many are checked in per group.
          </div>
        </div>
      )}

      {!loading && filteredAndSorted.length === 0 && groupStats.length > 0 && (
        <div style={{ textAlign: 'center', padding: 30, color: 'var(--text-soft)', fontSize: 13 }}>
          No groups match your filters. Clear the search/category to see all groups.
        </div>
      )}

      <div style={{ display: 'grid', gap: 8 }}>
        {filteredAndSorted.map((g) => (
          <GroupCard key={g.reg.id}
                     stats={g}
                     expanded={!!expanded[g.reg.id]}
                     onToggle={() => setExpanded((p) => ({ ...p, [g.reg.id]: !p[g.reg.id] }))} />
        ))}
      </div>
    </div>
  );
}

function GroupCard({ stats, expanded, onToggle }) {
  const { reg, memberStatus, presentCount, totalCount, badge } = stats;
  const badgeStyles = {
    all: { bg: 'rgba(0,230,118,0.15)', border: 'rgba(0,230,118,0.4)', text: '#7CF0B8', label: 'ALL HERE' },
    most: { bg: 'rgba(255,179,0,0.15)', border: 'rgba(255,179,0,0.4)', text: '#FFD08A', label: 'MOSTLY HERE' },
    'many-missing': { bg: 'rgba(255,23,68,0.15)', border: 'rgba(255,23,68,0.4)', text: '#FF7A8E', label: 'MISSING' },
    none: { bg: 'rgba(255,255,255,0.05)', border: 'var(--border)', text: 'var(--text-soft)', label: 'NONE YET' },
    pending: { bg: 'rgba(255,255,255,0.05)', border: 'var(--border)', text: 'var(--text-soft)', label: 'NO TICKETS' },
  };
  const b = badgeStyles[badge];
  return (
    <div style={{
      background: 'rgba(255,255,255,0.02)',
      border: '1px solid var(--border)', borderRadius: 10,
      overflow: 'hidden',
    }}>
      <button onClick={onToggle} style={{
        width: '100%', padding: '12px 14px',
        background: 'transparent', border: 'none',
        textAlign: 'left', cursor: 'pointer',
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)',
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {reg.group_name || '\u2014'}
          </div>
          <div className="font-mono" style={{ fontSize: 10, color: 'var(--text-soft)', marginTop: 2 }}>
            {(reg.category || 'Uncategorized').toUpperCase()}{' \u00b7 '}{reg.registration_code || '\u2014'}
          </div>
        </div>
        <div className="font-mono" style={{
          fontSize: 13, fontWeight: 800, color: 'var(--text)',
          padding: '4px 10px', borderRadius: 6,
          background: 'rgba(255,255,255,0.05)',
        }}>
          {presentCount}/{totalCount}
        </div>
        <span style={{
          padding: '4px 8px', borderRadius: 999,
          background: b.bg, border: '1px solid ' + b.border,
          fontSize: 9, letterSpacing: 1, fontWeight: 800,
          color: b.text, whiteSpace: 'nowrap',
        }}>
          {b.label}
        </span>
      </button>

      {expanded && (
        <div style={{ padding: '0 14px 14px', borderTop: '1px solid var(--border)' }}>
          {memberStatus.length === 0 && (
            <div style={{ fontSize: 12, color: 'var(--text-soft)', padding: '10px 0' }}>
              No members listed yet.
            </div>
          )}
          {memberStatus.map((m, i) => (
            <div key={m.name + '-' + i} style={{
              padding: '8px 0',
              borderBottom: i < memberStatus.length - 1 ? '1px solid var(--border)' : 'none',
              display: 'flex', alignItems: 'center', gap: 10,
            }}>
              <span style={{
                width: 16, height: 16, borderRadius: '50%',
                background: m.checked_in ? 'rgba(0,230,118,0.25)' : 'rgba(255,255,255,0.06)',
                color: m.checked_in ? '#7CF0B8' : 'var(--text-soft)',
                fontSize: 10, fontWeight: 800,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0,
              }}>{m.checked_in ? '\u2713' : '\u00b7'}</span>
              <div style={{ flex: 1, minWidth: 0, fontSize: 13,
                color: m.checked_in ? 'var(--text)' : 'var(--text-soft)',
                textDecoration: m.checked_in ? 'none' : 'none',
              }}>
                {m.name || '\u2014'}
              </div>
              <span className="font-mono" style={{ fontSize: 10, color: 'var(--text-soft)' }}>
                {m.checked_in ? fmtTime(m.scanned_at) : 'missing'}
              </span>
            </div>
          ))}
          {reg.leader_phone && (
            <div style={{
              marginTop: 10, paddingTop: 10,
              borderTop: '1px solid var(--border)',
              fontSize: 12, color: 'var(--text-muted)',
            }}>
              Leader: {reg.leader_name || ''}
              {' '}
              <a href={'tel:' + reg.leader_phone} style={{ color: 'var(--brand)', fontWeight: 600 }}>
                {reg.leader_phone}
              </a>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// LOOKUP MODAL — manual ticket lookup by name or code
// ============================================================
function LookupModal({ onClose, onPickTicket }) {
  const [mode, setMode] = useState('name'); // 'name' | 'code'
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  // Debounced search.
  //
  // Strategy:
  //   - BY NAME: matches against tickets.attendee_name. Also matches against
  //     orders.buyer_name and follows the join to find tickets, so searching
  //     the buyer's name finds tickets even if attendees were named differently.
  //   - BY CODE: matches against tickets.ticket_code (e.g. KP-V-A13). Also
  //     matches against orders.order_number (e.g. KP-0004) and returns the
  //     associated tickets. Some staff will read off the order # because
  //     that's what shows on the buyer's receipt.
  useEffect(() => {
    if (!query || query.length < 2) { setResults([]); return; }
    setLoading(true);
    const t = setTimeout(async () => {
      const trimmed = query.trim();
      console.log('[Lookup] searching', mode, '=', trimmed);
      const directQ = supabase.from('tickets').select('*')
        .neq('status', 'cancelled')
        .is('reissued_to_ticket_id', null)
        .limit(20);

      let directRes;
      if (mode === 'name') {
        directRes = await directQ.ilike('attendee_name', '%' + trimmed + '%');
      } else {
        directRes = await directQ.ilike('ticket_code', '%' + trimmed + '%');
      }
      if (directRes.error) console.error('[Lookup] direct query error:', directRes.error);
      console.log('[Lookup] direct match:', (directRes.data || []).length, 'tickets');
      let combined = directRes.data || [];

      // Also try matching via orders table — covers the case where staff types
      // an ORDER number (KP-0004) instead of a ticket code (KP-V-A13), or
      // searches by buyer_name when the attendee_name differs.
      const orderSearch = await supabase.from('orders').select('id, order_number, buyer_name')
        .ilike(mode === 'name' ? 'buyer_name' : 'order_number', '%' + trimmed + '%')
        .limit(20);
      if (orderSearch.error) console.error('[Lookup] order search error:', orderSearch.error);
      console.log('[Lookup] order match:', (orderSearch.data || []).length, 'orders');
      if (orderSearch.data && orderSearch.data.length > 0) {
        const orderIds = orderSearch.data.map((o) => o.id);
        const ticketsForOrders = await supabase.from('tickets').select('*')
          .in('order_id', orderIds)
          .neq('status', 'cancelled')
          .is('reissued_to_ticket_id', null)
          .limit(20);
        if (ticketsForOrders.error) console.error('[Lookup] tickets-for-orders error:', ticketsForOrders.error);
        console.log('[Lookup] tickets-via-orders:', (ticketsForOrders.data || []).length, 'tickets');
        if (ticketsForOrders.data) {
          // Merge results, deduplicating by ticket id
          const seen = new Set(combined.map((t) => t.id));
          for (const t of ticketsForOrders.data) {
            if (!seen.has(t.id)) {
              combined.push(t);
              seen.add(t.id);
            }
          }
        }
      }

      // Also try matching against registration_members for performer tickets.
      // Performer tickets have an attendee_name, but staff might know the
      // member by a different field (e.g. ID number, original registrant).
      // Relationship: tickets.registration_member_id → registration_members.id
      if (mode === 'name') {
        const memberSearch = await supabase.from('registration_members').select('id')
          .ilike('member_name', '%' + trimmed + '%')
          .limit(20);
        if (memberSearch.error) console.error('[Lookup] member search error:', memberSearch.error);
        console.log('[Lookup] member match:', (memberSearch.data || []).length, 'members');
        if (memberSearch.data && memberSearch.data.length > 0) {
          const memberIds = memberSearch.data.map((m) => m.id);
          const perfTickets = await supabase.from('tickets').select('*')
            .in('registration_member_id', memberIds)
            .neq('status', 'cancelled')
            .is('reissued_to_ticket_id', null)
            .limit(20);
          if (perfTickets.error) console.error('[Lookup] perf tickets error:', perfTickets.error);
          console.log('[Lookup] tickets-via-members:', (perfTickets.data || []).length, 'tickets');
          if (perfTickets.data) {
            const seen = new Set(combined.map((t) => t.id));
            for (const t of perfTickets.data) {
              if (!seen.has(t.id)) {
                combined.push(t);
                seen.add(t.id);
              }
            }
          }
        }
      }

      console.log('[Lookup] final results:', combined.length, 'tickets');
      setResults(combined);
      setLoading(false);
    }, 300);
    return () => clearTimeout(t);
  }, [query, mode]);

  return (
    <div style={modalOverlayStyle} onClick={onClose}>
      <div style={modalCardStyle} onClick={(e) => e.stopPropagation()}>
        <ModalHeader title="Manual lookup" onClose={onClose} />

        <div style={{ padding: 16 }}>
          <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
            <button onClick={() => setMode('name')} style={pillBtnStyle(mode === 'name')}>
              BY NAME
            </button>
            <button onClick={() => setMode('code')} style={pillBtnStyle(mode === 'code')}>
              BY CODE
            </button>
          </div>

          <input
            autoFocus
            placeholder={mode === 'name' ? 'Type attendee or buyer name\u2026' : 'Type ticket code (KP-V-A12) or order # (KP-0004)'}
            value={query}
            onChange={(e) => setQuery(e.target.value)} />

          <div style={{ marginTop: 14, maxHeight: '50vh', overflowY: 'auto' }}>
            {loading && (
              <div style={{ textAlign: 'center', color: 'var(--text-soft)', padding: 20, fontSize: 13 }}>
                {'Searching\u2026'}
              </div>
            )}
            {!loading && query.length >= 2 && results.length === 0 && (
              <div style={{ textAlign: 'center', color: 'var(--text-soft)', padding: 20, fontSize: 13, lineHeight: 1.5 }}>
                <div style={{ marginBottom: 6 }}>No matches.</div>
                <div style={{ fontSize: 11 }}>
                  {mode === 'name'
                    ? 'Searched attendee names, buyer names, and performer member names. If the buyer\u2019s order is still awaiting review, no ticket exists yet — ask admin to confirm it.'
                    : 'Searched ticket codes (KP-V-A12) and order numbers (KP-0004). If the buyer\u2019s order is still awaiting review, no ticket exists yet.'}
                </div>
              </div>
            )}
            {!loading && results.map((t) => (
              <button key={t.id} onClick={() => onPickTicket(t.id)} style={{
                width: '100%', padding: '12px 14px',
                background: 'rgba(255,255,255,0.02)',
                border: '1px solid var(--border)',
                borderRadius: 10, marginBottom: 8,
                textAlign: 'left', cursor: 'pointer',
                color: 'var(--text)',
              }}>
                <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>
                  {t.attendee_name || '\u2014'}
                </div>
                <div className="font-mono" style={{ fontSize: 11, color: 'var(--text-soft)' }}>
                  {tierLabel(t.tier_code)}{t.seat_label ? ' \u00b7 ' + t.seat_label : ''}{' \u00b7 '}{t.ticket_code}
                </div>
                {t.scanned_at && (
                  <div style={{ fontSize: 10, color: '#FFD08A', marginTop: 4 }}>
                    Already checked in at {fmtTime(t.scanned_at)}
                  </div>
                )}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// SETTINGS MODAL

function SettingsModal({
  onClose, staffName, staffOptions, onStaffChange,
  soundOn, vibrateOn, onToggleSound, onToggleVibrate,
}) {
  return (
    <div style={modalOverlayStyle} onClick={onClose}>
      <div style={modalCardStyle} onClick={(e) => e.stopPropagation()}>
        <ModalHeader title="Settings" onClose={onClose} />

        <div style={{ padding: 16 }}>
          <SettingsLabel>Your name</SettingsLabel>
          <select value={staffName} onChange={(e) => onStaffChange(e.target.value)}>
            <option value="">{'\u2014'} Pick a name {'\u2014'}</option>
            {staffOptions.map((o) => (
              <option key={o.value} value={o.value}>{o.label}</option>
            ))}
          </select>
          <div style={{ fontSize: 11, color: 'var(--text-soft)', marginTop: 6, lineHeight: 1.4 }}>
            All scans you do are logged under this name.
          </div>

          <div style={{ marginTop: 22 }}>
            <SettingsLabel>Feedback</SettingsLabel>
            <ToggleRow label="Beep on scan" on={soundOn} onChange={onToggleSound} />
            <ToggleRow label="Vibrate on scan" on={vibrateOn} onChange={onToggleVibrate} />
          </div>

          <div style={{ marginTop: 22 }}>
            <SettingsLabel>Session</SettingsLabel>
            <button onClick={() => {
              if (window.confirm('Clear all settings and reload?')) {
                localStorage.clear();
                window.location.reload();
              }
            }} style={{
              width: '100%', padding: '12px', borderRadius: 8,
              background: 'rgba(255,23,68,0.1)',
              border: '1px solid rgba(255,23,68,0.3)',
              color: '#FF7A8E', fontSize: 13, fontWeight: 600,
              cursor: 'pointer', marginTop: 4,
            }}>
              Reset all settings
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SettingsLabel({ children }) {
  return (
    <div className="font-mono" style={{
      fontSize: 10, letterSpacing: 1.5, color: 'var(--text-soft)',
      fontWeight: 700, marginBottom: 8,
    }}>{children}</div>
  );
}

function ToggleRow({ label, on, onChange }) {
  return (
    <button onClick={onChange} style={{
      width: '100%', padding: '12px 14px',
      background: 'rgba(255,255,255,0.02)',
      border: '1px solid var(--border)', borderRadius: 8,
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      marginBottom: 6, cursor: 'pointer',
      color: 'var(--text)',
    }}>
      <span style={{ fontSize: 14 }}>{label}</span>
      <span style={{
        width: 36, height: 20, borderRadius: 999,
        background: on ? 'rgba(0,230,118,0.4)' : 'rgba(255,255,255,0.1)',
        position: 'relative',
        transition: 'background 0.15s',
      }}>
        <span style={{
          position: 'absolute', top: 2, left: on ? 18 : 2,
          width: 16, height: 16, borderRadius: '50%',
          background: on ? '#00E676' : 'rgba(255,255,255,0.6)',
          transition: 'left 0.15s',
        }} />
      </span>
    </button>
  );
}
